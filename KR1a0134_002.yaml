body:
  text: 周易淺述卷二翰林院編修陳夢雷撰比卦下坤上坎以二體言之水之在地上親切无間有比之象又卦以九五一陽為上下五隂所親附亦比之義故曰比也比卦次師按序卦衆必有所比故受之以比人類既多必相親附而後能安比所以次師也卦以九五為君象陽剛中正為衆所歸相親相輔但當自審于先不可失之于後此全彖之大㫖也六爻以五為比之主五隂皆求比之初以先而吉上以後而凶二以應五為自内四以承五為外比故皆吉唯三失其所比離五既逺而應于无位之上所以傷也此六爻之大略也比吉原筮元永貞无咎不寧方來後夫凶比親輔也卦以九五一陽為上下衆隂所歸以一人而撫萬邦以四海而仰一人故有親輔而吉之象原筮再筮也䝉卦坎一陽在下曰初筮比坎一陽在上曰原筮比本坤卦以再筮得乾之五具乾之元與坤之永貞故有原筮元永貞无咎之象水性流動終有所歸有不寧方來之象九五一陽已為衆所歸上後來以隂變陽兩雄不並棲有後夫凶之象占者得此則我當為人所親輔而吉然人之歸我歸于德也必我有元善永長正固之德然後可以當衆之歸而无咎其未比于我而有所未安者亦將來歸若彼遲而後至則此交已固彼來已晚而得凶矣卦就人比我言之本義謂我比人以是反觀然玩彖意則比人之占已在其中蓋卦以坎五為比之主故我有元永貞之德則人自當速比于我而彼之後至者凶矣若我无其德則必求有是德者比之我不可自取後夫之㓙蓋卦具此象筮者各隨所問以為占不可執一而論也彖曰比吉也本義謂三字皆衍大全謂衍也字今從之比輔也下順從也比之所以吉者以比有輔之義臣下皆順從之所以吉也順者情不容已從者分不可逃謂陽居尊而隂在下也此以卦體釋卦名及比吉之義原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也此亦以卦體釋卦辭也剛謂五以者因也因剛中則私无所留所以為元剛中則健而不息所以為永剛中則正固不偏所以為貞上下謂五隂凡卦皆以剛柔兩爻相應此則以五隂應五之一陽又為一例然師亦一陽五隂又專以五為應者師以君任將則其任專比以君臨下則其分嚴也既曰上下應又曰其道窮者五隂皆有當應之道獨上以一隂在最後勢處于窮所以凶也乾上九曰窮之災坤比上六皆曰道窮皆以處上極窮故也象曰地上有水比先王以建萬國親諸侯水比于地不容有間先王畫疆分國使連屬相親則諸侯知尊君親上而天下從之矣本義謂彖意人來比我此取我往比人然封建以治天下使天下親于諸侯即使諸侯親于天子亦人來比我之意也井田封建先王治天下之大者也于師得井田之法使民自相合而无間于比得封建之法使君與民相合而无間初六有孚比之无咎有孚盈缶終來有他吉易六爻皆歸正應獨比諸爻皆以比五為義他卦陽爻皆言有孚此隂爻亦言有孚程子所謂中實者信之質中虚者信之本也當比之始虚中求比意无他適有有孚比之无咎之象坤為土缶土器以隂變陽又為仰盂坎水下流初變為屯屯者盈也有水流盈缶之象不與五應而終比于五有終來有他吉之象言凡比之初貴乎有信則可以无咎若誠信之心既充則在我无他向之心不但无咎終且有他吉之來也時解就人臣始仕者言亦不必拘凡事君交友有所資于人皆從其占也象曰比之初六有他吉也言他吉即于其初而信之不待其終而見之也六二比之自内貞吉内外卦之分始見于此以二應五故曰比之自内謂之自内則涵養有素道可格君學可匡時非以名求以偽應者也柔順而中正故曰貞吉象曰比之自内不自失也隂柔恐自失其身得正則不自失矣已无所失然後可以比人也六三比之匪人六隂柔而居三不中不正承四乘二應上皆隂所比皆非其人不言凶而凶可知矣象曰比之匪人不亦傷乎比以求安也上无首而三應之所以傷也承乘應皆隂所應非人尤重所應如所事非人所承所乘如居之有鄰學之有友仕之有同寮皆是也三四皆吉然皆隂爻故統謂之匪人六四外比之貞吉以柔居柔外比九五為得其正吉之道也初不係四而比五曰他四不係初而比五曰外二曰自内有以心許國之意四曰外比有公爾忘私之意隂柔近君近于媚故皆戒以貞吉象曰外比于賢以從上也五以剛明中正之賢又居君位四外比之豈徒以其賢哉正以上下之分有所必從无所逃也九五顯比王用三驅失前禽邑人不誡吉五以一陽居尊為衆隂所附陽明光顯有顯比之象比為師之反陽在上而統衆有王用三驅之象四隂皆順乎五獨上背之而五无容心有失前禽之象坤為土為邑為衆五下四隂皆比聴上之背去邑人不誡之象三驅宜從舊解三度逐禽而射之也失前禽者古田獵之禮置㫋以為門刈草以為圍獵者三靣合圍開其前門天子自門驅而入車三發徒三刺謂之三驅禽獸由門而出者皆免惟在圍之中者殺之圍三靣而空其門所謂天子不合圍開一靣之網者此也從門出者為前故曰失前禽也王用三驅句不過言天子之田失前禽句中自有三靣不合圍之意若以三驅為三靣驅禽以待射則非矣邑人不誡者天子聽其去而不問既无必得之心則邑中之人亦无警備之意也師比之五皆取禽象然師之田有禽害物之禽也在師則執之王者之義也比之前禽逺我之禽也在比則失之王者之仁也然使邑人不喻上意有唯恐失之之心則禽無遺類其仁不廣矣故失前禽而邑人不誡乃為吉也此爻取象極得帝王之用心盖王者未嘗不欲萬國皆在綏懐之中然惟順我撫而親之其叛去者亦姑舍之在内者安之在外聴之其心光明正大在下亦相忘其化王道所以隆也象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也位在正中心無偏黨比之所以為顯而得吉也舍逆取順者古人之獵喜其向我而縱惡其背我而殺之似縱其順而殺其逆今借以為喻但取往者不追來者不拒之意故以向我出圍者為逆以縱之為舍以背我入圍者為順以殺之為取舍逆去者取其順者順逆兩忘德怨不任也上使中者王心无取舍邑人亦无得失共化于中若上使之也上六比之无首㐫按王註云乾剛惡首比吉惡後五君元首之象上六居五之後比之不先无首之象即卦所謂後夫凶者也本義謂隂柔居上无以比下為无首之象盖以卦畫之序言之則上為後而初為先以上下之體言之則上為首而初為足其才既不足以髙人而為人之首又不能自卑以後人而失其首二意亦相貫也乾以純剛盡變為柔曰无首比以隂居上亦曰无首而吉凶各異者乾之无首剛而能柔不為首者也故吉比之无首隂柔不足為首者也故凶象曰比之无首无所終也其德不足以為首則其效不能以有終矣全卦以一陽統衆隂有君臨萬邦之象故五隂皆以比五為義而不論爻位之相應五為人所比貴于顯顯則正大光明取内四隂之比而舍上之後比不以為嫌餘五爻皆比人者惡其後後則无始无終故三以應上而傷初以能比于先而吉二以中正内比四以得正外比故皆有貞吉之占也卦爻大意取象于事君交友而得此卦者亦隨事以為占不必泥也小畜乾下巽上巽一隂伏于二陽之下故其德為巽為入其象為木為風畜止之也畜止剛健莫如巽順乾在上之物乃居巽下為巽所畜故為畜也然以隂畜陽能係而不能固以柔順柔其剛健非能力止之也所畜者小之義也又卦唯六四一隂得位上下五陽説之皆為所畜隂小陽大以小畜大之義也故為小畜彖傳不及二體但言六四畜諸陽盖舉其重言之也小畜次比按序卦比必有所畜故受之以小畜物相比附則為畜聚又相親比則志相畜小畜所以次比也全彖内健外巽二五剛中其志得行有可亨之道然其畜未極則施亦未行占者得此能亨而未可大有所為此全彖之大㫖也六爻上三爻巽為畜者也下三爻受畜者也初與四為正應二近初而剛中故初復自道而二亦以牽復而吉也三近四而非正應故為反目四以一隂畜衆陽在憂懼之中故有孚而血去惕出也五助四以畜乾四得五為合志五合志于四為以鄰也至上則畜極而成然以隂畜陽聖人憂之故危詞示戒此六爻之大略也小畜亨密雲不雨自我西郊卦以巽隂畜乾陽爻以一隂畜五陽皆以小畜大畜而不固小畜之義也以卦德言之内健外巽有可為之才以卦體言之二五皆以陽剛居中有得為之勢其道有可亨也隂在天上有雲象雲雖密而陽多足以制之又坎為雨三四五互為離坎之反也故為不雨象互體得兊為西方有西郊象四為主四互成兌在外卦又為巽風雲氣雖密遇巽風雲自西而東隂倡而陽不和不能成雨故有密雲不雨自我西郊之象占者得此其道可亨而不能大有所為或以臣畜君則臣道雖盛未能得君以施其澤或以小人畜君子則雖受其拘縻而守道不為所困或以應事則大事未有所成而為小事所阻不必執一以論也本義以為文王與紂之事似亦不必拘彖曰小畜柔得位而上下應之曰小畜柔得位六居四也上下應五陽也卦為一隂則四為主故獨言其得位四得位而不能大有所畜者隂柔故也此以卦體釋卦名義也健而巽剛中而志行乃亨剛健果決則能秉正嫉邪巽順舒徐則非用壯用罔五剛中正二與合德君子居中用事正氣得伸志可行也乃亨乃者亦難之之詞陽為隂畜宜不亨矣以健巽剛中志行乃亨也此以卦德卦體而言見陽道猶可亨也密雲不雨尚往也自我西郊施未行也尚往陽也指二五兩陽而言陽升而隂不能固止之陽以得行為亨也施未行隂也指六四一隂而言隂不能固諸陽未能鬱蒸成雨所施未得行也然曰未行則非終不行上九既雨既處則畜極而雨隂施亦行矣盖上九論一爻之德則有畜極而施之理彖論全卦之體則有密雲不雨之象夫子彖傳于陽則曰志行于隂則曰未行則又扶陽抑隂之微㫖也象曰風行天上小畜君子以懿文德陰陽和則畜極而為雨陽氣盛而畜之不固則散而為風雨則澤施風則號令雖布所施猶未行此風行天上所以為小畜也本義謂風有氣无質能畜而不能乆盖對大畜言之謂山體剛而風質柔然不必泥懿美也大畜多識前言往行所畜者大道德經綸之事也小畜未能厚積逺施所畜者小但美其文德如文章才藝之末而已初九復自道何其咎吉下卦乾體純陽本在上之物故自下升上曰復自道言由其故道也本義謂初九居下得正前逺于隂雖與四為正應而能自守以正不為所畜故有進復自道之象今時解皆從之謂如君子不援小人以進也然爻義雖取進復全卦則取畜止四以一隂畜衆陽初適與應自有畜象但九居初自處以正而所應又正雖為所畜而其進以道則不受其拘縻所以為小畜也此與本義不為所畜意稍異然于卦義為順以人事言之則如孔子之于季桓子雖為所召而墮其都亦復自道之義也如此則无咎而吉可必矣象曰復自道其義吉也吉斷以義不待事後而始知也九二牽復吉王註程傳皆以二五同志為牽復本義以連初為牽復今從本義盖五與四鄰主畜者也不得牽二下卦三陽同志上進者也二漸近隂似不能復矣然以剛居中故能與初九牽連而復譬則君子同道彚征亦吉道也象曰牽復在中亦不自失也初復自道固不失已二有剛中之德亦可同道不至自失也九三輿說輻夫妻反目按來註乾錯坤有輿象今按坤為輿取其能載然乾亦可為輿取其健行如震為龍乾亦為龍不必從錯卦取象也輻車轑所以利輪之轉也輻无脱理必輪破轂裂而後可脱三與四本非正應也志從上進而迫近于隂見制于四為隂所畜不能自進互四得兌為毁折有輿脫輻之象以陽遇隂受其畜而不能平乾為夫巽長女為妻有夫妻象互四兌又為口舌互四五得離為目有夫妻不和反轉其目不相對視之象重剛非正故不能如初之自道不中故不能如二之牽復象曰夫妻反目不能正室也夫不能正其室家由自處不以道也三剛而不中四為卦主自制于四六四有孚血去惕出无咎外卦主為畜者四又畜之主也以一隂畜衆陽本有傷害憂懼以其柔順得正虚中巽體而五上二陽助之有有孚之象坎為血又為加憂四互三五為離離坎之反有血去惕出之象血去身可无傷惕出心可无憂得以无咎矣占者必誠信感人乃可逺害若不然則凶咎也象曰有孚惕出上合志也上合志謂二陽與四同心畜乾也九五有孚攣如富以其鄰五上同為巽體與四合志畜乾者也而九五居中處尊勢能有為以兼乎上下四中虚五中實皆言有孚中虚者信之本中實者信之質也攣與牽皆有相連之義二連初以上進有牽引之象五合四上以畜乾非攣固不可然唯五居尊能使之攣如也上比上下比四有鄰象四隂虚乏而五陽實又巽為利市三倍有富象推其富以助六四而畜之是為以其鄰之象以隂畜陽雖能有所畜終非聖人之所與也故初二皆有吉占而四五則否象曰有孚攣如不獨富也言助四以畜乾也上九既雨既處尚德載婦貞厲月㡬望君子征凶上九變巽為坎為雨為月之象畜極而成隂陽和矣不雨者既雨矣尚往者既處矣尚尊之也載積而滿載也猶詩言厥聲載路也隂不盛不能畜陽今既雨既處由于尊尚隂德至于積滿而然也婦德如此雖正亦厲葢隂盛抗陽如月之將望君子不可以有行矣婦雖貞亦厲戒隂不得加陽君子有征必凶戒陽不可失道以受制于隂也象曰既雨既處德積載也君子征凶有所疑也由積載而雨䖏則隂之積當防其漸矣巽為畜者必有孚而後可畜而乾上進者必有疑而後免凶盖隂疑于陽必戰有凶象有所疑而豫制之或可免于凶也陽為君子上與三應上畜已極三進不已至于反目所謂征凶也全卦為小畜其象不雨故陽道可亨上爻變為需則雲上于天而雨則向之尚往者至此而征凶矣易之大㫖扶陽抑隂而此卦最重此意乾受畜者以尚往而不受所畜為善故初得正應而二以剛中皆得吉占獨三以不中而非正應為反目巽為畜者以合志同力為善然主畜者有防患之危而僅免于咎以鄰者有攣如之固而未得吉占至于畜極而成猶云雖正亦厲雖戒君子之征實畏隂德之盛也占者得此當各從其類以為占大抵陽為君子為夫為大事為善隂為臣為小人為妾婦為小事為惡又論我之所處主于畜人或受人所畜隨事以求其吉凶不可執一以論也又按來註以五上二爻不宜作同力畜乾宜作與陽同德引陽尚往盖謂陽為君子隂為小人五上不宜佐小人以防君子又以彖有剛中志行為陽之亨故以德積載為載三陽俱上也不知陽雖可亨而卦本取于畜原不必拘君子小人之解即以君子小人論之小人之畜君子非盡害之也正欲引用之耳如季桓子之于孔子蔡京之于楊龜山乃可為小畜盖牢籠羈縻之而已君子雖為所引不受其牢籠故陽德猶可亨猶可往所以為小畜彖就全卦言之故以五為剛中志行若單就五一爻而言自宜主畜乾之説盖五變則為大畜君子不家食此正小人引用君子之時也若上變為需則畜極而隂已盛矣故戒君子之往非能載三陽以上也履卦下兌上乾兌一隂見于二陽之上其德為説其象為澤天在上而澤居下上下之分尊卑之義理之常也禮之本也常履之道也又内和悦而外尊嚴禮之象也故為履履卦次小畜按序卦物畜然後有禮故受之以履物既畜聚則有大小之别高下之等美惡之差而禮起履所以次小畜也人之所履和悦卑遜斯為有禮全彖以和柔躡剛强之後處危而不見傷九五陽剛居尊所履中正其道光明有亨之象在上陽剛中正在下和柔卑順禮也人之所履當如是也此全彖之大㫖也又禮主謙柔陽爻處隂位謙也故六爻以剛履柔者吉以柔履剛者凶以剛履剛者厲初言往上言旋一進一反有踐履之義初陽履剛以在下而无咎九二之幽人九四之愬愬上九之考祥皆以剛履柔能行而不輕于行所以吉也六三之跛履以柔履剛不能行而强于行所以凶也九五之夬履能行而決于行所以厲也此六爻之大略也履虎尾不咥人亨程傳以履為承藉之義謂乾上而兌下乾乘兑而兑承之也本義以履為躡後之義謂乾前而兌後剛在前而兌以柔和踵其後也今按虎尾字則躡之意為是乾剛强有虎象兌以和柔躡之有履虎尾不見傷之象人之入世多近危機不為所傷乃見所履以柔應剛謙以自處其道自亨惟禮可以免禍也按來註以兌錯艮為虎象遂以履作踐履之履不知震為龍乾亦為龍取其陽也艮為虎乾亦為虎取其剛也若必作踐履于彖傳柔履剛句不通矣彖曰履柔履剛也以柔弱躡剛强之後此以二體釋卦名義也說而應乎乾是以履虎尾不咥人亨此以卦德釋彖辭也以兌說應乎乾剛則和而不激順而不拂可以亨矣剛中正履帝位而不疚光明也上文釋彖已畢此又專就九五一爻推廣其義二三四互為離有光明象以剛居尊位而得正所履之无咎者也德盛輝光功業顯著豈不亨乎此又發彖辭言外之意象曰上天下澤履君子以辨上下定民志立卦之義取乎踐履人之所履禮而已矣禮者所以辨上下定民志古人位必稱德終身居之得其分而志安焉位或未稱則君進之士修其學學至而君求之已无所慕也農工商賈各勤其業所享亦有定限无所貪也此上下之志定而天下之治定也後世位不稱德則上下不辨不辨則公卿妄意尊榮士庶僥倖求利分不明則志不定治所以難也此君子觀履之象而分别上下使各當其分以定民志也初九素履往无咎初九以陽在下居履之初未為物遷率其素履以往所謂素位而行可无咎也六爻皆以陽居隂為善初雖陽位而在下在下能安其素不變所守雖未得吉咎可无矣象曰素履之往獨行願也初无應故曰獨獨行其志願不為紛華所奪即所謂不願乎其外也民有志必辨分而始定士有願則能獨行其素矣九二履道坦坦幽人貞吉二變震為大塗履道坦坦之象剛中在下无應于上幽獨守貞之象人之所履未有不合道而吉者以剛居中道也剛而居柔坦也在下无應幽也坦則平易而无險阻幽則恬静而不炫燿又幽獨之人多賢者之過坦坦則不為索𨼆行怪以驚世駭俗宜其貞吉矣以陽居隂不得言正而曰貞吉者戒辭恐其幽静難乆剛化為柔故戒以惟貞則吉也此卦二五皆剛中二貞吉而五貞厲者二以剛居柔五以剛居剛也以剛居柔所履謙下禮之本也故六爻唯九二盡履之道象曰幽人貞吉中不自亂也二有中德在幽而貞外物不得而亂之也六三眇能視跛能履履虎尾咥人凶武人為于大君視不正曰眇行不中曰跛六三互二四為離有目象互四五為巽有股象兌為毁折有眇跛之象逼近于乾有履虎尾之象獨與上應履其尾而首應之有咥人象陽主寛和隂主肅殺六三以一隂為成卦之主欲統五陽又以兌隂變為陽為純乾有武人為大君之象六三不中不正柔而志剛以履乾必見傷害故占為凶又如剛武之人得志肆暴必不能乆也象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也自以為能視明實不足自以為能履行實不足爻柔故不足位剛故自以為能不中不正位之不當以柔居三其志務剛皆凶道也九四履虎尾愬愬終吉愬愬畏懼之意九四亦以不中不正履九五之剛然以剛居柔故有履危知戒而終得吉之象全卦以乾為虎此爻又以五為虎唯五以剛居剛也卦彖爻三言履虎尾而吉凶不同者全卦以和說履乾剛之後故不咥人亨三以柔居剛故咥人而凶四以剛居柔故畏懼而吉也二與四皆以剛居柔而二有坦坦之安四有愬愬之危者二得中而四不得中也象曰愬愬終吉志行也以剛居柔謙志得行所以終吉志剛者不足與行愬愬者其志得行而人可審所履矣時解以此爻作大臣畏慎得君行志言盖初曰獨行逺君也四曰志行近君也柔順以事剛決之君得行其志也亦是但不必拘九五夬履貞厲九五以陽剛中正履帝位而下以兌説應之凡事必行无所疑礙故有夬決其履之象然在上者純任其剛在下者一主于悦君驕臣謟之漸也故雖貞亦厲盖在下者不患其不憂患其不能樂故二之履坦曰貞吉喜之也在上者不患其不樂患其不能憂故五之夬履曰貞厲戒之也然彖辭剛中正光明而爻辭則厲何也盖以全卦言六爻未動剛中正所以為善此就九五一爻言之且變乾為離自恃其明愈過于夬決在本卦上決下說變又上下成睽比所以厲也象曰夬履貞厲位正當也以剛居五正當尊位傷于所恃故也上九視履考祥其旋元吉履上與小畜上皆不取本爻義小畜取畜之極從六四一隂來以隂盛為凶履取履之終合諸爻而觀其始終故以其旋為元吉旋謂周旋无虧欠也吉事有祥祥非外來視吾所履則祥可考若以此往此旋皆无虧欠則得大善之吉矣又按來註以視履為句其旋為句言周旋中規折旋中矩則履之盡善者可以大吉也意同本義而解旋字更順象曰元吉在上大有慶也人心難于有終元吉在上是所履至終大善故福慶亦大也全卦以履為禮又取踐履為義大抵危而能亨乃見所履之善剛而居柔乃𫉬所履之吉觀履之吉㐫而處世可悟矣泰卦乾下坤上内陽外隂天地氣交萬物生成君子進用世道方亨故為泰泰次于履按序卦履而泰然後安故受之以泰盖履得其所乃得安舒履所以次之以泰也泰以中為善故二為輔泰之臣五為保泰之君皆得吉占初為君子進用之始四則過中欲否之時矣三為消長之㑹猶可有為上則極盛而衰不免于吝矣自有天地人物以來䝉以教之需以養之訟以平之師以衛之比以附之畜以聚之履以辨之而後得泰乃過中而否之㡬伏矣甚矣致泰之難保泰之不易雖曰天數不可無人事也泰小往大來吉亨泰通也天地交而二氣通故為泰内卦三陽正月之卦也隂小陽大坤往居外乾來居内以綜卦言之有小往大來之象占者有陽剛之德則吉而亨也盖坤本在下之物自下而上故曰往陽本在上之物自外而内故曰來往者去而來者當時用事故為吉亨彖曰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也天地高卑之形不可交而氣可交交則萬物化生君臣上下之分不可交而心可交交則君臣同德隂陽以氣言順健以德言此二句造化之小往大來也君子小人以類言此三句人事之小往大來也内外釋往來之義隂陽健順君子小人釋大小之義盖隂陽不能相無者天地之氣而欲天下皆君子而無小人者聖人之心泰否之機歸宿于君子小人之消長主持世運者所當知也然小人必不能盡去但使君子居中而制其命小人在外不為无措君子之氣已伸天下已泰矣象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地之道以形氣全體言財成以制其過也如氣化流行相續聖人分之以春夏秋冬地形廣邈交錯聖人限之以東西南北之類是也天地之宜以時勢所適言輔相以補其不及也如春生秋殺聖人使春耕秋斂高燥下濕聖人使髙黍下稻之類是也裁成輔相皆所以左右輔助乎民自乾坤以後隂陽各三十畫而為泰而泰之隂陽各三是泰由隂陽无過不及而成故既泰之後裁其過補其不及所以保泰也初九拔茅茹以其彚征吉乾初變巽坤初變震皆属木三隂三陽皆相連以上故泰否初爻皆有拔茅茹之象茹根之牽連者三陽在下初動則相連以進衆君子同德以升泰運初開之時占者有陽剛之德則往而得吉矣初曰以其彚三陽欲進而以之者在初君子與君子為類也四曰以其鄰三隂欲復而以之者在四小人與小人為類也初曰征吉四則否者易為君子謀也象曰拔茅征吉志在外也君子之志在天下不為一身故當泰之時志欲上進也九二包荒用馮河不遐遺朋亡得尚于中行卦内君子而外小人三隂在外荒穢小人之象九二當保泰之任有宜包容荒穢之象以九合五成坎河象乾健臨之有馮河之象五隂在外隔三與四遐逺之象二應之不遺遐逺之象三陽朋象二居中不偏上應乎五專意事君不立朋黨有朋亡之象泰欲得中二大臣輔泰者當使君子小人皆得其所不能包荒使小人無所容則非中然能包荒而无果斷亦非中也二以中上應乎五有包容之德以剛應柔又有馮河之勇遺棄疎逺使小人不得效其力固非中然能不遺逺而君子在近自成朋黨亦非中也二逺應乎五逺人在所懷居中不倚近者亦无可昵剛柔相濟无偏无黨合四者言之合中行之道也然二居中固為中行今曰尚則中行又指五也五之象曰中以行願盖泰欲得中上有中行之君下非有中行之臣不能上輔乎五而保泰矣故二曰尚五曰歸所謂上下交而志同曰得尚喜之之辭也以隂爻言五取小人以位言又取君此又不可為典要者也象曰包荒得尚于中行以光大也二變為離有光大象人惟心胸光明正大故能兼容果斷不至遺逺而昵近獨言包荒舉一以該其餘也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福九三將過于中泰將極而否欲來之時也陽居内為平往外則為陂隂出外為往返内則為復乾三朝乾夕惕有艱貞象變兌為口食象天下无常平而不陂者无常往而不反者唯艱危其思慮正固其施為則可以无咎恤憂也孚理之信然者也食享之也平陂往復天運之必至而信然者也若以此動其心則不能艱貞矣唯盡其處泰之道而不以此為憂恤則可以食享其福也盖平陂往復者天運所不能无艱貞勿恤者人事所當自盡也象曰无往不復天地際也古本有无平不陂天地際謂隂陽交㑹消長之際也六四翩翩不富以其鄰不戒以孚六四已過乎中有泰極為否之漸六四一隂既動則五上二隂同類有翩然而下不約而同之象陽實隂虚故曰不富鄰指五上以四以之也小人合謀自外而内不待戒令自然相信君子所當戒也陽之升曰拔茅以自下而上升之難也隂之復曰翩翩以自上而下復之易也象曰翩翩不富皆失實也不戒以孚中心願也失實謂隂虚也以失實恐不容于君子欲傷正勢必結于小人乃中心所願也六五帝乙歸妹以祉元吉三四五互為雷二三四互為澤有歸妹象史謂湯為天乙左傳謂紂父為帝乙姑兩存之程傳謂帝乙始制王姬下嫁之禮本義謂帝乙歸妹時占得此爻今從程傳盖以隂居尊為泰之主柔中虚已下應九二以柔中之君倚任剛明之臣可以保泰𫉬福有帝女之貴下從其夫而受福之象全卦三隂皆為小人以五一爻言之則保泰之君不可執一論也象曰以祉元吉中以行願也居中應二行其志願非勉强也上六城復于隍勿用師自邑告命貞吝坤土復反于下有城復于隍之象掘隍土積累以成城如治道積累以成泰及泰之終將反于否如城土頽圮復反于隍也坤上為泰坤下為否以隂陽之氣言也若言其質則坤土本在下之物在上有必頽之理曰復者反其初也坤為衆有師象又為國土有邑象泰極而否衆心已散難以力爭勞民傷財必至散亂窮守一邑罪已下詔収拾人心可也然不能保邦未危而播告之修不能及逺雖正亦可羞矣象曰城復于隍其命亂也命政令也其命先亂故至于否不盡関天運也告命乃盡人事以治之非付之不可為也全卦以小往大來為義故内三陽属泰外三隂属否初為泰運方開君子並進二為保泰之臣三則隂陽消長之㑹也四為過中將否之時五為保泰之君上則泰極為否之日也泰以方中為幸故二五皆能保泰初陽始進則可幸四隂方動則可憂三陽已極則艱貞猶可有為上隂已復則命亂已難于治唯聖人保于方泰之時而不敢自弛于泰極之日雖天運有所必然而人事無時不宜自盡也否卦坤下乾上天地不交萬物不通隔絶閉塞故為否否卦次泰按序卦物不可以終通故受之以否通極必塞氣化之常否所以次泰也否與泰反故全彖之辭皆與泰反而六爻大意亦然内三爻為否而外三爻漸極而為泰初為小人用事之始二則小人得志之時三則小人有知羞之意四則否過中有將泰之機五則人君休否之事而上則否傾為泰矣天運無終泰亦无終否此天人所以常相勝而主持世道者當盡人事以回天心也否之匪人不利君子貞大往小來否閉塞也三隂在内七月之卦也匪人非人道也天地交而萬物生萬物唯人最靈不交則不生人道絶矣其占不利于君子之正道貞有何不利但此時小人用事不利于君子之貞大往小來謂陽往居外隂來居内也泰先言小往大來而後言吉亨否先言不利君子貞而後言大往小來聖人以泰歸之天否責之人也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也无邦謂上下隔絶雖有邦與无邦同也隂陽以天道言剛柔以地道言君子小人以世道言泰言健順此言剛柔者泰天地之氣交故言其德否氣既不交則言其質而已象曰天地不交否君子以儉德辟難不可榮以祿収斂其德不形于外以免小人之忌象坤隂之吝収斂于内也德既斂藏人不知我故不得以祿位榮之象乾德之剛逺避于外也初六拔茅茹以其彚貞吉亨三隂在下當否之時小人連類而進亦有拔茅茹以其彚之象然初之惡未形故許以貞則吉亨欲其變為君子也小人苟得故戒之以貞也然君子小人有何定名能貞則君子矣易為君子謀否乃不利君子貞之時乃戒小人以貞為小人謀正為君子謀也象曰拔茅貞吉志在君也泰初九應六四六隂也民也初陽志在澤民不獨善其身故曰志在外否初六應九四九陽也君也初六志在愛君不自植其黨故曰志在君小人以愛君為念則不計其私變為君子矣大抵小人初進猶有君國之念其後乃患得患失之心日勝彌縫奔競日工故此爻為始進者戒之小人君子之分視其志而已六二包承小人吉大人否亨否包承與泰包荒同否對外卦三陽言六二為得位之小人有欲包羅羣陽而以承順取之之象小人能如是在小人為吉道也然大人處此則當身安于否而道可亨不可以彼包承于我而失其所守妄意出否以求亨也初惡未形故不曰小人二則直以小人稱矣初曰吉亨猶望反否為泰二則否亨遂成否矣小人不安于否求亨何所不至故否亨者大人之事非小人之所能也象曰大人否亨不亂羣也三隂小人之羣也大人妄意出否以求亨則入于小人之羣矣身否道亨乃不亂于其羣也六二包羞以隂居陽不中不正欲包羣陽故有包羞之象三否之極小人之在髙位者故亦欲包羣陽然二居柔猶知承順乎君子所居中正故吉三居剛故不言承所居不中正則取羞而已包承如彌子之于孔子包羞則丁謂之拂鬚是也三否已極矣然世雖極亂必无善類盡滅之理君子有否亨之道小人亦不能盡肆其惡猶有所包藏且君子終有有命之時小人亦不能无愧于心故猶懷羞恥以其惡未肆而知羞也故不言凶咎之戒象曰包羞位不當也小人所以包而取羞者豈心之所甘哉但以不中不正所處之位不當故耳開小人以悔過也九四有命无咎疇離祉程傳以命為君命謂九四近君凡事必由君命以圖濟否也本義以命為天命泰極而否否極泰來天之所命即泰三平陂往復之義也今從本義為優九四以陽居隂不極其剛否過中而將泰之時有有命自天我不致咎疇類三陽皆可𫉬福之象盖否泰之運皆天命也泰變否易故于内卦言之否轉為泰難故于外卦言之泰之三必无咎而後有福否之四必无咎而後離祉盖乾坤交接之㑹隂陽消長之際必我自立于无過而後可為福而後可為疇類之福也泰三平陂往復冀其艱貞勉君子也否四有命无咎喜其𫉬祉戒小人也君子有命自天當否有可亨之道否極有泰來之祉小人之欲包君子者不誠可羞哉彌子謂孔子主我孔子亦曰有命即此意也象曰有命无咎志行也有命自天又必无咎者人與天合轉否為泰之志始行也九五休否大人吉其亡其亡繫于苞桑九五陽剛中正以居尊位能休時之否大人之事占此爻者大人遇之則吉也然方欲休之否未盡傾故必常存危亡之心乃有苞桑之固桑根深固苞叢生者其固尤甚也三四五互為巽木苞桑象巽又為繩繫之之象二五皆以大人言二有德無位故守其否而道亨五有德有位則能休時之否矣二時方否故與小人並言五否已過則大人獨居其位矣然非有戒懼之心不能為休否之事未可盡聴之天也象曰大人之吉位正當也唯有位故能休否與二之大人否亨者德同而位不同也无位時不能否亨得位未有能休否者上九傾否先否後喜以陽剛居否極能傾時之否者也不曰否傾而曰傾否不恃天運而貴人事也變兌為悦有喜象先否後喜先有其亡之懼則終有傾否之喜也象曰否終則傾何可長也天下无終否之時必有陽剛之才以傾之也全卦以大往小來之義内三隂皆属否外三陽則漸為泰初小人之惡未形猶可不至于否二則小人得志否之成三則小人知羞否之極矣四之有命否已過中有欲泰之機五之休否則有轉泰之事至傾否則否極為泰矣泰以三隂在外為小人而六五居尊應二又為保泰之主否以三隂在内為小人而六二中正可言否亨之大人則因爻起義不可執一也同人離下乾上離一隂麗于二陽之間其德為麗為文明其象為火為日為電天在上而火炎上有同之象上乾為天為君下離六二一爻在離之中居人之位卦中上下五陽同欲二之一隂而二五又以中正相應有以天同人以君同人之義故曰同人同人次否按序卦物不可以終否故受之以同人天地不交則為否上下相同則為同人又世既否必與人同力乃濟同人所以次否也同人取其大公不欲其狹小大公至正乃可以有為此全彖之大㫖也六爻雖以二為成卦之主然以私係而吝反不如初之无私猶无所咎也三四與五争二而不克同者然三怯于力不如四之反于理為得吉也五雖為三四所隔然終以正應而得同上雖免於三四之争然以逺而終未遂同之志合六爻而論之欲與人同貴于公正又可見矣同人于野亨利涉大川利君子貞天火性同二五中正德同五陽喜隂情同天與火其性光明正大其勢曠逺无私有同人于野而得亨通之象乾性健行同則可以濟險有利涉大川之象内文明而外剛健中正有應君子之正道也有利君子貞之象同人于野其同也大利君子貞其同也正人能大同有亨之道故大川可涉然有所同大而未必正者矣故又戒以正為本占者能大公至正則可亨而大有所為矣又按夫子言君子周而不比和而不同卦名取比與同者何也盖比以一陽為衆隂所比獨坎五一陽得正故彖有元永貞則其比所以為君子之周也同人以一隂為五陽所同唯二五之應以正故彖言利君子貞其同所以為君子之和也至兩卦六爻之中兼正不正言之唯正則為君子此夫子賛易之外又有周而不比和而不同之説也彖曰同人柔得位得中而應乎乾曰同人柔謂六二乾指五此以卦體釋卦名義同人曰舊作衍文來註謂敘述卦辭而釋之語氣謂六五應乾固名同人矣然卦辭曰同人于野亨利涉大川者何也起下乾行句為是同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志乾行句釋利涉大川之由二為同人之主應乾固亨矣至于利涉大川非二所能乃乾以剛健之天德同乎人以涉險故曰乾行也文明以健二句合二體言之釋利君子貞之意内文明則能燭理明乎大同之義外剛健則能克已盡乎大同之道二五皆居中得正内无私心而外合天德凡此四者皆君子之正道也正者人心所同然君子唯以正而天下之志已在吾心所以利君子貞也象曰天與火同人君子以類族辨物天在上而火炎上同而異異而同也類族者天之生物各族殊分法乾之无私者于殊分之族而類聚其所同異中之同也辨物者火之所及凡物畢照法離之有辨者于均照之物而辨析其異同中之異也初九同人于門无咎兩户為門初變艮為門有門象同于門外雖非野之可比然亦所同者廣而无私同人之初未有私主以剛在下上无係應占可无咎象曰出門同人又誰咎也門以内家人也于宗是也門以外天下之人也雖未至于野而非私昵矣必出門而所同乃大人自无咎之者他卦又誰咎有在我取禍无所歸咎者此則謂其无私人不得而咎之也六二同人于宗吝宗黨也乾為諸卦之祖離中變為乾有同于宗之象六二中正有應于上在一卦為同之主宜得吉占然同之道貴乎大公二既專有所應則不能大同矣又以隂從陽臣妾順從之道也故吝易之悔自㐫趋吉吝則自吉趨凶本以相應為善反以過于私暱而得吝盖全卦取大同之義于爻義又示阿黨之戒也象曰同人于宗吝道也狹而不公有可吝之道也九三伏戎于莽升其髙陵三嵗不興離為戈兵有戎象二三四互為巽木有莽象二與五為正應三剛而不中欲同于二懼五見攻伏于下以伺五之隙有伏戎于莽之象三變隂互為艮有髙陵象三居下卦之上下窺二之動有升其高陵之象自三至上三爻上无正應有三嵗不興之象三欲同二而二非正應則理不直五居尊位勢又不敵故三年之乆不敢動此强同而不得者也象曰伏戎于莽敵剛也三嵗不興安行也敵剛指五安行言上无應必不可行至于三嵗之乆又安能行乎九四乘其墉弗克攻吉四剛不中正欲同六二而為三所隔自三欲下取二故有乘墉以攻之象然以剛居柔知二非正應故有自反不克攻之象能改過可以得吉則賢于三矣盖三伏于莽自下而伺五也四之乘墉乘三以攻二也三惡五之親二故有犯上之心四惡二之比三故有陵下之志然三以剛居剛懼五之攻屈于勢也四以剛居柔終不克攻反于義也反義得吉道矣此始强同而終能改過者也象曰乘其墉義弗克也其吉則困而反則也已乘其墉則力非不足也斷以義而弗克攻耳義者天則之不可踰志欲攻而知義不可攻困于心而反于法則能改過者所以吉也與人同善事也乃三四皆有争奪之象四乘墉有其意三伏莽則已見其形矣四惡二三所欲攻者臣三敵五則欲攻其君矣涉世者不可不知而三四有吉否之不同又好剛强同者所宜戒也九五同人先號咷而後笑大師克相遇五剛中正二柔中正本正應也而為三四所隔不得其同然正應者終不得而間也隔于三四號咷之象五變為離互三四又為兌為說又火无定體故有先號咷而後笑之象離為戈兵有大師象三四剛强九五以陽剛之德勝之故有大師以克之象二五終為正應相遇之象九五大君三四以臣隔君大逆也故興大師以克强暴而後遇正應也然人君宜與天下相孚于大同乃不免于先號後笑用師以克如敵國之争何也盖以全卦言之以大同為亨而就二五一爻言之終未免于私吝故不得言吉也象曰同人之先以中直也大師相遇言相克也中理直故不勝其忿先至于號咷也直即君子之正也相遇必由于中直乃克非至正无以通天下之志也上九同人于郊无悔乾有郊象居外无應去隂已逺物莫與同故有同人于郊之象野逺而郊近但野乃大衆徃來之道无人不同郊在郭外荒僻之處无人可同也然无所争可以无悔象曰同人于郊志未得也爻曰无悔以其无争于人喜之夫子則以不能同于人病之唯君子能通天下之志今无人可同則于同人之忘亦未得遂也易卦有以此爻為主而吉凶與彖同者如屯之初比之五是也有成卦在此爻而不得為主吉凶與彖異者則此卦之二五是也盖論全卦以五陽同一隂又二五皆中正故有曠逺无私之象若就一爻論則所應既專在我有私暱之嫌在人有忿争之事矣故二吝而五不免于號咷三四皆争上以逺而志不遂初亦以比二而僅免咎六爻之義皆不及全彖之德君子欲通天下之志非大公至正不能也大有乾下離上火在天上其明及逺萬物畢照有盛大豐有之象又一隂居尊衆陽並應易以陽為大有所有者大之義故曰大有大有次同人按序卦與人同者物必歸焉故受之以大有衆物所歸所有乃大大有所以次同人也小畜亦一隂五陽而曰小此則稱大者小畜隂居四欲統諸陽其勢逆大有隂居五則位尊以統諸陽則勢順故小畜之亨不在六四而在上下五陽大有之元亨不在上下五陽而在六五五以柔居尊而為上下所應合全卦又有内剛健外文明之德自可大亨此全彖之大㫖也六爻皆從五起義初逺五而有艱二應五而无咎三以公而亨于五四以謙而能承五上以近五而𫉬天祐此六爻之大略也大有元亨大有所有之大也火在天上无所不照一隂居尊得中五陽宗之乾健離明居尊應天尊位能柔物情所與諸爻之有皆六五之有豈不大哉所有者大則其亨亦大矣皆治世極盛之象也彖曰大有柔得尊位大中而上下應之曰大有同人大有一柔五剛均也柔在下曰得位得中曰應乎乾而為同人我同乎彼卑附于尊之辭也柔在上曰尊位曰大中曰上下應而為大有我有其大上統乎下之義也此以卦體釋卦名義也其德剛健而文明應乎天而時行是以元亨上節自柔得尊位以下專主六五一爻以論人君之位能有衆陽之大自其德剛健以下兼上下兩體以論人君之德能致元亨之治也内剛健則克勝其私外文明則灼見其理上下應之者衆陽應乎六五也應天時行者五以柔應乾二之剛也天之道不外乎時而已憲天出治順時而行是以大亨也象曰火在天上大有君子以遏惡揚善順天休命凡物未見則有无不可知火在天上无物不照始見其有之大所有既大不可无以治之也天命有善而无惡君子于惡之未著者遏絶之使不復作善之𨼆者顯揚之使樂于為去惡歸善所以順天休美之命也謂之順者天討有罪吾遏之以天天命有德吾揚之以天于我无與也君子在上則以此治世在下則以此治身故本義云反之于身亦若是而已矣初九无交害匪咎艱則无咎害者害我之大有也富者怨之府故當大有之時最易有害初居下位凡民而享大有家肥屋潤人或害之離為戈兵又以離火克乾金有惡人傷害之象而初陽在下上无繫應未與物接去離尚逺未涉乎害何咎之有然自以為匪咎而以易心處之反有咎矣故必艱難其志慎終如始乃得无咎盖匪咎者此爻之義艱則无咎則處此爻之道也象曰大有初九无交害也交則有害處卑无應未有驕盈之失得以无害故也九二大車以載有攸往无咎坤為大輿九二體乾而曰大車者輿指軫之方而能載者言車則以其全體而言引之以馬之健行之以輪之圜皆乾象也況九二以剛居柔柔則其虚足以受剛則其健足以行有大車象上應乎五載上之象如是而有所往可以无咎可以任重而致逺也不言吉者處大有之時任天下之重分所當然得以无咎而已此大臣才德兼全足以任重者也象曰大車以載積中不敗也車大足以任重雖多積于中而車行不至于敗也九三公用亨于天子小人弗克亨作享按本義作享獻之享時解因之取大臣獻替之義今按左傳卜偃戰克而王享之言作宴享之享為優三四五互兌為口三變六為坎有飲食象九三居下之上剛而得正有公侯之象上有六五之君虚中下賢有亨于天子之象然三變六為隂為小又有小人弗克之象占者得此有剛正之德則足以受天子之寵榮若不然則雖有享宴之榮亦負素餐之愧也此與本義稍殊然于卦爻較切象曰公用亨于天子小人害也小人妄叨君寵反為害也乾金三變為兌亦金也迫近離火與初无交害者不同故有害九四匪其彭无咎彭鼓聲又盛多之貌即大有之大也四變中互為震震為鼓有彭象大有皆六五之有也然以柔中居尊而九四以剛近之且居四陽之首率諸陽以進盛多盖彭矣近君聲勢不宜太盛唯以剛居柔雖盛大而不有其大故有匪其彭之象占者如是則无咎也象曰匪其彭无咎明辨晳也四為離之初有明晳之象有盛大之勢而无燭理之明僣逼震主則柔中之君有所不安矣當大有之時不自有其大非明晳者不能故曰明辨辨其所居之地乃别嫌多懼之地辨其所遇之時乃盛極將衰之時凡事貶損以處之斯晳然明理見㡬者矣六五厥孚交如威如吉六五為大有之主離體中虚有厥孚之象柔中以應九二上下歸之有交如之象一變純乾有威如之象當大有之時柔中居尊上下孚信然太柔則人心玩矣濟之以威所以吉也初曰交害五曰交如者臣有交則私故害君有交則虚故吉也三有戒辭初二四僅得无咎獨五言吉者當大有之世盡臣道之常僅可免咎而君能剛柔並用使上下泰交則可常保其大有矣故曰吉象曰厥孚交如信以發志也一人之信以發上下孚信之志所謂上下交而其志同也威如之吉易而无備也恐人心慢易至于无備故威不可无也上九自天祐之吉无不利大有唯六五一隂而上下五陽從之上九能下從六五以陽從隂處盛時居髙位享自然之福有自天祐之之象曰天祐曰吉曰无不利其為福多矣象及傳皆不言所以致福之由故繫辭謂履信思順尚賢盖五之交孚信之也上能履之謙退不居思順也志從于五尚賢也天助順人助信有自天祐之吉无不利之象時解作人君信順下賢以保有照繫辭傳大意而歸重于君也大全作功成身退之耆舊賔師就六爻合論對五而言之也然皆不必拘占者得之亦隨其所處之位以為占大抵有剛明之德居崇髙之位得天之祐者而以人事言之唯履信思順尚賢則吉也象曰大有之吉自天祐也上居君上有自天象曰自天祐之言其非倖致也全卦為盛世至治之象以六五之君為主初之无交盛世之逸民也上之順五功成身退之耆舊或在賔師之位者也中爻三位為臣二大臣當大有之任者也三外臣也以公侯而受寵者也以不中故有戒辭四近臣也近于君而自抑損者也以剛居柔臣道之宜故與初同无咎五以中虚之信孚乎上下又一變純乾剛以濟之上下交應剛柔並用君明臣良故能長保其大有乏盛治也謙卦艮下坤上内止外順為謙之意山髙地卑屈而處其下為謙之象故曰謙也謙次大有按序卦有大者不可以盈故受之以謙大則易于滿盈道在謙損謙所以次大有也全彖極言謙德之亨六爻雖以九三一陽為主然内三爻皆吉外三爻皆利盖静則多吉順則多利六十四卦未有如謙之盡善者君子可以知所處矣謙亨君子有終謙者有而不居之義止乎内而順乎外山髙而處乎地之下皆有而不居者也他卦或有待而亨謙則即亨他卦始亨而未易保其終唯謙則始雖卑而終益尊始雖晦而終益光盖謙者人情所樂與故必亨始雖不居終有成就故有終艮終萬物亦有有終之象程傳謂小人雖暫謙未必能乆唯君子終身不易是謂謙之有終也本義謂先屈而後伸是謂亨之有終也然二意宜兼盖君子唯始終能謙所以始終能亨若暫時勉為謙恭偶然倖𫉬通泰皆非君子也彖曰謙亨天道下濟而光明地道卑而上行天氣下降以濟萬物天之謙也化育之功光明著見則謙之亨也地勢卑順處物之下地之謙也其氣上行以交于天則謙之亨也天地猶不敢以自滿況于人與鬼神乎此以天地言謙之必亨天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也虧盈益謙以氣言日中則昃月滿則缺是也變盈流謙以形言髙岸為谷深谷為陵是也害盈福謙以理言滿則招損謙則受益是也惡盈好謙以情言滿盈取忌退巽見推是也四者皆出于自然而非有心故曰道也盖太極之中本無一物事業功勞于我何有天地生萬物而不言所利此天地人鬼所以皆有取于謙也然六爻皆以三為主三居下卦之上有尊象光艮體也三居上卦之下有卑象不可踰德莫之過也盖人居尊而不光者有矣謙者處尊而能下人其德愈光人處卑則皆得而踰之謙者處卑所謂我自卑而人莫我髙又孰得而踰之君子之終言此所以為君子有終也不于其終觀之則争而得謙而失者盖有之矣惟要于究竟然後知謙之終必亨也象曰地中有山謙君子以裒多益寡稱物平施不言山在地中而言地中有山言卑下之中藴其崇髙也外卑下而内藴崇髙謙之象也山之在地髙者降而下卑者升而上一升一降髙卑適平矣物之多者裒取而使之寡猶降山之髙使之卑也寡者増益而使之多猶升地之卑而使之髙也一裒一益而多寡適平矣稱物平施謂稱物之多寡而損益之然後所施均平而多者不偏多寡者不偏寡也盖謙之為名生于過也物過然後知有謙謙者使物不過期得中而已聖人即謙之名使一切返于中善用謙者也凡大象皆於卦外教人用易之理裒多益寡稱物平施俾小大長短各得其平非君子謙德之象乃君子治一世使歸于謙之象也初六謙謙君子用涉大川吉以柔處下有謙而又謙之象三四五互為震木二三四互為坎水木在水上涉川之象用涉與利涉稍殊利涉者无往不利用涉者涉川不可争先用謙謙之道以涉則吉人當險難之時非深自屈折不足以濟故必用謙謙以涉也全卦以三為主故與彖同言君子初亦得稱君子者盖三在下卦之上有勞而謙在上之君子尊而光者也初在下卦之下謙而又謙在下之君子卑而不可踰者也用以涉川則雖濟患難可矣況平居乎占者有其德則常變皆吉也象曰謙謙君子卑以自牧也牧如牛羊使之馴服也養德之地未有不基于至卑者養者至則愈卑而不可踰矣六二鳴謙貞吉隂陽唱和為鳴卦以三為主三互四五為震善鳴者也易凡與震相應者皆言鳴豫初中孚二是也故此卦二上皆言鳴謙盖三以勞而能謙故凡聞其風者皆相從于謙和之而鳴言論稱述皆自處于卑下所謂鳴其謙也二與三比柔順中正謙出于性故有貞吉之象此爻本義謂以謙有聞解鳴字亦可通但此卦以三為主諸爻所解與三无涉于取象又未見確解意義稍淺今按蘓傳解之覺于三爻意義融貫象曰鳴謙貞吉中心得也二所居中正謙本于中心所自得非由勉强正與上爻對九三勞謙君子有終吉一陽居下之上剛而得正上下所歸有勞而能謙者也謙非難勞而能謙為難一陽為成卦之主勞矣乃不處上而處下故有勞而能謙之象上不疑而下不忌自能保終而吉也艮終萬物三居艮之終得其正位故以彖辭君子有終歸之象曰勞謙君子萬民服也卦中五隂有民象非服其勞服其勞而能謙所謂汝惟不伐天下莫與汝争功萬民服即有終也六四无不利撝謙柔而得正上而能下其占无不利矣然功不及三而居其上必當發揮其謙以示不敢自安之意盖勞謙者雖无忮害之心而在四則亦有自盡之道也象曰无不利撝謙不違則也理之當然非過于法則也六四不富以其鄰利用侵伐无不利隂柔不富之象以柔居尊五謙皆為之用不富而能以其鄰之象坤為衆五變互三為離為戈兵又有行師之象五君位君德不必以謙見且謙柔之過或不能以自立矣故不言謙然不自用而用人謙之大者謙者不争然居君位而使人有不服非稱物平施之謂矣故為君茍不自用而能用人雖以之侵伐亦无不利盖无害于為謙也象曰利用侵伐征不服也言其侵伐非得已非外謙而内好勝也上六鳴謙利用行師征邑國上與三應亦有鳴謙之象坤為地為衆有國邑征伐之象僅可征已之邑國不能如五之无不利也象曰鳴謙志未得也可用行師征邑國也二柔順中正故貞吉上所居不中特以與三應故亦鳴其謙謙之實有不足矣謙實不足故已之邑國或叛之然上鳴在于謙則叛者不利叛者不利則征之者利矣以謙得人心故利用行師非五之位故不能无不利非二之中故不能貞吉是以鳴謙雖與二同而未得遂其志也全卦以九三一陽爻為主而五隂所處雖有尊卑廣狹常變之不同而由艮體之静皆得吉占由坤德之順皆得利占則甚矣謙德之可貴也豫卦下坤上震九四一陽為卦之主上下羣隂應之内順外動由順以動无不和悦有豫之義又雷閉地中動而出地通暢和豫豫之象也豫卦次謙按序卦有大而能謙必豫故受之以豫大而能謙則有豫樂豫所以次謙也然豫有三義曰備豫曰和豫曰逸豫知備豫則和豫隨之然和豫之過則逸豫生矣繫辭傳重門擊柝以待暴客盖取諸豫此備豫之意彖象所未及也然建侯行師雖主人心和豫而建藩禦侮備豫之意𨼆寓其中矣六爻唯九四之豫以和樂言他則皆有心求豫失豫之正而流于逸豫者也唯二以中正不溺于豫然有先㡬之識則其知備豫可知然則凡事宜豫而豫不可溺此全卦六爻之大㫖也豫利建侯行師豫兼三義本義但以和樂言之盖備豫者所以致和樂之由而逸豫者又和樂之過故正解專取和樂盖彖意尚未他及也震動坤上長子主器有建國治民象坤順震下一陽統衆隂有行師動衆象屯有震无坤故不及行師謙有坤无震故不及建侯豫兼二卦故有此象建侯必百姓歸心行師必三軍用命人心和樂則二者利矣彖曰豫剛應而志行順以動豫九四一陽上下應之其志得行此以卦體言其豫也以坤遇震為順以動此以卦德言其所以致豫也豫順以動故天地如之而況建侯行師乎順理以動人心悅服建諸天地而不悖可也天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉日月之行景長不過南陸短不過北陸故分至啟閉不差其序以順隂陽之氣而動也刑必當罪順乎民心非一已喜怒之私民所以服也時義此時之義也此極言而賛其大使人涵泳言中而推其意于言外也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考陽閉地中奮震出地則通暢和豫矣先王作樂象雷之聲又取其和之義殷盛也樂无所不用薦上帝配以祖考盛之至也周祀稷于南郊配以祖也祀文王于明堂配以考也初六鳴豫凶隂柔在下獨與四應四震善鳴欲與倡和有鳴象然四大臣近君其志大行之時初位卑所居不中正小人在下上得强援當時用事不勝其豫夸大自張故有凶象卦以樂豫為義取衆心之樂也六爻自四外皆自樂者則逸豫之過矣故有吉凶之異初爻謙上之反對皆與震應故皆以鳴言然謙者卑下自處以聞于人者故猶有利豫者妄自張大因人為樂者故凶象曰初六鳴豫志窮凶也窮謂滿極六二介于石不終日貞吉二三四互為艮有石象二變互三四為離不終日而作之象樂豫易以溺人溺則憂矣六爻獨二中而得正自守之安静堅確如石静之至故其思慮明審不俟終日而見事理之㡬㣲是不溺于逸豫而知備豫者也盖此卦當逸豫以无所係應為善初應四而三五比之皆有係而溺于豫者故為凶為悔為疾二特立于衆隂之中而无遲戀之意故静則如石之堅動則有不終日之速不失其正而得吉也象曰不終日貞吉以中正也中正者處豫之道也六三盱豫悔遲有悔盱上視也隂不中正而近于四四為豫主六三不中不正希其逸樂而上視之有盱豫致悔之象故占者事當速悔若悔之遲必至于有悔也三質柔而位剛猶有能悔之象故戒之恐其悔之遲也盖盱豫者溺于逸豫遲悔則又失于猶豫矣聖人兩言悔始則示人以致悔之端終則勉人以悔過之勇也象曰盱豫有悔位不當也言所處不中正與六二反也九四由豫大有得勿疑朋盍簪九四卦所由以致豫者衆隂應之有大有得之象以陽居隂不能无疑故戒之德陽而位隂故五隂亦有朋象盍合也簪以貫髮者一陽貫五隂之中有以簪貫髮之象四大臣以陽剛任上事致君澤民合天下以為豫大有得矣又必開誠布公使朋類之賢俱進合志和衷則可常保其豫也象曰由豫大有得志大行也由已致天下于豫可謂大行其志矣六五貞疾恒不死貞疾猶言痼疾不得言正盖六五非正也三四五互為坎為心病貞疾之象當豫之時以柔居尊沈溺于豫又乘九四之剛事權歸四衆心不附處勢危矣然以其得中故又為恒不死之象二五皆不言豫六二貞吉以中且正當豫之時而不為豫者所以吉也六五貞疾中而不正當豫之時而不得豫者雖未至于凶亦僅矣人生于憂患而死于安樂以五之得中而僅得不死則過中者豈生道哉以君象言之周末之共主是也使剛而不中則魏之曹髦柔而不中則唐之僖昭矣可不戒哉象曰六五貞疾乘剛也恒不死中未亡也乘剛故權下移得中故位號猶可保也上六㝠豫成有渝无咎以隂柔居豫極有昏㝠于豫之象然以其動體又有事雖成而能有渝之象能改過則可无咎矣勉人以遷善也又豫上六變則為晉明出地上不終昏㝠樂極哀生有悔心之萌者所以无咎也然初鳴豫即斷其凶嚴于初以遏其惡也上冥豫開之以无咎恕于終以引其善也象曰㝠豫在上何可長也豫至昏㝠不可乆矣言當速改也全卦以九四一陽為主與彖之樂豫同義其他皆過于豫而至于逸豫者爻之吉凶皆從四起義二逺于四而中正所以吉上雖逺于四而處豫之極又與四同震體故為㝠初則應四而鳴豫者也三以比四而盱豫者也五又以乘四而溺于豫究不得豫者也總之豫宜衆不宜私故世道不可无豫人心不可有豫初凶而五疾三悔而上渝為國者當如四之勿疑守已者則當如二之介石矣隨卦下震上兌震動兌說此動而彼說隨之義也以少女從長男隨之象也隨卦次豫按序卦豫必有隨故受之以隨悅豫之極物之所隨隨所以次豫也全彖以物隨為義此感彼隨可以大通而要之于正則隨人之意亦在其中矣爻兼隨物為義此動彼説而至于隨易于自失其身大抵陽爻則人隨我陰爻則我隨人而隨人者宜隨上不宜隨下爻隂位剛者猶知所隨此三隨四所以有得二係初則有失上无所隨則不言隨也居上者宜為人所隨五君位為二所隨故貞吉四臣位為三所隨故貞凶初雖陽爻而在下故不言隨言係而言交此六爻之大略也隨元亨利貞无咎隨從也隨者我有以致物而物自隨乎我故占當得大亨然必利於正乃得无咎若不正則雖亨而不免于咎矣按左傳穆姜之言以隨四德與乾同雖非本㫖然所論深合利貞无咎大意諸卦中屯臨无妄革皆言元亨利貞獨隨係以无咎盖動而說易至于不正而有咎故示戒辭彖曰隨剛來而下柔動而說隨按本義謂以卦變卦體釋卦名義謂自困卦九來居初自噬嗑九來居五自未濟來兼此二變皆剛來下柔也今按來註但以綜卦言之隨蠱相綜雜卦原對言之隨以蠱之艮反兌居上㢲反震居下是剛來下柔也以後凡言卦變者皆從綜卦大亨貞无咎而天下隨時王註程傳皆作隨時謂隨時得正則天下皆隨其時也本義作隨之意尤順盖論全卦之義重我有以致物之隨也隨時之義大矣哉依本義作隨之時義尤順象曰澤中有雷隨君子以嚮晦入宴息雷二月出地八月入地澤亦地也又兌正秋八月正兌之時震下兌上有雷入地中之象君子取之及向昏晦則居内休息造化有晝有夜人生有作有息人心有感有寂有動有静此造化之自然亦人事之當然也初九官有渝貞吉出門交有功初九以陽為震之主有官守之象居下无隨我者剛體非隨人者然初動體則改其常矣故為有渝之象陽居陽位得正有貞吉之象前臨隂偶二三四互為艮有出門之象與四同德不言隨而言交有交有功之象初九卦之所以為隨者雖人无隨我我未隨人而震動之體已渝其常矣然居正得吉出門交四同德不繫私暱正不必言隨人而自有功也象曰官有渝從正吉也出門交有功不失也交不失其正則有功也人雖未隨我我亦不隨人以陽剛得正故也六二係小子失丈夫初陽在下而近以在下有小子象五陽正應而逺以君位有丈夫象二與五正應宜得所隨矣然當隨之時以隂爻隂位為過于柔不能自守以待正應而近係于初有係小子失丈夫之象人隨我為隨我隨人為係曰失惜之也象曰係小子弗兼與也係此失彼不能兼也六三係丈夫失小子隨有求得利居貞九四陽爻亦有丈夫之象小子亦謂初也三近係四而逺于初有係丈夫失小子之象四陽當任三則以隂隨之有求而必得之象三言係又言隨者三有得猶可言隨也三不中正宜失所隨矣然以居剛稍知自主勝于二之過柔故猶知係四而不係初而有得也然六居三不正九居四亦不正也以不正相比至于求而有得不可言矣故戒以居貞則利初九以陽居陽故得貞吉六三以隂居陽故示以居貞而不得言吉也象曰係丈夫志舍下也舍初之在下者也九四隨有𫉬貞凶有孚在道以明何咎九四以剛居上之下與五同德而三係之有得人之隨之象然勢陵于五有雖正亦凶之象變則為坎有有孚之象互二三為艮有光明之象卦中三隂三陽隂宜隨陽初以在下不足為人所隨故但言交四與五同德故人隨之然四大臣之位上有剛德之君雖君信民歸隨皆有獲然使恩威不自五出雖正亦有震偪之凶矣故必中有孚誠動皆合道使心迹光明君民共諒乃得无咎也豫隨九四皆大臣之位豫有得不言凶而隨四之有𫉬言凶者盖豫卦一陽五隂卦之所以隨者在四五又以柔居其上四志可行故戒不在臣而在君五之所以貞疾也隨卦三隂三陽卦能得隨之中正者在五四偪于五而得人心未必上安而下從之也故戒不在君而在臣四之所以貞凶也然豫四曰勿疑隨四曰有孚居危疑之地无論其吉與凶宜以至誠自將則一也象曰隨有𫉬其義凶也有孚在道明功也有𫉬豈必皆凶有致凶之理故曰其義凶也有孚在道以有明哲之功也爻曰以明言以此明其心迹也傳曰明功言有明哲之功則不為利欲所昏而心迹自光明也九五孚于嘉吉九五陽剛中正得衆爻之隨隨之主也然所應唯在中正之二是信于善者也故有孚于嘉之象而占則吉也四五皆以陽居三上二隂之中陽内隂外有中實之象故皆曰孚然四之孚戒之也欲其孚于五也五之孚喜之也喜其孚于二也大亨貞无咎而天下從之五足當之矣象曰孚于嘉吉位正中也五與二皆正中故謂孚于嘉也然以二之正中在五謂之嘉在二反有失者盖隨之為義貴我致人之隨而不欲徒隨于人隨人者有陽剛之德猶可自主若一于隂柔則係于近而失正應之可隨者矣故五孚于二則有君臣同德之象而二之係初則有背公植黨之戒也上六拘係之乃從維之王用亨于西山上六以柔居柔處隨之極有拘係又維之之象兌為西為巫二三四互為艮為山一變純乾為王有王亨于西山之象程傳以王為太王亨作亨通之亨指太王遷岐之事謂其得民心也本義以亨為祭享之享今從本義而王宜作太王盖六爻之義隂宜隨陽下宜隨上上勢居最上无所隨而質柔又不足以致人之隨居五之上而非天子之位與三非正應而兩隂同德有固結于幽隂之象太王避狄去豳遷岐我非隨人而人之隨我者亦未廣然誠敬以享于山川有固結維係之意人心從此而集天命從此而基占者得此則其象亦如是也象曰拘係之上窮也處隨之極故也全卦物來隨我我往隨物皆貴于正然此動彼說而至于隨易于失身尤以陽剛為貴故諸爻吉凶得失别為一例唯陽爻能為物所隨五有陽剛之德又居君位當為物所隨者故吉四居三之上有大臣之象故三係之有得而在四有偪五之嫌竟受人之隨則又不免于貞凶矣初雖陽爻為隨之主而在下位以在下則不應為人所隨然以陽爻為隨之主則不肯上係于人又不能安静以處故不言隨不言係而言交陽居陽位故交而有功也三隂爻皆隨物者則不言隨而言係然隂居隂位者柔而无主故二以舍五係初而失隂居陽位稍知自立故三以舍初係四而得至上以隨之極隂爻隂位所應又隂則固結之極然不可以人道言矣故為享于鬼神之象盖他卦六爻以相應為善此則又貴其自處之能剛他卦隂爻亦以得正為善此則又不欲其過柔而失主盖當隨之時義當如是隨之喜剛亦猶履之善柔故曰觀彖辭則思過半矣蠱卦巽下艮上按左氏風落山女惑男以長女下于少男惑亂其情蠱之象也風遇山而回物皆撓亂亦有事之象本義謂上苟止而下卑巽彼此怠緩積弊致蠱謂之蠱者壞極而有事也文從蟲從皿聚蟲皿中使自壞爛蠱之義也然卦中兼治蠱意治蠱而曰蠱猶治亂而曰亂也蠱卦次隨按序卦以喜隨人者必有事故受之以蠱喜悦隨人過中失正則蠱惑壞亂之事自此起蠱所以次隨也全彖謂蠱治則亂極復治而治蠱之道有取于更新丁寧此全彖之大㫖也六爻五為治蠱之君下四爻為治蠱之臣而上則為事外之臣事外者理亂不闗故不言蠱餘皆治蠱者而蠱為前人已壞之緒故又以子道言之治蠱以剛柔相濟為善初爻柔位剛故无咎二爻剛位柔故得中三爻位俱剛故有悔四爻位俱柔故未得五亦以爻柔位剛居中有應故用譽而五之一爻自處則為子二視之為母上視之又為君則其取象屢遷不可為典要者也蠱元亨利涉大川先甲三日後甲三日蠱本義謂壞極而有事也壞極為蠱有事則兼治蠱意亂極當治有元亨象治蠱必勇往以求必濟中互震木在兌澤之上有利涉大川象然治蠱宜勇亦須有道以治之甲日之始事之端先甲三日為辛後甲三日為丁前事已壞取先甲三日之辛以更新之不使至于大壞後事方新取後甲三日之丁以丁寧之不使至于速壞此治蠱而致亨之道也先甲後甲按本義及舊解皆同于理固順而蠱取甲巽取庚未見著落來註照圎圗但取艮巽二卦之義亦未見的確今按蘓傳所解與本義異而似可存按蘓傳蠱之與巽一也上下相順與下順而上止為媮一也而巽之所以不為蠱者有九五以幹之而蠱无是也故蠱之彖曰先甲三日後甲三日終則有始而巽之九五曰无初有終先庚三日後庚三日吉陽生于子盡于已隂生于午盡于亥陽為君子君子為治隂為小人小人為亂夫一日十二干相值支五干六而後終世未有不知者也先甲三日後甲三日世所謂六甲也先庚三日後庚三日世所謂六庚也甲庚之先後隂陽相反故易取此以寄治亂之勢也先甲三日子戌申也申盡于已而陽盈盈將生隂治將生亂故受之以後甲後甲三日午辰寅寅盡于亥然後隂極陽生蠱无九五以幹之則其治亂皆極其自然之勢勢窮而後變故曰終則有始天行也巽則不然初雖失之後必有以起之譬之于庚先庚三日午辰寅也後庚三日子戌申也庚之所後甲之所先故先庚三日盡于亥後庚三日盡于己先隂後陽先亂後治故曰无初有終曰吉不言于彖而言于九五明此九五之功非巽之功也彖曰蠱剛上而柔下㢲而止蠱剛上柔下以卦體言艮剛居上巽柔居下也以卦綜言反隨之震上為艮兌下為巽也上太剛則情不下接下太柔則情難上達上下不交以致蠱也巽而止以卦德言則下卑巽而上茍止皆積弊以致蠱者也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也他解以巽而止為治蠱者非盖下卑巽而上苟止乃致蠱之由非所以治蠱治蠱意當于此節言之既蠱又言元亨亂極復治之象也曰往有事而不言有功者當蠱之時宜有事以濟險不可以无事視之若巽懦而止則終蠱而不能元亨矣甲者十日之始亂之終治之始天運之行如是治蠱者終前事始後事一畨更新一畨丁寧亦如天之行也象曰山下有風蠱君子以振民育德山下有風物壞而有事矣治己治人事之大者風在内而能振動外物則象之以振動其民山在外而能涵育内氣則象之以涵育其德振者作興人之善新民之事育者培養己之善明德之事易言育德多取于山故䝉亦言育德而巽之申命行事亦振民之意當蠱之時風俗敗壞由民之不新民之不新由己德之不明故必有以振作聳動其民而在己宜進德不已此皆所以治蠱也初六幹父之蠱有子考无咎厲終吉幹木之幹枝葉所附以立者以身任其事而不敢避故曰幹中互震木下巽木有幹之象蠱之災非一日之故必世而後見故皆以父子言之明父養其疾至子而發也子能幹之克盖前愆則振飭而興起矣初六以隂在下所應又柔似不足以治蠱者然以其時言之在蠱之初蠱未深而事易濟且質柔而位剛故有子能治蠱考得无咎之象質柔位剛子專父事有厲象知危而戒終承已志有終吉之象象曰幹父之蠱意承考也不承其事而承其意所謂善繼人之志者也九二幹母之蠱不可貞母指六五也艮止于上巽順于下无為而尊于上者父道也服勞而順于下者子道也故五爻皆言幹父之蠱取艮之上爻為父也二獨與五應五雖艮體而質柔故有母象在五自處亦為子自二視五則為母此又取象之變不可為典要者也九二剛中上應六五有子幹母蠱而得中之象以剛承柔而治其壞故又戒以不可堅貞言當巽以入之也貞者事之幹而曰不可貞非不可正也不可固執以為正也母性多柔暗以二之剛承五之柔固守其正或至傷恩害義必巽以入之乃得中也若以君臣論則周公之事成王成王有過則撻伯禽亦此意也象曰幹母之蠱得中道也九二以剛居柔在下卦之中有中道之象得中道而以柔濟剛善于幹母之蠱者也九三幹父之蠱小有悔无大咎過剛不中故有小悔巽體得正故无大咎象曰幹父之蠱終无咎也爻言无大咎宜不免于小咎而傳謂終无咎者幸之也以九居三剛之至君之諍臣父之諍子不使君父䧟于不義者也盖幹蠱之道以剛柔相濟為善故初六六五之柔而居剛九二之剛而居柔皆可幹蠱不則與其為六四之裕而吝不若九三之悔而无咎裕而吝者由吉而趨凶悔而无咎則自凶而趨吉也六四裕父之蠱往見吝以隂居隂不能有為有寛裕以治蠱之象如是則蠱將日深往則見吝矣盖目前雖可苟安如是以往必致吝也象曰裕父之蠱往未得也目前以為得矣循此以往未為得也欲人急于改圗也六五幹父之蠱用譽二以五為母謂以柔居尊也然五之上有上則五又有子道若繼世之君也用譽用陽剛之臣以致譽也五柔中居尊九二承之以德能用陽剛之臣以幹父之蠱者可以致聞譽矣譬若周宣王之用仲山甫召穆公能用良臣而幹蠱有譽者也象曰幹父用譽承以德也二承以剛中之德德在臣譽在君上下一德矣故不見前人之蠱上九不事王侯髙尚其事陽剛居上在事之外有不事王侯髙尚其事之象初至五皆言蠱此不言蠱者上九蠱之終事之壞者六五幹之已畢則亂極而治之時矣故不言蠱也初至五皆言父子不及君臣者臣之事君猶子事父母當蠱之時身在事中必視國事如家事乃可故言父子而君臣之道在其中矣上九言不事王侯又不言父子者子于父母无可諉之事无一日可離之時君臣以義合者也則當以其位與時論之身在其位則盡力以幹如子事父母不以為汙不在其位則超然逺引不事王侯而不以為傲時當艱難則鞠躬盡瘁不避險患不以為勞世已昇平則功成身退辭榮謝寵而不以為矯上九者无位之逸民功成身退之耆舊也象曰不事王侯志可則也潔身髙尚如子陵功成身退如范蠡其事髙其志可為法則矣全卦名蠱而皆言治蠱蠱之可亨猶否極則泰雖夫運自然而人事宜盡所以有取于更新丁寧以為致亨之道家事國事皆有蠱為子為臣无異道總以剛柔相濟為善然與其柔而致吝又不若剛而免咎聖人望人之意切矣周易淺述卷二
