body:
  text: 周易淺述卷八翰林院編修陳夢雷撰說卦傳第一章言聖人因理數之自然而立揲蓍求卦之法使學者安於義命也昔者聖人之作易也幽贊於神明而生蓍幽贊神明猶言贊化育也天下和平王道得而蓍生長丈其叢滿百莖伏羲非因有蓍而後畫卦盖因生蓍而用之以求卦也參天兩地而倚數天圓地方圓者徑一而圍三三各一竒陽道常饒故天用其全參天而爲三方者徑一而圍四四合二偶陰道常乏故地用其半兩地而為二數皆倚此而起故揲蓍三變之末其餘三竒則三三而九三偶則三二而六兩二一三則為七兩三一二則為八三竒爲乾爲老陽三偶爲坤爲老陰二竒一偶爲巽離兌爲少陰二偶一竒爲震坎艮爲少陽此立卦生爻之本是數倚此而起也觀變於陰陽而立卦發揮於剛柔而生爻揲蓍先有爻而後有卦此先言卦而後言爻就聖人作易言之也在造化曰陰陽就人事曰剛柔數既形矣卦斯立焉聖人因其變之或九或七而爲陽因其變之或六或八而爲陰變至十有八而成卦聖人无與也特觀其變而立之爾卦旣立矣爻斯生焉聖人因其數之陽而發明其爲爻之剛因其數之陰而發明其爲爻之柔聖人无與也特發揮其義爾和順於道德而理於義窮理盡性以至於命此言聖人作易之極功也吉凶消長之道易皆和順從容無所乖逆黙契其本原之謂也理於義又就其細者析言之隨事皆得其條理應變合宜之謂也和順於道德體也理於義用也窮理以知言盡性以行言易書於天下之理无所不備而能盡人物之性而自合於天道也理必窮之性必盡之天命但可言至則自然之謂也易之妙皆因天地之自然如此右第一章第二章言易具三才之道故有取於六爻而因筮求卦者當盡人道以合乎天地也昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章理在人爲性在天地爲命天无陰陽則氣機息地无剛柔則地維墜人无仁義則人道滅而禽獸矣故曰立天立地立人陰陽以氣言剛柔以質言仁義以理言仁體剛而用柔屬乎陽義體柔而用剛屬乎陰兼三才而兩之以全體言則上兩畫爲天五陽而上陰中兩畫爲人三仁而四義下兩畫爲地初剛而二柔以兩卦分言則上與三爲天三陽而上陰五與二爲仁五仁而二義四與初爲地四柔而初剛分陰分陽以位言初三五爲陽二四上爲陰陰陽各半故曰分迭用柔剛以爻言柔六剛九也陽位剛爻居柔爻亦居陰位柔爻居剛爻亦居經緯錯綜粲然有文所謂成章也人負陰陽之氣以有生肖剛柔之質以有形具仁義之理以成性亦具三才之道分陰陽用柔剛以斷吉凶成亹亹而盡仁義之道則性命之理在天地者皆在吾心矣右第二章第三章就伏羲先天圓圖而言其對待之體復即卦氣之流行而分其左右之順逆也天地定位山澤通氣雷風相薄水火不相射八卦相錯此伏羲先天圓圖八卦之位也乾南坤北天居上地居下兩儀之位也艮爲山居西北兌爲澤居東南通氣者澤氣升於山爲雲爲雨山氣通於澤爲水爲泉也震爲雷居東北巽爲風居西南相薄者勢相廹也雷迅而風益烈風激而雷益迅也離爲日居東坎爲月居西不相射者水得火以濟其寒火得水以濟其熱不相滅息也先天八卦之位如此皆陰陽相對而居故曰八卦相錯也重爲六十四卦爲圓圖其位亦然其左以震離兌乾爲主與八卦相錯爲自復至乾三十二陽卦其右以巽坎艮坤爲主與八卦相錯爲自姤至坤三十二陰卦也數往者順知來者逆是故易逆數也此就圓圖卦氣之行凖之横圖卦畫之序從中而分其左右之順逆也覆數已生之卦爲順豫推未生之卦爲逆天道運行爲四時八節以冬至夏至爲樞紐圓圖配八節之運行以姤復二卦爲樞紐天道左旋故圓圖配八節皆左旋萬事出於心故圖自中起天開於子故卦始於復天道運行始於陽陽生於極陰故坤生復爲陽始冬至配之盡震宫八卦至明夷立春配之盡離宫八卦至於臨春分配之盡兌宫八卦至於泰立夏配之盡乾宫八卦至於乾陽極陰生得姤卦夏至配之盡巽宫八卦至於訟立秋配之盡坎宫八卦至於遯秋分配之盡艮宫八卦至於否立冬配之盡坤宫八卦至於坤陰極陽生又爲復卦復至乾由震四而離三而兌二而乾一皆得已生之卦如從今日計往日順而易知也自姤至坤由巽五而坎六而艮七而坤八如今日預推明日逆而難知也然以横圖觀之則自乾一而兌二而離三而震四而巽五而坎六而艮七而坤八皆預推之是皆逆也逆所以知來故易皆逆數也以其位言之則對待有順有逆以其數論之則皆逆而可以知來先天圓圖之妙如此右第三章第四章言先天方圖之位六子之用統於乾坤而造化流行有生長收藏之功也雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之動則物萌散則物解二者生物之功潤則物滋晅則物舒二者長物之功止則物成說則物遂二者收物之功君則物有所歸藏則物有所息二者藏物之功雷動風散乾坤初爻相易爲震巽也雨潤日晅中爻相易爲坎離也止之說之終爻相易爲艮兌也此六子生物之序也然六子致用主於乾而動歸於坤而藏此又父母之功也故以乾坤終之自動至晅物之出機自止至藏物之終機出无於有氣之行也故以象言入有於无質之具也故以卦言先天方圖中始震巽而始終於乾坤葢陽生於北而極於南陰生於南而極於北天之道也圓圖法天故乾南坤北也陽始於東北而盛於西北陰始於西南而盛於東南地之道也方圖法地故乾西北而坤東南也乾坤初爻相易而爲震巽故震巽居中爲物之始生中爻相易爲坎離故次外坎離爲物之方長終爻相易爲艮兌故次外艮兌爲物之所收終則乾居西北坤居東南以藏之以其位之尊卑而言則宜先乾坤而後六子以造化之流行而言故先言六子而統於乾坤此方圖之位具造化流行之妙也右第四章第五章言文王後天八卦之位帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮此文王後天八卦之位此節言八卦之流行也帝者天之主宰出者發露之謂震居東方於時爲春三陽開泰萬物從此發生則帝卽從此出矣齊相見致役以下皆帝也齊者畢達之謂巽居東南春夏之交萬物畢達矣尚有未盡生者彼此未得相見也離居南方於時爲夏則明盛可見矣致猶委也委役於萬物无不養也坤居西南夏秋之交萬物皆養於土得向實也說者物形至此充足而說兌居西方於時爲秋物至此充足可說也戰者陰極陽剥疑而戰也乾居西北秋冬之交戰乎乾非與乾戰言陰陽戰於乾之方也勞去聲慰勞之意坎居北方於時爲冬萬物歸藏於内而未息也成言者陽氣至此成終而成始艮居東北冬春之交止乎此矣復出乎震不終止也此皆萬物生成之序然生之成之必有主宰之者故謂之帝此就八卦之流行言之也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮上言帝此節言萬物之隨帝以出入蓋帝之出入不可見而爲物者可見故又以物言之以見八卦流行生物之功也離明以德言八卦之德可推坤地坎水以象言八卦之象可推兌秋以時言八卦之時可推聖人象八卦之義以治天下不獨取諸離亦舉一可通其餘也坤於方不言西南坤土之用不止於西南也上言致役於坤此言致養者蓋上言帝坤臣也帝君也君之於臣役之而已此言萬物則坤母也萬物子也母之於子則无所不養也乾曰陰陽相薄者九十月之交陰盛陽微陰疑於陽必戰坤之上六亦言龍戰於野者此也上言帝之所乗此言萬物之所主觀此而後天八卦之義可見矣蓋以其方位言之則坎離者天地之大用得乾坤之中氣故離火居南坎水居北也震動也物生之初故居東兌說也物成之後故居西此四者居於四正也震木巽亦木震陽木而巽陰木故巽居東南己之位也兌金乾亦金兌陰金而乾陽金故乾居西北亥之方也坤艮皆土坤陰土艮陽土坤居西南艮居東北者所以均旺於四時也此四者居於四隅也以其流行之序言之則以震巽離坤兌乾坎艮爲次蓋春爲木震巽屬木木生火夏爲火故離次之夏而秋火克金者也火金之交有坤土焉則火生土土生金克者又順以相生秋爲金兌乾屬金金生水冬爲水故坎次之冬而春水生木者也水木之交有艮土焉木克土土克水生者又逆以相克土金順以相生所以爲秋之克水土逆以相克所以爲春之生生生克克變化无窮而皆有帝以宰之此後天之妙也右第五章第六章去乾坤而專言六子以見神之所爲前卽文王卦次以明四時之序後卽伏羲卦次以明對待之偶蓋總先後天二圖言之以見不可偏廢也神也者妙萬物而爲言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化旣成萬物也此去乾坤專言六子由後天流行之用而推本於先天對待之體也以主宰言曰帝以功用言曰神八卦各有所在神无在无不在故曰妙萬物乾坤合而爲神言神則乾坤皆在其中去乾坤而專言六子見六子之爲皆乾坤之爲也五卦皆言象艮獨不言者終始萬物不係於山也文王後天卦次順四時之序而兌震以長男合少女艮巽以長女合少男則非其偶陰陽不相對待則无由生成萬物矣故此章先欲言神運萬物之妙卽文王卦次以明四時之流行後則推原其體必由陰陽對待各得其偶故又本於先天之卦以見陰陽交合之妙而後有此變化之神蓋合先天後天之妙總言之也右第六章第七章言八卦之性情乾健也坤順也震動也巽入也坎䧟也離麗也艮止也兌說也此節言八卦之性情因下文欲言其象先别其性情如此蓋象者其似性情者其眞也性者其本體情者其作用也乾純陽剛故健坤純陰柔故順震一陽生二陰之下剛而進故動坎一陽在二陰之中剛爲陰所掩故䧟艮一陽出於二陰之上无所往矣故止巽一陰藏於二陽之下順而伏故入離一陰在二陽之中順而附故麗兌一陰在二陽之上順而見故說然乾健坤順震坎艮三陽卦皆從健巽離兌三陰卦皆從順健則能動順則能入此震巽所以爲動爲入也健遇上下皆順則必溺而䧟順遇上下皆健則必附而麗此坎離所以爲䧟爲麗也健極於上前无所往必止順見於外情有所發必說此章以八字斷八卦之德下章乃依類而分言之自此以下乃以陰陽純卦及初中終爲序不用先天後天之序也右第七章第八章逺取諸物之象乾爲馬坤爲牛震爲龍巽爲雞坎爲豕離爲雉艮爲狗兌爲羊此章言逺取諸物者如此馬健行而不息其蹄圓故乾爲馬牛順而載重其蹄析故坤爲牛龍潛於淵在重陰之下與地雷同其動奮故震爲龍雞羽屬能飛其性則入而伏知時而善應鳴於丑半重陽之時又其行則首動於前足動於中身不動而隨其後能動象二陽在前不動象一陰在後故巽爲雞豕主汙濕其性趨下前後汚濁中心剛躁故坎爲豕雉性耿介中心柔懦而外文明故離爲雉狗外剛内媚止於人而能止人故艮爲狗羊外柔說羣而中剛狠故兌爲羊此章取象於經有不盡合者周公以乾爲龍夫子以爲馬文王以坤爲牝馬夫子以爲牛變通以觀可悟而不可執八者之中乾馬兌羊巽雞離雉與卦爻間有合者如大畜乾爻稱馬大壮似兌稱羊中孚巽爻稱雞鼎三應離稱雉暌互坎稱豕是也至坤牛震龍艮狗皆夫子所自取善觀之則萬物无非卦也右第八章第九章言近取諸身之象乾爲首坤爲腹震爲足巽爲股坎爲耳離爲目艮爲手兌爲口此言近取諸身者首㑹諸陽尊而在上腹藏諸陰大而容物足在下而動股兩垂而下耳輪内䧟陽在内而聰目睛附外陽在外而明手動在前口開於上此一身之合於八卦者也近取諸身者六子皆反對逺取諸物者六子皆以序對四者易而坎離不易也首以君之腹以藏之足履於下爲動手持於上爲止股下岐而伏口上竅而見耳外虚目内虗各以反對也在物乾坤與二少皆取走二長二中一走一飛龍者走之飛雞者飛之走各以序對也夫子此章取象坤爲腹與明夷六四同巽爲股與咸九三互體同兌爲口與咸上六同餘亦多自取鮮所合者其取義本先儒所解如此而有可疑者旣言足又言股於靣獨不言鼻按麻衣易謂艮爲鼻巽爲手鼻者靣之山風能鼓舞萬物手之所以舞也其說似亦可叅右第九章第十章又卽八卦而見其有父母男女之義也蓋文王有父母六子之說故孔子發明之也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女索求也本義揲蓍以求爻後朱子語録謂不當作揲蓍大概陽先求陰則陽入陰中而爲男陰先求陽則陰入陽中而爲女乾求於坤而得震坎艮坤求於乾而得巽離兌一二三者以其畫之次序言以初中終三畫取長中少之序也三男本坤體各得乾之一陽而成男陽根於陰也三女本乾體各得坤之一陰而成女陰根於陽也天地生萬物而人爲貴故以父母男女言之然萬物亦皆有牝牡雌雄長少之分則言人而物亦在其中矣此卦畫已成之後見有此象猶之前後取象不可以謂之二字謂畫此卦以象人也右第十章第十一章廣八卦之象不必盡合於經多夫子所自取也乾爲天爲圜爲君爲父爲玉爲金爲寒爲氷爲大赤爲良馬爲老馬爲瘠馬爲駁馬爲木果純陽至健爲天陽體動爲圜又天之體也居上覆下尊无不統君也乾知大始又生六子父也其德至粹爻剛而位以柔相濟玉也純剛金也金故寒而位西北卦氣又立冬也冬水始氷寒之凝陰之變而剛者也盛陽之色又四月在夏故爲大赤坎一陽在中爲赤乾純陽故赤曰大别於坎也馬曰良老瘠駁純陽无陰異於震坎陰陽相雜之馬也良健之善者老健之久者瘠多骨少肉健之堅强者駁鋸牙食虎豹健之威猛者又駁馬之色不純純極而駁生也圓而在上以實承實故爲木果異於艮之果蓏剛下有柔也又荀爽九家易解此下有爲龍爲直爲衣爲言言字宜作𤣥坤爲地爲母爲布爲釜爲吝嗇爲均爲子母牛爲大輿爲文爲衆爲柄其於地也爲黑積陰於下故爲地物資以生故爲母動闢而廣旁有邊幅而中寛平故爲布又地南北經而東西緯亦布象也釜虚而容物金質生於土受模冶而成有效法之義故爲釜静翕而不施陰性吝嗇女子小人未有不吝嗇者也吝嗇者翕之守均者闢之敷其勢均平而无偏陂其德則生萬物而无私均也順之極而生物相繼故爲子母牛厚而載物爲大輿坎二畫虚爲輿而不大坤三畫虚言大以别於坎也坤畫偶又物生於地至雜故爲文偶畫多故爲衆有形可執持成物之權故爲柄又在下而承物於上凡執持之物其本着地者柄也地之土色有五黑者極陰之色也又荀九家有爲牝爲迷爲方爲囊爲裳爲黄爲帛爲漿震爲雷爲龍爲𤣥黄爲旉爲大塗爲長子爲决躁爲蒼筤竹爲萑葦其於馬也爲善鳴爲馵足為作足為的顙其於稼也為反生其究為健為蕃鮮陰閉而陽奮於下爲雷陽在下動爲龍乾坤始交生震故兼天地之色得乾初畫爲𤣥得坤中畫上畫爲黃雜而成蒼色也陽氣始施爲旉又花蔕下連而上分爲花也一竒動於内二偶開通前无壅塞萬物畢出故爲大塗也一索得男長子也陽生於下上進决陰而躁動也蒼深青色筤竹之美者竹之筠也萑荻葦蘆竹與蘆葦皆下本實而上虗也上畫偶開出聲又陽氣始亨故馬善鳴也左足白曰馵震居左也足超健曰作下畫一陽動也的顙額有旋毛中虚射者之的言上畫之虚也稼諸穀之類萌芽自下而生反勾向上陽剛動於下也陽長必終於乾故究爲健蕃生鮮美春生之草下一根而開葉於上也按荀易下有爲玉爲鵠爲鼓巽爲木爲風爲長女爲䋲直爲工爲白爲長爲高爲進退爲不果爲臭其於人也爲寡髪爲廣顙爲多白眼爲近利市三倍其究爲躁卦木幹陽而根陰又物之善入者莫如木也陰凝於下陽發於外周旋不舍則爲風又氣之善入者莫如風也坤始交於乾而得巽長女也䋲紏木之曲而取直者工引䋲之直而制木者巽德之制故爲䋲直爲工也巽少陰故於色爲白木下入而上升故爲長爲高又長者風之行高者木之性也陰性多疑盤旋於二陽之下又風行无常或東或西故爲進退不果也陰伏二陽之下氣鬰不散故爲臭陽盛於上陰血不升故爲寡髪二陽在上陽氣上盛故爲廣顙眼白爲陽黑爲陰反離之黑在下而白居中故多白眼也陽義陰利陰主於内近利之至如賈之得利三倍也三爻皆變則爲震之决躁故究爲躁卦也然震變乾變上二畫而已巽不言中上之變爲坤而以三畫盡變爲震者蓋陰欲變爲陽陽又欲變爲純陽此又聖人扶陽抑陰之意也荀易有爲楊爲鸛坎爲水爲溝瀆爲隱伏爲矯輮爲弓輪其於人也爲加憂爲心病爲耳痛爲血卦爲赤其於馬也爲美脊爲亟心爲下首爲薄蹄爲曳其於輿也爲多眚爲通爲月爲盗其於木也爲堅多心一陽在内而明二陰在外而䧟故爲水溝瀆所以行水水流而不盈陽畫爲水二陰夾之故曰溝瀆陽居中而无陰以蔽之則見而不隱陽在陰下得時則起而不伏坎陽䧟陰中而包之故爲隱伏水勢曲直方圓唯勢之利因人所導故爲矯輮弓蓋二十八蔽車之上輪輻三十六運車以行皆矯輮所成也陽䧟陰中心危慮深故加憂心耳皆以虚爲體坎中實故爲病爲痛離火在身爲氣坎水在身爲血血運於身猶水之行於天地間也得乾中畫之陽故爲赤而不大也坎中畫陽故爲馬爲美脊剛在内而躁故爲亟心上柔故首下而不昂下柔故蹄薄而不厚也曳亦下之弱者柔不任重故在輿爲多眚坤輿行於平地則安坎多險䧟阻礙也通者水之性坎維心亨也月者水之精盗者隱伏而險剛在中故在木爲堅多心也按荀易又有爲宫爲律爲可爲棟爲叢棘爲狐爲蒺藜爲桎梏離爲火爲日爲電爲中女爲甲胄爲戈兵其於人也爲大腹爲乾卦爲鱉爲蠏爲蠃爲蚌爲龜其於木也爲科上槁離者麗也火麗木而生又内暗外明故爲火日火之精也陰麗陽而明又有火光故爲電坤再交於乾故爲中女剛畫在外爲甲胄火銳於上爲戈兵中虚有容爲大腹又得坤之中爻也火熯燥故爲乾卦外剛内柔故爲鱉蠏蠃蚌龜又鱉性静取中畫之柔蠏性躁取上下二畫之剛蠃取善麗之象蚌取中虚之象龜取文明之象科上槁一作科空也木中空上必枯槁一曰科非木科巢之附於木上者科中虚有離象上槁者科上之木乾燥如鵲巢以木枝結搆而成者二說雖不同皆於離象可通按荀易有爲牝牛艮爲山爲徑路爲小石爲門闕爲果蓏爲閽寺爲指爲狗爲䑕爲黔喙之屬其於木也爲堅多節静以止者山也徑者路之小艮爲震之反體高山之上成蹊非如平地之大塗也剛在坤土之上象山頂高處之小石若坎剛在坤土之中則平地土中之大石矣闕者門之出入處上畫連亘中二畫雙峙而虚似門闕也果木實蓏草實乾純剛爲木果艮一剛二柔故爲果蓏震爲旉草木之始艮爲果蓏草木之終果蓏能終又能始故於果蓏爲切閽掌王宫之中門之禁止物之不應入者寺掌王之内人及宫女之戒令止物之不得出者手以止物而用以止者在指又諸陽之末骨之外見者也䑕黔喙皆前剛也黔鉗通山居之獸齒牙如鐡能食生物又鳥亦善以喙止物者也堅多節亦剛在外也按荀易有爲鼻爲虎爲狐麻衣易亦以艮爲鼻朱子曰鼻者面之山管輅嘗言之兌爲澤爲少女爲巫爲口舌爲毁折爲附决其於地也爲剛鹵爲妾爲羊澤者水之聚二陽沉於下一陰見於上坎壅成澤也巫以言語說神者兌上折口象故爲巫爲口舌金氣始殺條枯實落故爲毁折柔附於剛剛乃决柔故爲附决陰在上皆有决義震陽動故躁兌陰說故附决躁者有所去以達其怒附决者始雖親而動不免於去也陽在下爲剛陰在上爲鹵剛鹵之地不生物鹵者水之死氣也坎水絶於下而澤見於上則爲鹵鹵暫熯而乾乾而復潤天下之潤者莫久焉然不生物以氣之在外也少女從娣故爲妾内狠外說故爲羊按荀易有爲常爲輔頰前章以八卦象八物此章又推廣以盡萬物之情其中有相對取象者如乾天坤地之類是也上文乾爲馬此則爲良馬老馬瘠馬駁馬良取其德老取其知瘠取其骨駁取其力皆取其健也上文坤爲牛此則爲子母牛取其生生有繼兼取其順也乾爲木果結於上而圓坤爲大輿載於下而方震爲决躁巽爲進退爲不果剛柔之性也震巽獨以其究言剛柔之始也坎内陽外陰水與月則内明外暗離内陰外陽火與日則内暗外明坎中實故於人爲加憂爲心病爲耳痛離中虚故於人爲大腹艮爲閽寺爲指陽之止也兌爲巫爲口舌陰之說也有相反取象者震爲大塗反而艮則爲徑路大塗陽闢乎陰无險阻也徑路陽阻而下陰不能闢也巽爲長爲高反而兌則爲毁折長且高者陽之上達毁而折者陰之上窮也有相因取象者乾爲馬震得乾之初之馬故於馬爲善鳴馵足作足的顙震陽下而陰上也坎得乾中爻之馬故爲美脊亟心下首薄蹄曳坎陽中而陰外也善鳴似乾馬之良美脊似乾馬之瘠作足陽下而健薄蹄者陰下而弱也坤爲大輿坎爲輿爲多眚坤中虚而力能載坎中滿而下无力也巽爲木幹陽而根陰也坎中陽故於木爲堅多心艮上陽故於木爲堅多節離中虚故於木爲科上槁震爲旉乾爲木果艮爲果蓏震之一陽花之敷乾之三陽果之結果蓏則陽上而陰下也有一卦之中自相因取象者坎爲隱伏因而爲盗巽爲䋲直因而爲工艮爲門闕因而爲閽寺兌爲口舌因而爲巫有不言而互見者乾爲君以見坤之爲臣乾爲圜以見坤之爲方吝嗇者陰之翕也以見陽之闢均者地之平也以見天之高爲文者物生於地雜而可見也知其始於天者不可見矣爲柄者有形之可執也乾之氣不可執矣離爲乾卦以見坎之爲濕坎爲血卦以見離之爲氣巽爲臭以見震之爲聲巽離兌三女震爲長子而坎艮不言者尊嫡也於陽之長者尊之也兌少女爲妾而巽離不言者少女從嫡爲娣於陰之少者卑之也乾爲馬震坎得乾之陽皆言馬而艮獨不言者艮止也止之性非馬也其大畧如此他可觸類而通至於卦象之中有與卦爻相符者如乾天坤地之類是也有不與卦爻相符者如乾坤稱龍而不必在震坤屯稱馬而不必在乾之類是也有見於卦爻而此不載者如漸之鴻中孚之豚魚之類是也有見於此而卦爻无之者如爲釜爲布爲蠃爲蚌之類是也若夫大琴謂之離小罍謂之坎此見於他書而易與說卦又可以類推也至若自坤而降或曰其於地其於人其於馬於輿於稼於木唯乾不言者蓋物不足以盡卦則正言爲天爲地之類卦不足以盡物則言其於人其於馬之類至乾之爲物无不周遍萬物不足以盡之故无所言焉要之天地之物大而天地山川微而草木禽蟲君臣父子之倫毛髪爪甲之細无一不備於卦卽无一不本於太極无一不在於吾心知此可與言八卦之象矣右第十一章以上說卦傳十一章備言卦象卦位疑古者若八索之書所載有此夫子因筆削之以爲傳也序卦傳按序卦韓康伯謂非聖人之藴沙隨程氏謂非聖人之書朱子辨其不然謂此中事事夾雜无所不有雖非聖人之精不可謂非聖人之藴也今從程傳分析其辭見於六十四卦之首則在此註釋可畧附諸儒别論於後有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者䧟也䧟必有所麗故受之以離離者麗也序卦之意有以相因爲序乾坤屯蒙是也有以相反爲序泰否剝復是也天地間不出相因相反二者始則相因極必相反也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晋晋者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以旣濟物不可窮也故受之以未濟終焉右下篇或問易上經三十卦下經三十四卦多寡不均何也曰卦有正對有反對乾坤坎離頥大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而爲三十六卦其在上經不變卦凡六乾坤坎離頥大過是也自屯蒙而下二十四卦反之則爲十二卦以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恒而下三十二卦反之則爲十六以十六而加二亦十八也其多寡之數未嘗不均也雙湖胡氏曰文王序卦大扺本先天圖以東西南北四方正卦乾坤坎離爲上經之始終以西北隅艮東南隅兌合而爲咸西南隅巽東北隅震合而爲恒四隅反卦爲下經之始而終之以旣未濟則亦坎離之交不交也故乾坤坎離四純卦皆居上經震巽艮兌四純卦皆居下經又以反對爲次雖非伏羲之舊而先天之圖大㫖則備見焉夫子序卦直以卦名發其次第之義而他則未暇及耳又按吕氏要指曰易變易也天下有可變之理聖人有能變之道反需爲訟泰爲否隨爲蠱晋爲明夷家人爲睽此不善變者也反剝爲復遯爲壯蹇爲解損爲益困爲井此善變者也文王示人以可變之幾則危可安亂可治特一轉移間耳後天之學其以人事贊天地之妙歟又嘗合上下經始終而論之乾坤天地也坎離水火也以體言也咸恒夫婦也旣未濟水火之交不交也以用言也上經以天道爲主具人道於其中下經以人道爲主具天道於其内三才之間坎離最爲切用日月不運寒暑不成矣民非水火不生活矣心火炎燥而不降腎水涸竭而不升百病侵陵矣故上下經皆以坎離爲終焉按沙隨程氏謂序卦非聖人之書韓康伯謂序卦非聖人之精藴朱子辨之曰謂序卦非聖人之精則可非聖人之藴則不可太極生兩儀兩儀生四象此易之精也序卦无所不有此易之藴也今按横圖圓圖方圖之序伏羲所由以畫卦也先天之學不待語言文字者也序卦所云文王所由以作易也後天之學得語言文字而明者也伏羲之後連山首艮歸藏首坤則六十四卦之序在夏商已不一文王憂患作易曲盡天道人事之變皆從卦之名義或取相因或取相反而爲之序故序卦所云謂非先天之精藴則可謂非後天之精蘊則不可後人或卽麻衣反對之言以明序卦之僞則尤一偏之論夫屯之與蒙需之與訟其爲綜卦何疑坤後繼屯蒙後次師於卦畫非有所據自當如序卦所云由卦名以思其義程氏疑其非聖人之書得无過乎雜卦傳序卦所以言易道之常雜卦所以言易道之變雜卦但要取反對之義反覆其卦則吉凶禍福動静剛柔皆相反也序卦自乾坤而下三十卦咸恒而下三十四雜卦亦然序卦反對雜卦亦多反對此其所同也序卦以乾坤頥大過坎離在上篇中孚小過在下篇故二篇反對皆成十八卦雜卦但以乾坤在上篇餘盡在下篇又自大過以下不復反對此其所異也以其序次錯綜故謂之雜然自乾至困當上經三十卦實雜下經十二卦於其中咸至夬當下經三十四卦又雜上經十二卦於其中則雜之中又有不雜者存焉又卦以乾爲首而終之以夬蓋夬以五陽决一陰决去則又爲純乾矣故曰君子道長小人道消是又聖人扶陽抑陰之意也又按春秋傳有屯固比入坤安震殺之語疑古筮書以一字斷卦義者多有之夫子雜採其辭爲經羽翼本非創作故謂之雜未可知也乾剛坤柔比樂師憂剛柔以德言憂樂以事言剛皆屬乾而純乾爲至剛柔皆屬坤而純坤爲至柔然二卦之二五皆得中爻位剛柔又各有相濟非倚於一偏者就其德之各見者則分爲剛柔耳比九五居上而得衆故樂師九二居下而任重故憂又順在内故樂險在内故憂臨觀之義或與或求以我臨物曰與物來觀我曰求臨卦以二陽在下徧臨四陰而六五上六又若以上臨下觀卦九五觀示乎下而四陰又相率以觀乎上互有求與之意或者疑詞无求與而若有求與見爲與又疑於求見爲求又疑於與也屯見而不失其居蒙雜而著屯震遇坎震動故見坎險不行居也又以初爻言之物始生爲見未得位居貞居也又合初五二爻言九五陽在上卦之天位而顯見也一陽動坎險之下而固守居也蒙坎遇艮坎幽昧爲雜艮光明著也又以二爻言全卦蒙然而生故雜二能治之使明著也又合九二上九二爻言之九二陽在下卦之中而位幽雜也上九一陽止坎險之外而光明著也本義就卦義論大全兼取爻義宜兼之始備時解謂屯以事功言才有餘而遇不足當養晦以俟時蒙以學問言質不足而學有餘宜親師以取益意亦是但不必拘震起也艮止也損益盛衰之始也震艮以天道言損益以人事言損者人所憂乃爲盛之始益者人所喜乃爲衰之始倚伏之機可畏也大畜時也无妄災也剛難畜而畜之時有適然意外之得也无有妄而得災災自外至者也意外之禍也萃聚而升不來也謙輕而豫怠也萃三陰聚於下升三陰升於上不來謂升而不降也時解以萃言君之用賢升言臣之遇主亦近之不必拘舊說輕者一陽居下之上不自尊大自卑而輕豫者一陽居上之下其志滿足自肆而怠也然豫四爻无怠意按來註謙之上六卽豫之初六故二爻皆言鳴謙心虚故自輕豫志滿故自肆此說爲勝噬嗑食也賁无色也頥中有物故曰食賁以白賁无咎无色而天下之賁莫尚焉食色人之大欲色至賁則過故欲返本也兌見而巽伏也兌陰外見巽陰内伏也隨无故也蠱則飭也隨時行止前无故也蠱壊已極後當飭也剝爛也復反也五陰潰於内爛也一陽生於下反也晉晝也明夷誅也二卦朝暮生殺之義日出地上爲晝則入地下爲夜也明在下爲誅傷則明升上爲生長矣井通而困相遇也往來井井則其道通剛爲柔揜所遇之困自乾至此三十卦適與上經之數相當咸速也恒久也有感必通故速速則夫婦及時其道有常故久久則夫婦偕老渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也渙節與井困相反井以木出水居塞而能通渙以水浮木則通極而致散矣節澤上之水爲有制困澤下之水則枯竭矣解難旣散多失於怠緩蹇險在前則知阻難睽疎而外家人親而内否泰則君子小人其類每相反也大壯則止遯則退也慮後陽之恃壯故不欲九四之進而欲其止恐前陽之不及故不欲六二之進欲其退也陽進而消陰者愼之陰進而消陽者抑之也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也明且動故多故旅寓則所親自寡矣此句卦名在下變文以叶韻也離上而坎下也炎上潤下小畜寡也履不處也一陰畜陽寡不敵衆說隨陽進柔能制剛也需不進也訟不親也大過顚也姤遇也柔遇剛也漸女歸待男行也頥養正也旣濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也需訟皆主乾言止坎之下爲不進背坎而去爲不親大過本末弱故顚女待男而行所以爲漸頥以上養下養得其正旣濟六位皆當故定女者未嫁之稱歸則女之事終也未濟陰陽皆失位而陰不足言也故曰男之窮始乾終夬則喜陽之長也本義謂自大過以下卦不反對或疑其錯簡然以韻恊之又似非誤未詳其義按蘇氏蔡氏皆有改正之文而蔡氏所改類從而韻亦恊附録於後兼載胡氏之論以備叅考大過顚也頥養正也旣濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也雲峰胡氏曰易終於雜卦而交易變易之義愈可見矣每一卦反復爲兩卦而剛柔吉凶每每相反此變易之義也自乾至困三十卦與上經之數相當而雜下經十二卦於其中自咸至夬三十四卦與下經之數相當而雜上經十二卦於其中此交易之義也或曰此偶然爾愚曰非偶然也皆理之自然也坎離交之中者本居上經三十卦内今附於下三十四卦震艮巽兌交之偏者本居下經三十四卦内今附於上三十卦至若无反對者上經六卦下經二卦今附於上者二卦附於下者六卦皆交易之義也十二月卦氣除乾坤外上經泰否臨觀剝復陰之多於陽者十二下經遯壯姤夬陽之多於陰者十二今雜卦移否泰於三十四卦之中而陰陽之多少復如之特在上經者三十六畫在下經者二十四畫今附於上者二十四畫附於下者三十六畫愈見其交易之妙爾若合六十四卦論之上經三十卦陰爻之多於陽者八下經三十四卦陽爻之多於陰者亦八今則附於三十卦者陽爻七十二陰爻一百八而陰多於陽者三十六附於三十四卦者陽爻一百二十陰爻八十四而陽之多於陰者亦三十六以反對論上經陰之多於陽者四下經陽之多於陰者亦四今則附於上者陽爻二十九陰爻五十七而陰爻多於陽者十八附於下者陽爻六十九陰爻五十七而陽爻之多於陰者亦十八或三十六或十八互爲多少非特見陰陽交易之妙而三十六宫之妙愈可見矣是豈聖人之心思智慮之所爲哉愚故曰伏羲之畫文王周公孔子之言皆天也本義謂自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義愚竊以爲雜物撰德非其中爻不備此蓋指中四爻互體而言也先天圖之左互復頥旣濟家人歸妹睽夬乾八卦右互姤大過未濟解漸蹇剝坤八卦此則於右取姤大過未濟漸四卦於左取頥旣濟歸妹夬四卦各舉其半可兼其餘矣是雖所取不能無雜蓋此謂雜卦而互體又其最雜者也上三十卦終之以困柔掩剛也下三十四卦終之以夬剛决柔也柔掩剛君子不失其所亨剛决柔君子道長小人道憂矣然則天地間剛柔每相雜至若君子之爲剛小人之爲柔决不可使相雜也雜卦之末特分别君子小人之道言之聖人贊化育扶世變之意㣲矣周易淺述卷八
