body:
  text: 周易淺述卷三翰林院編修陳夢雷撰臨卦兌下坤上澤上有地岸臨于水相臨最切又有進而侵凌之義二陽侵長以逼于隂故曰臨也臨卦次蠱按序卦有事而後可大故受之以臨臨者大也可大之業由事而生二陽方長隂小陽大陽氣將盛是謂可大臨所以次蠱也全彖以陽長為亨而以隂生為戒亦扶陽抑隂之意六爻以二陽徧臨四隂二當任而􅀄不當任故以二為臨主上四隂皆受陽之臨者三不中正廹陽而應非正之上故无利四五皆應陽上附五而厚于二故皆吉也而三曰甘臨四至臨五知臨上敦臨又有上臨下柔凌剛之義雜卦云臨觀之義或與或求言彼此相與為臨也臨元亨利貞至于八月有凶臨本義謂進而凌逼于物言凡逼近者皆為臨不專居上臨下之意也二陽侵長以逼于隂故為臨而卦中上下彼此又互有相臨之象于一歲中為十二月之卦也下說上順九二剛中上應六五故占者大亨而利于正也又按元亨利貞者乾道之變化陽長之卦獨臨與乾同者易道貴中二陽方主于中乾之體用全備于此故四徳咸歸之也八月有㐫戒辭何氏以建子至建未為八月禇氏以建寅至建酉為八月孔氏㨿王註小人道長君子道消以建申為八月按大全不言建申隆山李氏主建酉為觀卦謂當自臨數不當自復數也本義主建未為遯卦謂文王作卦時只就周正紀之也今按文王作卦在紂之時未用周正正朔之説可不必拘以隂陽消長之數論之當自復數至遯為是盖否卦隂陽各半觀卦四隂勝陽其㐫不待言矣今曰有㐫者亦將盛之辭也于二陽方盛之時即為二隂方盛之慮聖人防㣲杜漸之意也不然則凡陽盛之卦八月皆有隂盛之時何獨于臨言有㐫哉又按復言亨而此言元亨復不言利貞而此言利貞盖復初陽未盛至臨則大矣復陽之萌无有不善臨則陽盛易于肆矣此聖人所以于臨獨有戒辭也彖曰臨剛浸而長此以卦體釋卦名也爻辭上下皆有相臨之意此獨取以陽臨隂浸長内兼二意有漸長不驟之意又有方來未艾之意說而順剛中而應内卦說則陽之進也不逼内不激于意氣矣外卦順則隂之從也不逆外皆中于機宜矣此以卦徳言卦之善也九二剛中在我有强毅之才應五柔中在上有知人之主此以卦體言卦之善也大亨以正天之道也剛長而說順大亨也剛中應柔中以正也剛長之時其善如此以之臨人臨事臨天下莫不大亨而必以正者天道宜然也天道扶陽而抑隂黜邪而崇正者也至于八月有凶消不久也言二陽方盛之時然至八月為遯則陽之消亦不久矣此雖天運之自然而君子所當戒也象曰澤上有地臨君子以教思无窮容保民无疆不曰地下有澤而曰澤上有地主澤之二陽而言也地臨于澤上臨下也二者皆臨下之事教思无窮澤潤地之象也容保民无疆地容澤之象也不徒曰教而曰教思其意念如澤之深不徒曰保而曰容保其度量如地之廣􅀄九咸臨貞吉按玉註及程傳皆以咸作感之義本義以咸臨作徧臨謂以二陽徧臨四隂也從王註程傳為順而徧臨意可兼盖咸者无心之感二陽在上无為而天下化所以為觀二陽在下无心而天下應所以為咸􅀄以正二以中我中正而天下自應故皆曰咸􅀄二两爻與四五正應皆有咸臨之象􅀄以剛居初為得正有貞吉之象四大臣之位無所感而臨則不𫉬乎上然自處不正所應非正亦枉道狥人者矣唯剛而得正所應又正故曰咸臨貞吉也象曰咸臨貞吉志行正也自處以正所應又正則得以行其正道矣時觧以此爻作君子臨小人以正隂雖小人然爻中未有此象九二咸臨吉无不利二應于五上有中正之君既見信任得行其志故有吉无不利之象此爻為臨之主盖陽在􅀄猶㣲至此乃盛􅀄之咸臨謂與二恊力以為臨也二之咸臨謂率􅀄同徃以為臨也象曰咸臨吉无不利未順命也九二以剛居柔非苟且以取悦于上者有未順命之象五順體而二説之疑以苟從取悅矣然剛而得中以此為五所信任非苟將順君命以取容者也本義于此爻傳云未詳今從此觧得聖人教人以道事君之意然爻中亦實有此象也六三甘臨无攸利既憂之无咎卦以隂陽相臨為臨三隂柔說體逼近二陽而與上非正應坤土味甘變兌為口舌无實心相接但以甘說臨人之象不中不正下乗二陽上无正應有无攸利之象二陽上逼互卦得震有憂懼之象一變為乾為泰有无咎之象盖在上以甘說臨人固无所利然知憂懼自改則咎可无若小人在上知君子非可以甘言要結能改過以合乎剛正則咎自可无矣象曰甘臨位不當也既憂之咎不長也位不當不中正也始雖有咎而後可无其咎不長也六四至臨无咎以隂居隂處得其位與三之不當者異下應􅀄九應得其正與三之乗陽者異又坤兌之交地澤相比相臨之切至者也至非至極之謂言誠意以相與也故无咎象曰至臨无咎位當也言位之當而正應之意其中矣六五知臨大君之宜吉五變坎為通知之象以柔居中下應九二不自用而用人知之事也自用其知者其知小不自用而用人者其知大以此臨下乃大君之所宜吉之道也象曰大君之宜行中之謂也中者天理之當然非出于矯餙也上六敦臨吉无咎上六居地之上畫爻本坤土又變艮土有積累至于極厚之象舊說以上最逺于陽不敢以柔臨剛厚之至也以厚接物未有不安者故厚敦于臨乃吉而无咎之道也然按象傳志在内則非不敢臨之意按蘇傳六五既已應九二矣上六又從而附益之謂之敦臨復之六四已應􅀄九矣六五又從而附益之謂之敦復此說觧敦字為切言附五以加厚于二也象曰敦臨之吉志在内也上六與九二非正應而志在于九二之陽附五以相臨厚之至也上以志在陽為吉三以志在上而无利可知矣卦義以陽臨隂而六爻自三以上隂亦臨陽陽氣方升陽臨隂在所宜故皆吉隂上陽下雖有以上臨下之𫝑而嫌其逼于陽故獨于三爻无利上以逺于陽而志在陽反得吉至四之无咎五之吉則又皆應于陽者陽氣方盛勢正上進吉多㐫少聖人言外扶陽抑隂之意又可見矣觀卦下坤上巽風行地上徧觸乎物有自上觀下之義則為去聲之觀二陽在上四隂所仰有自下觀上之義則為平聲之觀全彖取以上示下之義故卦名取去聲之觀也觀卦次臨按序卦物大然後可觀故受之以觀觀所以次臨也彖取上觀下之義在上者致其潔清不輕自用民自信而仰之此全彖之大㫖也六爻以四隂自下仰觀二陽然上不得位故以五為觀之主而下四隂則近者吉而逺者㐫四觀光而三進退二利女而􅀄則吝矣盖臨卦二陽在下進而凌隂故隂欲逺陽觀卦二陽在上隂自下仰故隂欲近陽此又扶陽抑隂之㣲意也觀盥而不薦有孚顒若觀者以中正示人為人所仰也盥者將祭而潔手薦奉酒食以祭也顒若尊敬之貎盥者无不薦盥時誠意精專薦亦未至于􅈈今云盥而不薦者風行地上萬物肅清然无形可見有盥而不薦之象然氣之所至自然鼓動萬物有孚而顒若之象聖人潔清自治恭己无為不待政教號令之行而羣下信而仰之莫不整肅猶祭者方盥手於洗誠意精專不待牲牢酒食之陳而精誠使人皆肅然生敬也又按大壮則取四陽之盛觀則不言四隂之盛反取二陽在上為四隂所仰則又聖人扶陽抑隂之意也彖曰大觀在上順而巽中正以觀天下陽為大故曰大觀在上以位言順巽中正以徳言中正指九五也有位无徳有徳无位皆不足以觀天下順則心于理无所乖巽則事于理无所拂具順巽之徳以我之中正觀天下之不中正者此節以卦體卦徳釋卦名義也觀盥而不薦有孚顒若下觀而化也非有意于感人而觀者自化也此釋卦辭也觀天之神道而四時不忒聖人以神道設教而天下服矣神者无形與聲而妙不可測天運自然四時不忒天之所以為觀神道也聖人亦不俟號令政教之煩使天下自服聖人之所以為觀以天之神道設教也不薦之孚聖人之神道也猶中庸之篤恭而天下平上天之載无聲无臭也此因卦辭而極言之象曰風行地上觀先王以省方觀民設教風行地上徧觸萬物有周觀之象先王體之省方以觀民風而設教如國奢示儉國儉示禮之𩔖是也坤為土有土有民省方觀民坤之象巽以申命設教巽之象初六童觀小人无咎君子吝卦以觀示為義㨿九五為主也爻以觀瞻為義皆觀乎九五也初六陽位而隂爻陽則男而隂則稚又居卦之下如未有知識之童子不能逺見有童觀之象小人无咎而君子則吝者盖下民日用而不知乃其常也君子不著不察則可羞矣象曰初六童觀小人道也小人之常也六二闚觀利女貞六二質柔位隂女子之象自内窺外雖與五為應而為三四所隔三四五互為艮有自門内闚視所見者小不見其全之象此女子之正道也象曰闚觀女貞亦可醜也在丈夫則可醜矣六三觀我生進退諸爻皆觀乎五故三上不取相應之義我生我之所行也六三隔四不能觀國居下之上可進可退故不觀九五而觀已之所行可否何如以為進退量已而後入官者也他卦居中多吉三不中多㐫此獨以觀之逺近取義故四最善而三次之象曰觀我生進退未失道也進退合宜未失其常道也六四觀國之光利用賔于王六四下互坤土有國象互五為艮近陽爻有光明象五為君王象四承五最近而柔順得正賓于王之象其占利于朝覲仕進也象曰觀國之光尚賔也士不苟進君以賓禮待臣有非常之遇矣故其志尚樂于進用也九五觀我生君子无咎九五陽剛中正以居尊位下四隂仰而觀之君子之道也然必返而自觀我之所行果合于君子乃得无咎盖觀本四隂侵陽之卦故有危詞茍我之所行不足以觀示四方反有咎矣象曰觀我生觀民也人君有臨民之責而曰觀我生非置民而不問也王者通天下為一身觀我所行之善否即可以知民之善否矣觀我正所以觀民也本義又當觀民徳之善否似作言外補意稍緩上九觀其生君子无咎上九以陽剛居尊位之上亦為下所觀瞻若賓師之位也故亦當反觀已之所行求免于咎也曰其生者上无位不當事任避九五不得稱我也象曰觀其生志未平也自省其身未得自安故曰未平不敢以不居其位而晏然不自省也觀為隂盛之卦而九五陽剛得位故有可以觀示下民之象然髙位為衆所仰非可易居而隂盛亦多戒懼故五僅无咎而上志未平也四隂觀在上之陽位髙則所觀者大卑下則所觀者狭此四觀光三進退而初二則羞吝也噬嗑下震上離噬齧也嗑合也口中有物間之必齧而後合卦上下两陽而中虚頥口之象九四一陽間于其中必齧之而後合故為噬嗑噬嗑次觀按序卦可觀而後有所合故受之以噬嗑嗑者合也既有可觀然後有來合者噬嗑所以次觀也口有物間之必噬而後合天下有强梗䜛邪間之亦必治之以法而後治成又火為明雷為震皆有當于治獄之道故全卦皆以治獄之事言之六爻則初上无位為受刑之人中四爻為用刑之官大抵以爻位之剛柔論噬之難易要歸于能謹此全卦六爻之大略也噬嗑亨利用獄上下两陽而中虚口之象天下之物中有所間則不通齧之而合則通矣故有亨象此概論天下之事用獄則噬嗑中之一事也天地生物有為造物之梗者必用雷電擊摶之聖人治天下有為民之梗者必用刑獄懲治之上離電之明所以察獄也下震雷之威所以决獄也六五以柔居中有威與明而得中者也故有利用獄之象又相噬以求合教化之衰也故但利用獄彖曰頥中有物曰噬嗑上下两陽頥象中一陽有物象此以卦體釋卦名義所謂近取諸身者也噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬之而嗑乃得亨通以治道論㓂盗作梗以倫紀論䜛邪作梗治而去之則合矣彖傳増而字所謂以卦名釋卦辭也三隂三陽剛柔均分此以卦體釋卦辭也下動而上明言未嗑以前以噬而致亨雷震電耀相須並見曰合而章言既噬之後以嗑而致亨所謂以卦徳二象釋卦辭也此以上皆釋噬嗑之亨也柔得中句本義謂卦變自益卦六四上行于五而得其中然與得中上行不合今依卦綜賁之離二夲得中今上行于五為是以柔居五為不當位然剛柔相濟治獄所宜此以卦綜釋卦辭也此二語釋利用獄也象曰雷電噬嗑先王以明罰勅法雷電當作電雷明者辨别精審之意象電之明所以示民而使之知避也勅者整飭嚴整之意象雷之威所以防民而使之知畏也罰者一時所用之法法者平日所定之罰明罰勅法猶不知戒不得已乃有豊之折獄致刑初九屨校滅趾无咎初上受刑之象中四爻用刑之象校足械也屨校者校其足如納屨然趾所以行滅其趾􅃒沒其趾使不得行受刑之小者也震為足初應四三四五互為坎為桎梏初爻最下故有屨校之象震變坤不見其足滅趾之象罪小而受薄刑小懲可以大誡故无咎也象曰屨校滅趾不行也震主動變坤則静不敢妄動不進于惡矣六二噬膚滅鼻无咎中四爻言用刑之人皆取食物為象膚豕腹下柔軟无骨之肉噬而易嗑者滅鼻深入至沒其鼻也六二隂柔中正聽斷得理噬之最易合者二三四互艮為鼻二變則為離故有深沒其鼻之象盖以乘初之剛以柔治剛深痛治之不至于有咎也此觧照程傳按本義謂傷滅其鼻占者雖傷而終无咎然噬膚无傷鼻之理不如程傳之順象曰噬膚滅鼻乘剛也噬膚至于滅鼻疑于深矣所以无咎者以乘剛故也盖在下有强梗之人恐過柔以治之則廢故深嚴而得宜乃得其中也六三噬腊肉遇毒小吝无咎腊肉小獸全體骨而乾之者堅韌之物也六三柔中有剛有腊肉象互坎有遇毒象六三隂柔不中正治久年疑獄而人不服者也故占小吝然時當噬嗑于義亦无咎也象曰遇毒位不當也以柔弱居剛强之位故也九四噬乾胏得金矢利艱貞吉乾胏肉之帶骨者至堅而難噬者也金矢本義謂入鈞金束矢而後聽之然周禮束矢鈞金所以禁民訟獄使𤨏屑之事不敢妄興訟非聽訟之正道也不如程傳以金剛矢直為得治獄之宜九四離體離為乾乾胏之象三四五互坎坎得乾之中爻有金象坎又為矢得金矢之象九四以剛居柔居大臣之位所㫁之獄又非若膚腊之易者必如金之剛則不撓如矢之直則无私然剛直非易行恐瞻頋而不果矣故必艱難正固則吉象曰利艱貞吉未光也離有光明之象四離體而居下大臣之位不便威福自己治此大獄雖以剛直為主未免艱難戒懼故曰未光六五噬乾肉得黄金貞厲无咎乾肉難于膚而易于腊胏者也六五君位小事不至于君故所噬非膚之易君威無所不加故不至如腊胏之難黄金本義謂指鈞金盖周禮小事束矢大事鈞金大臣大小兼聽唯鈞金則以聞之君者也今從程傳作剛中之徳為優離中變乾為金黄金之象盖大臣貴其不撓尤貴于无私君則无可私矣唯恐其優柔不㫁而已黄中色而金剛徳六五柔順居尊剛柔相濟得其中矣然刑者聖人不得已而用之不可无戒懼之心也故雖貞亦厲但于義則无咎也五位與二同而五能噬乾肉二但能噬膚者二以柔居柔而五以柔居剛五之才勝乎二也五之才與三同而五得黄金三不免遇毒者三之柔不中五之柔得中五之位勝乎三之位也六五之才之位勝二三而爻辭但言无咎不及九四之吉者五之柔不如四之剛也盖九四以剛噬者有司執法之公六五以柔噬者人君不忍之仁然治獄本有司之事而有司雖威照並行必以剛直為主故論治獄之道必以九四為則也象曰貞厲无咎得當也得當謂處剛而得中也彖言不當位以位言也爻言得當以事言也四爻言吉而傳曰未光五爻僅无咎而傳言得當者九四臣位必艱貞而後吉權難自主所以未光五君位用刑人无不服而以艱貞危厲為心盖欽恤之道當然故在五為得其當也上九何校滅耳凶何負也本爻離為稿木三四五互坎為耳為桎梏坎耳在下有何校而滅其耳之象居卦之極怙終不悛罪之大者故㐫象曰何校滅耳聰不明也罪其聽之不聰怙終而䧟于大罪也九未變為離之明今變不成離故不明也全卦以物由噬而得合莫甚于用獄以懲奸故所論皆用獄之事初上无位為受刑之人初過小而在下為治獄之始上惡極而怙終為用刑之終中四爻皆治獄之人然卦才之剛柔不同故所噬之難易亦異六二以柔居柔故噬膚最易者也六五以柔居剛為得中者故噬乾肉然比膚則難矣六三柔中有剛則噬腊肉比乾肉難矣九四剛中有柔則噬乾胏噬之最難者也難易雖有不同而四艱貞三亦遇毒五貞厲而三亦滅鼻則治獄之道期于敬謹一也賁卦下離上艮山下有火山者草木百物所聚火照之其上百物皆被光彩有賁餙之象又卦綜剛柔交錯卦徳文明以止皆有賁餙之義故為賁賁次噬嗑按序卦嗑者合也物不可以苟合而已故受之以賁人物合聚必有次序行列威儀上下而文餙生焉賁所以次噬嗑也賁雖尚文必以質為本凡事无本不立无文不行故全彖以賁有可亨之道然本大而文小故不過小利于所徃六爻初四以相應為賁而二與三五與上則以相比為賁三爻在内者離體則以文明為賁故賁趾賁須濡如皆有所設餙三爻在外者艮體則又以篤實為賁故皤如丘園白賁皆取于質素然内三爻雖以文明為賁二之賁須既出于自然初之舍車則取其髙隐三之濡如即戒其永貞于賁餙之時皆以不賁為賁此又聖人返樸還淳之妙用維持世道之深意此六爻之大略也賁亨小利有攸徃賁餙也凡事无文不行有賁之文文以輔質此賁所以亨然文勝又恐滅質内文明而艮止于外収歛其文不欲盡𤼵故小利有攸徃盖凡事以本為大而文則小也又按小利有攸徃固所利者小之意亦有唯小則利之意盖隂小陽大小利徃而大不宜徃矣故以下六爻隂爻皆宜動而陽爻多有戒辭此又賁而剥之漸也彖曰賁亨亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸徃天文也柔來二句以卦綜言盖噬嗑以初五兩爻為主爻此二上両爻為主爻噬嗑五柔來為賁二居初三両剛之中所謂黄離元吉得中道者也文在其中是以謂之賁亨噬嗑初上而為賁上居四五両爻之終所謂敦艮之吉以厚終者也文成其終是以小利有攸徃柔來不言分離反為離中偶不動也剛上言分者震反為艮下畫移居上畫也天文也上有剛柔交錯四字日月五星之運行不過剛柔一徃一來而已故曰天文文明以止人文也此以卦徳言之君臣父子夫婦兄弟朋友之間燦然有禮以相接文之明也截然有分以相守文之止也觀乎天文以察時變觀乎人文以化成天下聖人觀日月之次昏旦之星以察四時寒署之變觀于君臣父子之間有禮有分而導之以禮樂詩書列之以采章服物化舊為新而風俗成于天下占此卦者雖小利于所徃而賁之為用又大如此象曰山下有火賁君子以明庻政无敢折獄山下有火明不及逺明庶政事之小者離明在内之象折獄事之大者艮止于外之象又山在上法有所必守火居下明有所不矜君子體此于錢穀簿書之小必精審之以成文明之治至折獄則无敢无敢非不折也盖獄貴詳審得情若自恃明察深文縁餙沒其情實是之謂敢敢則民命不可問矣初九賁其趾舍車而徒初在下為趾象二三四互為坎為車象初雖與四應而在最下艮止于上故以剛徳明體自賁于下為舍非道之車而安于徒歩之象盖君子以義為榮不以徒行為辱故也初四相應四求初為貴德初求四則為趨勢故以徒行為賁壮初剛居剛而健體故壮于趾賁初剛居剛而明體故賁其趾車馬幣帛主于文餙故賁六爻取象及之象曰舍車而徒義弗乗也君子之取舍决于義毎于在下之時𤼵足之初觀之徒義而車非義故弗乗非惡富貴而逃之也六二賁其須須鬚同在頥曰須在口曰髭在頰曰髯三在上有頥體上在頥下須之象須亦人身之有文餙者故以須言之二以隂柔居中正三以陽剛而得正皆无應與然須附頥以成其文二爻相比以為賁者故二附三而動有賁須之象盖須生而美非外餙者六二柔麗乎中正固有其美須之賁非待于外也然隂柔不能自動必附麗于陽如須雖美必附于頥占者宜資人共濟從上之陽剛而動則可有為也象曰賁其須與上興也不能自興隨上而動也九三賁如濡如永貞吉三互坎一陽居二隂之間得其賁而潤澤者也故有濡如之象然坎體有濡象亦有䧟溺之象九三非不貞也能永其貞而不溺于所安則二隂于我有潤澤之濡而我无䧟溺之悔矣故吉此爻與二以相比為賁然小利徃故二隨上而三則宜永貞也象曰永貞之吉終莫之陵也陵生于狎以正自持顰笑不假誰能陵之六四賁如皤如白馬翰如匪㓂婚媾皤髪之白者四變互二三為巽為白不變互為坎為馬四與初以相應為賁乃為三所隔心雖合而迹暌不得所賁為皤如之象然本正應不肯他從徃求之心如飛翰之疾有白馬翰如之象九三剛正非為冦者也乃求婚媾耳此與屯六二相似屯剛柔始交賁剛柔相襍皆有婚媾象然屯之乗馬班如意甚緩賁白馬翰如意獨急者屯二以下求上難進易退賁四以上求下虚已求助也此爻與初以相應為賁然小利徃故初賁趾而四則翰如也象曰六四當位疑也匪冦婚媾終无尤也四與初逺為三所隔所當之位有可疑也然位雖近三心實在初守正不與理直義勝三不得而尤之也六五賁于丘園束帛戔戔吝終吉六五柔中為賁之主離之文明至艮而有所止漸近敦本而尚實上九艮體有丘象五互三四震木有園象五比上以成賁者人君虚已以求山林隠逸之賢故有不賁于朝市而賁于丘園之象隂性吝嗇淺小薄物可以自將故有束帛戔戔之象如此雖可羞吝然禮奢寕儉禮賢貴質實不事虚文故得終吉盖賁以文餙成卦過則流于靡矣自五與上皆有敦本返始之象象曰六五之吉有喜也方逐末之時人君崇儉反本人心世道之幸也上九白賁无咎居賁之極反本復于无色有白賁之象如此則善補過矣故占為无咎此爻與五相比以成賁五君以束帛相加上則遂其髙隐之志唯以朴質為本唯小利徃故五可賁于丘園而上但宜守其白賁也象曰白賁无咎上得志也居卦之上在事之外不假文餙而有自然之文可謂優㳺自得矣以人事言則六五以束帛聘而上髙尚自守以成其志亦得志也全卦以賁餙為義華美外餙世趨所必至也然无所止則奢而至于偽故文明而有所止乃可以為賁也内卦文明漸盛故由趾而須至于濡如則極矣故戒以貞文明而知永貞則返本之漸也故四之皤如猶求相應以成賁也五之丘園則返朴上之白賁則无色矣由文返質所謂有所止也六爻以三隂三陽剛柔交錯而為賁如錦繡藻繪間雜成章凡物有以相應而成賁者則初四是也有相比而成賁者則二三是也有相比而漸歸淡樸以為賁者則五上是也盖文質相須者天地自然之數賁之所以成卦而質為本文為末質為主文爲輔務使返朴還淳則聖人所以繫之辭而維持世道之心也至于初應四而四翰如二比三而二與上興五比上而五賁丘園三隂爻多利于徃此又隂盛之漸所以賁之後為剥也剥卦下坤上艮山髙于地而附着于地有傾頺之象又卦五隂自下漸長消剥一陽故為剥剥卦次賁按序卦賁者餙也致餙然後亨則盡矣故受之以剥文餙之極反而剥落剥所以次賁也全彖取順時而止之義故君子不可有所徃六爻以上九為主故于上爻幸一陽之存而下五爻凡有與于陽者吉无與于陽者㐫五以承陽故无不利三以應陽故无咎初二逺陽而剥未盡故皆蔑貞㐫獨六四以廹于陽而剥極故直言㐫也此全卦六爻之大略也剥不利有攸徃剥落也五隂盛而一陽將消九月之卦隂盛陽衰小人壮而君子病又内坤順而外艮止有順時而止之象故占者不利于有所徃也彖曰剥剥也柔變剛也自姤而遯而否而觀而剥皆以柔而變其剛至此則欲以五隂變上之一陽也此以卦體釋卦之名義也不利有攸徃小人長也順而止之觀象也君子尚消息盈虚天行也五隂剥陽小人之長也此以卦體言也卦有順而止之象君子觀之陽消隂息隂盈陽虚天運之行如是君子尚之順時而止所以合乎天之行也知天行之方剥則不至不量力以取禍知剥之必有復亦不至怨天尤人而變其所守矣象曰山附于地剥上以厚下安宅山附于地下基不厚則上不安髙者有剥落之象為君子者以此制田里教樹畜以厚下民即以自安其居也卦以下剥上取義小人剥君子所以成剥也象以上厚下取義人君厚下民所以治剥也不以隂陽消長為論而以上下厚薄為言于極危之卦得極安之道此聖人用卦之微權也初六剝牀以足蔑貞㐫蔑滅也牀者人之所安其體上實下虚剥一陽下五隂有牀象坤土艮山本至安剝則危矣故卦有剥牀象初在下有足象剥自下起侵蔑正道其占㐫也方剥足而即言蔑貞如履霜而知堅氷至也象曰剥牀以足以滅下也侵滅正道自下而上也六二剝牀以辨蔑貞㐫辨牀幹也牀身與足上下分辨之處也二隂侵上占與初同象曰剥牀以辨未有與也二隂徒與未大盛危之中有幸之之意六三剥之无咎衆隂方剥陽而三獨與上應去邪黨而從正者也咎可无矣剥之三同復之四復四與初應而不許以吉剥三與上應而許以无咎何也復君子之事不言其吉明道不計功者也剥小人之事許以无咎欲人遷善改過也剥以近陽者為善應陽者次之故五利而此无咎象曰剥之无咎失上下也上下四隂也居四隂之中而獨與陽所失者隂其失也乃所以為得也六四剥牀以膚凶四在下卦之上猶人卧處有剥牀及肌膚之象故不復言蔑貞而直㐫也象曰剥牀以膚切近災也隂禍已廹其身也六五貫魚以宫人寵无不利魚隂物宫人隂之美望寵于陽者也五變巽有魚象巽為繩貫之之象以者后妃以之也六五柔中居尊率羣隂以從陽故有后妃之象卦徳内順外止猶后妃以宫人偹數循序以進御于君后徳之美者也故占无不利盖剥至于五極矣隂不可以再長陽不可以終消也故不取剥義自初至四以隂剥陽此則循序而以隂從陽聖人示之戒若曰與其以次剥陽而至㐫孰若以次從陽之无不利乎故彖言不利有攸徃為君子謀也此言无不利為小人勉也此聖人欲人悔過之心也然六三應上九而寕失羣隂之心六五率羣隂而上求一陽之寵則天道之不可一日无陽世道之不可一日无君子也又按遯剥皆隂長之卦遯隂㣲可制故授權于陽于九三曰畜臣妾吉陽制隂之道也剥隂盛難制矣故示教于隂于六五曰以宫人寵隂從陽之道也隂陽消長出于自然爻中自有此象而扶陽抑隂不可无人事之功此聖人繫辭之深心也象曰以宫人寵終无尤也衆隂逼陽疑有尤也循序以從尤終可无也上九碩果不食君子得輿小人剥廬艮為果蓏一陽獨存于上如碩大之果不為人所食獨留木末之象果不食必爛核墮地又復生仁窮上反下陽將復生也坤為輿五隂載上九之一陽有君子得輿之象上九變柔有小人象一陽覆五隂有廬象變偶則破敗矣有剥廬象一陽未盡猶可復生君子得此則為小人所載小人居之則剥極于上自失所覆如剥其廬盖君子能存陽徳能覆小人小人隂屬勢必欲害君子然自古未有君子亡而小人能自容其身者廬剥則小人亦无所容矣象如是而占因君子小人而分也象曰君子得輿民所載也小人剥廬終不可用也民指衆隂剥極思治陽剛君子民所共載小人至此欲剝盡諸陽不知其終不可用也全卦當隂盛陽衰之時故君子不利于所徃然能以隂承陽者无所不利而應陽者亦得无咎唯逺陽而剥陽者㐫雖聖人之戒辭亦隂陽消長之定理也復卦下震上坤一陽生于五隂之下隂極而陽復君子之道消而復長有返于善之義故為復復卦次剥按序卦物不可以終盡剥窮上反下故受之以復陽剥極于上復生于下復所以次剝也全彖以陽剛來反理勢必亨又震動坤順所徃皆利天地以生物為心天地之一陽初動猶人善念之萌聖人所最重此全彖之大㫖也六爻以初爻為主故凡有得于初陽者吉无則否二比初曰下仁四應初曰從道此皆得于陽者也餘三隂皆无得于陽者獨五以得中而无悔三不中則頻失頻復而厲上則去初最逺居卦之窮迷而不復宜其㐫也此六爻之大略也復亨出入无疾朋來无咎反復其道七日來復利有攸徃復陽復生于下也剥盡則為純坤十月之卦陽氣漸生至十一月一陽之體始成其卦為復陽徃而復反有亨象内震外坤陽動于下順而上行反下為入上行為出皆以順行有出入无疾之象先出後入于語順也諸陽自此可亨有朋類之來皆得无咎之象又自五月姤卦一隂始生至此七月而一陽來復乃天運自然反復之道此時剛徳既長君子可以有為故于占利有攸徃也不言月而言日猶詩言一之日二之日也臨卦于隂之長則曰八月欲隂長之緩也此于陽之長則曰七日欲陽復之速也又七為陽數日為陽物故于陽長之卦言之八為隂數月為隂物故于隂長之卦言之彖曰復亨剛反剛徳復反有可亨也動而以順行是以出入无疾朋來无咎剥以順而止復以順而行道消之極道長之初未有不順而能免咎者出入朋來陽之動无疾无咎以順行故也反復其道七日來復天行也隂陽消長天運之自然也利有攸徃剛長也既生則漸長故利于徃自内出為徃動而順行以下以卦徳言反復其道以下以卦體言復其見天地之心乎天地以生物為心積隂之下天地生物之心㡬息一陽來復而天地之心可見在人則惡極而善念萌動之時也先儒以静為天地之心程傳以動為天地之心然隂陽分動静善惡不可太拘盖天地之氣純隂寂静之中未嘗无陽然必一陽之動而後生物之心可見在人則所動之念有善有惡必其善端之動乃可謂見天地之心也象曰雷在地中復先王以至日閉闗商旅不行后不省方閉闗休息安静以養㣲陽也在人心則善端之萌甚微亦必荘敬以飬之不然復亡之矣卦辭言出入无疾而象言閉闗息事盖動者天地生物之心而静者聖人裁成之道也初九不逺復无祗悔元吉一陽復生于下復之主也祗至也居事之初失之未逺復于善而不至于悔大善而吉之道也人有過失或至于徴色𤼵聲困心衡慮此則有不善未嘗不知知之未嘗復行也象曰不逺之復以修身也修身之道无他知不善而速改而已六二休復吉柔順中正近于初九之仁人能比而下之取友以輔仁者復之休美吉之道也象曰休復之吉以下仁也克已復禮為仁初剛徳之復仁者也二能親而下之故吉六三頻復厲无咎不中不正處動之極復而不固有頻失而頻復之象頻失則厲復則无咎盖三爻在上下進退之間巽以柔為主巽九三剛而不中以比柔故頻巽而吝復以剛為主復三柔而不中以比柔而位剛故頻復雖厲而无咎象曰頻復之厲義无咎也得補過之義六四中行獨復四在上下四隂之中有中行之象不比羣隂而與初應有與衆俱行獨能從善之象此時陽氣甚㣲未足有為故不言吉然理所當然吉㐫非所論所謂明其道不計其功者也象曰中行獨復以從道也以其從陽剛君子之善道也修身以道修道以仁仁與道皆所以修身也六五敦復无悔坤土有敦厚之象四以應初而復五雖與初无應然以柔中居尊因四之獨復而能篤其行厚其飬以復于善者猶臨之有敦臨也故可无悔按來註謂不逺復者善心之萌敦復者善行之固无祗悔者入徳之事无悔者成徳之事是以五勝于初也然初曰无吉五僅曰无悔不得以五勝初竊意此乃困知勉行所謂人一已百人十已千百倍其功者能如是悔亦可无也象曰敦復无悔中以自考也五居中中即天地之心考成也以中道自成也二四待初而復學知利行者也故曰下仁曰從道五與初非比非應而復困知勉行者也故曰自考自即人一已百之意盖五本逺于陽但以居中能順因四自返加厚其功故能自成也上六迷復㐫有災眚用行師終有大敗以其國君㐫至于十年不克征上六以隂柔居復終位髙而无下仁之美剛逺而失遷善之機厚極而有難開之蔽質柔而无改過之勇无應而无從道之明是終昏㝠而不復者也災自外來𤯝自己作坤先迷今居其極有迷復象坤為土為衆有行師象在上近五有以其國君象地數十有十年不克征之象象曰迷復之凶反君道也陽剛在上君之道此剥之上九所以為民所載也復上反之故以其國君㐫也全彖以氣數言復有必亨之理故出入可以无疾朋來亦得无咎所以然者以七日來數反復之道天運之自然也六爻以人事言剛徳為善端之復質柔以從剛為貴人事之當然也故五之自考不如四之從道四之從道不如二之下仁二之下仁不如初之修身三頻復雖危猶知復也上迷復反道則災眚所必至矣聖人示人以復善改過取友修身之功莫切於此无妄下震上乾无妄者實理自然之謂震動也動以天為无妄動以人則妄矣无妄次復按序卦復則不妄矣故受之以无妄復者反于道也既復于道合于正理而无妄矣无妄所以次復也全彖大亨而利于正不正則所徃不利盖正則合于无妄不正則妄矣六爻下三爻震體時當動而動者故動則應天初之徃吉二之利徃三曰行人之得皆動而无妄者也上三爻乾體時當静而静者故動則拂天四之可貞五之勿藥上之有眚皆以不動為无妄者也乾體非静但震動之時已過則宜順乎天不必復有所動耳此六爻之大略也无妄元亨利貞其匪正有眚不利有攸徃无妄實理自然之謂史記作无所期望而得亦即自然之意盖有所期望皆妄也天之化育萬物生生不窮各正其性命本无妄也下震上乾動與天合自可大亨而必利于正固若有不正即妄也則有過眚而所徃不利矣吉㐫悔吝生乎動卦以震動為主故聖人多戒辭彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸徃无妄之徃何之矣天命不祐行矣哉剛自外來而為主于内以卦綜言也大畜艮在外為主今反為震為主于内此卦之所以為无妄也動健以下一正一反能如本卦之徳動健剛中而應則以正合乎天命矣若其不以正則私意妄動必不可行也震動乾健以卦徳言九五剛中而應六二以卦體言天之命天理之當然也无妄之徃何之承上匪正言无妄而不正徃復何所之乎不正則逆天之命天必不祐其猶可行乎哉象曰天下雷行物與无妄先王以茂對時育萬物天下雷行震動𤼵生萬物各正其性命物物與之以无妄也先王法此對其所育之時養育人民使昆蟲草木无不得宜亦物物與之以无妄也對時如孟春犧牲毋用牝斧斤以時入山林之類茂者盛大之意无時不對无時不育也即盡人性盡物性贊化育之謂也天下雷行物物與以无妄物物各具一性物物一自然之天也聖人因物之性以育萬物使物物各得其天聖人一自然之天也初九无妄徃吉初當位而動為无妄之主動之得正者也何徃非吉按他卦皆以應為吉此則二應五三應上乃三有災五有疾而上不免于眚獨初以无應而吉者盖卦名无妄貴于无心有心于應而徃則妄矣震陽初動誠一未分剛實无私動與天合不必有應而得无心之吉也象曰无妄之徃得志也誠能動物徃无不通也六二不耕穫不菑畬則利有攸徃耕農之始穫其成也田一歲曰菑三歲曰畬始耕終穫先種後畬此自然之常今皆曰不統付之无心也或作不耕而自穫不菑而自畬或作不以耕而計穫不以菑而計畬唯夲義謂四者俱无不耕不菑无所為于前不穫不畬无所冀于後也盖无妄之時有所為所得付于两忘而自然如此者互卦上巽下震耕耨之象震為禾稼收穫菑畬之象六二柔順中正因時順理而无私意期望之心故有不耕穫不菑畬之象占者如是則利于有所徃矣盖假象之辭不可以辭害意也象曰不耕穫未富也未富如非富天下之意言非計其利而為之也六三无妄之災或繫之牛行人之得邑人之災三變離牛象互巽為繩艮為鼻繫牛之象震為大塗中爻人位行人之象卦之无妄皆以正而亨六三則不中不正矣故有无妄致災之象行人牽牛以去居者反遭詰捕之擾所謂无妄之災也震主動故去者猶可倖免居者反以无妄致災占者得此則以其行止分其吉㐫也象曰行人得牛邑人災也得者有无妄之福邑人有无妄之災九四可貞无咎九居四非貞也然陽剛乾體不事應與可以自守其正不可以有為亦不至于有咎也盖下卦震體以動為无妄四交乾則動之時已過以不動為无妄可貞則不雜以妄矣象曰可貞无咎固有之也有猶守也天命之正人所固有貞者守其所固有也九五无妄之疾勿藥有喜五變互三四為坎有疾之象互巽木艮石藥之象乾剛中正以居尊位當无妄之時容有非常意外之事静以待之則自消如有疾勿藥而自愈也象曰无妄之藥不可試也无妄而試藥反為妄矣故不可上九无妄行有眚无攸利上居乾之終純乎天矣无妄之至也然卦當窮極以九居上其位不正行則无利即彖所謂匪正有眚不利有攸徃也象曰无妄之行窮之災也无妄宜可行然時位窮極而行則自為妄以取災也全彖无妄二字之義兼夲義實理自然與史記无所期望二意无妄而出于正則利不正則有眚天下有无妄之福无妄之禍而自處不可不出于正也六爻内三爻以動為正故初徃吉二徃利三之行人亦得牛皆有无妄之福也外三爻以不動為正故四可貞五勿藥上行則有眚盖雖有无妄之禍而能静守其正則眚亦可无也无妄之禍福聽于天唯正則不失可亨之道聖人示人切矣大畜下乾上艮天在山中所畜者大則有畜聚之義乾健上進為艮所止則有畜止之義以隂畜陽所畜者小則為小畜以陽畜陽畜之力大則為大畜大畜次无妄按序卦无妄然後可畜故受之以大畜物有其實乃可畜聚大畜所以次无妄也全彖兼畜徳畜賢畜健之意總以見畜之大六爻上三爻艮為畜者下三爻乾受畜者初受四之畜故初有厲而四言牿牛也二與五應受五之畜故二言説輹而五豶豕也至三與上則合志上行又畜極而通矣此六爻之大略也大畜利貞不家食吉利渉大川大陽也以艮畜乾畜之大者内乾剛健外艮篤實輝光能日新其徳所畜者大矣異端曲學所畜多而不正者有矣故利于貞所畜既正可以享天禄而有為于天下在一身為畜徳為國為畜賢故賢人有是徳則其占不畜于家而畜于朝一身之吉亦天下之吉也互兌為口在乾之上食天禄之象所畜既大能應乎天可以濟險又互體震木在兌澤之象如舟之行乾健應之故又有利渉大川之象盖畜極而通也彖曰大畜剛健篤實輝光日新其徳此以卦徳釋卦名義也在他卦艮但言止此言篤實輝光者艮止故能篤實此艮一陽之所以能畜也篤實自有輝光盖畜于中而見于外也以乾體之剛健无人欲之私艮之篤實无虚偽之􅎖則闇然日章自有輝光畜之不已其徳必日新矣彖畜字有三義以藴蓄言之蓄徳也以畜養言之畜賢也以畜止言之畜健也此專言藴蓄之義下文乃以畜賢畜健言之剛上而尚賢能止健大正也以卦綜言之无妄下卦之震上為大畜之艮剛上也以卦體言六五居中尊尚上九所謂尚賢也以卦徳言以艮之止止乾之健如禁强暴之類所謂能止健也不曰健而止而曰能止健者以乾之健受艮之止卦之所以稱大畜也大正總承上以剛陽在上尊尚賢徳能止至健皆非大正不能以釋利貞之義也不家食吉養賢也亦取尚賢之象方陽剛在上六五所尊之時占者得之宜食禄于朝所以不家食也利渉大川應乎天也亦以卦體言渉險非乾健不能六五下應乎乾故能渉川天者時而已矣有藴蓄之才又有乾健之力自可乗時濟險象曰天在山中大畜君子以多識前言徃行以畜其徳天在山中夲義謂不必實有是事然天包地外地下有天是即山中之天也山中有天所畜至大君子以此多識前古之言已徃之行以畜其徳之大者小畜言懿文徳不過文章才藝之末而已此則就道徳性命言之初九有厲利己已止也乾之三陽為艮所止初九為六四所止若恃其陽剛而鋭于進徃必有危故利于止也他卦取隂陽相應為吉此取其能畜故外卦以畜止為義内卦以自止為義獨三與上畜極而通則不以止言也以自止為義者以隂陽言若君子之受畜于小人以畜止為義者以上下言若有位之禁止强暴象曰有厲利已不犯災也自止則不犯災九二輿説輹輹車傍横木行則縳止則脱暫止旋起之義輻脱則車破敗輹脫但不欲行而已故小畜之脱輻在人而大畜之脱輹在已盖九二亦為六五所畜以其剛中故能自止而不進乾有輿象互兑為毁折故有脱輹之象象曰輿說輹中无尤也以其剛而得中不至于過九三良馬逐利艱貞日閑輿衛利有攸徃三以陽居健極上以陽居畜極畜極而通之時也乾為良馬與上之陽合志三互震為作足之馬故有良馬逐之象然恐其過剛鋭進故戒以利于艱貞而日閑習其輿衛則利有攸徃也輿者任重之物衛者應變之具乾有輿象隂爻両列在前有衛象以人事言君子不終家食以一身任天下之重者輿也以一身應天下之變者衛也必多識前言徃行之理畜剛健篤實之徳以待時而動也象曰利有攸徃上合志也陽志上進且畜已極故上不下畜三而合志上進也六四童牛之牿元吉童牛未角之稱牿施横木于牛角以止觸者六四變離牛象應初童牛象互震木施木牛角為牿之象六四畜初防之于始禁惡于未形為力則易故有防牛觸于未角之象其占為大善之吉也象曰六四元吉有喜也喜其不勞而无傷也六五豶豕之牙吉坎為豕坎陽得乾之中畫故二亦有豕象二之陽已長而止之不若初之易矣然五以柔中居尊是以得其機而可制如豕牙之猛利制其牙則力勞惟豶去其𫝑則剛􅏥自止故亦吉但不如四之元吉耳又按來註天下无嚙人之豕引埤雅云牙者以杙繫豕也此與童牛之牿同例豶走豕也豶字與童字同牙字與牿字同互震木有牙象五變巽為繩有繋象此説亦可存象曰六五之吉有慶也制惡有道則不至于决裂天下之福慶也上九何天之衢亨何字程傳謂衍文本義謂何其通逹之甚也驚喜之詞今從本義艮為徑路天之衢則大通矣艮夲畜乾乃畜極而通三陽上逹在卦之上故有天衢之象始抑而今乃大通故若訝之喜之其亨可知矣象曰何天之衢道大行也賢路大開君子之道可大行矣全卦兼畜徳畜賢畜健六爻則專取畜止受畜者當知自畜之道主畜者貴有豫畜之功至于畜極而通則又理數之自然不可强者也然畜之所以大恃艮上之一陽乃四五隂爻有畜止之事至上反不言畜者盖唯所畜者大則所通者亦大故小畜之上九畜道之成反有征㐫之戒而大畜之上九畜道已散反有大行之亨又喜陽惡隂之微㫖也頥卦下震上艮上下两陽中含四隂上止下動頥之象也口所以飲食故卦名頥而取義于養頥次大畜按序卦物畜然後可飬故受之以頥物既畜聚必有所以飬之頥所以次大畜也全彖言養人自養皆歸于正而極言養道之大六爻下震動多言求人之飬求飬者多不正故多㐫上艮止多言飬人飬人者多得正故多吉此全卦六爻之大㫖也頥貞吉觀頥自求口實頥口旁也卦取頥之象而口之食物所以養也故取飬之義頥中有物曰噬嗑恐害其所養故不取飬義頥中虚未受外物則當擇其所養唯正則吉也觀頥本義謂觀其所養之道就飬徳言自求口實本義謂觀其所以飬身之術就養身言觀其飬徳者果出于聖賢而不入于他途飬身者果合于理義而不害于饑渇則得正而吉矣今時觧皆從之然按正義及程傳皆以為觀其飬人及自養今觀彖傳語意近之則所謂觀頥者觀其所以養人不可不得其道所謂自求口實者求其所以自養不可徒狥其欲也自養者小飬人者大故彖傳極其義于天地聖人則養人之義不可無又自飬有道則不以口腹累其心志雖言飬身而飬徳之意已在其中不必以觀頥為養徳也彖曰頥貞吉飬正則吉也觀頥觀其所養也自求口實觀其自飬也觀彖傳所飬自養作養人自飬為是君子在上足以養人在下足以自飬卦中上下二陽為卦之主爻所飬指上九自養指初九也天地飬萬物聖人飬賢以及萬民頥之時大矣哉此極言養道之大皆得其正者也天地之于萬物无庸區别隂陽運行而萬物各遂其生一出于正而已若不正則二氣繆戾何以飬萬物乎聖人之飬人不能家賜而人益之也必擇賢才與共天禄使之施澤于天下是飬賢以及萬民亦一出于正而已若不正則賢人不在上位澤何由下䆒乎此極言養之大故專就所養言之也象曰山下有雷頥君子以慎言語節飲食帝出乎震萬物得飬而生成言乎艮萬物得飬而成所以取于養也言語飲食皆頥之動慎之節之法艮之止也慎言語所以飬徳節飲食所以飬身此則專就自養言之已得其飬然後可以及人也彖傳言養之大者故極其所飬至于萬物天下象傳言飬之切者故先其自飬而始于言語飲食要皆出于正者也初九舍爾靈龜觀我朶頥凶上冝飬下然陽又宜飬隂初陽在下不能飬人故以自飬言之靈龜不食之物朶動也朶頥食物之貎離體中虚為龜全卦有靈龜象我指四也上三爻主養人者初與四正應宜待飬于四不宜㐫者然隂則待飬陽宜養人初九陽剛在下不能飬人猶當善于自養乃以震體而上應六四之隂有舍靈龜觀于四而朶其頥欲有所食之象靈龜以氣自飬不求飬于外飬之得正者也朶頥則貪欲而易其清􅍾飬不以正宜其㐫矣象曰觀我朶頥亦不足貴也陽剛以能飬人為可貴今乃不能自飬至為欲所累不足貴也六二顚頥拂絰于丘頥征㐫上之養下理之常經也然隂不能自飬必欲從陽求飬今二求飬于初則顚倒而違于常理矣上九最髙有丘象二求飬于上則非正應徃必取㐫矣六二在他卦為柔順中正在頥則為動于口體上動于上下動于初皆自飬之不以正者也象曰六二征凶行失𩔖也拂經之義易明不必言矣于丘頥乃曰征㐫者以上非正應失其𩔖也本義兼初爻言之似不必六三拂頥貞凶十年勿用无攸利三與上為正應待養于上得頥之貞者也然自處不中不正居動之極是媚上以貪求而无厭者拂頥之貞矣其占必㐫互得坤有十年之象不中正而􅄭動无所徃而利者也盖全彖以正而吉三不中正故㐫象曰十年勿用道大悖也不中正而妄動大悖頥飬之道也六四顚頥吉虎視耽耽其欲逐逐无咎上三爻皆以飬人言之而隂宜待飬于陽四與初又正應故程傳本義皆謂此爻求飬于下以飬人者時觧從之作大臣用賢以飬民之義然以虎視為四則爻中未見飬人及施下之象于象傳上施之言不合今從蘇傳作以四飬初為順盖上冝飬下陽宜飬隂以上下之位言之二求飬于初固顛頥以隂陽之義言之初求飬于四亦顚頥也但四居初之上所處得正又為正應自初而言之則初之見飬于四為凶自四而言之則四之能養初九為吉初九之剛其視若虎之耽耽不可馴也六四順其所欲而致之逐逐焉而來不失以上飬下之正咎可无矣綜卦夲不宜取象但自四視初則震反為艮故初有虎視之象象曰顛頥之吉上施光也按蘇傳謂六四于初為上六四之所施可謂光矣今按施固在四不妨兼上爻言之盖上爻物所由以飬六四與上同體四所以逐逐能􅁇者亦頼與上同體得以恩施及下也以人事言五君也上相也四則奉令行政之大臣膏澤下于民者也六五拂經居貞吉不可渉大川以上養下常經也六五以隂居尊不能飬人反頼上九以為之飬拂于經矣然居尊而能順陽剛之徳以為養又艮體之中故有静安于正而得吉之象隂柔不可以大有所為故又有不利渉大川之象六二拂經而㐫此拂經而猶吉者二動體貪求于人以自飬則失正而㐫五止體雖不能飬人而能用人以飬人則正矣故吉時觧作君用賢飬民近之象曰居貞之吉順以從上也能從上九之賢以飬天下故也上九由頥厲吉利渉大川六五順上九以飬人是物由上九以飬也故曰由頥然位高任重易失之專故必危厲而吉五不利渉大川而上利者五柔而上剛也此居大臣之位而澤及天下可以濟變者也象曰由頥厲吉大有慶也言天下被其澤也全卦言自飬飬人皆貴于得正六爻以上下之𫝑言之則在上宜飬人在下則不能故上三爻多言飬人而下三爻多言自飬以隂陽之分言之則陽能為飬而隂待飬于陽故初上有飬人之才而中四爻皆有藉于初上上九居上卦之上又有陽剛之徳六五藉之以飬天下者故最吉初九其位雖不能飬人其陽剛猶可以自養乃動于四而自飬併失其正者也故㐫四五雖不能飬人而能資人之養又推以飬人者也故雖未能如上之渉川而皆有吉道二三既待飬于人又急于求賢則自飬之大逺于正者也故其㐫又有甚于初矣要之自飬得正然後可以飬人君子必由慎言語節飲食以為自飬之功極之至如天地之飬萬物聖人之飬賢以及萬民以盡所飬之道庻有得于頥卦之㫖矣大過下巽上兊澤以潤木乃至滅木有大過之象陽大隂小中四陽極盛初上二隂不能勝大者過也故名大過大過次頥按序卦頥者養也不飬則不可動故受之以大過凢物飬成而後所動者大非常之事大過于人由于所飬者大大過所以次頥也又六十四卦次序多由相綜惟乾與坤錯坎與離錯此則澤風與山雷相錯下經則以風澤與雷山相錯也全彖以四陽雖過而二五得中内順外說其道可行故所徃皆亨六爻則以剛柔相濟者為善而過剛過柔者皆㐫二四爻剛而位柔故二利而四吉初爻柔而位剛故无咎三五重剛而三又不中者也故三㐫而五醜至上則以柔居柔過于柔者也故㐫大抵剛柔相濟則有大過人之才行大過人之事否則過于剛過于柔皆失之于過者也此全卦六爻之大㫖也大過棟橈利有攸徃亨大陽也四陽居中過盛故為大過上下二隂不能勝又卦之大象坎坎為棟又為矯揉故有棟橈之象然二五得中内巽外説有可行之道故所徃皆亨也既有棟橈之象而又利于徃而可亨者有陽剛之才則雖當甚危之時无不可為之事此所以大過乎人也彖曰大過大者過也謂陽過也此以卦體釋卦名義也棟橈本末弱也本謂初末謂上弱謂隂柔也此又以卦體釋卦辭也剛過而中巽而說行利有攸徃乃亨以卦體言之剛雖過而二五得中以卦徳言之巽順而和悦以行如此則不激于意氣不拂于物情調劑合宜委曲盡善所徃皆利乃可亨也乃者難之之辭大過之時大矣哉以大過人之材立非常之大事創不世之大功成絶俗之大徳唯其時為之无其時不可過有其時无其才不能過也象曰澤滅木大過君子以獨立不懼遯世无悶澤以潤木而今滅没之大過之象也君子之行不求同俗而求同理天下非之而不頋獨立不懼也不求人知而求天知舉世不知而不悔遯世无悶也此皆大過人之行也初六藉用白茅无咎卦以棟橈為象初則夲之弱者然但以棟橈為言則天下事付之不可為矣故又因爻取象巽為木有茅象初在下以柔承剛有藉用白茅之象初六以隂居陽雖弱猶愈于上又大過之初居事之始茍能過于謹慎猶可自全如木中剛本柔茍錯于地或致缺折藉以白茅庻㡬无傷以其能畏懼故得无咎也象曰藉用白茅柔在下也下柔承剛當過于慎也九二枯楊生稊老夫得其女妻无不利稊根之榮于下者女妻年之少者九二陽之過有枯楊象二三四互純乾有老夫象初隂在下有女妻象既處于隂又與初比得隂之滋有稊根復秀女妻得遂生育之象其占无不利也此剛資于柔以成務者也象曰老夫女妻過以相與也二剛之過得初隂以相與以成天下之事也九三棟橈凶三四居卦之中三又變坎皆有棟象全卦弱在初上乃于三言棟橈者盖以剛居剛又與上應上以柔居柔既不能勝三過剛必折是故橈者在三此大臣之過于剛而不勝其任者也象曰棟橈之凶不可以有輔也剛强之過不能取于人人亦不能輔之九四棟隆吉有他吝九四在三之上以剛居柔上與初應以柔居剛剛柔相濟以成天下之務者也故其棟有隆起之象而占則吉也有他吝反言以决之謂當大過之時必剛柔相濟如四乃可不然而或失之剛或失之柔皆吝道也象曰棟隆之吉不橈乎下也四以剛居柔初亦以柔遇剛則其下不致橈折矣本義以應初為有他以不係于初為不撓然細觀全卦以陽之過而有棟橈之象盖凡物以過剛而遇過柔必有橈折也三四皆棟象而三獨言橈以三之過于剛也初上本末皆弱而上獨最㐫以上之過于柔也三以應上得㐫則四以應初得吉可知矣故不必以應初為嫌也九五枯楊生華老婦得其士夫无咎无譽九五亦陽之過有枯楊象隂爻在上又五變為震震為旉有華生于枯楊之象五陽爻變為震又少于上有士夫象比于上六有為老婦所得之象盖陽爻為夫隂爻為婦又以爻之上下分老少取象不可易也隂雖過極得陽不為无益故亦无咎盖隂欲陽非陽之咎也然二之老夫女妻以剛為主而柔輔之五之老婦士夫則以柔為主而剛反輔之矣何譽之有象曰枯楊生華何可久也老婦士夫亦可醜也枯楊生華旋即枯矣老婦雖得士夫安能成生育之功乎上六過渉滅頂凶无咎兌為澤渉水之象一變為乾為坎又居最上有過渉于水滅没其頂之象其㐫甚矣而得无咎者四陽方過盛上以隂爻居隂位隂不敵陽自其分也如棟之橈必自其最弱之處橈折理𫝑固然无足怪者以人事言之則當大過之時才弱不能自濟然理窮𫝑極殺身成仁于義為无咎也象曰過渉之凶不可咎也事雖无濟理勢當然不可咎之也全卦以陽過乎隂取棟橈之象大過不能无橈卦中二五陽皆在中故猶可亨六爻皆欲其剛柔相濟以適乎中然後當大過之時不至于有過大抵剛中有柔柔中有剛者吉偏剛偏柔者㐫陽剛在上為主而隂柔輔之者宜隂柔在上為主而陽剛輔者否初上本末皆弱然上以柔居柔又居最上故㐫初以柔居剛又所處下故无咎三四皆象于棟然四以剛居柔又居上而下取初之輔故吉三以剛居剛又自下而附上之柔故㐫五以剛居剛又自下而上比于上故醜二以剛居柔在上而取初之比故利人當大過之時必以剛為主以柔為輔非剛无以任天下之重非柔无以成天下之功身在下位則當柔而能剛敬以承上庶㡬白茅之義身在上位則當剛而能柔求賢自輔得棟隆之吉老夫之利矣若以剛居剛反上附于隂不㐫必醜若柔弱已極而居最上唯有取㐫而已坎卦一陽䧟于二隂之中陽實隂虚上下无㨿為坎䧟之義故卦名坎坎次大過按序卦物不可以終過故受之以坎坎者䧟也理无過而不已過極必䧟坎所以次大過也坎為險䧟全彖取一陽在中以為内實有常剛中可以有功時世有險而此心无險故雖險而亨此全卦之大㫖也六爻皆不言吉二五雖剛中而皆在險中五得位而二不得位故五既平而二僅小得也四隂爻亦皆從陽爻起義三四在陽爻之中猶愈于初上在陽爻之外三以失位乗陽而无功四以得位承陽猶得无咎若初上則在两陽爻之外初居險之下而上居險之極故㐫為最甚此六爻之大略也習坎有孚維心亨行有尚習重習也坎險䧟也水象陽䧟隂中外虚内實險䧟之象此卦上下皆坎是為重險故言習乾坤六爻同一爻可不言習坎卦序在六子之先此言習而他皆以重習起義可知矣坎卦中實而水内明有有孚心亨之象世可險而心不可險身可䧟而心不可䧟誠信在中則安于義命而不僥倖茍免此心有主不為利害所動而心亨矣心亨則洞察時𫝑取必于理而行自必有功此所以為處坎之道也彖曰習坎重險也危難洊至險而又險也此釋卦之名義水流而不盈行險而不失其信水流足此通彼无有盈溢雖奔突險阻專赴于壑而不失不盈之信盖水性趨下不盈即趨下也此以卦象釋有孚之義也維心亨乃以剛中也行有尚徃有功也三五以剛在中實心无累何徃不通如是而行必有功也盖坎以能行為功若止而不行則常在險中矣天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉不可升无形之險山川丘陵有形之險王公因有形之險為无形之險是謂人險坎卦四隂二陽二陽中實之象體水之徳為有孚心亨處險之道也四隂險䧟之象因坎之形而設險守國用險之方也徃有功以上皆言處險之道此則言用險之方象曰水洊至習坎君子以常徳行習教事水流不已以成大川人學不已以成大賢君子于己之徳行務于常乆于教人之事務于熟習初六習坎入于坎窞凶坎中小穴旁入者曰窞以隂柔居重險之下其䧟益深故其象占如此象曰習坎入坎失道凶也深入于險失出險之道也有孚心亨所謂道也九二坎有險求小得處重險之中未能自出故為有險之象然剛而得中故有求而小得之象象曰求小得未出中也雖有剛中之才未能出坎中之險六三來之坎坎險且枕入于坎窞勿用隂柔不中正而􅂂重險之間來徃皆險前險而後又枕于險之象其䧟益深不可用也初入于坎窞則曰㐫此曰勿用初不可出此猶可出也象曰來之坎坎終无功也未有出險之道六四樽酒簋貳用缶納約自牖終无咎貳副貳之意益之也牖室之所由以明者坎有酒食之象四變互巽木樽簋之象互離中虚有瓦缶及牖象按本義以樽盛酒以簋盛食復以瓦缶為副樽按來註一樽之酒二簋之食樂用瓦缶覺來註為順且與象傳合縂言當險難之時不事多儀而尚誠實也自牖言不由正道因其所明者而進結之盖當艱險之時不能直致自間道以上逹也六四居大臣之位處險之中本其至誠因君之所明者委曲獻納則雖歴艱險而終得无咎也象曰樽酒簋貳剛柔際也本義謂无貳字人情同樂則相猜共患則相􅀝四與五比君臣相接在險難之中不事煩文以誠相向可以上逹將出于險矣九五坎不盈祗既平无咎九五在坎之中隂之下有不盈之象祗至也以陽剛中正居尊位上止一隂勢將出險有既平之象不盈猶有險也既平則无險矣二居重險之中故有險五出重險之外故既平將出于險可无咎矣象曰坎不盈中未大也剛中居尊宜濟天下之險乃猶在坎中有中徳而未光大也大有六五以柔居中乃曰大中此以剛居中反曰未大者大有柔能統剛坎則剛猶䧟于柔也上六係用徽纆寘于叢棘三歲不得凶三股曰徽両股曰纆皆索名叢棘獄牆所設坎為刑獄上變巽為䋲上六以隂柔居險極故有此象周禮司圜收教罷民能改者三年而舍其不能改而出圜土者殺三歲不得罪大不能改者也占者得之則不能出險可知象曰上六失道凶三歳也三歲久之極所以至此者失處險之道也全卦二五中實故有有孚心亨之象然處險之道即在是矣故六爻惟二五得有孚心亨之道二在險下但可小得五在險上則既平也初以最下而㐫上以險極而甚三以處前後險之間而勿用惟四際五僅得无咎然樽酒納約亦得有孚心亨之義故也離卦一隂麗于上下之陽有附麗之義中虚有光明之義離麗也明也于象為火體虚麗物而明者也又為日亦麗天而明者也故卦名離離卦次坎按序卦坎者䧟也䧟必有所麗故受之以離離者麗也䧟于險難之中必有所附麗理之自然離所以次坎也又按上􅀴終于坎離下􅀴終于既濟未濟六十四卦以乾坤為首而坎離居其中盖坎離二卦天地之心也造化之本也天一生水而二生火坎藏天之陽中受明為月離麗地之隂中含明為日坎為水而司寒離為火而司暑坎為月而司夜離為日而司晝故先天之圖乾南坤北後天則離南而坎北坎離為乾坤之􅁇體此上經終坎離下經終既濟未濟之意而道家亦以人身為小天地以心腎分属坎離而其功用取于水火之既濟盖亦從易説而旁通之者也全卦以柔順得正為吉六爻以二隂爻為主二中正而五非正故不如二其四陽爻則從隂爻起義初上在隂爻之外勝于三四在隂爻之中三日昃而四焚如以在二五两隂之内也初能敬而上出征以在二五兩隂之外也盖坎離二卦竒耦反對故爻象之吉㐫亦相反也離利貞亨畜牝牛吉離之為麗猶亂之為治以隂麗于陽也物之所麗貴乎得正故正則有可亨之道也又離得坤之中畫牝牛皆取隂象坤以全體配乾而行故為牝馬之行離以二五附乾而居故當為牝牛之畜盖所麗得正則亨又當柔順自處則吉也坎離二卦爻畫反對故其義其占皆相反盖坎之明在内當以剛健行之于外離之明在外當以柔順飬之于中坎水潤下愈下則䧟故以行為尚離火炎上愈上則焚故以畜為吉也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下日月麗天以氣麗氣而成明百榖草木麗土以形麗形而成文君臣上下皆有明徳而處于中正則可以成天下文明之化此皆以釋卦之名義也柔麗乎中正故亨是以畜牝牛吉也二中正五中而不正中正統言之此以卦體釋卦辭也象曰明两作離大人以􅁇明照于四方明两作两明相􅁇而起也􅁇明猶以聖􅁇聖也前言重明以上下言之取象于君臣此言两作以先後言之取象于帝王之父子若以人事言之則日新又新緝熈不已􅁇明之義也洞逹事理光被四表照于四方之義也初九􅂂錯然敬之无咎剛明在下其性炎上剛則􅏥明則察二者襍于胸中所􅂂交錯之象能敬則心有主不至于錯可以无咎矣火在下而未上炎猶有可制雖戒占者之辭亦其象然也象曰履錯之敬以辟咎也剛明而不妄動咎可辟矣六二黄離元吉黄中色坤為黄離中爻乃坤土有黄象柔麗乎中而得其正以此事君將順而能匡救以此治民渾厚而能精明上可正君下可成化純臣之道大善而吉之占也象曰黄離元吉得中道也言中而正在其中矣九三日昃之離不鼓缶而歌則大耋之嗟凶重離之間前明將盡有日昃之象離中虚缶象互五為兌口歌與嗟之象死生猶晝夜之常理鼓缶而歌安常以自樂可也不然而徒以大耋為嗟則窮蹙以死而已故㐫盖數之所至當安于命也象曰日昃之離何可久也求人以繼其事退處以休其身可也九四突如其來如焚如死如棄如前明盡而後明忽廹有突如其來如之象其炎正盛焚如之象􅂂非其位逼近至尊𫝑不能終死如之象无應无承衆无所容棄如之象象曰突如其來如无所容也无所容總釋上文舉突如句可該六五出涕沱若戚嗟若吉以柔履剛不得其正而廹于上下之陽互卦兌澤之流兌口之開故有出涕沱若戚嗟若之象然居尊位而知憂懼故占得吉也象曰六五之吉離王公也居王公之位而知憂懼故吉也三前明將盡則不宜為大耋之嗟五柔中居尊則宜以戚嗟自戒上九王用出征有嘉折首𫉬匪其醜无咎離為甲胄戈兵故有出征之象上九為五所麗有王用之之象有嘉言有嘉美之功折首但誅其首惡也𫉬匪其醜言不及其徒衆也陽剛在上有出征有嘉之象離為上稿折首之象剛明在上所照及逺有折首不及其醜之象如此則威震而刑不濫何咎之有象曰王用出征以正邦也㓂賊亂邦上能以剛明除天下之惡所以正邦也全卦以居中得正有可亨之道而以柔順自處自能𫉬吉六爻惟二兼中正柔順之徳故為最吉五中而不正而居尊位以照臨四方故雖憂懼而亦有吉道又火性炎上在下則有𫝑易制在上則其明及逺所以皆无咎若三處前明之盡四居後明之逼則㐫不待言矣周易淺述卷三
