body:
  text: 周易淺述卷七翰林院編修陳夢雷撰繫辭上傳上下經卦爻之下文王周公所作謂之繫辭此傳則孔子之言以發明繫辭中之大意也以其統論全經之大體凡例故不與彖傳象傳同附于經而自分上下云第一章首節以造化之實明作易之原是故以下至坤以簡能言易理之見于造化者易則易知以下則言人之當體易也天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣天地者隂陽形氣之實體乾坤者易中純隂純陽之卦名也天尊地卑隂陽固有自然尊卑之象在易則即太極之生兩儀四象見之太極動而生陽靜而生隂陽已居先矣至陽儀之上生一陽一隂以陽為先而隂儀之上生一陽一隂亦以陽儀居先以至六畫莫不先陽後隂故首乾終坤尊陽卑隂非聖人之私意乃畫卦自然之象實造化自然之位也卑髙者天地萬物上下之位貴賤者易中卦爻上下之位也不言髙卑而言卑髙者髙以下為基人先見卑而後見髙畫卦亦自下而始卦之六位上貴下賤如五為君二為臣之類是也動者陽之常靜者隂之常剛柔者易中卦爻隂陽之稱斷者自然分判不俟人力也天圓而動地方而靜男外而動女內而靜雄鳴而動雌伏而靜皆有常者以卦爻言之初三五為剛二四六為柔以卦畫言之奇為剛偶為柔天地之動靜有常卦畫爻位陽動隂靜陽剛隂柔剛柔本自判然也方事情所向以類聚善與善聚惡與惡聚也善有善之羣惡有惡之羣各有羣則善惡不得不分此天下事物之情而易之吉凶即從此生善以致吉惡以召凶也象者形之精華發于上者日月星辰之屬形者象之體質留于下者山川動植之屬變化者卦爻隂變為陽陽變為隂也有形象者皆陽中有隂隂中有陽易之變化非因形象而後有即形象而易中之變化可見也此節即造化之所有以明易之原然非因有天地而始定乾坤非因卑髙始定爻之貴賤蓋卦爻未起之先觀天尊地卑而易之乾坤已定觀卑髙之陳而易中卦爻之貴賤已位餘皆倣此所謂畫前之易也是故剛柔相摩八卦相蕩自此至坤以簡能皆言易理之見于造化者此節言易卦之變化也畫卦之初以一剛一柔與第二畫之剛柔相摩而為四象又以二剛二柔與第三畫之剛柔相摩而成八卦八卦已成又各以八悔卦蕩于八貞卦之上而一卦為八卦八卦為六十四卦也摩蕩即上文所謂變化鼓之以雷霆潤之以風雨日月運行一寒一暑六十四卦之中有雷霆風雨日月寒暑此變化之成象者易中有之也乾道成男坤道成女男女兼人物而言動物有牝牡雌雄即植物如竹亦有雌雄麻亦有牝牡六十四卦之中自有男女此變化之成形者易中又有之也此兩節又明易之見于造化者大抵易之未畫卦爻之變化在天地中易之既畫天地萬物之變化又在卦爻中在天地者未畫之易在易者已畫之天地也乾知大始坤作成物此承上文男女而言成男雖屬乾道而男女所受之氣皆乾以始之成女雖屬坤道而男女所生之形皆坤以成之知知此也作能此也大始無所不始也大始未有形故曰知成物則流形而有為故曰作大抵物不離乎隂陽陽先隂後陽施隂受陽之輕清未形而隂之重濁有質也乾以易知坤以簡能乾健而動即其所知便能始物而無所難故以為易而知大始坤順而靜凡其所能皆從乎陽而不自作故以為簡而能成物以草木之生觀之天之陽氣一到萌芽盡發何其易也坤不必别有作為承受而長養之即其能也何其簡也此承上文而言易中乾坤之德如此下文乃言人當體乾坤之德也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業此節言人當法乾坤之道乃可以為賢也易簡之易以簡易言易知之易以難易言天地間凡物皆有乾坤而人心尤自具一乾坤人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則非深險而不可測與之同心者多故有親易從則事無艱阻與之協力者衆故有功有親自然可以長久有功自然可以廣大德以所存主言得于己者業以所發見言成于事者可久者日新而不已賢人之德也可大者富有而無疆賢人之業也不言聖而言賢蓋聖人者自然之事言賢人以見乾坤之德業人皆可勉而至也且可久可大僅曰可而已非其至也至成位乎中則聖矣易簡而天下之理得矣天下之理得而成位乎其中矣成位成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣此章首言天地有自然之易中言易中有自然之天地末言天地與易不外乎自然之理理至易至簡人能易簡則人心有易人心有天地矣右第一章第二章自章首至三極之道也言聖人作易之事以下言君子學易之功聖人設卦觀象繫辭焉而明吉凶聖人既作觀卦爻之象而繫之以辭非得已也恐後人知不足以及此而明示以吉凶也剛柔相推而生變化吉凶以辭而明辭因象而出卦爻隂陽迭相推蕩而隂或變陽陽或變隂此聖人所以觀象而繫辭衆人所以因蓍而求卦者也是故吉凶者失得之象也悔吝者憂虞之象也聖人觀卦爻之中有得失因繫之以吉凶有憂虞則繫之以悔吝得則吉失則凶憂則悔虞則吝吉凶相對而悔者自凶而趨吉吝自吉而趨凶蓋憂在心虞在物在心方有端而無患為悔而已心每有之而不忘積之所以成吉在物則有形可虞非悔可及故成吝吝者口以為是文過不改積之遂以成凶矣此節明上文繫辭焉而明吉凶之義變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也變化剛柔以卦畫言進退晝夜以造化言進者息而盈退者消而虛隂進則陽退陽進則隂退剛方變柔柔方變剛剛柔未成為變化者即造化或進或退之象也剛屬陽明晝之象柔屬隂暗夜之象變化已成而為剛柔即造化晝為陽夜為隂之象也極至也不極則不動三極即三才六爻之位初二為地三四為人五上為天三才之位陽極則動為隂隂極則動為陽六爻所以變動三才極至之道也此節明上文剛柔相推而生變化之義然剛柔相推而生變化而變化之極復為剛柔以流行于一卦六爻之間占者遂各因所值以斷吉凶也自此以上皆言聖人之作易也是故君子所居而安者易之序也所樂而玩者爻之辭也居就身之所處而言安者隨分而安也序以卦言如剝復否泰是也以爻言如潛見飛躍是也能循其序則居之安矣玩者觀之詳樂有契于心也玩味知其理之無窮則可樂愈可玩矣居而安君子之安分也樂而玩君子之窮理也安分則窮理愈精窮理則安分愈固此及下節皆言君子學易之功也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利居字與上文微分以靜對動就平居學易言之也動則揲蓍求卦就臨事用易言之也未卜筮時易但有象與辭方卜筮時易乃有變與占八卦六爻皆有象辭則各因象而指其吉凶此就全經言之在理而未形于事者也變則揲筮得老隂老陽之變占則所值卦爻之吉凶此就揲筮所得卦爻言之以吾所問之事合所得之辭而斷之者也言君子平居學易既觀象矣又玩辭以考其所處之當否動而諏筮既觀變矣又玩占以考其所值之吉凶吉則行凶則止動靜之間無非易即無非天靜與天俱動與天遊冥冥之中若或助之故自天祐之吉無不利也人在天地之中吉凶悔吝無一息之停然吉一而已凶悔吝有三焉故上文示人以吉凶悔吝以見聖人作易之事此獨言吉而無凶悔吝則君子學易之功也右第二章第三章釋卦爻辭之通例而後教人體卦爻辭之功彖者言乎象者也爻者言乎變者也彖文王所作卦辭象指全體而言爻周公所作爻辭變指一節而言吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也盡善為得不盡善為失小不善為疵不明于善而誤為不善為過覺其不善而欲改為悔覺其不善而未能改或不肯改為吝悔未吉而猶有小疵吝未凶而已有小疵善補過嘉其能改也有過當有咎能補則無聖人不貴無過而貴改過望人自新之意切矣此皆卦爻辭之通例也彖爻中吉凶悔吝無咎之辭皆備吉凶者言卦爻中之得失悔吝者言卦爻中之小疵無咎者善卦爻中之能補過此釋彖爻之名義又釋吉凶悔吝無咎之名義也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭上文已釋卦爻吉凶悔吝無咎之名義此則教人體卦爻吉凶悔吝無咎之功也六爻之位二四則四貴而二賤五三則五貴而三賤初上則上貴而初賤上雖無位然在所貴以君言為天子父天子師以世人言物外清髙不與事者所以貴也小隂大陽小大不可齊猶辨别而定之也如泰大否小之類隂陽雖有小大必假卦象而後顯也此承上節而言爻固言其變矣若列貴賤則存乎所變之位貴賤不可淆也彖固言其象矣若齊小大則存乎所象之卦小大不可亂也吉凶固言乎失得矣若辨吉凶則存乎其辭吉則趨凶則冝避之也憂悔吝者存乎介震無咎者存乎悔介謂辨别之端善惡已動而未形之時也悔吝未至于吉凶乃初萌動可以向吉凶之微處介又悔吝之微處于此憂之不至于悔吝矣震動也不曰動而曰震有所震動以求其無咎者在乎深有所愧悔以堅其補過之心則不至于有咎矣此亦承上而言悔吝固言乎其小疵矣然當謹于其微不可以小疵而自恕也無咎固善其能補過矣然欲動其補過之心必自悔中來也是故卦有小大辭有險易辭也者各指其所之大卦辭易謙復之類小卦辭險睽剝之類所之所向也各字兼吉凶悔吝無咎五者讀謙復之辭如行坦途如逢春陽氣象和樂其辭平易示人以所之之得且吉也讀睽剝之辭如涉風濤如履雪霜氣象凛栗其辭艱險示人以所之之失且凶也本凶而悔所之則吉本吉而吝所之則凶無咎本有過而能補過則所之之于得不之于失之于吉不之于凶矣合前二章論之第一章論伏羲畫卦望賢人之體易第二章論文王周公所係辭望君子之用易此則專論彖爻辭之例示衆人之用易也右第三章第四章言易道之大聖人用之而窮理盡性以至于命易與天地凖作易聖人亦與天地凖也易與天地凖故能彌綸天地之道此節言易道之大也易指易之書而言易書卦爻具有天地之道與之齊凖故于天地之道能彌之彌者彌縫合萬為一使渾然而無欠又能綸之綸者絲綸一中有萬使燦然而有條彌而不綸則空疏無物綸而不彌則判然不屬彌如大德之敦化綸如小德之川流也仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀此窮理之事也以者聖人以易之書也易者隂陽而已幽明死生鬼神皆隂陽之變天地之道也天文地理本義謂天文有晝夜上下地理有南北髙深大全謂晝明夜幽上明下幽觀此見天文幽明之所以然南明北幽髙明深幽察此見地理幽明之所以然此亦不過粗舉大凡亦不盡此也天文顯而在上觀之可見地理隱而在下必察其詳又天文逺而成象難于細察地理近而有形又非觀之所可盡也就天文地理分言之似天文明而地理幽而天文地理中又各有幽明如日月雷風見于象者為明其藏而不見處即為幽山澤水火之隱藏未見者為幽其有形可見即為明以易之隂陽知天文地理之有幽明以易之隂中有陽陽中有隂知天文地理中之幽中有明明中有幽陽極隂生則漸幽隂極陽生則漸明終古天地皆如此知其所以然之理所謂知幽明之故也原者推之于前反者要之于後天地之化雖生生不窮然有聚必有散有生必有死以易中隂陽二氣之聚推其所以始則可以知生之説以易中隂陽二氣之散推其所以終則可以知死之説説謂言其理也耳目之聰明為精口鼻之噓吸為氣人之生也精與氣合而有物故為神精滅則魄墮于地氣絶則魂遊于天人之死也魂與魄離而為變故為鬼蓋在生謂之精氣在死謂之魂魄離合聚散屈伸往來于天地之間謂之鬼神然要不出于易之隂陽可知也蓋精也魄也皆隂之屬也氣也魂也皆陽之屬也精氣為物隂陽二氣聚而為神也而神又陽之屬則精氣者陽中之隂陽也遊魂為變隂陽二氣散而為鬼而鬼又隂之屬則魂魄者隂中之隂陽也人生謂之氣死謂之魂乃夢中不謂之氣而謂之魂者蓋當其睡夢生而有死之形氣雖未絶而精不用事故魂與魄離而有夢此又陽中之隂也人生謂之神死謂之鬼乃正人君子死不謂之鬼又謂之神者蓋浩然之氣死而全生之理精雖已滅而氣猶不散故魂能舉魄而為神此又隂中之陽也正人君子之死遊魂之變而為神伯有為厲之屬遊魂之變而為鬼鬼者歸也亦漸歸于澌滅而已神者伸也在天為星辰在地為河嶽正氣常伸此又聖人之所以貴陽賤隂扶陽抑隂之意乎而要其聚散久近則隂陽之變化而不可窮詰而其自無之有自有之無則無極太極而生隂陽隂陽仍歸于無極此鬼神之情狀可以易知之者也大全楊氏曰禍盈福謙鬼神之情如在其上如在左右鬼神之狀于義亦通但未盡其所以然之故耳與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛上文言易與天地凖故可即易以窮天下之理此言聖人之道似天地而所以似天地者用易道以盡其性而已天地之功大矣凖之者易似之者聖人易本無體故言凖如平凖之凖均一無間聖涉有為故言似如形似之似順適乎自然天地聖人本無二道列之為三則相似而已唯相似故先天後天而不違也此句統言之以下不過不憂能愛皆不違之事天地之道知仁而已知周萬物者知同乎天也道濟天下者仁同乎地也後以知仁分天地以動靜言之此以清濁言之知之所及猶虛故以屬天道之所濟則實故以屬地不過與下文不同不過言天下莫能過即不違也旁行而不流本義謂旁行者行權之知也不流者守正之仁也大全朱子又云細分之有知仁其實皆知之事對下安土敦乎仁一句蓋朱子因兩故字而改之也今從之知之旁行而流則不能樂天知命而不憂故此句詳言之天以理言仁義忠信是也命以氣言吉凶禍福是也雖有旁行行權之知而不流于邪曲之為蓋所樂者天理之正無一念之雜又知天命之有定不以利害禍福夭夀二其心所以能不憂也如是而其知益深似乎天矣安土隨處而安也所處不安則何暇及于人隨處皆安無不息之不仁私欲盡淨天理充滿愈加敦厚不忘其濟物之心所以能愛也如是則其仁益篤似乎地矣此聖人體易以盡性之事而上下與天地同流者也又按來注知仁不分不過不憂能愛皆指天地言天地至大無外不過者也聖人知周萬物道濟天下故同其不過天地鼓萬物不與聖人同憂者也聖人樂天知命故同其不憂天地以生物為心能愛者也聖人安土敦仁同其能愛此説更渾範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體此聖人體易而至于命之事範如鑄金之有模範圍匡郭也天地之化無窮聖人範圍之不使過于中道以天道言如一嵗分四時生長收藏以人身言如欲動情勝為之禮義檢制皆是也曲成不遺又隨萬物之分量形質使大小方圓各有成就也範圍即大德之敦化上文之所謂彌曲成即小德之川流上文之所謂綸也幽明死生鬼神即一晝一夜之理通達之也知有晝即有夜之理則古今一晝夜也幽明死生鬼神無不可知矣以此見至神之妙無有方所易之變化無有形體也使範圍有過曲成有遺通晝不通夜通夜不通晝則神有方易有體矣蓋天地之化隂陽之氣萬物隂陽之形晝夜隂陽之理此三者不外乎隂陽者也神則隂陽不測在隂忽而在陽在陽忽而在隂本無方所可定易則隂中有陽陽中有隂亦無體質可定聖人盡乎易即合乎神所以能範圍曲成而通知之也上文言聖人之知不過此則能使天地之化不過上言知周乎萬物此則曲成之而不遺上言仰觀俯察原始要終而知幽明死生鬼神此則通乎晝夜之道而知蓋窮理盡性之極至于命之事聖人即易也即神也即天地也而已矣按來注不言窮理盡性至命但謂易與天地凖聖人亦與天地凖此節承上文易能彌天地之道聖人範圍不過亦能彌之易能綸天地之道聖人曲成不遺亦能綸之易所具不過幽明死生鬼神之理聖人通乎晝夜亦有以知之其説雖與注小異而意更渾可參右第四章第五章言道不外乎隂陽繼之者善以下二節言其在人者顯仁藏用二節言其在造化者自生生之謂易以下言其在易書者而總以隂陽不測結之一隂一陽之謂道隂陽迭運者氣也所以隂陽之理則道也按來注理乘氣機以出入一隂一陽氣之散殊即太極之理各足而富有者也氣之迭運即太極之理流行而日新者也故謂之道此解亦精中庸率性之謂道就道之在人者言此則就道之在天者言繼之者善也成之者性也繼善就斯道之發育賦豫者言之以其天命之本體不雜于形氣之私所謂元者善之長故曰善也成性就人物所稟受而言之氣以成形而理亦賦物物各得一太極無妄之理不相假借故曰性也繼善陽之事成性隂之事也蓋道即所謂太極繼善則動而生陽成性則靜而生隂也此節就天人賦受之界言之也孟子之言性善蓋出于此夫子之言性相近也蓋自成性之後兼于氣質者言之孟子之言性善則自成性之先純乎繼善者而言之也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣曰善曰性具于人身渾然一理不可名狀唯仁者發見于惻隱則謂之仁知者發見于是非則謂之知而後所謂善與性方有名狀百姓同此善性而氣稟所拘物欲所蔽故知之者鮮上章言聖人之知仁合而為一者也此言仁者知者分而為二者也自天命之流行于人物者言之則繼善為陽成性為隂此就所成之德言之則仁屬陽知屬隂上章以知屬天仁屬地此則仁屬陽知屬隂者彼以清濁言此以動靜言也夫子言仁靜知動而此又以動屬仁靜屬知者論語就成德之後言此從其稟性所近言仁者得陽之發生流動以為仁而德成能安于理則見其靜知者得隂之凝定不易以為知而德成周通于理則見其動此又隂中之陽陽中之隂不可拘也仁知各得道之一隅隨其所見而目為全體百姓則日用之間習而不察此君子之道所以鮮也君子之道即一隂一陽之道係之君子者君子有體道之功也顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉顯自內而外也運行之迹生育之功顯諸仁也德之發也藏自外而內也神妙無方變化無迹藏諸用也業之本也聖人之與天地可同者顯仁藏用之德業也不可同者天地無心聖人有心也聖人仁萬物而獨任其憂天地鼓萬物而不與聖人同其憂蓋天地無心而成化聖人有心而無為也富有之謂大業日新之謂盛德富有者大而無外天髙地下萬物散殊是也日新者久而無窮隂陽升降變化不窮是也此雖言天地然聖人亦然生物無窮天地之大業功及萬世聖人之大業也運行不息天地之盛德終始日新聖人之盛德也繼善成性二節言隂陽之道在天人賦受之界者顯仁藏用二節言隂陽之道在天地造化者生生之謂易隂生陽陽生隂其變無窮易之理如是故其書亦如是此以下就隂陽之在易書者言之成象之謂乾效法之謂坤象者法之未定法者象之已形乾主氣故曰成象坤主形故曰效法乾本陽而名為乾以其健而成象也坤本隂而名為坤以其順而效法也此一陽一隂之道在卦者也極數知來之謂占通變之謂事數蓍數也天數二十有五地數三十極天地之數而吉凶可以前知此之謂占通變即所占之卦變而通之事行事通其變而行之也極數知來所以通事之變曰占則事之未定者屬乎陽曰事則占之已決者又屬乎隂也按來注云極數者方卜筮之時究極其隂陽七八九六之數觀其所值何卦所值何爻以斷天下之疑故曰占通變既卜筮之後詳通其隂陽老少之變吉則趨之凶則避之以定天下之業故曰事此一隂一陽之道在卜筮者也隂陽不測之謂神此句總結上文三百八十四爻隂中陽在陽中隂在故不測也上章言易無體此言生生之謂易唯其生生所以無體也上章言神無方此言不測之謂神唯其不測所以無方也言易繼以乾坤乾坤毁則無以見易也言神先以占事占事則神所托而顯者也此章大抵以道不外乎隂陽而隂陽終不可測以其在人者言之則繼善成性仁者知者皆隂陽之所為也就其中而分之則繼善陽成性隂仁陽知隂而究之繼成之妙隂陽之在人者不可測也以其在天地者言之則盛德大業皆隂陽之所為也就其中而分之則顯仁陽藏用隂而要之盛德大業之妙隂陽之在天地者不可測也以其在易者言之為乾為坤為占為事皆隂陽之所為也就其中而分之則乾陽坤隂占陽事隂而究之生生之妙隂陽之在易者不可測也不可測者神也以其理之當然而言謂之道以其道之不測而言謂之神非道外有神也聖人假易書以明道假卜筮以顯其神使人體易即以法乎天地易也天地也聖人也一而已矣右第五章第六章贊易之廣大而原于乾坤之二卦也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣上章言易與天地凖贊易之書此言廣大贊易之理也廣言其中之所含大言其外之所包下三句皆言廣大不禦言其無逺不到莫之能止即所謂天下莫能載也靜而正言未動之先即物而理存無安排布置之擾即所謂天下莫能破也盈天地之間惟萬物而易之理無不備其廣大如此夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉乾坤各有動靜靜體而動用靜别而動交也直專翕闢其德性功用如是以卦畫觀之亦然乾性健其畫奇不變則其靜專一不他變則其動直遂不撓以其一而實故以質言曰大言無所不包也坤性順其畫偶不變故其靜翕受無遺變則其動開闢無壅以其二而虛故以量言曰廣言無所不容也蓋天雖包于地之外而其氣常行于地之中易不過寫乾坤之理乾坤之德性如是易之所以廣大者以此廣大配天地變通配四時隂陽之義配日月易簡之善配至德配相似之意廣大配天地承上文言之非配合也易之廣大得于乾坤則其廣大亦如天地矣變通者陽變而通乎隂隂變而通乎陽老陽老隂變化往來配四時之流行不息也義者名義也卦爻中剛者稱陽柔者稱隂故曰義隂陽對待配乎日月也易簡即順健至德即仁義禮智天所賦于人之理而人得之者也仁禮屬健義智屬順是易所言易簡之善與聖人之至德相似也天地之間至大者天地至變者四時至精者日月至善者至德易之書具此四者豈不謂之備乎右第六章第七章贊易道之至聖人所以崇德廣業而參天地也子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地德業以聖人為至而聖人之德所以崇業所以廣者易也德由于知知識貴其髙明聖人以易窮理則知之崇如天而德崇矣業由于禮踐履貴其著實聖人以易踐履則禮之卑如地而業廣矣所見髙于上所行實于下則道義從此生生不窮猶天地設位而易行乎其中矣天地設位而易行乎其中矣成性存存道義之門承上天地言之言聖人非勉強效法乎天地也蓋天地設位而易行所以成性之存而道義出也易不外隂陽隂陽升降所謂易行乎其中也成性與成之者性稍異彼乃成就之意此則已成之性渾然天成非有所造作也性同唯聖人能存之存存者存而又存知崇禮卑則成性存存矣在造化謂之易易在人謂之道義性者所得于天道義世所共由能知崇禮卑則成性存而不失道義從此而出道義之得于心為德見于事為業自然日新月盛不期崇而自崇不期廣而自廣矣聖人作易固教人存性以由道義之門而德之崇業之廣皆以此此易之所以至也右第七章第八章言卦爻之用自中孚初爻以下夫子擬議其辭示人以學易之變化以為三百八十四爻之例也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象賾繁多也擬諸形容如乾為圜坤為大輿之類象其物宜如乾稱龍坤稱牝馬之類象卦爻中之象也聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻會以物之所聚言通以事之所冝言觀其會不觀其通或窒塞而不可行觀其通而不觀其會則不知其中之條件曲折典禮猶常禮常法堯舜揖讓湯武征誅是也全卦中自有會通一爻中又各有一爻之會通繫辭以明其吉凶使人皆由于典禮也言天下之至賾而不可惡也言天下之至動而不可亂也繁多者使人易厭然皆理中所有則不可惡也動則紛紛致亂然其中各自有理則不可亂矣擬之而後言議之而後動擬議以成其變化聖人之于象擬之而後成學易者亦擬其所立之象以出言則言之淺深詳略必各當其理聖人之于爻必觀其會通以行典禮學易者亦必議其所合之爻以制動則動之行止久速必各當于時易之變化無窮學易者能擬議之如此而易之變化成于吾身矣故下文皆言擬議以成變化之事鳴鶴在隂其子和之我有好爵吾與爾縻之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎釋中孚九二爻義爻言感通之理夫子專以言行論之蓋誠信感通莫大于言行也居室在隂之象出言鶴鳴之象千里應之子和之象出身加民發邇見逺好爵爾靡之象樞動而户之開有大小機動而弩之發有中否猶言行之出有榮辱應在人而感之在我故曰榮辱之主也言行和則致祥乖則致異所謂動天地也學易必擬議至此乃不為爻象所拘也同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭釋同人九五爻義爻言君子之道始雖岐而終實無間孔子釋之言始異而終同者由于迹異而心同也斷金物莫能間如蘭其言有味也初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣釋大過初六爻義置物者不過求其安錯諸地可以安矣又承之以茅則益有所藉又安有傾覆之咎茅為物至薄用之以得無咎則其用重矣此慎之至也天下事過則有失唯過慎則無咎勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也釋謙九三爻義德言盛禮言恭言德欲其盛禮欲其恭也人之謙與傲視其德之厚與薄德厚者無盈色德薄者無卑詞如鐘磬焉愈厚者聲愈緩薄則反是故有勞有功而不伐不德唯至厚者能之德盛禮恭本君子修身之事非有心以保祿位然天下莫與爭勞爭功自永保斯位矣亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也釋乾上九已入文言不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也釋節初九爻義爻義就出處言夫子推及言語之節蓋兑有口舌象也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思代之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也釋解六三爻義按上慢下暴大全作慢其上而暴其下恐未的竊意小人而乘君子句以德言上下以位言小人在上驕慢不戒小人在下暴竊非據皆盜所伐也作易者不歸罪于盜而咎招盜之人所以為知盜也自中孚二爻至此皆夫子擬議示人以變化者蓋爻義非辭不明而天下事之變化非辭可盡故即諸爻以示三百八十四爻之例蓋學者當觸類以及其餘也右第八章第九章論天地大衍之數揲筮求卦之法天一地二天三地四天五地六天七地八天九地十此言天地之數陽奇隂耦即所謂河圖也人知河圖之數不知天地之數故孔子分屬之其位一六居下為水二七居上為火三八居左為木四九居右為金五十居中為土五行本五而有十五行中又各有隂陽如木有甲乙火有丙丁土有戊己金有庚辛水有壬癸故十也數十而卦八者十五行之數卦但取隂陽之象也即一二三四得卦畫老少隂陽之象即六七八九得揲筮老少隂陽之象即中五為衍母次十為衍子而得揲筮求卦之原至于因圖而畫卦與先後天配合河圖之位于河洛圖説詳之此節所舉天地自然之數以見大衍用五十之由耳天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也天數五者一三五七九皆奇也地數五者二四六八十皆偶也相得本義謂一與二三與四五與六七與八九與十各以奇偶為類而自相得有合謂一與六二與七三與八四興九五與十皆兩相合今就五位二字思之此句頗有疑竊意五位者五行之位也五行之位北水南火東木西金而中土一與六皆水而居北二與七皆火而居南木金土亦然水得水之位火得火之位所謂五位相得也若一與二三與四彼此相對非五位之相得者矣所謂有合者固以一六二七為合而各字所包者廣竊意皆與五數又有合也蓋一二三四五者生數也六七八九十者成數也然行止五大衍之數亦取五一與五合而得六二與五合而得七以至八九十皆然又十干之中甲與己合乙與庚合丙與辛合丁與壬合戊與癸合皆隔五位所謂各有合也二十有五五奇之積然亦五其五也三十五偶之積然亦六其五也河圖畫卦意義所取非一此節敘大衍之數所以獨取五十之原故獨于此詳之耳變化本義謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之此處亦覺未合蓋五行之生成在變化之前此所謂變化疑在五行生成之後又以變字化字分屬亦未得其解竊意水體陽而用隂而質最清故天以一生水地以六成之火體隂而用陽而質次清故地以二生火天以七成之木為少陽而質漸濁故天以三生木地以八成之金為太隂而質更濁故地以四生金而天以九成之土中宫而質最濁故天以五生土而地以十成之五行各位其方而四方即為四象蓋自有天地而即有之此五行之生成在未有變化之先也及五行既具二氣運行錯綜不一所謂四象變化而庶類繁聖人畫卦則由此而定先後天之位而揲筮以求隂陽之數不外此自一至十之數千變萬化皆從此出故此所謂變化宜在五行生成之後不必復以五行之生成分配變化也鬼神本義謂凡奇偶生成之屈伸往來者蓋鬼神流行之妙要不外于隂陽而已此節未詳言本河圖以畫卦之原不過言天地之數之原以起下文大衍用五十之意也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸奇于扐以象閏五嵗再閏故再扐而後卦河圖五十有五者天地自然之數也大衍之數五十聖人又即河圖中宫天五乘地十而得之者也河圖洛書皆五居中而為數故在天為五星在地為五行在人為五常五者數之祖也數始于一備于五小衍之成十大衍之而成五十五十數之成也成則不動故虛天一不用而取四十有九此皆理數之自然非人力所能損益也兩兩儀天地也挂縣其一于左手小指之間也三三才也揲數之也奇所扐四數之餘也扐勒于左手中三指之兩間也閏積月之餘日而成月者也象閏者以其所歸之餘策而象日之餘也五嵗再閏者一年十二月氣盈六日朔虛六日共餘十二日三年則餘三十六日分三十日為一月又以六日為後閏之積其第四第五年又各餘十二日以此二十四日湊前六日又成一閏此是五嵗再閏也挂一當一嵗揲左當二嵗扐左則三嵗一閏矣又揲右當四嵗扐右則五嵗再閏矣再扐而後挂者再扐之後復以所餘之蓍合而為一為第二變再分再挂再揲也獨言挂者分二揲四皆在其中矣此則象再閏也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日凡此策數生于四象蓋河圖四面太陽居一而連九少隂居二而連八少陽居三而連七太隂居四而連六揲筮之法則通計三變之餘去其初挂之一凡四為奇凡八為偶奇圓圍三偶方為四三用其全則三奇為九四用其半則三偶為六如三揲挂扐通十三策去初挂之一為十二是三奇為九矣而其揲亦九策亦四九三十六是為居一之太陽三揲挂扐通十七策去初挂之一為十六是二奇一偶則為八矣而其揲亦八策亦四八三十二是為居二之少隂三揲挂扐二十一策去初挂之一為二十是二偶一奇則為七矣而其揲亦七策亦四七二十八是為居三之少陽三揲挂扐二十五策去初挂之一為二十四是三偶為六矣而其揲亦六策亦四六二十四是為居四之老隂此言乾之策二百一十有六坤之策百四十有四者專以乾坤之六爻老隂老陽言之蓋少隂退而未極乎虛少陽進而未極乎盈故獨以老隂老陽為言也然得乾者未必皆老陽得坤者亦未必皆老隂但以乾坤有老隂老陽之象六子有少隂少陽之象故以老隂老陽計乾坤六爻之策數而其餘可推也至于三百六十則隂陽之合其數必齊若乾坤之爻皆得于少隂少陽則乾之策六其二十八而為百六十八坤之策六其三十二而為百九十二其合亦為三百六十也期周一嵗也一嵗凡三百六十五日四分日之一此特舉成數言之耳當者適相當非以彼凖此也二篇之策萬有一千五百二十當萬物之數也二篇上下經也老陽爻百九十二得六千九百一十二策老隂爻百九十二得四千六百八策合之得萬有一千五百二十以當萬物之數非謂物止此數亦極言其多耳若兩篇皆少隂少陽之數合之亦為萬一千五百二十也是故四營而成易十有八變而成卦四營分二挂一揲四歸奇也易謂一變也三變成爻十有八變成六爻也八卦而小成謂九變成三畫得內卦也引而伸之觸類而長之天下之能事畢矣此又就六爻大成之後視其變與否則一卦可變為六十四卦以定吉凶凡四千九十六卦也能事即下文顯道神德行酬酢佑神也顯道神德行是故可與酬酢可與佑神矣道隱而無形者也因辭而顯其吉凶以示乎人德行人之所為者也因數而決其行止則皆神之所為矣隱者顯之以示人顯者神之以合天則明可以酬酢事物之宜而幽可以輔助鬼神之功矣受命如嚮如賔主之應對故曰酬酢神不能言吉凶以示人蓍卦有辭代鬼神言之是佑助鬼神所不及也此又極言因筮求卦之妙也子曰知變化之道者其知神之所為乎此復加子曰以别上文也變化即上文大衍之數與揲筮求卦之法也陽變為隂隂變為陽皆非人之所能為故曰神道者本然之妙神者所以然之故也全章首論天地之數次論蓍策之數末論卦畫之數而終贊因筮求卦之妙也右第九章第十章承上章而言易中之用有四者皆神之所為也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占以用之也尚取也指其所之者易之辭也以言者尚之則言無不當矣化而裁之者易之變也以動者尚之則動無不時矣象其物宜者易之象也制器者尚之則可以盡創物之智矣極數知來者易之占也卜筮者尚之則可以窮先知之神矣辭與占為類觀其辭乃可知其占故下文至精合辭與占言之變與象為類變者事之方始象者事之已成故下文至變合變與象言之四者唯變難知變雖在辭象占之外實不出乎辭象占之間也是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此此節言尚辭尚占之事問焉而以言按本義謂以言與以言者尚其辭之以言同謂以之發言處事也今按經文上已有有為有行此又補以言語氣未順又按大全朱子又云言是命龜受命是龜受命此説較順今從之至精窮理于精微也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此按本義謂尚象之事變謂事之未定者也要之此節總承上尚變尚象言之參伍以變交互參考之意然按筮法每爻三揲為三變而每揲之中象兩象三象四時象閏象再閏雖曰四營實五小變所謂參伍以變也錯謂分而配之三奇為老陽三偶為老隂兩奇一偶為少隂兩偶一奇為少陽是也綜謂合而總之總記左右手之正策得四六四七四八四九之數是也此二語止論一爻之法也通其變謂通六爻十有八變而成初二三四五上剛柔相雜之文也極其數謂極六爻七八九六而得內外兩卦天地雷風水火山澤之象也此二句論成卦之法也三變而成爻十有八變而成卦易之有象天下之至變者無以加之矣易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與于此此四者易之體所以立而用之所以行者也易指蓍卦無思無為蓍策本無心者也寂然者其體感通者其用此專就蓍卦而言然而人心動靜之妙亦如此唯聖人能之耳夫易聖人所以極深而研幾也極深承至精研幾承至變如幽明之故死生之説易中之至精者本深也聖人即此以極其深如吉凶悔吝之萌人不自覺易中之至變者其幾也聖人即此以研其幾極深大學之所謂知止研幾大學之所謂能慮上文至精至變至神易之體也下文惟深惟幾惟神易之用也此句承上起下唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至唯易之能極深也故以辭為占則可以前知而開通天下人之心志唯易之能研幾也故以變得象則可以制作而完成天下人之事務然辭占變象所以能如此者皆妙不可測之神為之唯其妙不可測故不待疾之而自速不待行之而自至謂自然而然非人所能為也天下之理唯疾故速唯行故至未有不疾而速不行而至者蓋不如是不足以為神也神莫神于心此所謂神亦就易書言之子曰易有聖人之道四焉者此之謂也觀變玩占可見其精觀象玩辭可知其變然非有疾然感通之神何以為精何以為變哉變化之道皆神所為易有聖人之道四焉無非變化之道而已矣右第十章第十一章專言卜筮之事子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑開物謂人所未知者開發之成務謂人所欲為者成全之冒天下之道謂卦爻既設而天下之道皆包括于其中也易之道本如此而聖人以之教人卜筮以知吉凶易能開物則于人所未知者開發之而通天下之志矣能成務則于人所欲為者成全之而定天下之業矣能冒天下之道則于萬事萬物之得失莫遁其情有以斷天下之疑矣卜筮之妙如此是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與于此哉古之聰明睿知神武而不殺者夫圓神謂變化無方方知謂事有定理易以貢謂變易以告人蓋蓍以七為數七七四十九而屬陽分挂揲扐隂陽老少變化無方圓而神也卦以八為數八八六十四而屬隂吉凶得失一定不易方以知也貢猶告也三百八十四爻剛柔迭用九六相推其理變易以告人易以貢也此以上皆承上節言易之妙也聖人以下就畫前之易易理在聖人之心者言之洗心者心純乎理别無所纍非有私而洗之也退藏于密者寂然未動人莫能窺非有意藏之也吉凶與民同患者既得吉矣又患其凶凶固民之所患吉亦民之所患聖人之心與民同之也神以知來承上圓而神知以藏往承上方以知蓍未有定數故曰知來卦已有定體故能藏往聖心之神知亦然也言聖人之心體具三者之德故當無事之時心之體虛靈寂靜人莫能窺所謂洗心退藏于密也及其有事之時心之用隨感輒應終始畢照所謂吉凶同患知來藏往也此節即上章所謂寂然不動感而遂通者而此特就易之在聖心者言之也神武不殺按本義謂得其理而不假其物之謂謂無卜筮而知吉凶也據此則神武不殺作取譬之詞以文義求之有疑按王注言服萬物不以威刑也竊按王注近是蓋此二句設為問答贊嘆之辭以起下文興神物前民用之意蓋指伏羲氏也神足以開物知足以成務聰明睿知也吉凶之斷神武之決也與民同患不殺之仁也故下文遂言聖人建立卜筮之事蓋惟聖人體備全易之理乃有易之書也是以明于天之道而察于民之故是興神物以前民用聖人以此齋戒以神明其德夫天之道隂陽寒暑之運行皆是也民之故倫常日用之云為皆是也明天之道則知神物之可興察民之故則知民用之不可無以開其先神物即蓍龜也湛然純一之謂齋肅然警惕之謂戒聖人明于天人之故而作為卜筮以教人而于此齋戒以考其占使其心神明不測如鬼神之知來故曰神明其德上言聖人以此洗心者此心至靜而易之體具也此言以此齋戒者此心至敬而易之用行也是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神此節言揲卦布爻之事闔户謂之坤言畫偶爻也凡偶皆屬隂為坤闔户謂之乾言畫奇爻也凡奇皆屬陽為乾先言坤者由靜而動猶言隂陽也一闔一闢謂之變者六畫既成剛柔相雜言成卦也往來不窮謂之通者九六之動爻相往來謂之通也見于蓍策有隂陽老少謂之象也形于卦爻有剛柔動靜謂之器也制揲蓍以教人使知分挂揲扐謂之法也一出一入審其吉凶以為趨避謂之神也按此節本義謂乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也此似泛論天下之事理大全平庵項氏專就卜筮解之今從項氏為切是故易有大極是生兩儀兩儀生四象四象生八卦此聖人作易自然之次第畫卦揲蓍其序皆然自此以下皆言聖人制作之本八卦定吉凶吉凶生大業吉凶既定以之建功立事則天業自此生矣此二節言爻象之所由生是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾素隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜富貴謂有天下亹亹猶勉勉也疑則怠次則勉此六者之功用皆大聖人即五者之天以形蓍龜功用之大易占用蓍不用龜然龜亦具此理故每並言之此節言成器之所由立是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之此節言易書之所由作神物謂蓍則之而四十九之數以行變化謂隂陽天變化寒暑晝夜之類地變化山川動植之類效之而卦爻之動靜以出象謂日月星辰循度失度而吉凶見象之而卦爻有以斷吉凶圖書則金木水火土生成克制之數則之而卦畫方位以定皆作易之本也河圖洛書别詳于圖説易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也四象謂隂陽老少示示以所值之卦爻示使人有所見告使人有所知斷使人無所疑此又總卜筮之大意而言之也右第十一章第十二章言聖人作易之意其散在六十四卦之爻象其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也釋大有上九爻義大有惟六五一隂而上下五陽應之上九以剛居上而能下從六五是能履信思順而尚賢也五之交孚信也而上能履之五得位而上從之謙退不居思順也志從于五尚賢也此節疑在第八章之末錯簡在此耳子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神言之所傳有盡象之所示無窮立象盡意指伏羲所畫之卦爻包含變化無有窮盡雖無言而吉凶同患之意悉具于中所謂盡意也設卦謂文王所設六十四卦之名義也本乎性而善者為情拂乎性而不善者為偽六十四卦之中善惡真妄無所不具所謂以盡情偽也繫辭則文王周公彖爻之辭吉凶悔吝之言盡矣此三句皆言作易之事答書不盡言言不盡意之語而設卦在立象之後繫辭之前蓋竟盡意之緒啓盡言之端也盡意盡情偽盡言皆所以為天下利也又恐其利有所未盡于是作揲蓍十有八變之法使往來相通一卦可為六十四則其用愈廣足以盡利矣因變得占吉凶知所趨避心無所疑如以鼓聲作舞容鼓聲愈疾舞容亦愈疾鼓聲不息舞容亦不息成天下之亹亹而不自知其所以然所謂盡神也此二者言用易之事立象設卦即上章所謂象也繫辭辭也變通變也鼓舞占也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣緼即包蓄也易之所有不外隂陽凡陽奇皆乾隂偶皆坤畫卦定位則二者成列而易之體立矣成列舉乾坤而諸卦皆在其中乾坤毁無以見易謂卦爻不列則易道無由而著也易不可見則乾坤息謂易道不顯則卦畫之變化不能自行也易未嘗無乾坤亦未嘗息特以畫卦不立無以見其變易之理而乾坤之功用併不可得而見也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業卦爻隂陽皆形而下者其理則道也道超乎形而非離乎形故不曰有形無形而曰形上形下也所變所通所指者皆道然皆宜就揲蓍言之本義謂變通二字上章以天言此章以人言蓋上章言闔闢往來蓍策中所本有之理此言化裁推行則聖人筮卦用易之事也易道無窮聖人化而裁之為六畫為上下為內外故謂之變推而行推其變而行之也如乾初變宜潛則潛為通乾二變宜見則見為通故謂之通也事者業之未成業者事之已就定天下之吉凶以成天下之亹亹則天下從此立矣是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻重出以起下文極天下之賾者存乎卦鼓天下之動者存乎辭按本義卦即象也辭即爻也此解頗有可疑竊意天地萬物之形象至多六十四卦之中隂陽奇偶無所不備是能極天下之賾也辭則有象辭有爻辭皆示人以吉凶悔吝使人曉然知所趨避是能鼓天下之動也化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行上文變通就揲筮而言此就用易以行事而言化卦爻所示之理而得其裁制存乎人之能變不可拘也推卦爻所決之事而善于施行存乎人之旁通不可執也變與通所謂神明之也存乎其人而辭變象占皆不可泥也此皆因筮得卦之後用易而見于事者也至于平居尢貴體易道于心身不在書與言之迹所謂默而成之不言而信存乎德行也成者我自成信者他人信之得于心為德履于身為行前言變通而措之事業推易道于民此言變通而歸之德行存易道于已也上文五謂者聖人作易之用此六存者聖人之用夫易也自章首至乾坤或幾乎息言聖人作易散為六十四卦之爻象而緼于乾坤之二卦自形而上者謂之道以下言聖人用易散為天下之事業而要歸于人之德行也繫辭下傳第一章言卦爻吉凶造化功業八卦成列象在其中矣因而重之爻在其中矣成列謂乾一兑二離三震四巽五坎六艮七坤八及先後天之方位皆是也象即卦之形體大全謂乾兑離震之象未及天地雷風也重之謂八卦之上各加八卦以成六十四卦也爻六爻既重卦則六爻皆在其中矣然八卦所以成列乃從太極兩儀四象漸次而生畫成之後方見有三才之象非聖人因見三才遂以己意連畫三爻以象之也六十四卦每卦六爻亦以下卦為太極生兩儀則十有六生四象則三十有二生八卦則六十四畫成之後然後見其可盡天下之變非聖人見下三畫不足以盡天下之變又增三爻以益之也剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推而往來交錯卦爻之變見矣聖人因其有變隨爻皆繫之辭占者一二爻變則一二爻動四五爻變則不變者為動三爻變則二彖皆動純變則之卦為動皆觀其所繫之辭也吉凶悔吝者生乎動者也吉凶悔吝在辭因變動而占乃見剛柔者立本者也變通者趣時者也一剛一柔各有定位自此而彼變以從時立本者天地之常經趣時者古今之通義上繫曰剛柔者晝夜之象即此所謂立本變化者進退之象即此所謂趣時吉凶者貞勝者也貞正也常也天下事非吉則凶非凶則吉常相勝而不已也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也觀示也天地常垂象以示人故曰貞觀日月常明而不息故曰貞明天下之動無窮然順理則吉逆理則凶其正而常者亦一而已矣夫乾確然示人易矣夫坤隤然示人簡矣確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也效此者效健順之理像此者像奇耦之畫爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭內謂分蓍揲卦之時外成卦之後吉凶悔吝生乎動不變則功業無自而成故曰功業見乎變辭則彖辭象辭聖人示人以吉凶者也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此以上言作易之聖人以憂世之心發明卦爻之辭此節則言用易之聖人有御世之位而行仁義之道也天地以生物為心德之大莫過乎此聖人有德無位亦不能相天地而遂人物之生故以位為大寶非聖人自寶之蓋天下賴聖人之有位得蒙其澤故天下以為寶也曰仁之仁仍作人人君能得天下之心位乃可守財可養萬人之生故人可聚理財使各得其分養之也正辭則分别是非教之也禁民為非明憲勑法以齊其不率刑之也養之教之而後齊之以刑聖人不忍人之政盡此三者皆出于理之當然而不可易所謂義也其在易則理財即易之備物致用也正辭即易之辨物正言也禁民為非易之斷吉凶明失得內外使知懼也此章論卦爻吉凶推之造化功業而以有德有位之聖人能體易而參贊天地者終之蓋天地之德在乎生作易之聖人情見乎辭用易之聖人仁守其位無非以為斯人而已矣右第一章第二章言聖人制器尚象之事古者包羲氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之冝近取諸身逺取諸物于是始作八卦以通神明之德以類萬物之情象以氣言屬陽法以形言屬隂鳥獸之文謂天産之物飛陽而走隂也土地所宜謂地産之物草陽而木隂也神明之德不外乎健順動止陷入麗説之德萬物之情則不止天地雷風山澤水火之情本義云俯仰逺近所取不一然不過以驗隂陽消息兩端而已蓋萬物不外于八卦八卦不外乎隂陽隂陽雖二而實一氣之消息也作結繩而為網罟以佃以漁蓋取諸離離有二義曰象曰理理謂麗也禽獸魚鱉麗乎網罟也象謂虛中網罟之目虛也取之離者言為網罟有離之象非睹離乃有此也他卦倣此包羲氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益二體皆木中互坤土木入土中上入下動風雷之象也粒食之利自此而始益之義也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明下動火雷之象中爻坎水艮山羣珍所出聚貨之象艮止退而得所之象貨不同皆合于市借噬為市嗑為合噬嗑之義神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤陽極變隂隂極變陽變也陽變隂不至于亢隂變陽不至于伏通也隂陽循環無端久也上衣色玄象天下裳色黃象地食貨既足禮義當興變草昧而文明又取乾坤變化而無為之義也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙刳木使中虛剡木使末鋭木在水上故渙有利涉大川之占服牛乘馬引重致逺以利天下蓋取諸隨下動上説澤雷之象各因其性動止隨人有隨之義重門擊柝以待暴客蓋取諸豫雷震乎外有聲之木又互艮為門闕以取其象先事警戒又豫備之意斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過下止上動雷山之象民既粒食又治使精小過之義弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖然後服之以威取睽之義又離為戈兵兑金為矢為毁折互坎為弓輪亦有其象上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯棟屋眷承而上者宇椽也垂而下者故曰上棟下宇風雨動于上棟宇覆于下雷天之象又取壯固之意古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過送死大事而過于厚大過之義又大過全卦象坎為隱伏殯葬之象中爻乾為衣內巽為木入土之象養生不足以當大事故杵臼小過送死可以當大事故取諸大過也上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬言有不能記者書識之事有不能信者契驗之取明決之義蓋夬乃君子決小人之卦造書契亦所以決小人之偽而防其欺也此章十三卦取象見上古未有易之書而先有易之理人見聖人備物致用立成器以利天下以為此出聖人之心思不知皆因乎理所固有也右第二章第三章言卦象彖爻之用是故易者象也象也者像也聖人立象以盡意由八卦以及六十四卦內外互變皆象也知此則易書所有不獨天地雷風為象即其言君臣政教無非象也占者因象而變通以相觀則于其辭有所不必泥矣彖者材也言一卦剛柔之材即卦德也爻也者效天下之動者也天下之動甚微有同德同事而所當之位各有不同而吉凶生爻則倣所動之吉凶以示人也是故吉凶生而悔吝著也吉凶在事本顯故曰生悔吝在心尚微故曰著悔有改過之意至于吉則悔之著也吝有文過之意至于凶則吝之著也原其始而言吉凶生于悔吝要其終而言則悔吝著而為吉凶也此章言卦象彖爻之設無非明得失以示人使觀象玩辭觀變玩占者知有悔心而不吝于改過庶幾有吉而無凶耳右第三章第四章專以隂陽卦畫分君子小人之道陽卦多隂隂卦多陽震坎艮為陽卦皆一陽二隂巽離兑為隂卦皆一隂二陽其故何也陽卦奇隂卦偶陽卦雖一奇二偶而以奇為主隂卦雖一偶二奇而以偶為主也隂二畫止當陽一畫不必云陽卦五畫隂卦四畫其德行何也陽一君而二民君子之道也隂二君而一民小人之道也德行以善惡言君為陽民為隂一陽二隂則一君二民尊無二上道大而公君子之道二陽一隂則二君一民政出多門道小而私小人之道然凡陽卦未少皆言君子隂卦未必皆言小人特借隂陽卦體以明有君子小人之不同耳陽奇隂偶卦畫固有一定而即此推之則陽為君隂為民陽為君子隂為小人易之扶陽抑隂又如此右第四章第五章錯舉九卦十一爻發明其義與上繫之七卦皆象傳之文言欲學易者觸類以及其餘也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮此引咸九四爻辭而釋之思者心之用慮者謀度其事也事之未來寂然不動何思之有既與物接各有定理何慮之有同歸殊途天下無二理也一致百慮天下無二心也若憧憧往來而僅其朋類從之所從者亦狹矣日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉此承上文憧憧往來而言往來屈信皆天道自然感應之常理憧憧然則入于私矣日月往來而明生寒暑相代而嵗成往者之屈感來者之信來者之信又感往者之屈而有明生嵗成之利此天道往來自然之感也若九四之憧憧豈如是乎尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也按此節本義云因言屈信往來之理而又推以言學亦有自然之機也精研其義至于入神屈之至也然乃所以為出而致用之本利其施用無適不安信之極也然乃所以為入而崇德之資內外交相養互相發也今時解皆從之蓋本義以屈信交互言之以明學問內外相資之功未為不可然細按上文之意似以屈信相感發明何思何慮之一言大抵人情但知信之為利不知屈之為利所以思慮愈多卒求信而不得故此節發明屈即為信之理而教人以素位而行之學不出其位之思也尺蠖之行不屈則不能伸伸而再行則又屈是屈乃以求伸也龍蛇至冬不蟄則來嵗不能奮故蛇冬見者多死是龍蛇之蟄正所以藏身也此四句猶詩之興體精義四句即應上言物理如此人之學問亦宜然精義二句以知言利用二句以行言人惟不安于屈妄意求伸是以思慮百出究皆無當不知天下之理屈即為伸隨時隨地有我之所宜知宜行者如精義至于入神吾方屈以求其所宜知也而可以致用則伸矣利用祗求安身吾方屈以求其所宜行也而德之崇則伸矣况乎知盡行至過此以往窮神知化不可得而知屈而伸至于如此人又何以思慮為乎竊思如此解此方與上文何思句相應義者宜而已精義者精密其宜與不宜皆得其分定而不可易至于入神則經權常變惟我所為以此致用用無不利矣致用由知而行利用則專言行事矣人身不安德何由崇故無論處常處變處順處逆凡所施用且自安其身似未嘗大有所作為然此身既安則一切事業皆由此起是雖不過自安其身實德所由崇也精義入神利用安身豈必盡無思慮然思其所宜思所謂同歸殊途一致百慮者非憧憧之思也過此以往未之或知也窮神知化德之盛也此指上精義利用下學之事至此過此以往則無所用其力未之或知則不止于致用崇德而已窮神之神即入神之神唯有入神之功乃有窮神之效德盛之德即崇德之德唯積而日崇則德自愈盛也由致用崇德而至于窮神知化乃德盛仁熟而自致非人力之所能為至此則信之極矣按本義不知者往而屈也自致者來而伸也竊意此節不必又分屈伸宜承上節而言屈之必伸非特致用崇德而已過此以往乃有不可知之妙即至于窮神知化盛德之極而其始不過精義入神利用安身而已又何必以憧憧之思慮為哉竊意此節之解與本義不合然于經文較為明順以待髙明參酌易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶非所困而困不可為而強為之也非所據而據宜去而不去之也君子有不幸之困而我無致困之道則不辱陳蔡匡人是已君子無非據之據而所據必正則不危不立巖牆之下是已此釋困六三爻義易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也此釋解上六爻義夫子又推言外之意也括結礙也子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也此釋噬嗑初九爻義小懲大誡猶為小人之福况真知義者乎善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶此釋噬嗑上九爻義言懲惡在初改過在小也子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此釋否九五爻義能常存危亂與亡之意則可以安其位保其存有其亡也子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也此釋鼎九四爻義子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望此釋豫六二爻義上交宜恭而近諂下交宜和而近瀆所分甚微所謂幾也介于石則至靜而無欲至重而難動所以能見幾而不溺于豫故知微又知彰知柔又知剛也知幾則有吉而無凶故曰吉之先見子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔無吉此釋復初九爻義庶幾言近于道也天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也此釋損六三爻義天地氣化男女形化皆以兩故專一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心無恆凶此釋益上九爻義易平易也易其心而後語心平氣和故能言也危以動則民不與黨與之與也無交而求則民不與取與之與也安其身易其心定其交皆非立心有恆者不能動而與語而應求而與者物我一心而無間之者也益之上九專利自益故不徒無益而反有傷之者也上傳七卦下傳九卦十一爻皆夫子隨其意之所欲言發明其義以為學易者之法學者觸類以及其餘則易之道思過半矣右第五章第六章言乾坤為六十四卦之所從出其究無非斷吉凶以決民疑也子曰乾坤其易之門耶乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德六十四卦不外隂陽闔闢而成故乾坤為易之門有形質曰物有奇有偶則有形質矣以二物之德言則陽與隂合隂與陽合而其情相得以二體言則剛自剛柔自柔而其質不同撰猶事也雷風山澤之類也可得見者也可見者以此二物體之德順健動止之類也不可測者也不可測者以此二物通之其稱名也雜而不越於稽其類其衰世之意耶萬物雖多無不出于隂陽之變故卦爻之義雖雜出而無差謬衰世本義謂指文王與紂之時蓋伏羲畫卦之時理雖無所不具然人心淳質未有歷其事者世衰道微情偽滋多至文王與紂之時則經歷崎嶇險阻故其言曲盡情偽艱險蓋聖人憂世之心有不得已焉者也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣而微顯當作微顯而開而之而亦有誤彰往謂隂陽消長卦畫已具也察來謂事之未來吉凶因卦爻以斷也微顯謂即人事推之天道顯者微之使求其原也闡幽謂本天道驗之人事幽者闡之使求其端也當名謂父子君臣之分上下貴賤之等各當其位也辨物如乾馬坤牛離火坎水悉辨其類也正言如元亨利貞直方大之言正其言以曉人也斷辭如利涉大川不利涉大川可小事不可大事以決人之疑也其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報此節上六句抑揚其辭而總以因二以濟民行二語結之負乘往來事之小茅棘雞豕物之小然取類皆本于隂陽則大矣其節皆隂陽道德性命之祕逺而難窺其辭則經緯錯綜有文燦然可見矣委曲其辭者未必皆中乎理易則委曲而無不合理敷陳其事者無有隱而不彰易則事雖畢陳而理之所以然未嘗不隱也二疑也報應也承上言凡若此者無非因民之疑二而決之以濟其所行而明得失吉凶之應也大全吳氏謂專指彖辭其實彖爻皆然宜兼言之右第六章第七章三陳九卦以明處憂患之道易之興也其于中古乎作易者其有憂患乎易指文王所繫之辭伏羲畫卦夏商雖以占卜未有其辭自文王拘于羑里身經患難而係彖辭教人以反身修德故曰其有憂患乎下文舉九卦之名以見其憂患之意因即此示人以處憂患之道也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也九卦皆反身修德以處憂患之事也基所以立履禮也上天下澤定分不易必謹乎此然後其德以有基而立也柄所以持謙者自卑以尊人為禮者之所當執持而不可失者也復為反善之義人性本善蔽于物欲則流于惡能于念慮之萌人所不知己所獨知之處審其幾而復于善則火然泉達萬善從此推廣是德有其本也所守遊移則德不固恆則守不變而常且久矣損者懲忿窒欲所以修其身也益者遷善改過使善日長而充裕也人處困窮出處語默取豫辭受可以觀德明辨于此以自驗其學問之力又困而能通則可辨其是困而不通則可辨其非矣井有本故澤及于物而井未嘗動如人之有德而所施及人德性初未嘗動故曰德之地也巽為資斧有斷制之象蓋巽不止于順以一隂入二陽之下順而能入故曰德之制也此皆修德之具不必言功夫次第履和而至謙尊而光復小而辨于物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱此如書之言九德也禮本人情和也和則或疑非其至然各得其所而不亂則至極無以加矣自尊者雖尊而不光唯謙則已雖卑而人尊之且益光也復一陽之微而不亂于羣隂猶善端之萌非衆惡所能遏也恆既歷久豈能無雜然其德有常雖歷煩雜而不厭也損如懲忿窒欲其始雖難純熟之後乃易矣益但充長其本然而初無所造作困者身困道亨故通井不動而及物所施不窮所謂遷也巽能順理因時稱物之宜而性入而伏形迹不露猶風之動物不見其形所謂隱也此正言九卦才德之善以見能為修德之具如履和而至所以為修德之基若和而不至則不可為基矣餘倣此履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權人之所行不由禮則乖故履所以和其行也謙主卑下禮以謙為主所以制乎禮也復則良知不為欲蔽以自知也恆則有始有終所以一德也損以逺忿欲之害益以興遷改之利知守其困處之有道則少有所怨尤遷徙于義非辨安能遷而井靜而生明故于義能辨之巽則義精仁熟精微委曲無所不入所謂可與權也始于守禮終于達權先後亦有其序也此章凡三陳九卦首言九卦為修德之具次言九卦之善所以可為修德之具終乃言用九卦以處憂患之道然九卦非專以處憂患易言處憂患者亦不止于九卦夫子偶舉其近似者言之以為學者之法而已右第七章第八章言易之不可離而深有望于率辭揆方之人也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適按本義逺猶忘大全林氏謂人生日用不可須臾離者道即一隂一陽之道變動卦爻之變動也屢遷不居非一定也六虛即六爻六爻剛柔往來如寄非實有也故曰虛典常也要約也不可為典要唯變所適所貴變易以從時而已其出入以度外內使知懼此句疑有脫誤大要謂易雖不可為典要然或出或入在內在外皆有一定之法度無非使人知戒懼而巳又明于憂患與故無有師保如臨父母所以然曰故明于憂患且知其所以然之故憂患之來苟不明其故則人有苟免之心易明憂患而明其所以致之之故故人知自反也蓋易本聖人吉凶與民同患之書雖無師保而常若父母臨之則不徒教之誨之且使人有所怙恃有所瞻依此極言易之切于人而戒懼之不可以已此易所以不可逺也初率其辭而揆其方既有典常苟非其人道不虛行方向也初對既言初始也既終也始由其辭以度其意之所向則其書雖不可為典要而其辭終則有典可循有常可則也然神而明之存乎其人視其率辭揆方何如耳苟非其人道又何以行哉此章總論易書之不可逺變動不拘而終有典常而後以非其人不行結之深有望于學易者也右第八章第九章專論爻畫以示人也易之為書也原始要終以為質也六爻相雜唯其時物也質謂卦體時謂六位之時物謂隂陽二物凡八卦及六十四卦所取龍馬豕雞之類皆物也卦有定體故曰質爻無定用故曰時言聖人之畫卦必原其事之始要其事之終以為一卦之體質六爻則剛柔錯雜隨其時而辨其物占者吉凶各因其所值無一定也此節總言聖人作易立卦生爻之義下文乃因分諸爻之為用而詳言之其初難知其上易知本末也初辭擬之卒成之終此承上文原始要終而言初上二爻也原其始則初爻為本本質未明故難知要其終則上爻為末末質已著故易知難知者所繫之辭必擬議之而後得易知者但卒其卦之辭以成其卦之終而已若夫雜物撰德辨是與非則非其中爻不備按本義此謂卦中四爻按大全吳氏謂論正體則二為內卦之中五為外卦之中論互體則三為內卦之中四為外卦之中故皆謂之中爻今按中爻之義宜從本義以全卦之中言之而經文備字宜兼正互體為言物者爻之隂陽德即健順動止之德爻有中不中正不正有應無應則皆有是與非矣有內外卦之物與德有互卦之物與德故備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣上文既分言初上二爻及中四爻此又總六爻言之而歸重于彖以結章首原始要終之意也存亡者隂陽之消息吉凶者事情之得失一卦所言不一要其存亡吉凶之所歸則六爻之義居然見矣然知者見事于未形雖不觀六爻之義但觀其彖辭已得十之五六矣蓋彖者原始要終以為質或論二體或論主爻或論綜卦相易之爻大意已該知者觀之無待于爻也觀此則爻辭有疑義宜求之彖可知矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也此以下論中爻同功謂皆隂位異位謂逺近不同四近君有僣逼之嫌雖在上而多懼二逺君隂柔逺則難援雖若不利而歸于無咎者以二居下體之中也爻尚中正而中可兼正四雖得正猶有不中之纍況不得正者乎二雖不正猶有得中之美況兼得正者乎三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶三五同陽位而貴賤不同三以臣之賤而居下卦之上故多凶五以君之貴而居上卦之中故多功柔危剛勝宜兼五三兩爻言之五君位也柔居之則危剛能勝之故六居五多危九居五多吉也九居四不言其剛危六居三則曰柔危者蓋九居四猶為剛而能柔六居三則才柔志剛所以危也耶字疑詞蓋卦爻之大凡如此若乾之九三履之九五則剛亦間有危者矣右第九章第十章論六爻備天地人之道而不外隂陽二物錯雜成文以為得失吉凶之象總以見易書之廣大悉備也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也才者能也天能覆地能載人能參天地故曰才三畫已具三才重之以上二爻為天中二爻為人下二爻為地蓋一而不兩則專而無對天獨陽無隂地獨隂無陽人之隂陽亦孤而無偶不生不成必皆兼而兩之天地人各有隂陽然後其道全而不偏若各以所近而析其名則在天為隂陽五陽而上隂在地為剛柔初剛而二柔在人為仁義三仁而四義皆兩之道本如是非聖人強安排之也易之為書所以廣大悉備也至其位之上下取義又有不可拘者一卦中隂或居上則地或為天陽或居下則天或為地五為君位則天道為人道二為臣道則地道為人道是又變通取義不可為典要者也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道有變動指卦之全體自初至上各有不同如乾之初潛二見三惕四躍始終先後不同非隂陽老少之變也爻有等謂髙下逺近貴賤之差物即隂陽二物有剛柔小大之分即物也物相雜指隂爻陽爻之相間有隂無陽有陽無隂則無所雜而文不見自乾坤二卦之外皆隂陽錯雜以成文者也文有當否陽居陽位當居隂則不當隂居隂位當也居陽則不當當者多吉不當者多凶然陽居二或以剛中而吉居四居上或以剛而能柔為吉隂居初或以在下而吉在五或以柔中而吉陽居初三五或以過剛而凶隂居二四上又或以過柔而凶則又因卦義所取間有不同未可執一為論也此章上節言全卦兼三才之道以見易道之大此節則即六爻而言吉凶之所由著亦以見廣大之悉備也右第十章第十一章明文王所以作易之意欲人懼以終始歸于無咎而已易之興也其當殷之末世周之盛德耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也前章已言易興於中古作于憂患此則明以屬之文王蓋非末世則情偽不如是之熾非盛德則易道無自而傳以紂之末世遇文王之盛德易之所由演也危者有憂患之心故辭多危懼也其辭危懼故凡人之知危懼者使之安平慢易者使之傾覆非易有意使之蓋殖有禮覆昏暴天道之自然也百物不廢本義作萬物之理無不具與上文不相接來注廢字即傾字也謂此道甚大近而一身逺而天下國家若常以危懼為心皆不至于傾廢也此説較勝懼即憂危之意憂懼于始者易終而猶始者難憂懼以終始其要不過欲無咎而已易之為道如此學易者可以悟矣右第十一章第十二章首論乾坤二卦之德因及全卦之功用自八卦以象告以下又總作易繫辭之大略而末以人情立言之不同以明繫辭之不同也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻至健則所行無難故易至順則所行不煩故簡然皆本于憂患之心皆知其難而不敢易以處之之意下危曰險乾體在上自髙臨下知下之險而不敢進健而知險則不陷于險矣上難曰阻坤體在下自下趨上知上之阻而不敢越順而知阻則不困于阻矣全易皆由乾坤二卦而生乾坤二卦之德如此則全易之貴于危懼可知能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者侯之二字衍文説諸心本義屬乾之事蓋心與理會有自然之妙故以屬陽也研諸慮本義屬坤之事蓋理因慮審涉于作為故以屬隂也又事之未定者屬乎陽故本義謂説諸心有以定吉凶事之已定者屬乎隂故本義謂研諸慮有以成亹亹分屬亦是亦不必過拘是故變化云為吉事有祥象事知器占事知來變化者隂陽之所為云為者人事之所作人事與天道相符則吉事有祥如見乎蓍龜之類言吉事則凶事在其中矣變化云為明也吉事有祥幽也于變化云為則象之而有以知器凡有形之實事皆器也于吉事有祥則占之而有以知來凡未形之吉凶悔吝皆來也此節言易之為書具天道之變化人事之云為又吉凶皆有休祥之應所以象事于此而知器占事于此而知來也天地設位聖人成能人謀鬼謀百姓與能天地設位而變化云為吉事之祥已具然此理不能以告人聖人作易以成其功使明則謀諸人幽則謀諸鬼而至愚之百姓亦因卜筮知所趨避是百姓亦與其能也蓋健順易簡知險知阻天地之能也説心研慮定吉凶成亹亹聖人成天地所不及成之能也云為之祥象占之知則百姓之能得與于聖人已成之能也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣象謂卦畫八卦成列象在其中以象告也至錯綜為六十四卦爻彖所趨各異則曲盡其情實而言之上古觀象已告後世情偽既多非以情言不可也爻彖之辭因剛柔雜居有得有失故吉凶于此見焉此後乃詳言聖人爻彖所繫之辭吉凶悔吝之所由著以示學易者也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝此承上文剛柔雜居吉凶可見而詳言繫辭吉凶悔吝之凡例也易道變動開物成務以利言也而卦爻之辭有吉有凶則其情之有所遷耳以下皆詳言吉凶以情遷之説而以吉凶悔吝利害之三辭由于相攻相取相感之三情末復總以相近不相得之一情使人推觀之也命辭之法必各象其爻之情易之繫辭不止言吉凶蓋吉凶者事之已成者也吉凶之尚微而未成者則曰悔吝而其事之始商度其可否則曰利不利不利則害是易之辭有吉凶悔吝利害三者也而其故由于爻之情有相取相攻相感三者相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之愛惡逺近情偽姑就淺深言之若錯綜言之則相攻相取相感之情其居皆有逺近其行皆有情偽其情皆有愛惡也故總以相近一條明之近而不相得則以惡相攻而凶生矣以偽相感而害生矣不以近相取而悔吝生矣是一近之中備此三條然不相得則惡相攻偽相感近不相取則相得為愛相攻情相感近相取可知不相得為凶害悔吝則相得為吉利悔亡無悔無咎可知夫子已言者三其未言者三其條例有六也然凡爻有比爻有應爻有一卦之主爻皆情之欲相得者今稱近者但即比爻言之反以三隅則主爻及應爻亦備此六條以此十八條合之爻辭則吉凶悔吝之大凡可知如頥上九之于六五蹇上六之于九五比爻之以愛相攻而吉者也離之九三九四比爻之以惡相攻而凶者也漸六四之于九三賁上九之于六五皆比爻之近相取而無咎悔者也咸九三之于初二小畜九三之于六四皆比爻之近不相取而悔吝者也賁六二之于九三震六三之于六二皆比爻之以情相感而有利者也蒙六三之于九二艮六二之于九三皆比爻之以偽相感而有害者也蒙九二之于六五臨六五之于九二皆應爻之以愛相攻而吉者也大過九三之于上六恆九三之于上六皆應爻之以惡相攻而凶者也損初九之于六四睽九二之于六五皆應爻之相取而無咎悔者也屯六三之于上六蒙六四之于初六皆應爻之不相取而悔吝者也蠱九二之于六五賁六四之于初九皆應爻之以情相感而有利者也萃六三之于上六歸妹六三之于上六皆應爻之以偽相感而無利者也比九五之于六二六四主爻之以愛相攻而吉者也其于六三上六則以惡相攻而凶者也大有六五之于九二九四主爻之以相取而無咎悔者也蒙六四之于九二豫六三之于九四主爻之不相取而悔吝者也復六四之于初九剝六三之于上九主爻之以情相感而有利者也隨六三之于九五觀六二之于九五主爻之以偽相感而無利者也易卦就主爻應爻論吉凶者多就比爻論吉凶者不數故夫子獨舉比爻以例其餘又按六爻有比有承有乘先儒謂初與二比三與四比五與上比而二三與四五則以承與乘言之今曰近而不相得則承與乘皆在其中分之則比中又有承與乘合之統謂比亦可將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈此又即人情之情偽其見于辭者不同如比以見易之繫辭不同亦猶是也叛非叛逆背實失信皆是言與實背故慙心疑則可否難決如木之有枝分為兩岐誣善為惡則言語不實如物在水上浮遊不定失守者見理不真操持不固故辭多屈而不伸六者皆反對叛者無信疑者不自信吉者靜躁者動誣者敗人失守者自敗然吉一而已叛疑躁誣失居其五人情之變盡于此矣猶卦爻之情有相攻相取相感而吉凶悔吝利害由此而生也自八卦以象告至此又發卦爻繫辭之凡例以示學易者也右第十二章周易淺述卷七
