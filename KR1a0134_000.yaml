body:
  text: 周易淺述易類提要臣等謹案周易淺述八卷國朝陳夢雷撰夢雷字省齋閩縣人康熙庚戌進士官翰林院編修緣事謫戍後蒙恩召還校正銅板復緣事謫戍卒於戍所是編成於康熙甲戌乃其初赴尚陽堡時所作大旨以朱子本義為主而參以王弼注孔頴達疏蘇軾傳胡廣大全來知德注諸家所未及及所見與本義互異者則别抒已意以明之蓋行篋乏書故所據止此其凡例稱解易數千家未能廣覽道共實也然共説謂易之義藴不出理數象占顧數不可顯理不可窮故但寄之於象知象則理數在其中而占亦可即象而玩故所解以明象為主持論多切於人事無一切言心言天支離幻冥之習其詮理雖多尊朱子而不取其卦變之説取象雖兼採來氏而不取其錯綜之論亦頗能掃除轇轕惟卷末所附三十圖乃其友楊道聲所作穿鑿煩碎實與夢雷書不相比附以原本所載且説易原有此一家姑仍其舊存之置諸不論不議可矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易淺述凡例一易之為書義藴雖多大扺理數象占四者盡之有是理乃有是數有是數即有是理六經皆言理獨易兼言數顧數不可顯理不可窮故但寄之于象夫子謂立象以盡意而全彖六爻之傳皆稱象曰則理數之備于象可知故今所注釋多即其取象之由釋之蓋知象則理數在其中且可隨類旁通不拘于一隅之見不獨先儒精義有可融洽即時解所稱君臣政教亦不妨借為設象之觀矣一有象即有占本義分龍馬日月之辭為象吉凶悔吝之辭為占然占即在象中蓋龍馬日月之辭象也即占也吉凶悔吝之辭占也亦卦爻中有此象也繫辭傳謂居則觀其象而玩其辭動則觀其變而玩其占然必平日審于象既筮乃明于占蓋觀象貴能變通臨筮乃以我所問之事合之所占自能分其義類以定可否矣一是書雖參注疏大全及蘇氏來氏之解而要以本義為主亦有本義所云大全中朱子又存疑義者則本義尚有朱子未定之解自宜參之他家以求其歸也間有注疏大全所無妄附臆見者必明言與本義異同之故非敢立異正以心有未安又不敢以己見托之先儒故明言附一知半解以待高明指摘耳一解易數千餘家未能廣覽來氏獨于取象最詳然一卦之中內卦外卦二互卦六爻變卦變卦中互卦取象已博若再以錯綜卦取象亦太泛矣愚意謂互變猶未卦也錯綜則已屬意求之如震為龍乾亦言龍正不必過拘也一易之有圖原列于經首蓋卦畫在未有經之先也今所附楊子道聲圖説則有先後天配合及方圓卦分合之圖多後人之論矣不知圖者固不得經之原然不讀全經亦未能究圖之藴故附圖説于後使人先從誦讀求其文義然後探其本原也一是書義藴本之先儒圖説本之楊子間皆附以臆見獨于卦變有疑凡彖傳言卦變者程傳本義多異同朱子亦多存疑義三覆再三究未得其不易之解今凡彖傳言卦變者俱照來氏綜卦言之于理甚順故闕卦變之圖以待異日一易之為書雖理數象占所包者廣大旨無非扶陽而抑陰隨時而守正教人遷善改過憂勤惕厲以終其身學易者茍不悟此則詮理雖精探數雖微觀象雖審決占雖神總于身心無當故所解多于前後總論一卦大意及逐爻象傳之下發明聖人言外示人大意雖未敢謂神明默成之道盡是然借一二言自警身心庶克道聽塗説之咎云
