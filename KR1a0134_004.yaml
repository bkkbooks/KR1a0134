body:
  text: 周易淺述卷四翰林院編修陳夢雷撰咸卦下艮上兌取相感之義兌少女艮少男也男女相感之深莫如少者又艮體篤實兌體和說男以篤實下交女心說而上應感之至也故名為咸下經首咸按序卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恒也又按繋辭天地定位山澤通氣位欲其對待而分故天地分為二卦氣欲其流行而合故山澤合為一卦也全卦取男女夫婦之義唯正則吉六爻皆以人身取象下卦象下體自拇而腓而股上卦象上體自心而背而口拇腓股隨體而動應感者也脢不能思无感者也口以言為説不足以感人者也皆不能盡感之道唯心為感之主乃无心者无所感有心者憧憧往來亦不能以為感則感道之難言也此全彖六爻之大略也咸亨利貞取女吉咸感也不曰感而曰咸咸皆也无心之感无所不感也所謂寂然不動感而遂通天下之故者若有心于感則非易之道矣故卦名咸艮以少男先下于兌感之專也兌以少女而悦少男應之至也男先下女得男女之正感則必通故占為亨然必貞而取女則吉若不以正則失其亨而所為皆㐫矣又按八卦各有正位艮在三兌在六艮屬陽三則以陽居陽兌屬隂六則以隂居隂男女皆得其正故曰貞吉彖曰咸感也本卦二體初隂四陽二隂五陽三陽六隂皆陽感隂應隂感陽應六畫皆相與卦之名義由此柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也以卦體言之兌柔在上艮剛在下六畫隂陽相應以卦徳言之艮止則情專兌說則應切以卦象言之少男先下於少女柔上剛下感應相與所以亨也夫婦之道止而不說則離說而不止則亂止而說所以利貞也婚姻之道无女先于男必女守正而男先下之所以取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣天地无心而成化一自然之運也聖人有心而无為一至誠之理也誠能動物人心之和平一至誠所感非邀結之為也分言之天地自天地聖人自聖人合言之則天地之翕闢即聖人之呼吸天地之慘舒即人之哀樂故有感必通天地萬物之情所同也寂然不動者性感而遂通者情即有感必通之道引伸之而情可見矣𧰼曰山上有澤咸君子以虚受人澤性潤下土性受潤澤之潤有以感乎山山之虚有以受乎澤咸之𧰼也山上有澤氣以虚而通人心以虚而受虚受則能感矣若心之不虚私意先入為主雖投之不受感通之機窒矣初六咸其拇拇足大指也卦取男女之感六爻皆以人心取𧰼初在下有拇之𧰼拇非能感人者特以人身形體上下象所感有淺深耳拇隨足而動欲進未能初感於最下所感尚淺以其未至妄動故不言吉㐫象曰咸其拇志在下也初與四正應雖所感尚淺未遽動而志知其在九四矣六二咸其腓㐫居吉腓足肚也欲行則先自動􅏥妄不能固守者也二在下體之中故有腓象二與五為正應然君位非可妄動求感二變巽為入則不待五之感而先動躁妄故失之㐫然有中正之徳故能居其所則吉也又按艮之六二曰艮其腓象與咸同而不言㐫今咸曰㐫者以動故也能居則如艮之本體可以吉矣象曰雖㐫居吉順不害也吉言居者非戒之使不得感也隂性本靜艮體本止順其本然不累於欲感可不害矣九三咸其股執其隨往吝三居下體之上互巽有股象執者專主之意股主於隨足而動不能自專者也下二爻皆欲動三以陽剛不能自守欲應於上六上悅體之極三往而從之但主于隨以人事言猶君子說小人之富貴者往必吝矣象曰咸其股亦不處也志在隨人所執下也亦者對下二爻而言二爻隂躁其動固也三以陽剛居止之極乃不自安處而但隨人所守汚下不足言矣九四貞吉悔亡憧憧往來朋從爾思九四居股之上脢之下三陽之中心之象咸之主也心之感物必正而固乃得其理九四以陽居隂非其正也而曰貞吉悔亡戒之也憧憧往來謂一心計我之所以感又計彼之所以應有明道計功之意初與四為正應有朋象思者心之用也心不可見故言心之用九四心之象咸之主若能正而固則虚中无我无所不感无所不應而自然𫉬吉悔可亡矣若此心一有計功謀利之私則未免憧憧然於往來不過其朋𩔖從之又安能廓然大公物來順應而无所不通哉象曰貞吉悔亡未感害也憧憧往來未光大也未感害當從程𫝊未為私感所害也憧憧往來以私心相感則感之道狹矣故曰未光大也九五咸其脢无悔脢背肉在心之上而相背昧无所知不能感物者也五在上卦之中心之上故以取象然以其无私係也故亦可以无悔此卦諸爻皆動而无靜五則靜而无動皆非心之正也僅以无私係而得无悔非取之也象曰咸其脢志末也孤孑絶物所志已末上六咸其輔頰舌兌為口舌上六居卦之最上故有輔頰舌之象舌動則輔應而頰從之三者相須皆所用以言者以隂居說之終處咸之極无其實而徒以口舌感人者也人情喜䛕說佞口舌容有感人之時然其事已不足道矣故㐫悔吝皆可不言也象曰咸其輔頰舌滕口說也滕騰通馳騁其辭辯以取說於人也全卦以相感為義感之道莫大於男女故彖以取女言之而要於正則吉感之用莫神於心故六爻以四之心為主而要於正則悔亡心有動有靜靜而无動則脢也不能感者也動而不靜腓也股也輔頰舌也感之不以正者也葢上卦雖主於說下卦則取於止必也未感之先心本於虚方感之時一出於正所謂寂然不動感而遂通者庶得咸之義矣又按蘇𫝊咸者以神交夫神者將遺其心況於身乎身忘而後神存心不遺則身不忘身不忘則神忘故神與身非兩存也必有一忘足不忘屨則屨之累也甚於桎梏要不忘帶則帶之為虐也甚於縲絏人之所以終日躡屨束帶而不知厭者以其忘之也道之可以名言者皆非其至而咸之可以分别者皆其粗也是故在卦者咸之全也在爻者咸之粗也爻配一體自拇而上至於口當其處者有其徳徳有優劣而吉㐫生焉合而用之則拇履腓行心慮口言六職並舉而我不知此其為卦也離而觀之則拇能履而不能提口能言而不能聴此其為爻也方其為卦也見為咸而不知其所以咸猶其為人也見其人而不見其體也六體各見非全人也見其所以咸非全徳也是故六爻未有不相應者而皆病焉不㐫則吝其善者免於悔而已此說可叅恒卦巽下震上取有常能久之意彖𫝊取義有四剛上柔下一也雷動風應二也由順而動事乃可久三也剛柔相應乃理之常四也故卦名恒恒次於咸按序卦夫婦之道不可以不久也故受之以恒恒久也咸夫婦之道夫婦之道終身不變者也故咸之後繼以恒也咸少男在少女之下以男下女男女交感之義也恒長男在長女之上男尊女卑夫婦居室之常也論交感之情則少為親切論尊卑之序則長為謹嚴故兌艮為咸而震巽為恒也全彖以有常則亨又貴於得正以往兼不易不已二義能盡乎恒之道者也六爻雖上下相應而皆於恒之義未盡初在下之下四在上之下皆未及乎恒者故泥常而不知變三在下之上上在上之上皆已過乎恒者故好變而不知常惟二五得上下體之中似知恒之義者而五位剛爻柔以柔中為恒故不能制義而但為婦人之吉二位柔爻剛以剛中為恒而居位不當亦不能盡守常之義故但可悔亾而已葢恒之道難言必如彖所云而後可也恒亨无咎利貞利有攸徃恒常久也常有不易之義久有不已之義字從心從一日立心如一日也人能常久其道則可以亨通而无咎然必利於得正乃得常久之道而利於有所往也利貞有不易之意利有攸往有不已之意彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒以卦體言之艮剛上而巽柔下名分之常以卦象言之雷震則風從氣化之常以卦徳言之巽順理而雷動有為操行之常又以卦體言之六爻剛柔皆應情理之常此皆以釋卦之名義也恒亨无咎利貞久于其道也天地之道恒久而不已也本義重貞字按文意宜重道字道即貞也言恒亨无咎而必曰利貞者恒之義雖取於久必久於其道也天地之所以恒久不已者道也若久而非道則不得謂之貞矣安得亨而无咎乎利有攸徃終則有始也久於其道終也利有攸徃始也葢一定不易之中即有隨時變易之理天地晝之終即夜之始寒之終即暑之始循環无端所以可常可久故居恒而利於往也此二節釋彖辭日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣此極言恒久之道見恒之利於貞也日月隂陽之精以得天之道往來盈虧而能久照四時隂陽之氣亦得天之道而變化之故寒暑相禪以成歲功聖人亦常久於道皆出於正故天下化之以成風俗故恒有所以恒者道也即貞也日月之久照四時之久成聖人之化成皆以此也故曰天地萬物之情可見矣象曰雷風恒君子以立不易方方理之不可易者巽性入而在内雷性動而在外雷風至變而不失其常君子體之常變經權皆不可易之理非膠于一定之謂也初六浚恒貞㐫无攸利初與四為正應理之常也然在下未可深有所求四震體陽性動而不下又為二三所隔應初之意異乎常矣初之柔暗不能度𫝑巽性善入故深以常理求之為浚恒之象如是則雖貞亦㐫而无所利矣況爻象本不正乎象曰浚恒之㐫始求深也交際之道自有淺深交始而遽以深望之豈常理哉九二悔亡以陽居隂本當有悔以久於中道故悔可亡象曰九二悔亡能久中也過不及皆不能久可久之道唯中而已諸爻以不中故不能久葢正者或未必中中者可以兼正也九三不恒其徳或承之羞貞吝位雖得正然過剛不中志從于上而不能久盖巽為不果又為躁卦故有不恒其徳或承之羞之象承進也或者不知誰何人皆得而進之以羞也如是則雖正亦吝矣象曰不恒其徳无所容也過剛又介二剛之間進退无所容也九四田无禽坤為衆四變坤有田象應初巽為无禽象師六五變坎中實所應又剛故為有禽此變坤隂虚所應又柔故有无禽之象以陽居隂已非其位所處不中震體好動曲學異端返之身心而天益措之天下而无功者也象曰久非其位安得禽也以陽居隂非所久而久也九二亦非位而悔可亡此則不然者又中與不中之辨也六五恒其徳貞婦人吉夫子㐫以柔中而應剛中隂柔之正有恒其徳貞之象五變兌為少女婦人之象以柔為恒婦人之道非夫子所宜故婦人得此爻則吉在夫子則㐫也象曰婦人貞吉從一而終也夫子制義從婦㐫也婦人從一夫而終无專制之義夫子剛斷以義制事乃柔順而從婦道則㐫矣上六振恒㐫以一卦之極言之居恒之極不能常矣以上卦之極言之處震之終過於動矣以上六之一爻言之質隂柔不能固守居上又非所安矣故有振動其恒之象而其占則㐫也象曰振恒在上大无功也居上必有恒徳乃可有功躁動如此安能有所成乎曰大无功上无益於國家下不利於生民也恒卦象甚善而六爻鮮有全吉盖以爻配位隂陽得失各有不同大抵或守常而失之拘或厭常而失之躁皆不能中正以盡乎恒之義初四皆守常而拘者也而初之㐫甚於四三上皆厭常而躁者也而上之㐫甚於三二五皆中而不正故五有不能制義之㐫即二亦僅悔亡而已盡恒之義必如彖之所云乎遯卦艮下乾上二隂浸長陽當退避又乾陽外徃而艮能止有違遯之義故為遯不言退而言遯者退但有退後之義无避去之義故也遯卦次恒按序卦恒者久也物不可以久居其所故受之以遯久則有退去之理遯所以次恒也全彖以君子能遯則身退而道亨小人則不可以隂之浸長而遽迫於陽此全彖之大㫖也六爻獨二不言遯葢全卦以二隂迫陽二乃卦之所以為遯者故遯之意至堅而不言遯恐其迫陽也遯貴速而逺三近二故有係四應初故有小人之戒五得中為嘉遯上最逺為肥遯獨初與同體而在衆陽之後則又以不遯免災故當遯之時不可不見幾逺去也遯亨小利貞遯卦隂浸長而陽避六月之卦也亨指四陽而言知時而遯故身雖退而道亨小利貞程𫝊謂不可大貞而尚利小貞本義以小為小人言小人當利於守正不可以浸長而迫於陽也今按此句宜指二隂而言本義為是葢易雖為君子謀未嘗不望小人之為君子小而能貞則亦君子矣當遯之時君子固以遯而亨小人亦以正為利諷君子而儆小人亦扶陽抑隂之意彖曰遯亨遯而亨也剛當位而應與時行也五以陽剛中正與二之隂柔中正相應二隂能順五可以不遯矣然二隂浸長時不可以不遯有知時而遯之能所以致亨小利貞浸而長也二隂浸長而利於貞不以𫝑之將盛而凌君子小人之福也遯之時義大矣哉隂方長而處之甚難時在天而義在我不審時不知遯不斷以義不能遯去就大節所闗非與時偕行者不能也易中大矣哉有二有贊其所係之大者豫革之類是也有嘆其所處之難者大過遯之類是也象曰天下有山遯君子以逺小人不惡而嚴天不必示逺於山也乃山勢雖高而天去之自逺君子不必示惡聲厲色於小人也乃小人雖近君子逺之自嚴不惡者待彼之禮嚴者守已之節逺小人艮止之象不惡而嚴乾剛之象也初六遯尾厲勿用有攸往遯而在後尾之象其𫝑已危欲往不及然在下无位所居不正无徳无位之凡民遯亦无益晦處靜俟庶可免耳象曰遯尾之厲不往何災也不往即晦藏之意初所居非貞不往即其貞也六二執之用黄牛之革莫之勝說二隂迫陽卦之所由以遯者而艮為手有執之之象二居中隂畫黄牛象本義謂二以中順自守志在必遯人莫能解故有此象然卦以陽遯隂故陽爻皆言遯二隂不必言遯蓋二隂也勿迫乎陽必堅其交五之志而不可解此說雖與本義悖而與彖小利貞句相應象曰執用黄牛固志也舊說謂志之固非外物所能移也此爻卦之所以為遯而不言遯葢未行而志之決實由於此也今作固其交五之志蓋君子皆遯小人豈能自存小人得志能固留君子小人之貞也九三係遯有疾厲畜臣妾吉二隂迫陽陽宜遯矣然三與隂近又艮體為止故有遯而有所係之象艮為閽寺有臣妾象君子不可有所係於小人若臣妾之屬則撫之以恩以得其心亦可然曰畜之則亦不使侵逼於陽矣象曰係遯之厲有疾憊也畜臣妾吉不可大事也當遯而係勢必困憊矣臣妾畜之則吉非可使之干預大事也一作臣妾最易係戀畜養之則可若出處去就之大事則不可有所係也此二意宜兼九四好遯君子吉小人否下應初六有情好之象而乾體剛健能絶之以遯之象惟以義制欲剛克之君子能之小人不能故占者君子得之則吉小人則否也象曰君子好遯小人否也小人有係戀之私必不能自克也九五嘉遯貞吉陽剛中正下應六二亦柔順而中正然不以相應而有所係遯之嘉美者也占者能正則吉矣五雖君位而遯非人君之事故不以君言此君子未見疎於小人而能與時偕行超然逺引可不遯而遯者也隨六三言係而五曰孚於嘉遯亦於三言係於五言嘉盖非正應而相昵曰係以中正而相應則曰嘉也象曰嘉遯貞吉以正志也九五嘉遯无係无執无好不事于外正在我之志而已二以隂應陽其志當固五以陽應隂其志當正上九肥遯无不利肥者寛裕自得之意陽道常饒或損者隂剥之也以陽剛居卦之外去柔最逺高而能應剛而无決无有疾憊故稱肥焉而占无不利也象曰肥遯无不利无所疑也剛健決去无所復疑有係者憊无疑則肥矣全卦雖主于遯然下三爻艮體主止故為不往為執為係上三爻乾體主行故為好遯為嘉為肥盖四陽以遯為亨二隂以不迫陽為貞二雖陽而艮體不免于係故欲盡彖遯亨之義唯乾之三爻乃可言之大壯乾下震上四陽盛長大者壯盛故為大壯乾剛震動以剛而動大壯之義又雷之威震于天上大壯之象故為大壯大壯次遯按序卦遯者退也物不可以終遯故受之以大壯遯為違去壯為壯盛消而復長違去之後仍復壯盛遯則必壯大壯所以次遯也全彖以陽壯之時亨不待言唯利于得正天地之情亦不過正大而已六爻當陽壯之時多以處隂位為美九四乃壯之所以為壯者以不極其剛許其決藩二亦履柔能守者也故貞吉初三皆以剛居剛躁進過暴所以征㐫而羸角也若上之二隂則五以柔中受陽之壯故可以无悔若上以柔居柔則以不能壯者而用壯所以有不能退不能遂之戒也此全卦六爻之大略也大壯利貞大謂陽也四陽盛長大者壯盛二月之卦也陽壯則亨不待言但利于正而已六爻初三正而二四不正而四為成卦之主喜其震動得時又恐以剛動而失其正也故戒之又大壯與遯相綜之卦隂之進不正則小人得以凌君子故遯言小者利于貞陽之進不正則君子不能勝小人故大壯言大者利于貞也彖曰大壯大者壯也剛以動故壯以卦體言四陽盛長大者壯也以卦徳言乾剛震動所以壯也卦體則𫝑壯卦徳則理壯此皆以釋卦之名義也大壯利貞大者正也正大而天地之情可見矣所以大者以其正也陽正隂邪陽大隂小若不正則非大矣天地无不覆載无不生成其情不過正大大者正大字指陽下正大二字就理言雷在地中天地生物之機未露有以見天地之心雷在天上天地生物之心已達有以見天地之情象曰雷在天上大壯君子以非禮弗履人之克已能如雷在天上則威嚴果決非禮在所必去矣曰勿履猶禁止之辭弗則自不為矣雷在天上聲𫝑之壯非禮弗履義理之壯初九壯于趾征㐫有孚初陽在下當壯時而急于進有壯于趾之象征㐫有孚言進必取㐫也此以剛居剛剛之過者也象曰壯于趾其孚窮也言必困窮九二貞吉以陽居隂非正也然所處得中不恃其剛使因中求正非禮弗履則吉矣王註謂居中得位以陽居隂履謙不亢是以貞吉亦通象曰九二貞吉以中也中則不恃壯妄進也九三小人用壯君子用㒺貞厲羝羊觸藩羸其角㒺宜如不思則㒺之㒺冒昧而進也過剛不中當壯之時在小人用之以為壯君子用之為罔而已血氣之剛无禮之勇雖以九居三正亦危矣三四五為兌有羊象三欲應上而隔于四震為竹木有藩象陽剛欲進有角象為四所困有羸象此恃壯輕進而取困者也象曰小人用壯君子㒺也小人之壯非真壯也在小人以為壯在君子則不過冒昧妄行而已其困不待言矣九四貞吉悔亡藩決不羸壯于大輿之輹九四前二隂震為大塗附兌為附決有藩決之象輹車之中幹也輹壯則車強四變坤下乗三陽有大輿壯輹之象以陽居隂疑於不正所處非中似乎有悔然當壯之時為壯之主以剛居柔行不違謙不極其剛不失其壯故凡事得正則吉悔可亡也所以然者前臨二隂如藩之決无阻隔之𫝑後乗三陽如輹之壯有大行之具也貞吉悔亡與咸九四同但在咸為不得其正故有憧憧徃來之戒在壯又為不極其剛所以有藩決不羸之喜也又大畜九二在三陽之中為六五正應所畜故有脱輹之象壯則九四在三陽之上六五隂𫝑方衰故有壯輹之象也象曰藩決不羸尚往也九二但能自守而已四則可以往矣六五䘮羊于易无悔全卦似兌多取象于羊羊性抵觸外柔内剛五又互兌有羊象易宜作疆埸之埸卦以陽盛名大壯而六五无陽以柔居尊不能抵觸或失其壯有䘮羊于易之象然陽𫝑方盛隂柔不敵理之宜也故亦得无悔象曰䘮羊于易位不當也以隂居陽又在尊位過于畏縮宜有所䘮上六羝羊觸藩不能退不能遂无攸利艱則吉全卦有羊象壯終動極有觸藩不能退之象質柔非壯有不能遂之象猶幸不剛不敢妄進有艱難自守之象一變為大有有終得吉之象蓋以柔居剛不能剛而强為剛則无利若能量已詳審猶可得吉也象曰不能退不能遂不詳也艱則吉咎不長也質本非剛見剛之壯亦從之不詳審故也艱難自守久則變矣故雖有咎不長也臨三變㤗大壯上變大有故咎皆不長也全卦當陽壯之時必以正得吉不正則雖壯不可恃也六爻又皆以不恃壯者為吉人未有違謙越禮能全其壯者也故方壯之始宜如二之貞吉不宜如初之壯趾方壯之盛宜如四之決藩不宜如三之羸角居壯之位无壯之才固不免于有䘮處壯之極有不敢恃壯之心庶㡬其終得吉君子但當以正大為心不宜以用㒺取困也普卦下坤上離日出地上進而益明以綜卦言之明夷之離在下今則進而上行故為普不言進而言晉者進但有前進之義无明之義普則進而光明故也普次大壯按序卦物不可以終壯故受之以普普者進也既壯无止理必進以至于極普所以次大壯也全彖取方盛明之時以坤順之臣上接離明之君而君復以柔進居尊是以有功臣受寵之象六爻以五為主専取柔進之義五自下而升已進者也故往吉无不利下三爻皆欲進者九四以剛間之故有鼫䑕之象三與五近下接二柔志在上行衆莫能間故悔亡二去五漸逺憂不得進故愁初最逺于五應四反為所抑故摧上居卦之窮无可進矣故有吉而不免于吝此全卦六爻之大略也普康侯用錫馬蕃庶晝日三接普進也康侯能致一世於康寜之侯也錫馬蕃庶言受賜之多晝日三接言親禮之至也坤有土有民有康侯象坤為牝馬為衆有錫馬蕃庶象離為日為中虚坤為衆為文有晝日三接之象全卦明出地上為盛明之時坤順附於離明則君臣道合六五柔中虚己之君當明盛之時臣以功進君以恩接故禮遇之隆如此占者得之有是徳者宜受是寵也彖曰普進也釋卦名義明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也以卦象言之以離乗坤明出地上此賞罸清明之時也以卦徳言之坤順麗乎離明順徳之臣附於大明之君也以卦綜言之明夷下卦之離進而為上卦之離柔中虚己之君也康侯遇是時有是徳遇是君是以有用錫馬蕃庶晝日三接之象也象曰明出地上普君子以自昭明徳日本明也然入地則晦出地則明矣人之徳性本明也物欲蔽之則昏自强不息則昭矣至健莫如天君子以之自强至明莫如日君子以之自昭程𫝊專就去蔽致知言之然兼力行言亦可葢此即大學所謂明明徳也初六普如摧如貞吉㒺孚裕无咎居初應四欲進者也但所居既不中正所應又不中正四互二三為艮為止有在下始進而見摧抑之象與四正應貞吉之象互坎為狐疑㒺孚之象坤土寛廣初在下有寛裕无咎之象盖當卑下之位使以人之未信而戚戚不能自安則有咎矣故摧如在彼吾不可以不貞㒺孚在彼而吾不可以不裕盖初以隂居陽非正故戒以唯貞則吉才柔志剛非裕故戒以唯裕則无咎此君子之受抑而守正以俟時者也象曰普如摧如獨行正也裕无咎未受命也獨行正言雖摧不可失其正也寛裕以處何以无咎以未受君命无官守言責故也若已受命而不見信則一日不可居矣安得寛裕以曠其官乎初居最下應四不應五有未受命之象六二普如愁如貞吉受兹介福于其王母二與五非正應三四五互為坎為加憂故有欲進而愁之象然二居中得正故許以貞吉又五以隂居尊有王母之象上下同徳亦有受福之象二不以應之有无為吉㐫而以在我不失其正為吉故始雖若愁如而終乃受福也初與二進身之始皆言貞吉初未有貞言貞勉之也二本貞因其貞而欲其固守之也聖人欲人始進之必以正也如此象曰受兹介福以中正也二本中正與初不同故得言受福也六三衆允悔亡三不中正宜有悔然居坤體之上與下二隂皆欲上進是以為衆所允而悔亾也坤為衆有衆象順之極有允象居下之上衆隂之長康侯之謂也從此上進則麗乎大明矣故无摧愁之象而不中正之悔可无也象曰衆允之志上行也上附於大明之君也九四普如鼫䑕貞厲九四互二三為艮有䑕象不中不正而居高位三隂上進而已間之貪位而忌能者鼫䑕田間食粟豆者貪而畏人者也其象如此雖正亦危況不正乎象曰鼫䑕貞厲位不當也不中不正以間柔進之三隂皆不當也六五悔亡失得勿恤徃吉无不利以隂居陽宜有悔矣然以大明在上下皆順從故悔可亡也當進之時易生得失之心大明之中而才柔易有得失之累故戒以勿恤言但當用其明于所當明去其一切計功謀利之心持此以徃自吉而无不利也三隂為四所間有失象終與五合有得象離火无定體或得或失之象互坎加憂恤之象五變不成坎勿恤之象變乾徤行徃吉之象五柔疑于進故勉以徃吉失得勿恤者立心宜然吉无不利又理𫝑之必然也象曰失得勿恤徃有慶也心惟无私乃自有慶有純王之心乃有純王之化也上九晉其角維用伐邑厲吉无咎貞吝角剛而居上者也上九剛進之極有普其角之象應三坤為土有邑象離為戈兵有伐之之象剛躁之極他无可用惟以伐其私邑過剛雖不无危厲然以陽制隂有必勝之𫝑故吉而无咎但離明在上所照不逺僅治小邑則雖正亦吝矣他卦皆取扶陽抑隂此獨不足于剛四有鼫䑕之厲上有貞吝之戒所以然者卦取柔進上行離明以柔為主故也象曰維用伐邑道未光也離體光明今不能光被天下而僅治一邑故也全彖當明盛之時有功徳之臣以柔順受寵於離明之君普道之盛者也君子難進易退故六爻宜柔而不宜剛遯尾厲惡其後也普其角厲惡其先也普角之躁鼫䑕之貪皆以剛而失者也四隂爻則在上者宜有得失勿恤之心人自進附于我在下者宜有寛裕貞正之守我乃可進而受寵于君故未受命則以裕而无咎已受命者則以貞而受福而居下之上者亦必由信友而𫉬上凡以柔進上行道宜如此也又按需卦九五一陽在位三陽在下卦反為需普則以隂居五三隂在下卦乃為普則君子宜以剛徳自强而進退之際宜柔順不宜剛躁又可見矣明夷下離上坤日入地中明傷而暗以人事言之則昏君在上明者見傷之時也故為明夷明夷次普按序卦晉者進也進必有所傷故受之以明夷進之不已必有所傷理自然也明夷所以次普也全彖言處明夷之道在艱難而不失其正文王箕子後世之法也然以二體言之則離明為坤暗所傷以六爻言之則上一爻為暗君下五爻皆為所傷初去上最逺垂翼而已二傷股則害已深而居中去上猶逺故猶可拯也三與上應則以明而能去其暗者矣四已入暗而淺猶有可去之道五則迫逐受傷惟有自晦而已此處明夷隨其逺近淺深不同如此明夷利艱貞以全卦言日入地中明而見傷以六爻言下五皆為上六所傷占者得此在艱難委曲以守其正亦以自晦其明也不必専指六五一爻象曰明入地中明夷離日在坤地之下此以卦象釋卦名也内文明而外柔順以蒙大難文王以之離明坤順卦徳如是文王内有文明之徳不失其已而外柔順以事紂得免於禍故雖見囚於紂而終得釋也利艱貞晦其明也内難而能正其志箕子以之以六五一爻之義釋卦辭内難謂為紂近親六五近於上六者也文王箕子皆晦其明者而箕子佯狂受辱故艱貞於箕子尤切象曰明入地中明夷君子以莅衆用晦而明自昭明徳以治已也用晦而明以治人也不以察察為明而寛容之中物情自照用晦而明也初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言離為雉有飛鳥之象在下見傷猶淺有飛而垂翼之象行徃皆去也主人所之之地主我者也君子見㡬而作行而三日不得食然寜不食不可以不行行重于食故也所往之地主我者或訝其去之早然寜主人有言不可以不徃君子之獨見非衆人所知也大全以為伯夷太公之事近之象曰君子于行義不食也去就以義不食其禄亦義也六二明夷夷于左股用拯馬壯吉君臣一體故明夷以人身取象上為首而四腹心二股肱也二變為乾有馬象傷股害于行矣而左股則傷未切得馬之壯者則救之速可以去矣蓋二較近于初而猶有三四五之隔故傷未甚而猶可救也所謂吉者得免而已非可有為也如文王賴散宜生有美女竒物之獻以脱羑里之囚也象曰六二之吉順以則也居中得正二之則也九三明夷于南狩得其大首不可疾貞離居南為戈兵有南狩象上失位而居最高有大首象九三以剛居剛明之極而屈於至暗之下正與上六為應故有向明除害得其首惡之象以明伐昏似正矣然此事間不容髮天命已絶則為獨夫一日之間天命未絶猶為天子不可以為正而急疾行之也離性暴故戒之此湯武之事也象曰南狩之志乃大得也志在救民去害非利天下也必有湯武之志乃可也六四入于左腹𫉬明夷之心于出門庭坤為腹左者𨼆僻之所又右前而左後六四隔六五是五入其右四入其左矣四在坤體之下四變互巽為入有入于左腹之象隂偶為門互震為足為動四柔而得正居闇尚淺有𫉬明夷之心出門庭之象程𫝊謂邪臣以𨼆僻結君心而後行之于外也按卦以明見傷邪臣得意非明夷之義本義謂得意而逺去然大臣去國非得意之事大全以微子之行遯言之微子紂至親故知紂幽僻之事至悉知其心意決不可輔故去之也象曰入于左腹𫉬心意也凡人心腹中事難知今入于左腹已深知其心意也六五箕子之明夷利貞明夷以象暗主高而失位者也故于上九象君而五不言君然居坤之中近至暗之主同體而親宗臣之象以柔居中隂居陽位自晦其明者故為箕子之象以六居五疑于不貞故戒占者如箕子之貞乃可耳彖言艱貞此獨言貞者蓋如箕子則艱不待言矣象曰箕子之貞明不可息也明可晦不可息者若失其貞則明息矣上六不明晦初登于天後入于地以隂居坤之極有不明而晦之象下五爻以明而受夷者上則晦而夷人者也上居高位而夷人有登于天之象終則自傷而墜厥命有入于地之象象曰初登于天照四國也後入于地失則也照四國以位言之言居其位宜有其明也而後乃入于地失其明不足為四方之則也六二受人之夷者以順則而自全其明上六夷人者以失則而自墜厥命大全以此爻為紂之事也合全卦而論之凡亂世君臣皆有此象後人因商周之事有可擬合者故因彖𫝊文王箕子之言五爻箕子之占因逐爻擬其人其事以明之而聖人作易立教初非以紀商周之事也家人下離上巽風自火出有由家及外之象又卦中二五有男正位乎外女正位乎内之象以六爻推之有上父初子五三夫四二婦五兄三弟之象故為家人家人次明夷按序卦傷于外者必反于家故受之以家人被傷于外必反于内家人所以次明夷也彖専言女而彖𫝊推之一家内正而外无不正也六爻内三爻多言女子之事外三爻多言男子之事其間内外剛柔皆有定位所以為家道之善也家人利女貞家人一家之人也九五居外六二居内男女正位之象長女居上中女居下尊卑有序之象四陽二隂陽强隂弱夫唱婦隨之象二柔皆居柔位執柔不敢抗之象内明外巽處家之象自初至五皆貞尊卑安于其分之象而卦曰利女貞女先正乎内也八卦正位離在二巽在四此卦長女位四中女位二女之貞也正天下莫難于一家一家莫難于一婦一婦正則内正而外无不正矣彖曰家人女正位乎内男正位乎外男女正天地之大義也卦専言女此兼言男盖男女内外俱正乃為治家之道故即卦中九五六二二爻而推言之也家人有嚴君焉父母之謂也嚴君尊嚴之君長也前既言男女之正此又推本于父母之嚴盖父母者一家之君長也君長嚴則臣下肅父母嚴則家道齊必父母之嚴于其子如君之嚴于臣則倫理一定上下截然整齊矣或疑父嚴母慈而此皆稱嚴者盖母之不嚴則庇子弟之過亂内外之别家之不齊率由於此故亦稱嚴正恐其過于慈也此節本義謂亦指二五然五剛二柔于嚴義未甚合按大全丘氏謂此卦内三爻女子之事外三爻男子之事初為人女二為人妻三為人母四為人子五為人夫上為人父三上皆剛有合于嚴君之義且前節言夫婦此言父母末又以六爻旁通取象一家意尤曲盡父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父初子上下相去甚逺而其分嚴五兄三弟上下相去甚近而其情親五夫四婦三夫二婦雖相比而亦未嘗无上下之分也卦但言女貞夫子即爻象旁通言外之意而治家之道乃盡也象曰風自火出家人君子以言有物而行有恒火熾則風生君子觀風火之象知凡事由家而出而家之本又在乎身也脩身莫大于言行言必有物實而不虚行必有恒常而不變則身修而家治矣初九閑有家悔亡離體中虚有家象變艮為門為止有防閑之之象凡事謹始初之時當閑而九之剛明能閑之盖離則有先見之明陽剛則有威如之吉如男不入女不出皆所以閑之也推此𩔖凡事閑之于初悔可无矣然能謹閑可免悔不閑且如何哉象曰閑有家志未變也志未變而豫防之則易若已變而治之則傷恩失義亦无及矣六二无攸遂在中饋貞吉六二上應九五有无遂事而順從其夫之象在下卦之中互坎為酒食有居中唯酒食是議之象柔順中正女之正位乎内者也故曰貞吉象曰六二之吉順以巽也柔順中正而上應九五也九三家人嗃嗃悔厲吉婦子嘻嘻終吝九三重剛不中故有嗃嗃嚴厲之象比乎二四兩柔之間又有婦子嘻嘻之象治家之道過剛不中不无悔厲然以義勝情猶可𫉬吉若縱情敗度則家道以壊矣豈不終可吝乎悔自㐫趨吉吝自吉趨㐫象曰家人嗃嗃未失也婦子嘻嘻失家節也過嚴未失治家之道失節則必亂矣六四富家大吉陽主義隂主利六四以隂居隂得位之正介乎九三九五之間以柔得剛以虚受實又巽為利市三倍故有能富盛其家之象大吉之占也大全以主家之婦言之時解以言大臣理財于家人之義未協然為人臣者占得之則以為理財之占亦可也象曰富家大吉順在位也以柔順而居隂之正位能保其富者也九五王假有家勿恤吉假至也九五剛徤中正應六二之柔順中正能修身以至于其家者勿用憂恤吉可知矣初閑有家家道之始此有家家道之成中互坎為憂此出坎外故有勿恤之象象曰王假有家交相愛也五愛二之内助二愛五之刑家所謂假也上九有孚威如終吉陽爻實有有孚之象以剛居上有威如之象有孚則至誠惻怛可聨一家之心而不至于離威如則整齊嚴肅可振一家之事而不至于瀆故長久得吉也三以剛居剛故有悔厲上以剛居柔又卦之終以威為正家之本故終吉象曰威如之吉反身之謂也反身自治則人畏服非作意以威之也如言有物行有恒是也全卦以正家必先乎内又上下卦為長女中女之象故專言女貞彖𫝊六爻則推為一家之象彖𫝊以上為父初為子五三夫四二婦五兄三弟而一家之長幼備矣先儒又謂内三爻女子之事外三爻男子之事男女有定位而爻之剛柔亦不可易女子未嫁律身宜嚴故九居初以自閑也婦道宜順故六居二无遂事也母道恐慈之過故寜為九三之嗃嗃此女正位乎内也子道宜順故六居四為富家夫道貴義故九居五則刑家上則為人父之事嚴君一家之主威如所以吉也此男正位乎外也盖正家之道莫詳於此而占者又隨事以求其義未可泥也睽卦下兌上離火炎上而澤潤下二體相違睽之義也又二女同居志不同行亦睽之義也睽次家人按序卦家道窮必乖故受之以睽睽者乖也睽綜家人家人離隂在二巽隂在四皆得其正睽則兌隂居三離居五皆居陽位不得其正家道之窮必乖睽所以次家人也全卦以卦徳内説外明卦綜柔進居剛卦體六五下應九二故雖不宜大事而小事猶吉六爻皆有始睽終合之象初䘮馬至四遇元夫而初四合二遇巷至五徃何咎而二五合三輿曵牛掣至上遇雨而三上合内卦皆睽而有所待外卦皆反而有所應天下未有終睽而不合者也睽小事吉睽乖異也上火下澤性相違異中女少女志不同歸故為睽長女中女同居則為家人而中女少女同居則為睽者家人離隂在二巽隂在四得女之正睽則兌隂在三離隂在五非女之正也離上兌下為睽僅可小事兌上離下為革則曰元亨利貞者革以九居五六居二剛柔得位故為湯武之大事睽以六居五而九居二剛柔失位是以為小事也又凡卦陽剛為主則可以大事睽柔進乎五者也小過柔過乎剛故不可大事睽柔進居剛故小事吉也彖曰睽火動而上澤動而下二女同居其志不同行火炎上而澤潤下无相得之性二女少則同處長則各有夫家有難合之情此以卦象釋卦名義也説而麗乎明柔進而上行得中而應乎剛是以小事吉以卦徳言之兌說麗乎離明則心氣和平明燭事機矣以卦綜言之家人下卦之離進為睽之上卦六居五尊位有𫝑矣以卦體言之則以六五虚中之主下應九二剛中之臣得輔矣然三者皆柔之為也故僅小事吉而已柔進上行得中而應乎剛在鼎則為元亨在睽僅為小事則爻同而事異故也天地睽而其事同也男女睽而其志通也萬物睽而其事𩔖也睽之時用大矣哉天高地下睽也然陽降隂升而成化育之事則同矣男女異質睽也然男倡女隨志則通矣生物萬殊睽也然此感彼應事則𩔖矣睽小也睽而終同則其用大矣故極贊之象曰上火下澤睽君子以同而異二卦合體而性不同君子以此于大同之中知所當異和而不流羣而不黨是也彖𫝊于睽言合君子濟睽之功也象于同言異君子不茍同之性也然惟有不茍同之君子乃能合天下之睽初九悔亡䘮馬勿逐自復見惡人无咎初无正應宜有悔也然居睽之時陽剛得正悔亦可亡下卦為兌為毁折有所䘮失之象四互三五為坎為亟心之馬有䘮馬勿逐自復之象坎又為盜惡人之象見惡人亦可无咎所謂見者不得已而遇之之詞如孔子之于陽貨也若徃求見則為逐矣此爻言當睽之時正應不可必得不可强人之合惟去者不追聽其自還來者不拒雖惡人亦見斯善于處睽者也象曰見惡人以辟咎也此咎作殃咎之咎九二遇主于巷无咎二變互三四為艮為徑路巷之象二五正應遇之之象二五本正應也以當睽之時多所乖隔二以剛中之才具和悦之性委曲相求以得遇主而成濟睽之功故无咎象曰遇主于巷未失道也正應非有邪也六三見輿曵其牛掣其人天且劓无初有終三互坎有輿象二以剛在後輿為曵之象離有牛象四以剛居前其牛掣之象天去髮之刑劓去鼻之刑皆傷于上者天而又劓重傷也離為目有見之之象三與上皆言見非實有是事而見為如此耳三與上本正應而二在後有見輿曵之象四隔于前有見牛掣之象上九猜狠方深見為被傷天且劓之象二陽厄之如此是无初也終得正應有終矣三以不正之隂承乗應皆不正之陽故其象如此象曰見輿曵位不當也无初有終遇剛也以六居三在二陽之間不當也遇剛正應也三雖善遇非上之剛明亦不得遇也九四睽孤遇元夫交孚厲无咎九四无應上下皆隂柔小人有睽孤之象初九同德有遇元夫交孚之象元善之長惡之反初剛而得正故為元夫然當睽之時惟恐交孚之不至必以危厲處之乃无咎也初視四為惡人四視初為元夫者初得正而四不正也不正而終有遇者喜其陽剛之同徳也象曰交孚无咎志行也得人以濟睽也六五悔亡厥宗噬膚徃何咎睽時以隂居陽有悔也然居中得應悔可亡矣厥宗指九二于五猶宗臣也二兌口有噬膚象噬膚本義謂其易合程𫝊謂五雖隂柔之才二輔以陽剛之道而深入之如姬公之于周成入之者深也今兼用之五柔易合二入之者深明良道合往以濟睽何咎之有象曰厥宗噬膚徃有慶也𫝊推言之言睽可濟天下之慶豈但免咎已乎上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉上九六三正應非孤而曰孤者睽極多疑孤生于所見也三互四五為坎有豕象又為水有塗象三以隂居二陽之上又坎為𨼆伏有載鬼一車象三見四有牛掣象上見三為豕之負塗且疑其汚我矣三見二有輿曵象上見三則為載鬼一車且疑其祟我矣弓矢本取象于睽又坎為弓又為狐疑先張之弧疑之也後脱之弧疑漸去矣上變震為歸妹有婚媾象匪寇婚媾知三非冦而實親也坎又為雨隂陽和則雨遇雨則吉遇六三也言疑盡釋睽終復合也象曰遇雨之吉羣疑亡也羣疑指上所見全卦當睽之時是以不可大有所為而睽有終合之理故小事猶可𫉬吉六爻皆始睽終合二五三上以正應而終合初四非應以同徳而亦終合天下事未有終于乖違者所以貴有濟睽之功也蹇卦下艮上坎險在前而止不能進也故為蹇蹇卦次睽按序卦睽者乖也乖必有難故受之以蹇蹇者難也睽乖之時必有蹇難蹇所以次睽也全彖取後天八卦艮坎在東北方離坤在西南方艮坎為蹇則對方為出蹇矣又九五以剛健中正之君在上而六二以柔順中正之臣在下又有利見大人之象此全彖之大㫖也六爻以五為濟蹇之君二為同患之臣餘四爻雖處蹇而无濟蹇之責唯三以剛實具濟蹇之才獨以與五非近非應而反就二以同往故言喜四以比三故言連上以應三故言來碩盖蹇中非有陽剛之才不能濟故五之所待者三之來也三反從二以來則朋來矣獨初六才柔位卑故以來譽勉之此六爻之大略也蹇利西南不利東北利見大人貞吉蹇足不能進行之難也前有水之陷後有山之阻又為見險而止之義故曰蹇又睽卦盡反則為蹇睽取目有所見重離在前也蹇取足不能進重坎在前也利西南不利東北按本義謂西南平易東北險阻程𫝊謂西南坤方坤地也體順而易東北艮方艮山也體止而險今按卦象中无坤而言坤者其説有二以後天八卦言之艮坎東北與西南離坤相對艮坎合為蹇不利東北離坤合為普是為利西南矣蹇卦无西南就東北對方言之猶坤卦言西南得朋而兼言東北䘮朋也又以卦之六爻言之蹇難之時非有陽剛之才不可有為卦中唯五與三為陽五以陽剛為濟蹇之君三非正應然反而就二連四應上以輔乎五五三變為純坤則出東北之險阻入西南之平易蹇乃濟矣故有利西南不利東北之象六二柔順中正之臣三反就之遂與四上皆來互輔于五以共濟蹇有利見大人之象六爻唯初不正故宜見險待時二以上皆正可以濟蹇故曰貞吉占者得之則見險者貴于能止而不必終于止處險者貴于能進而又不可失其正也彖曰蹇難也險在前也見險而能止知矣哉以卦徳釋卦名義而贊之蹇固足不能進之義然知其不能進而不輕進即知也山水為蒙水山為蹇知者蒙之反蹇利西南徃得中也不利東北其道窮也利見大人徃有功也當位貞吉以正邦也蹇之時用大矣哉以卦綜言之蹇卦綜解解下卦之坎徃為蹇上卦之坎九五得其中也後天震在東艮在東北解上卦之震下為蹇下卦之艮正在蹇之方其道窮也以卦體言之二五正應三反四連而上來碩皆可濟險往有功也自二至上位皆得正初雖不當而隂柔在下亦正也上下皆正則邦可正蹇可濟矣坎睽蹇皆非順境夫子以為此時亦有可用者故極贊其大象曰山上有水蹇君子以反身修徳水之蹇也止而不流君子之蹇也反而自修反身即思不出其位之義艮象也修徳即常德行之義坎象也象𫝊言反身修徳五爻曰大蹇朋來盖得人心以反諸身為本即孟子所謂其身正而天下歸之也初六徃蹇來譽徃上進也來止而不進蹇行之難也故諸爻皆以徃來為言他爻來字指下一爻而言初无可來以不進為來六非濟蹇之才初非濟蹇之位往則犯難來則有見險能止之譽也象曰徃蹇來譽宜待也來時而徃非終止也六二王臣蹇蹇匪躬之故六二與五為正應輔五以濟蹇者有王臣之象他爻外卦一坎而已二互三四又得坎體有蹇而又蹇之象入難之深致身王事非為私也故曰匪躬之故他爻皆喜來惡徃二五獨不然五乃濟蹇之君二之柔順中正濟蹇之臣也當蹇之任鞠躬盡力而已成敗利鈍皆非所計故不言吉㐫也象曰王臣蹇蹇終无尤也事雖不濟亦无可尤也二匪躬而不言濟蹇者隂柔短于才故也君子取其義而恕其才故无尤九三徃蹇來反三與五非正應非當蹇之任者故徃則蹇來下就二也此爻變為水地比有親比于人之象二有蹇之任三有剛陽之才下就二以圖共濟則反而得所安矣象曰徃蹇來反内喜之也内指二隂喜從陽三有濟蹇之才雖未當其任而匪躬之臣有得人之喜矣六四徃蹇來連六四已入險中而隂柔不足以濟徃則益蹇唯連于九三則合力可以共濟矣象曰徃蹇來連當位實也隂虚陽實九三陽居陽位言所以連于三者以三之實所居當位可以共濟蹇也九五大蹇朋來五君位而在險中天下安危所係而有陽剛中正之徳以居之故曰大蹇五變坤為衆朋來之象來者皆就二以輔五也二與五為正應既有匪躬之志三于二能來反復具濟蹇之才四比三而上承五恊力以濟蹇占者有其徳則有是助矣象曰大蹇朋來以中節也居位得中可以節制聨屬之故能成正邦之功也上六徃蹇來碩吉利見大人碩大也陽為大本義大全皆作就九五以成大功今按六爻之義宜就三爻言之蓋當蹇之時非陽剛不足以濟上以隂居蹇極徃則益蹇唯來就九三之陽可成大功又蹇極將變為漸則進矣故許其吉利見大人指九五言就九三陽剛之才利見九五之君以濟其蹇也象曰徃蹇來碩志在内也利見大人以從貴也大全以在内指九五時解從之然于從貴之言似複今以在内指内卦之九三言之上柔无濟蹇之才志在得内卦陽剛之才以共濟而從九五之君也全彖以卦象有利西南不利東北之占以卦體二五相應有利見大人之占大抵當蹇之時欲其知止以善處蹇之道又欲其陽剛以大濟蹇之功需衆爻以濟蹇者五故曰朋來在蹇而輔蹇者二也故曰匪躬君臣當蹇之任者故不得言徃來餘四爻皆不任濟蹇之責故皆喜來而惡徃然蹇之時惟陽剛與五同徳乃能共濟三有濟蹇之才者反而就二則可以共濟矣四以比三而來上以應三而來皆濟蹇之朋能輔五者也惟初隂柔在下則惟有待時而徃耳然則蹇之時在下者貴于知止而在上者貴于濟蹇庶幾得其正乎解卦下坎上震動于險外出乎險也故為患難解散之象又震雷坎雨隂陽交感和暢解散故為解解卦次蹇蹇者難也物不可以終難故受之以解難極必解散所以次蹇也全彖以解散之後利于平易安靜不宜久為煩擾然小人者亂之根也故六爻之義主于去小人六三一隂為小人非據以致天下之兵者諸爻皆欲去之二之𫉬狐𫉬三也四之解拇解三也上之射隼射三也五之有孚亦退三也唯初六才柔位卑不任解難而在解時无咎而已此全彖六爻之大指也解利西南无所徃其來復吉有攸徃夙吉解難之散也在險能動出乎險之外故為解難既解則宜于平易安靜不可久為煩擾其卦上震下坎後天亦居東北之位與坤亦對蹇與解相綜蹇在險中故言利西南兼言不利東北解已出險外則但言利西南而不利東北可不必言矣无所徃其來復者復東北也難已解故復亦吉也有所徃徃西南也夙早也若可徃西南又以早為吉也蹇上卦之坎來解為下卦而二仍居中有來復吉之象蹇下卦艮綜解為上卦之震反艮止為震動有所徃而夙之象震東方日之初出故曰夙吉彖曰解險以動動而免乎險解以卦徳釋卦名義也蹇遇險而止才之不足也解遇險而動才之有餘也屯動乎險中難之未平解動乎險外則難之已散也解利西南徃得衆也其來復吉乃得中也有攸徃夙吉徃有功也以卦綜釋卦辭坤為衆西南入于坤體故為得衆得中有功本義大全皆謂指九二時解從之然六爻獨重九二未得其解愚意謂指兩陽爻也无所徃則來復取坎之得中有所徃則貴夙取震之能動蹇上卦之坎來解下卦仍在下卦之中來復得中所以吉也蹇下卦之艮綜為解之震震動有為所以有功也聖人于患難方平之際不欲人以多事自疲亦不欲人以无事自怠故得中則不養禍亦不擾民矣有功則惡不滋難永息矣天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉雲雷為屯故雷雨作為解窮冬之時隂陽固結不通及隂陽交㤗則百果草木或甲或拆天地所以成化功也此極言而贊其大也象曰雷雨作解君子以赦過宥罪雷者天之威雨者天之澤威中有澤刑獄之有赦宥也有過者赦而不問可也罪惡而赦之非義也矜其无知宥而從輕而已此所以推廣天地之仁也雷雨交作天地以之解萬物之屯赦過宥罪君子以之解萬民之難故襍卦曰解緩也初六无咎震陽動于險上初與為應卦之所藉以解散者何咎之有又方解之初宜安靜而休息之故爻辭簡以示意象曰剛柔之際義无咎也初柔四剛際遇也難之方解不宜過剛過柔以剛柔相際為得宜也九二田𫉬三狐得黄矢貞吉狐者邪媚之獸本義謂卦凡四隂除六五君位餘三隂狐之象也今按三隂爻上得正而初在下有應爻辭皆不深貶唯三不中不正又无正應又居下卦之上猶小人以邪媚居高位者當解之時小人而在高位在所必去唯二以陽剛能去之又坎為狐六三居三之位故有田𫉬三狐之象黄中色矢直物九二居中有剛直之徳有得黄矢之象九居二若非正而中自无不正矣故曰貞吉此大臣得君能去邪佞以行其中直之道者也象曰九二貞吉得中道也居中自能守正也六三負且乗致冦至貞吝以六居三在下卦之上坎為輿有負荷之小人而乘車之象二視三為狐上視三為隼四視三為拇羣起而攻有致冦至之象六三非貞而言貞者高位乃君所與亦貞也雖以正得之亦可羞也唯避而去之可也卦以解名解難莫要于解小人故諸爻皆欲解三而三亦唯有自解而去則冦亦解矣象曰負且乗亦可醜也自我致戎又誰咎也負无可醜負且乗則可醜戎由自致不言㐫而㐫可知九四解而拇朋至斯孚按本義以拇為初朋為二按王註以拇為三朋為初皆未當今以朋指二拇指三葢震為足三在足下有拇象二與四同陽剛之徳四居大臣之位宜與二同心以解難者三以小人間之解去三之拇則二得以上比于四同𩔖之朋可相信矣此大臣之去邪黨以親善𩔖者也象曰解而拇位未當也以九居四而與三比故曰未當設若居三居初則得正而與二比居五則得當而與二同徳矣觀象𫝊益見解拇宜指三六五君子維有解吉有孚于小人按本義卦凡四隂而六五當君位與三隂同𩔖者必解而去之則吉也孚騐也君子有解以小人之退為騐也按王註居尊履中而應乎剛可以有解而𫉬吉矣以君子之道解難釋險小人雖闇猶知服之而无怨矣今時解皆從本義謂人君以去小人為騐也然詳王註語意釋有孚尤明順六五當君位而得中亦得稱君子然五隂柔非能解者以應陽剛之二能𫉬三狐比陽剛之四能解其拇是能逐惡之賢臣而五能信任之故曰有解也五維能任二四以解難凡卦中諸隂皆信服而退聽此賢君能用賢臣以除患使小人畏服者也象曰君子有解小人退也從本義作退去之退從註疏作退聽之退可兼上六公用射隼于高墉之上𫉬之无不利上六居卦之最上又震體故有公象三居下卦之上互二四為離為飛鳥有隼在高墉之象上與三非應則敵也有射隼于高墉之上之象九二剛中視三柔而不中象狐之邪媚上柔正視三居剛不正又象隼之鷙害繫辭以三為小人以上為藏器待時之君子六爻唯上獨正故也易于震動多有戒辭今曰无不利葢自坎來經歴多難所謂待時而動者動必不妄也象曰公用射隼以解悖也三竊位而不應悖逆者也故解之宜速也此卦彖𫝊及二爻四爻五爻上爻所見皆與本義不同非敢求異姑存疑義耳損卦下兌上艮取損下益上之義其説有四山體高澤體深下深而上益高一也澤在山下其氣上通潤及草木二也下為兌説三爻皆上應説以奉上三也損下乾剛而益柔益上坤柔而成剛四也損上益下謂之益損下益上謂之損譬損牆上之土以培基則安益也取牆基之土以増其高必危損矣散君惠以結民心益也剥民以奉其上損矣故卦名損損次解按序卦解者緩也緩必有所失故受之以損縱緩必失失則有損損所以次解也全彖以損所當損則得而要之于時六爻則下三爻皆知損者上三爻皆損中受益者葢損者聖人不得已而用之唯合于時則得若不宜損而損則所損又不待言矣此全卦之大㫖也損有孚元吉无咎可貞利有攸徃損為减省之義以人事言之損下益上損内益外剝民奉君皆是也損非人情所欲故必損所當損使人皆有孚信之心則有樂從之吉无貪鄙之咎可垂諸萬世而貞可通行天下而利有攸徃也占辭繁而不殺葢以損之事本未能大善而吉未必可固守未必可有徃唯損所當損而至于有孚則兼得之故損不可不慎也曷之用二簋可用享曷何也問答之辭言當損之時何所用乎雖以二簋之薄可用以享而无害于禮矣彖曰損損下益上其道上行以卦體釋卦名義損益二卦皆損有餘以補不足也損乾之九四曰損上損乾之九三曰損下葢陽實隂虚損下體本乾皆實在所當損上體本坤皆虚在所當益此所以損下益上而合于道之當然也損而有孚元吉可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行當其可之謂時二簋之用時當損故也以卦爻推之凡損剛益柔皆有時非剛皆所宜損也以天下之理推之凡損其盈益其虚益極復盈而損損極復虚而益皆隨時以行雖聖人不能違乎時也象曰山下有澤損君子以懲忿窒欲忿易𤼵難制故曰懲懲者懲于今而戒于後也欲之起甚微故曰窒窒者遏絶之使不行思禮義以勝之也君子觀山之象以懲忿葢忿之來氣湧如山況多忿如少男乎故懲忿當如摧山觀澤之象以窒欲葢欲之溺浸淫如澤況多欲如少女乎故窒欲當如防澤忿之不懲必至于遷怒欲之不窒必至于貳過君子修身所當損者莫切于此初九已事遄徃无咎酌損之初九當損下益上之時而以剛居剛處于有餘上應六四故宜輟其所為之事速徃以益四則為无咎然當損之初又不宜自損之過故當酌其淺深之時宜庶不自傷其本量也象曰已事遄徃尚合志也尚上通上與四合宜速徃也九二利貞征㐫弗損益之二剛中无有不正然不能自守而妄進則不正矣故戒以征㐫也弗損益之葢損己益人者益止于所損以弗損為益其益已无方初曰酌損二則弗損者初以剛居剛𫝑處有餘在所宜損二以剛居柔已得其中又為説體若過損以益上是屈己以取媚非貞者矣故弗損者不變其所守也然以陽剛與六五相應剛柔相濟五已受其益是弗損而有以益之也象曰九二利貞中以為志也居二處説疑于非正中以為志不以損為益則正矣六三三人行則損一人一人行則得其友此爻獨言損之義天地間隂陽對待唯兩而已三則餘其一而當損葢兩相與則專三則雜而亂下卦本乾損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也上與三以剛柔相易而謂之損者但言其减一耳夫子繫辭以男女媾精言之即指三上二爻程𫝊又謂初二二陽四五二隂同德相比三與上應皆兩相與則又因夫子之言而推之六爻以廣得友之義也象曰一人行三則疑也一人行而得一人為友三則疑其所與理當損去其餘也然細繹此爻取象不過謂有餘在所當損損而得當則為得友耳夫子繫辭以男女言之葢隂陽對待不容或過猶男女有偶不容或叅故道有所宜損者耳非謂取友者有取于二而不容有三也若以辭害意則不可通矣六四損其疾使遄有喜无咎四變互坎為心病疾之象卦取損下益上四在上卦宜不言損矣然居損之時在上之下與剛相應是能自損其隂柔之疾以受陽剛之益者也惟速則善而无咎矣四與初皆言遄葢初方舎其事而速于益四四亦必急去其疾以受初之益若彼方汲汲此乃悠悠非受益者矣初曰遄徃四曰使遄初之遄四有以使之也此能變化氣質以受益者也占者能如是則无咎矣象曰損其疾亦可喜也疾本无可喜能因人而損之亦可喜也六五或益之十朋之龜弗克違元吉自二至上中虚其體似離而大有十朋之龜之象按食貨志兩貝為朋元龜長尺二寸大貝十朋朋直二百一十六十朋直二千一百六十大寶也二應于五而二既守正以弗損為益五虚中居尊以受天下之益若不知其益之所自來者故曰或益之而有其徳則其實亦有不得辭者故曰弗克違元吉象曰六五元吉自上祐也徳能動天天祐之也上九弗損益之无咎貞吉利有攸徃得臣无家按本義謂上九受益之極欲自損以益人然惠而不費不待損己然後可以益人也惠而不費則惠廣矣故又曰得臣无家今時解皆從之然上雖損卦之終不得遽言損上益下之事且上正受下之益者又不得反言益人按王註處損之終上无所奉損終反益剛徳不損處損之極尚夫剛徳為物所歸故曰得臣天下為一故无家也此解雖不言益下而于受益之義亦未明愚意此弗損益之與二爻不同二爻言不損己以益人此則不損人以自益也葢上爻乃損下卦之陽益此爻之隂而成上九今既稱九則无可益下應六三三亦不容復損矣葢在全卦為損之極在此爻為受益之極故以不損于三為益也損下之極不復過損于義无咎然以九居上疑于不正故戒以唯貞則吉葢取民有制非若蠲租市惠之為如是則利有所徃矣上以三為臣三與上應有得臣之象然不過求于三非以三為私有者有得臣无家之象若陳氏之以家量貸民以固人心則意在得臣實以為其家矣得臣而非以為家亦受益之中而自寓貶損之意者如此則于損卦之義較合姑以此備闕疑象曰弗損益之大得志也不損于下為衆所歸其益乃大得其志矣全彖當損之時必信服于人心乃得其當故下三爻主損皆知損者初以爻位俱剛而可損然在初則宜酌二爻剛位柔則不必損下以益上矣三正當損者也上三爻皆受益者四自損以受人之益者也五不求益而下樂損以益之者也上已受益而不欲過損于下矣損非美事而得其道則皆吉此彖辭所以詳言之也周易淺述卷四
