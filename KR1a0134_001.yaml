body:
  text: 周易淺述卷一翰林院編修陳夢雷撰昔者伏羲氏仰觀于天俯察于地近取諸身逺取諸物見天下萬有不齊之變不外由太極而生隂陽故畫一竒以象陽畫一偶以𧰼隂而兩儀具見一隂一陽有各生一隂一陽之𧰼故增二畫而太陽太隂少陽少隂之四𧰼成叠之為三而三才既備則天地雷風水火山澤之八卦列謂之卦者言懸卦物𧰼以示于人也八卦既成則八卦皆可為太極復生兩儀而十六四𧰼而三十二八卦而六十四而萬物之變盡于斯矣伏羲雖有六十四卦之畫而未有文義至文王始作彖辭以斷一卦之吉凶如乾之元亨利貞是也周公始作爻辭以占所動之爻之吉凶如乾初九之龍勿用九二之見龍在田利見大人者是也伏羲六十四卦夏商相承用之皆有其書夏曰連山首艮商曰歸藏首坤至文王周公則首乾連山歸藏不傳今經則文王周公所作故曰周易也易之為字從日從月隂陽具矣易之為義有二曰交易隂陽寒暑上下四方之對待是也曰變易春夏秋冬循環往來是也易分上下兩經上經首乾坤而終坎離下經首咸恆而終既濟未濟意義所該者廣圖說亦發明其略非以簡帙重大而分也孔子始作十翼上彖一下彖二上𧰼三下𧰼四上繫五下繫六文言七說卦八序卦九雜卦十周易上下二篇合孔子十翼凡十二篇後人以彖傳𧰼傳文言分入諸卦而上下繫傳及說卦序卦雜卦則附于下經之後故曰易為四聖之書者此也有天地而後萬物生焉萬物莫尊乎天周易所以首乾也其𧰼為天其卦純陽健而不息故其𧰼為天統言其𧰼占則有大亨之道而利于正固就其理析言之則四德具焉此全彖之大㫖也卦既純陽變化不測故六爻皆取𧰼于龍具龍德而在上則居天位以應天天子之事也具龍德而在下則盡天理以順天學者之事也生而知之安而行之見惕躍飛亢各隨其時者聖人也觀𧰼玩辭觀變玩占固守其潜積學待見當惕而惕當躍而躍飛則應時亢不至悔者君子也此六爻之大㫖也乾元亨利貞三畫皆陽其卦為乾其𧰼為天乾者健而不息之謂天體純陽健而無息以形體言為天以主宰言為帝以性情言謂之乾下三畫內卦也上三畫外卦也六畫皆陽內外皆乾乾之純健之至也元亨利貞文王所繫之詞以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也六竒純陽有元氣渾淪無所不包而發生暢茂各得其宜皆歸于至正之𧰼學易者筮得此卦而六爻不變則占當得大通而必利在正固以保其終也按大全謂諸家解元亨利貞皆作四德獨本義作占辭然惟理如是則數亦如是見于𧰼占亦如是經言四德就其理析言之也本義則就其𧰼斷其占為體易者言之其意亦並行不悖也初九龍勿用凡畫卦自下而上故下爻為初按本義大全凡揲筮得三竒則所餘三十六䇿合四九之數為老陽得二偶一竒則所餘二十八䇿合四七之數為少陽老變而少不變故陽爻稱九按來注引繫辭參天兩地而倚數謂參天者天之三位天一天三天五也兩地者地之二位地二地四也倚者依也天一依天三天三依天五而為九所以陽皆言九地二依地四而為六所以隂皆言六取生數不取成數此說亦可參用龍八十一鱗九九之數變化不測純陽之物故諸爻皆取𧰼于龍初陽在下故有潜龍之𧰼此時未可有為故有勿用之𧰼勿用雖戒占者之辭實卦爻中有此𧰼也九二見龍在田利見大人二自下而上第二爻也後倣此出潜離隱故有見龍之象澤能及物猶田之得雨耕穫有功故有在田之象雖非君位而在下卦之中有君之德故有大人象澤能及物故有物所利見之象占者得此則利見此人若占者有見龍之德則可以得君行道利見九五在上之大人矣九三君子終日乾乾夕惕若厲無咎九陽爻三陽位在下卦之上重剛而不中乃危地也六爻取𧰼三才則三為人位故不取象于龍而稱君子處危地而以學問自修君子之事非可言龍也三下乾終而上乾繼故其性體剛健有乾乾自惕之𧰼若者擬議之辭三居下卦之終故言終日夕亦日之終也終日乾乾自始至終無日不戒懼也夕又惕若自晝至夜無時不戒懼也重剛不中所處危地有厲𧰼雖處危地而剛健得正自修不息有雖危無咎之𧰼凡言無咎者本皆可致咎善處之故咎可無也程傳擬舜之𤣥德升聞時解作相臣憂勤任重不必泥九四或躍在淵無咎九陽四隂在上卦之下或者疑而未定之辭進退之際無適無莫無可不可人不能測故以或言之淵者上空下洞深昧不測龍之所棲也淵雖卑于田然田非龍所居在田則下于地淵正龍所從變化之處躍則已離于地而將向于天矣九陽動故有躍𧰼四隂虛故有淵𧰼以陽居隂居上之下又變巽為進退為不果有進退未定可上可下能隨時進退則可無咎之𧰼乾至健知險六爻皆不言吉而險莫如三四故善處之僅可無咎而已程𫝊擬舜之厯試諸艱胡氏擬之儲二皆存而不泥可也九五飛龍在天利見大人易卦皆以五為君位以其居上卦之中也上雖尊而過乎中則擬之賔師矣卦體純陽剛健也以陽居中中正也純陽居上之中而得正有飛龍在天之𧰼居上之中人所共仰有利見大人𧰼二與五皆剛健中正而五居尊位以聖人之德居天子之位故萬人樂得而見之即文言所謂聖人作而萬物覩也然使有德位者占此則所利見者九二在下之大人如堯之得舜可也上九亢龍有悔上者最上一爻之名亢者過于上而不能下龍由潜而見而躍而飛至秋分又蟄于淵知進退者也過此不蟄則亢矣五者位之極中正者得時之極過此則為亢矣陽極于上有龍之過亢而動必有悔之𧰼唯聖人知進退存亡乃可免也凡言有者非必然之辭曰有悔亦自有無悔之道可知用九見羣龍無首吉九變而七不變凡筮得陽爻皆用九而獨乾稱用九蓋他卦不純陽獨乾之六爻皆變則純陽為隂所用皆九矣人為勢位所移為才氣所使是為九所用非能用九者因時變化無適無莫故獨稱用九坤之用六倣此六爻皆動有羣龍𧰼陽皆變隂不以剛為物先剛而能柔有羣龍無首𧰼龍未嘗無首而首不可見善藏其用者吉之道也六爻皆不言吉獨此言吉聖人不恃剛也如此彖曰大哉乾元萬物資始乃統天彖即文王所繫元亨利貞之辭彖曰以下謂之彖傳孔子所以釋彖辭也彖獸名豕形而有六牙卦有六爻彖則總六爻之義故以為名焉彖傳以天道明乾義又析元亨利貞四德而言聖人之法天此一節首釋元義也卦以陽為大隂為小六爻純陽故曰大哉贊嘆之也元字兼大始二義大者無所不包物莫有外者始者無所不達物莫有先者元之為德不可見也可見者物之資始而已天以生物為心而物之生必有所始乾元實能資之既資以始即資以終自始而終終而復始皆一元生意貫徹其間是能統乎天也資始者無物不有統天者無時不然此乾元之所以大也雲行雨施品物流形此釋乾之亨也既資其始自然亨通元氣薰蒸油然雲行淋漓布濩沛然雨施資始之初渾淪未辨故曰萬物此則形質可别故曰品物流者川流不息形者明白不紊所謂亨也經未言亨字然雲行雨施氣之亨品物流形物之亨也大明終始六位時成時乘六龍以御天此言聖人體天之元亨也始即元終即貞不貞無以為元不終無以為始故曰終始來注以終為上爻始為初爻引繫辭原始要終亦可兼用蓋六爻即有元貞之義也大明之者深知其所以然之故也六位即六爻見惕躍飛亢之位位隨其時皆有一定而不可易故曰時成成者位自成乘者聖人乘之既曰六位又言六龍者位有一定因時變化與之咸宜者聖人也故曰時乘六龍不曰行天道而曰御天者與時偕宜造化在我猶控御之也言聖人大明乾道之終始見卦之六位各以時成而能因時變化以合乎天則聖人即天矣六位已兼利貞而謂聖人之元亨者言其功業作用未及其究竟也乾道變化各正性命保合太和乃利貞此釋利貞之義也乾道即乾元之道變者化之漸化者變之成萬物由變而化也各正者不相混淆無偏枮也物所受為性天所賦為命保者存而不失合者聚而不散太和隂陽會合冲和之氣也各正者得于有生之初萬物各具一元也保合者全于有生之後萬物統會一元也乾道由變而化萬物華者向實生理各足無偏此利也太和元氣保全凝合又含將來生意此貞也各正性命言理而氣在其中保合太和言氣而理在其中然皆元之所為此元之所以統天也首出庶物萬國咸寧此言聖人體天之利貞也首出庶物聰明睿智出乎庶物之上以君臨天下猶乾道之變化也乃恭已無為而四海各遂其生各復其性猶萬物之各正性命而保合太和也此聖人功業成就究竟故謂之利貞又按古本大明終始節在利貞之下首出庶物之前則聖人體天之元亨與體天之利貞不必分屬尤為渾融大抵彖傳以乾備四德而要以元氣流行無間發生萬物聖人備四德亦體元出治以致太平此聖人得天位行天道致太平之占而占者得之亦隨其所處時位論之不必拘也𧰼曰天行健君子以自强不息書不盡言言不盡意故聖人立𧰼以盡意卦之上下兩𧰼伏羲所取六爻之𧰼周公所繫也此節謂之大𧰼孔子作傳以釋伏羲所取之𧰼也龍以下謂之小𧰼孔子作傳以釋周公所取之𧰼也上下卦有重義天則一而已但言天之行則今日一周明日又一周至健之𧰼也以用也君子體易而用之常存天理不以人欲害其天德之剛則自强不息若間以一念之私則息矣凡大𧰼之傳皆夫子所自取故與卦爻不相屬行健者在天之乾不息者在我之乾上句以卦言下句以人事言他卦倣此潜龍勿用陽在下也自此至用九夫子小𧰼之傳以釋周公取𧰼之意也陽謂九初爻在下陽氣在下君子處微未可以有為也聖人于乾之初憂其在下于坤之初慮其始凝已有扶陽抑隂之意見龍在田德施普也德即剛健中正之德二雖未得位而德化足以及物所施普矣終日乾乾反復道也反復往來進退動止必合乎道也下乾已盡上乾復來乾而復乾無他塗轍猶云反反復復只在這條路也二德及于人三惟道修于己以所處危地也或躍在淵進無咎也量可而進適其時則無咎增一進字以斷其疑也飛龍在天大人造也造作也聖人興起在天子位也此釋飛龍在天至同聲相應節乃言利見大人亢龍有悔盈不可久也乾之上九陽之盈也盈則必消不可久致悔之由人知其不可久防于未亢之先則有悔者無悔矣防其亢者復返于潜而已用九天德不可為首也天德即乾道陽剛天德不可為物先羣龍無首用九之𧰼不可為首為人之用九者言也然惟其不可為首所以能首出庶物蓋乾本為萬物之所資始已具首出之德而物極必變善體乾者剛而能柔謙卑遜順不為天下先故曰不可為首非于乾有所不足也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也他卦彖𧰼作傳而已獨乾坤為諸卦之父母故夫子更設文言以盡二卦之蘊依文以言其理故曰文言又為有文之言詞也此乃釋元亨利貞為四德者字也字夫子悠然有會于其妙而贊嘆之非詮解之詞元者生物之始天地之德渾涵于此於時為春於人為仁四時之運皆此元氣周流義禮智之善皆從此生生惻怛之心發端故曰善之長也亨者生物之通物至于此莫不嘉美於時為夏於人為禮萬物至夏發生暢茂一物如此萬物無不如此衆美之物無不會聚故曰嘉之會也利者生物之遂物各得宜不相妨害於時為秋於人為義秋氣嚴肅義也然無此氣不能各遂其生人人親其親長其長義也即此便和所以為利若不親其親而親他人之親至於不和又安有利不於利上求利義之和處便是利蓋處置得宜不逆于物利莫大焉者也貞者生物之成實理具備隨在各足於時為冬於人為智萬物至冬收斂完固實理充足故貞下起元來嵗復能發生人之有知見理既明知而弗去靈明內涵萬變由我猶木之有幹枝葉從此以生也此節發明乾之四德天理之自然也下節乃言君子體乾之學人事之當然也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事體仁以身法天地生物之心所存所發無不在是全體皆仁無一物不在所愛有君長之道故足以長人嘉會本義曰嘉其所會謂衆美畢集動容周旋無不盡善不失之過不失之不及故曰合禮義體嚴而用和君子使天下君君臣臣父父子子各得所利情既相安分乃不瀆故義無不和貞固者真知理之正而固守之凡事從此立矣故曰足以幹事君子行此四德者故曰乾元亨利貞天行健而四德備君子亦體天之健以行四德君子之乾也四德人所同具唯君子能自强不息以法乎乾乃能行之故言元亨利貞必先以乾也自元者善之長至此皆以申明彖傳之意然下文申明彖傳皆繫以子曰此則否者疑古人已有其辭故左傳穆姜嘗稱引之夫子亦有取焉者也初九曰龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔龍也自此至乃見天則夫子申言彖傳之意而此節六爻設為問答之辭龍德聖人之德也聖人神明不測故曰龍德初九陽在下聖人之在側陋也不易乎世謂自守其道不因世而變易不成乎名謂自晦其跡不求其名之成行與世違遁世矣而道足自樂故無悶已不求名不見是于人矣而心可自信故無悶時當可樂則不私其有以同乎人時當可憂則不失吾已違而去之憂與悶不同為一身起見為悶為天下起見為憂此六句皆言龍德確乎其不可拔隱也然確乃的確之確非堅確之確蓋非意專于退也憂樂一隨乎時行違一凖乎道非一己之私所謂用舍無與于己行藏安于所遇富貴不淫貧賤不移所見真確者也六爻皆以聖人言之有隱顯而無淺深九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也正中正當下卦之中也蓋上下卦以二五為中也德而曰龍似神竒不可測矣不知聖人祗修其庸言庸行而已庸常之言亦信庸常之行亦謹則無不信與謹盛德之至矣猶且間邪存誠猶詩所謂無斁亦保雖無厭斁而常自保守也邪自外入故言間誠本我有故言存邪間則誠自存蓋妄去則真全非别求所謂誠者而存之也乾二畫實故言誠坤二畫虛故言敬誠敬者聖學之源見于乾卦坤卦實天地自然之理也去其不謹信之邪存其謹信之誠由是上可格君下可善俗則善不徒在一身而及于一世矣不見為己之善而見為世之善何伐之有乎善被于一世德之博也已既不伐人亦不知其所以然正已而物正化也自誠之純粹言之曰善自其及人者言之曰德二非五未居君之位而正中已有君之德故稱大人也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣本義謂六爻皆以聖人言之有隱顯而無淺深言所處時位有不同非自初而上有積漸也三爻爻辭稱君子亦君子而求至于聖人者也進德就存諸心言修業就見諸事言忠信存諸心者無一念之不誠也德欲進而不已然使無真實之心德安能進故忠信所以進德也修辭立其誠見于事者無一言之不實也人之不實多在于言若口不擇言雖有忠信之心不能立立其誠即立此忠信隨事檢㸃不敢妄言雖不言制行而制行在其中矣業既言修又言居者修者治而弗怠居者守而勿失如屋之既修居之乃為我有也修辭立誠業為我有故曰所以居業也忠信修辭言所以進德修業之道知至知終又詳其始終用功之序知至至之進德之事理無加于忠信故曰至至之則進而不已也誠僞微茫之判曰幾與許也人惟所見未真故不敢進疑似之際不能自主知至則實見是非端的知德之極至在是而以實心必欲赴之則凡意念所動微茫之際不差此幾之動乃可許之而德日進矣知終終之居業之事萬事究竟歸于一誠故為終終之則居而不失也事物有裁制之宜為義義與幾非二在心之初動為幾然幾尚有善惡所動皆善見之于事則為義矣存之即居之也人不知究竟所在則不知所終知之而不務至乎其極雖所行偶有合宜亦不能存知終則深知萬事歸於一誠而以修辭立誠終之則凡事之裁制合宜而為義者皆無不存而業自修矣知開其始行要其終內實其心外實其事以此居上居下安往不宜所以終日乾乾夕猶惕若無一息之間也三在內卦為上合外卦為下不驕不憂所謂無咎進德修業之效也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎或之為言可上可下可進可退上下無常疑為邪矣然欲及時而上故有時或下非為邪枉也進退無恆疑于離羣矣然欲及時而進故有時或退非離羣類也四處危疑之地進德修業與九三同三因時四欲及時無常乃所以為常無恆乃所以為恆故無咎也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也此言凡物各從其類聖人人類之首故為人所歸以釋利見之義也鶴鳴子和雄鳴雌應同聲相應也取火於日取水於月同氣相求也下濕易潤水先趨之乾燥易焚火先燃之龍陽物薰蒸之氣為雲虎隂物肅殺之氣為風凡此皆以類相感者也聖人人類之首故為人之利見亦然作者首出于上覩者下觀而化也又以物之親上親下以見人之于聖人亦然本乎天日月星辰輕清成𧰼者皆親之本乎地蟲獸草木重濁成形者皆親之蓋屬陽者從上屬隂者從下也類各有本本各有親聖人萬物一體利見又何疑乎上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也九為龍貴矣而陽不得陽位位在于五是無位也上而亢髙矣而純陽無隂是無民也九三之賢在下而敵體不應是無輔是以動而有悔然致悔在動不動而復于則悔可無矣龍勿用下也陽在下也釋龍以氣言此釋勿用以人言言在下未可用也見龍在田時舍也舍作舍止之舍見止在田尚未大用時舍者暫止于此勢非久安也終日乾乾行事也進德修業行所當行也即行健不息之意或躍在淵自試也自試斟酌之意試其時之可否而不輕進非中無所主而漫以嘗試也飛龍在天上治也得位而行居上以治下也亢龍有悔窮之災也隂陽一氣無窮而時位有窮窮極則災生也乾元用九天下治也言乾元用九見與他卦不同蓋一百九十二陽爻皆用九各有所指獨乾之用九為剛而能柔人君治天下之道也元者仁也足以長人者也人君體乾之元用乾之九至誠惻怛之意行于剛果之中寬猛得宜天下自無不治矣四德獨言元元可包四德也亢之後言元貞下起元也天下自無不治一元之運無為之化也自龍勿用下也至此申言𧰼傳之意龍勿用陽氣藏陽氣藏君子亦當晦隱初一而天下陽之屬皆宜潛也曰下曰隱曰藏反復發明示人不必强立分别見龍在田天下文明文者經緯成章明者光顯不昧二雖不在上位天下已被文明之化如孔子是也此爻變離有文明𧰼終日乾乾與時偕行兼無時不然隨時加謹二意天行健無息時與天時俱不息法天之學也時當危厲理宜乾惕處危之道也或躍在淵乾道乃革離下內卦而上外卦時當變革勢不得輕飛龍在天乃位乎天德六爻皆天德而五乃天位天德之得位者唯有是德乃宜居是位也亢龍有悔與時偕極此窮極之極非至極之謂也時既極而我不能變通則與時運俱極故言偕偕極有悔非德也故初曰德之隱二曰正中三四曰進德五曰天德獨上不言德知進退存亡之聖人則雖偕極而有窮變通久之道矣乾元用九乃見天則則者理之有節限而無過不及者也剛柔適中天之則也用九剛而能柔乃合乎天之則也言用九而冠以乾元有統天之德而後九可用也自龍勿用下也至此皆反復申言𧰼傳之意或言其時或言其位或言其用不必强有所分乾元者始而亨者也自此至天下平也又申彖傳之意承上言乾元用九又嘆乾元之妙前以無亨利貞析為四德至此又若以元亨與利貞分言之而統歸于一元因贊乾德之妙唯聖人能體元以法天也他解有謂自此至天下平申言乾元用九天下治者非蓋用九六爻皆變取其剛而能柔此言剛健中正六爻發揮則以純乾之德言之蓋夫子因言乾元因申彖傳未盡之意也始即資始之始而始則必亨蓋有息則不能亨不息則理勢必亨增而字有漸次而無斷續天地生生之氣自微而著始而亨則亨而利利而貞皆可知矣利貞者性情也收斂歸藏乃見性情之實元亨時乾之發見利貞則各有成就如草木之種春時發芽夏則千枝萬葉至秋漸收斂冬乃堅實前此發見時共一性情至此則各一性情猶前言各正性命也遡性之本言之則曰性命推性之用言之則曰性情情又可發生貞下又起元矣乾始能以美利利天下不言所利大矣哉乾始乾元之始也乾始之道能使庶類生成天下蒙其美利能以美利利天下也坤利牝馬他卦利建侯涉川皆有所指乾始無所不利非可指名故言利不言所利也乾之始即元而亨不言亨者元可包亨也利天下者利不言所利者貞不言貞者利可包貞也然乾始能以之則亨利貞皆在元之中矣故贊其大大哉乾乎剛健中正純粹精也四德一元元一乾也故曰大哉乾乎其體堅强不可屈撓剛也其用循環無少間斷健也其行若有所限而無過不及中也其立若有所專而不偏不倚正也剛健之極不雜于隂柔純也中正之極不入于邪惡粹也純粹至于至極無有形容精也乾屬剛而又言中正者蓋分乾坤而言則有隂陽剛柔動靜之不同自一元之氣周流無間之本體言之則無所不包也六爻發揮旁通情也乾德之精不容言矣可言者其情耳故聖人以六爻發揮曲盡其情而乾之道在易矣時乘六龍以御天也雲行雨施天下平也六爻曲盡易之道而唯九五有德位之大人能體備乎乾之蘊故獨以有天下之聖人言之六龍即六爻時乘句增也字與上不同上重乘龍此重御天言乘龍者將以御天也六爻不外一時聖人以時乘此六龍將以御天下也雲行雨施就聖人言之政教如雲之行德澤如雨之施天下自無不平也御天而雲行雨施聖人之以美利利天下也天下皆平聖人之不言所利也至此而乾之道在聖人矣又按彖以元亨利貞言乾文言即以元亨利貞屬之君子乾之德在君子躬行之中也彖以雲行雨施言乾文言即以屬之聖人乾之功即在聖人運用之內也此天人之合君子自强不息以法乎天不可以已也君子以成德為行日可見之行也之為言也隱而未見行而未成是以君子弗用也德得于心者也行見于事者也日可見猶指日可待之意理得于心可以見之行事矣但當隱而未見之時德雖可行而時位未能成其所行君子知其時位之未可是以弗用此以下又申𧰼傳未盡之意君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九二有正中之龍德然所以成德者亦由學問之功之指正中之理言理之得于天者雖我所固有然散見于事物不學則聞見者寡無以聚于吾心也聚矣而不問則不知所擇故問所以辨其是非同異也聚矣辨矣狹隘其心則此理非我有故必有涵養寬裕之意優游厭飫勿忘勿助而所聚所辨者庶融會貫通與心為一矣至于仁者吾心之全德即天之元吾之所學所問者此也既聚既辨之後既居于心即見之于行事亦猶天之行健無或一息之間則莫非天理無一毫私欲之間而乾元之德全雖未居君之位而已具君之德矣九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重剛陽爻陽位也按來注三居下卦之上四居上卦之下以剛接剛故皆曰重此解亦可參不中非二五也不在天非上之中不在田非下之中時本可危因時而惕以防危故雖危無咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎重字衍三四皆人位而四居人之上而近君故曰不在人重剛不中之中二五之中也中不在人之中六爻中間之中也下以二為中三則過上以五為中四則不及過則憂不及則疑然憂所當憂卒于無憂疑所當疑卒于無疑故皆可以無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎前同聲相應節言利見之意此專就大人言而利見之意在其中九五之為大人大以道也天地者道之原大人無私以道為體則合于天地易簡之德矣天地之有象而照臨者為日月循序而運行者為四時屈伸往來生成萬物者為鬼神名雖殊道則一也大人既與天地合德故其明目達聰合乎日月之照臨刑賞慘舒合乎四時之代禪遏揚彰疸合乎鬼神之福善禍淫先天弗違如先王未有之禮可以義起蓋雖天之所未有而吾意默與道契雖天不能違也後天奉時如天秩天序天理所有吾奉而行之耳蓋人與天地鬼神本無二理特蔽于有我之私而不能相通大人與道為一即與天為一原無彼此先後之可言其曰先天後天者亦極言或先或後皆與天合也亢之為言也知進而不知退知存而不知亡知得而不知喪進退以身言窮上反下退矣存亡以位言過五居上亡矣得喪以物言無輔無民喪矣是之謂亢所以動而有悔其唯聖人乎知進退存亡而不失其正者其唯聖人乎知進退存亡則無得喪矣故不復言得喪不失其正處之以道非計私以避害也正即貞也乾元歸于一貞聖人法天體元歸于一正隨其時不失其正非聖人不能也故再言其唯聖人乎此卦六爻周公皆取𧰼于龍夫子文言皆屬之于聖非聖人固不能體天然易非專為聖人言也自天子以至于庶人自聖賢以至于愚不肖皆可觀𧰼玩辭觀變玩占而以聖人為法耳蓋人生天地之間吉凶悔吝無一息之停聖人隨其時之所值而皆有以處之使得其正此不獨乾卦之義而實全易之義易之所以開物成務聖人所以為天下後世法者此也歸藏首坤其義未知所取周易以坤繼乾以地承天萬物之父母也全卦以柔順得正為地道臣道妻道之宜六爻唯二五言吉利而五不如二之正他則皆有扶陽抑隂之微㫖焉坤卦之大略也坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉三偶為隂其卦為坤其𧰼為地隂之成形莫大乎地地勢卑順故名為坤六畫皆隂內外皆坤隂之純順之至也純隂至順一承乎陽循物無違居心順應理無不通故占亦可大亨然必守此順德久而不變故曰利牝馬之貞牝馬柔順而健行者馬為乾𧰼曰牝馬明配乾也陽得其全隂得其半以柔順得正為利則其他有所不利矣陽先隂後君子占此欲有所往率先首事必至于迷居後順從乃得其當故曰先迷後得主利本義謂陽主義而隂主利大全謂占此卦便主利此事非坤道主利萬物也時解皆從之今按蘇傳來注皆以後得主為句謂陽為隂主乾為坤主居後從乾得其所主所以為利也此雖與本義不合然觀後文言後得主而有常句似非遺去利字且于理義甚順宜存之西南隂方東北陽方西南致養之地與坤同道故得朋東北反乎西南故喪朋隂體柔而躁妄作以求全則非矣必安于正乃吉故曰安貞吉蓋隂之德減于陽之半故體乾之君子可先亦可後而體坤之君子但為後不可為先所遇雖得喪之不同而要以安于正則吉此地道臣道妻道也此三句本義解如此時解皆從之今按蘇傳及來注皆謂文王圓圖西南兌離巽三女所居坤之朋也東北震坎艮三男所居非朋也隂以從陽為正去其三女之朋求主于東北則為安貞之吉矣此雖與本義悖而說可存彖曰至哉坤元萬物資生乃順承天此以地道明坤之義而首言元也至極也乾曰大無所不包也坤曰至無所不盡也乾之大無方坤則未離乎方也故但曰至元非别有一元乾施坤受一氣而已資始者有其氣資生則有其形然非坤自為順天氣而承之以生不先不後所以為至也坤厚載物德合無疆含𢎞光大品物咸亨此言亨也坤之德厚持載萬物合于乾之無疆無疆即乾之不息也不息則可久無疆則可大矣其靜也翕故曰含𢎞含言無所不容𢎞言無所不有其動也闢故曰光大光言無所不著大言無所不被所以德合無疆而品物之流形者咸暢茂條達無不亨矣牝馬地類行地無疆柔順利貞君子攸行此言利貞也馬乾𧰼而曰地類者馬行地之物牝則隂之類也行地無疆則順而健矣地承天施柔順也生物有終利貞也坤之德如此君子所行如之則有先迷後得之慶矣先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶居先則迷惑而失坤之道居後則順利而得地之常西南與隂之類行故得朋東北非其類故喪朋然反而與類行亦終有得朋之慶矣本義所解如此程傳謂東北從陽成生物之功曰有慶蘇傳來注同之今按獨隂不生從陽有慶為是安貞之吉應地無疆安而且貞地之德也彖有三無疆德合無疆坤配乾之無疆行地無疆坤之德無疆也應地無疆人法地之無疆也無疆本天德唯地能合天之無疆則地亦無疆君子能法地之無疆君子亦無疆君子法地地法天一天德之無疆已矣𧰼曰地勢坤君子以厚德載物天以氣運故曰行地以形載故曰勢上下卦皆地然其𧰼一而已故不言重而但言其勢之順蓋地非以平為順髙下相因正見其順也髙下相因無窮地勢之順以地德之厚也厚故萬物皆載焉君子以之法地德之厚而民物皆在所載矣至乾之大𧰼不言乾而言健地則不言順而言坤朱子謂用字偶有不同不必穿鑿初六履霜堅氷至隂爻言六者凡揲筮得三偶則所餘二十四䇿合四六之數為老隂得二竒一偶則所餘三十二䇿合四八之數為少隂老變而少不變故隂爻稱六又按兩地之義合河圖地二地四而為六取地之生數不取成數則亦為六也霜一隂之𧰼氷六隂之𧰼霜隂氣所結其勢猶微及其既盛則水凍而為氷初隂有霜𧰼六隂有氷𧰼隂爻雖始生于下其端甚微而其勢必盛故聖人示人以戒辭當履霜則知堅氷之將至也蓋隂陽造化之本不能相無而消長有常亦非人所能損益然其類則陽生隂殺陽善隂惡陽君子而隂小人故聖人于易每致扶陽抑隂之㫖亦參贊天地之微權也𧰼曰履霜堅氷隂始凝也馴致其道至堅氷也本義謂魏志作初六履霜當從之馴順習也道即小人道長之道經言堅氷至要其終也𧰼𫝊至堅氷原其始也當其履霜不過隂之始凝耳乃至于堅氷則惟其因循順習以致之耳戒占者當豫防不可自我致之也始于微而終于著隂陽均也而隂之為物弱而易入易以陷人故戒其馴習而致之即子産水弱民玩之意六二直方大不習無不利乾五爻皆取𧰼獨九三指其性體剛健者言之坤五爻皆取𧰼獨六二指其性體柔順者言之初三五柔順而不正非隂位也四上柔順而不中非上下卦之中也唯六二柔順而中正得坤道之純者也正則無私曲而內直中則無偏黨而外方內直外方其德自然盛大不假修習而自無不利也不揉而直不矩而方不廓而大故曰不習不待學習自然直方大故曰無不利蓋習而利則利止于所習矣唯不習故無不利言以乾之德為德也乾其動也直坤亦直乾圓而坤則方乾不息而坤德合無疆則與乾並大矣占者有是德則其占如是初六占在象中此則𧰼在占中𧰼曰六二之動直以方也不習無不利地道光也地之直方于其動觀之即生物之無屈撓見其直即賦形之無變易見其方蓋唯承天而動故也直方則大也故不言大地道之光自然而然無所勉强不可掩蔽也六三含章可貞或從王事無成有終坤為吝嗇又為文六三隂居陽位剛柔相雜內含章美之𧰼體純隂可貞以守之𧰼居下卦之上有位者也有或出而從王事不終含藏之𧰼三居下卦之終有終之𧰼三居陽不正故不曰貞曰可貞不欲輕進故曰或不敢造始故曰從人臣之道凡事不敢居其成功唯奉事以守終故曰無成有終也本義謂始雖無成後必有終意似不同然全卦有先迷後得之𧰼而三爻多凶凡占者得此即如所占可也𧰼曰含章可貞以時發也或從王事知光大也處下之道必能含其美乃為得正然義所當為則以時而發非有所隱而不盡也或從王事乃能無成有終以其知之光大故也蓋天下唯能含者乃能發圭角淺露不可有為矣唯知光大者乃能含暗昧不明妄自炫耀矣大知光明者不事匿名晦迹而驕矜不形涵養深沉者不用見事風生而事業自逺此即𧰼傳所謂合𢎞光大也六四括囊無咎無譽隂虛能受故坤有囊𧰼重隂凝閉有括囊之𧰼三以隂居陽猶或可出四以隂居隂逼近于君唯有謹密晦藏而已不但言語之簡默凡一切動止皆然如此則無僨事之咎亦無成事之譽蓋四近君譽則逼上譽即咎之招無咎者以無譽也求譽則不能括囊矣𧰼曰括囊無咎慎不害也能慎則不害也君子當否塞之時不求有功當思逺害六五黃裳元吉黃中色地之色也裳下飾坤為裳也然不于二言之獨于五言之者蓋六二隂而在下柔順中正自然無不利六五以隂居尊必中順之德充于內而見于外乃得大善之吉否則凶矣程傳以羿莽武氏臣妾居尊位者言之先儒或病其拘蓋卦本臣道妻道而五居尊位然易之為占皆因人立教為臣妾者得此則宜忠信卑順以盡其道為君得此則宜居中謙遜以下賢也𧰼曰黃裳元吉文在中也坤為文又居五之中文生于相錯隂陽專一則無文隂有陽德則黃中之文充于中而見諸外也上六龍戰于野其血𤣥黃隂宜從陽者也純隂在上盛于陽矣故與陽皆有龍𧰼盛則必爭故有戰𧰼上動不已進至于外故有戰于野之𧰼隂雖極盛豈能獨傷陽哉故有兩敗俱傷之𧰼氣陽血隂陽衰于隂故與隂皆有血𧰼𧰼如此不言凶而凶可知矣乾上但言亢而坤則言戰者蓋隂陽雖不可相無然乾尊則無對待坤卑而盛極必至侵傷也初曰堅氷至者防龍戰之禍于始上曰龍戰野則著堅氷之禍于終也餘意文言詳之𧰼曰龍戰于野其道窮也隂盛窮極勢必爭而傷也然道豈驟窮由初之馴致也用六利永貞坤之用六以凡筮得隂爻六變而八不變也然凡隂爻皆用六獨坤以純隂而皆變為陽則得稱用六也隂柔不能固守變而為陽則能永貞矣不牽于私欲不惑于常變固守其順所以利也坤本有元亨此獨言永貞者蓋乾以元資始坤以貞大終六爻皆變則其德減半故不言元亨也前言安貞之德而此言永貞者蓋安者順而不動永者健而不息變而為乾故言永也乾吉在于無首坤利在于永貞蓋以剛健居人之首則物之所不與也以柔順而為不正則佞邪之道也乾變坤剛而能柔坤變乾雖柔必强變化氣質之道陽本先于隂而陽之極不為首隂本小于陽而隂之極以大終審時觀變之學也𧰼曰用六永貞以大終也隂小陽大先隂而後陽始小而終大也小者小人之道大者君子之道美其善變也文言曰坤至柔而動也剛至靜而德方此釋牝馬之貞也動者生物所動之機德者生物所得之質坤不專成本至柔也而承天發生勃不可禦動之剛也坤不造始本至靜也而生物賦形一定不易德之方也乾剛健而中正所以為大坤柔靜中有剛方所以為至不必于柔靜之外别求剛方也後得主而有常按本義主下當有利字即彖傳後順得常之意今按蘇來二說後乎乾得乾為之主坤道之常也觀其文勢主下無利字為是含萬物而化光復明亨義即彖傳含𢎞光大之意靜翕則含生意於中動闢則有光輝也坤道其順乎承天而時行承天之健順天之時以行即彖傳順承天之意自坤至柔至此皆以申言彖傳之意積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也順本義作慎凡事皆由積漸所致宜辨之于微而加慎也或曰順即馴即馴致其道言因循以致之也更通直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也何以謂直言其心之本體無邪正也何以謂方言其心之妙用合宜義也此六二直方之所由名也下則言求直方之功君子惟主敬則其內自直兢兢業業主一無適一私不擾直矣惟守義則其外自方凡所施行因時制宜一定不易方矣敬義既立事君則忠事親則悅交友則順所謂不孤至此不期大而自大矣蘇氏謂直內方外隱然如碩師良友之在吾側是以特立而不孤也此說較勝凡事必有所疑故習而後利體全用備如此無施不可坦然行之而無疑復何假于習乎乾于二言誠坤于二言敬乾于二言仁坤于二言義先儒以誠敬屬乾坤仁義分隂陽蓋本于此隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也三以隂居陽雖有美而含之非其才有所不足分有所不敢也以從王事不敢專其成功蓋以地承天即以妻承夫以臣從君之道也地道不敢專成功不過代天而終所未終况妻道臣道乎以數言之天數終于九亦以地十終之天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也天地二句引起下文之辭天地交感則變化萬物雖草木亦蕃若重隂閉塞雖賢人亦隱初言慎毋縱夫微隂之長也四言謹毋衒于重隂之時也君子黃中通理此釋黃字之義中德在內曲鬯旁通無私欲之滯塞條理分明無私欲之混淆中德在內不可見即通理二字形容其蘊所謂文在中也本爻既變坎為通通之𧰼本爻未變坤為文理之𧰼正位居體此釋裳字之義雖在尊位而居下體美在其中而暢于四支發于事業美之至也德之美者既在其中由是暢于四支而和順在一身發于事業而順治者在天下內外融貫乃為美之至此贊嘆之以見元吉之故隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃三雖有美含之猶知有陽也上則均敵無小大之差疑于陽矣其勢必戰十月純隂古人稱曰陽月亦以天道不可一日無陽故稱龍于盛隂之時以存陽也氣陽血隂未離乎隂故曰類𤣥黃天地之正色言隂陽皆傷也全卦唯二五居中為坤德之美二居中得正故不習而利五以柔中居尊必中順而吉三以隂居陽貴乎含四以隂居隂在乎括初勢猶微宜辨于始上勢已極必凶于終矣蓋隂陽二氣天地不能相無而因時有扶陽抑隂之妙又聖人裁成輔相之功所以參贊天地者也屯卦震下坎上震一陽動于二隂之下故其德為動其𧰼為雷坎一陽陷于二隂之間故其德為陷為險其𧰼為雲為雨為水有天地而後萬物生焉屯者難也物之始生鬱結未通故其為字𧰼草穿地始出未申此屯所以次乾坤之後也其卦以震遇坎乾坤始交而遇坎陷故其名為屯也六爻二陽四隂凡卦爻中隂陽以少者為主故二陽為四隂之主然五坎體陷而失勢初震體動而得時屯難之世陽剛善下可以有為故初為全卦之主也五但小貞吉而已餘四爻皆因初起義四應初則往吉三不應初則往吝二乘初則不進上逺初則道窮此全卦六爻之大略也屯元亨利貞勿用有攸往利建侯乾坤始交而遇險陷世界草昧之時震動在下坎險在上在險中有震動之才可以大亨但出險有機利于守正未可妄進震性好動故戒以勿輕往也三四五互為艮止勿用攸往之𧰼震一君二民又為長子震驚百里有侯𧰼初九陽居隂下為成卦之主是以賢下人得民而可君故利于建侯筮立君者遇之則吉也蓋盈天地之間者萬物萬物以人為首人道以君為尊草昧之時震動出險立君得正乃以繼天立極此屯所以具四德而繼乾坤也彖曰屯剛柔始交而難生乾坤之後一索得震為始交再索得坎為難生此正昏冥雜亂之時此以二體釋屯之名義也動乎險中大亨貞動乎險中未遽出險震體能動故可大亨坎在險中故宜正自此以下釋元亨利貞皆不言四德用文王本意此以二體之德釋卦辭也雷雨之動滿盈天造草昧宜建侯而不寧此以二體之𧰼釋卦辭也雷震𧰼雨坎𧰼物之生未有不待雷雨者然必霽而後見其功當其方動充滿瀆亂不知所從則氣運鬱塞之時也孔子即此以言世道言此乃天造之草昧草者如草不齊震為蕃草之𧰼昧者如天未明坎為月天尚未明又坎水外暗內明亦昧之𧰼此時天使之然如天所造天下未定名分未明雜亂晦冥之際宜立君以統治之然君初立治理猶踈日夜不遑寧處乃可成撥亂反正之功如更始既立日夜縱情聲色非不寧者矣蓋惟侯心不寧方可求天下之寧也自屯卦以下彖𫝊皆先釋卦之名義後釋卦辭而釋卦辭又各有所取或卦體或卦𧰼或卦德或卦變而彖之㫖盡矣此皆先儒所未及說似拘而分疏清析不可易也𧰼曰雲雷屯君子以經綸坎不言水而言雲者在雷之上鬱而未通雨而未成也坎在震下則為雷雨之解矣彖言雷雨象言雲雷彖言其動𧰼著其體也經綸治絲之事君子治世猶治亂絲解其紛結經者理其緒而分之猶雷自斂而發綸者比其類而合之猶雲自散而聚屯難之世人皆惶懼沮喪不知正君子經綸之時也初九磐桓利居貞利建侯磐桓難進之貌陽剛動體才足濟屯但初在下無勢應四柔無援當險陷之交故有磐桓之象然陽居陽位為得正故利于居貞又初成卦之主以陽下隂為民所歸有君之𧰼故占者如是則利建以為侯此爻為卦之主大意與彖同磐桓即勿用有攸往利居貞即利貞利建侯雖同而合全卦言之則侯指人自初爻言之則侯指已占者得之則隨所處以為占不必泥也𧰼曰雖磐桓志行正也以貴下賤大得民也磐桓非晏安棄務志在行正也正為濟屯之本居之將以行之也陽貴隂賤初爻陽在隂下屯難之世人皆思主貴能為賤下所以大得民心可以為君也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字屯如以時言鬱塞而未通也邅如以遇屯之時者言遲回而未進也班分布不進之貌震于馬為馵足為作足班如之𧰼女子許嫁笄而字六二變兌為少女女子之𧰼三四五互為艮止不字之𧰼二三四互為坤坤數十十年之𧰼六二隂柔中正上應于五然以乘初之剛故為所難而邅回不進然初非為冦也乃求與已為婚媾耳但二與五為正應二貞于五異于五者皆冦矣焉知其德哉故守正而不之許至于十年則妄求者去正應者合數窮理極而可許故不字于初終字于五也爻𧰼如此占者得之則宜如是蓋全卦雖以屯初為主而各爻又各以所處之位論其吉凶唯二乘初剛故為所難二之質柔故受人所制欲應五不得故屯邅不字所應者正故終有可字之時也易爻有己正而他爻視之為邪者有己凶而他爻得之為吉者屯之初正也而二視之則為冦旅之上凶也而五承之則有譽命蓋皆以所處之時位論之不可泥也𧰼曰六二之難乘剛也十年乃字反常也乘剛居初之上為初所迫失其常也然理之所在十年必反守正不變不悖常矣終獲正應復其常也六三即鹿無虞惟入于林中君子幾不如舍往吝六三下卦六隂而居三之陽位以求上六不安于隂而又貪求陽不中不正無正應而妄行取困者也鹿陽物虞虞人無虞無應也陽在五而不在上求陽不獲即鹿無虞之𧰼林隂𧰼在六二六四之間入于林中之𧰼卦下體震動也互體有艮止也聖人于其震之動庶幾其艮之止曰君子見幾不如舍去若往逐不舍必致羞吝矣𧰼曰即鹿無虞以從禽也君子舍之往吝窮也妄動由于多欲無虞而即鹿以有貪禽之心君子見幾則必舍若往則羞吝而至困窮矣經曰不如舍辨之明也傳曰舍之去之決也六四乘馬班如求婚媾往吉無不利坎為下首薄蹄之馬隂柔居屯不能上進故有乘馬班如之𧰼然初九守正于下以應于已故初來求四四往應之則吉也本義謂下求婚媾蓋以初求四為以陽求隂往者適人之意也時解以四近五為大臣初剛為賢四求賢輔君乃以濟屯然以隂求陽有害婚媾之義且初為卦主有可君之德如湯之于伊尹昭烈之于孔明皆以君下臣以求濟屯然後往而應之正不必復言輔五又剛柔相濟亦以濟屯亦不必専以剛為濟屯之賢也𧰼曰求而往明也初來求我而後往應非明理知幾者不能觀𧰼傳意更與本義合六五屯其膏小貞吉大貞凶九五雖以陽剛中正居尊位然當屯之時陷于險中六二雖為正應而隂柔才弱不足以濟初九為衆所歸則人心已他屬坎體雖有膏潤而不得施故為屯其膏之𧰼以處小事則守正猶可獲吉以處大事則雖正亦凶矣初與五皆陽而五以中居尊反遜于初者初在下而動為衆所歸時之方來者也五在上而陷于險人心他屬時之已去者也六爻獨二五言屯者二在下而柔遇時之屯者也五在上以剛而陷于柔自屯者也守貞不字無濟變之才屯膏吝賞非大君之道皆不能濟屯者也𧰼曰屯其膏施未光也光陽德也陷于二隂之間人君澤不下及所施未光大也上六乘馬班如泣血漣如坎為血卦又為水有泣血漣如之𧰼隂柔無應處屯之終進無所之唯有憂懼遂至于泣血漣如也爻言乘馬班如者三二待五四待初皆有應獨上無所待唯有泣血漣如而已𧰼曰泣血漣如何可長也屯難窮極莫知所為顛沛如此何能久乎全卦當屯難之世居上陷險而下方震動陽剛奮發而能下人則可以為君柔順待求而應則可以為輔居上而澤不下究則僅可小安居下而應逺被迫則但當守正若貪欲妄行勢必取困窮極憂懼理難久長知此可以處世變矣蒙卦下坎上艮艮一陽止于二隂之上故其德為止其𧰼為山坎為水為險內既險陷不安外又行之不可蒙之𧰼也水必行之物遇山而止莫知所之亦蒙之𧰼蒙次于屯蓋屯者物之始生物生必蒙蒙者物之稚蒙昧未明蒙所以次屯也乾坤之後屯主在震之初九蒙主在坎之九二此長子代父長兄次弟之𧰼艮為少男方有待于開發者也此屯蒙次乾坤之義也又屯之建侯有君道焉蒙之養正有師道焉天地既位君師乃立此又乾坤屯蒙之序也六爻二陽四隂亦以陽爻為主然九二剛而得中故能為蒙之主上九過剛不中則但可擊蒙禦冦而已上下四隂爻皆因二以起義五應二則為童蒙之吉初承二則為發蒙之利四逺二不明則為困蒙之吝三乘二不順則不以蒙待之故獨此爻不言蒙此六爻之大略也蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞物生之初蒙昧不明然蒙者不終于蒙則有亨道而卦之九二以剛居中與六五隂陽相應能發人之蒙亦有亨道也我指二童蒙幼稚而蒙昧謂五也禮無往教故非我往求童蒙必待童蒙之求我也其所以必待童蒙之求我者何也凡求教者必其心精專而吾之言易入故童蒙來求我則告之若再三則以我求蒙為䙝瀆瀆則雖告之無當與不告同矣凡若此者蓋以蒙者為物所蔽其中之正未亡也俟其求發而告之使歸于正所以利也若求蒙至再三䙝瀆彼終不得其正何利何亨之有乎本義以初筮再筮為喻言初筮指問者之精專瀆指問者之煩瀆于理固順但易皆取𧰼不必作喻言觀彖傳以剛中及瀆蒙二語似非指問者言來注以初筮指二再三指三四說又近鑿今按蒙有九二之發蒙則不終于蒙有亨𧰼二不求五而五求二有不求童蒙童蒙求我之𧰼坎一陽為內卦初筮所得初筮告之𧰼艮一陽止于上再三則不告之𧰼九居二六居五似非正矣然二以剛中為正五以應二為正利貞之𧰼彖曰蒙山下有險險而止蒙山下有險上峻而難升下險而莫測以卦𧰼釋蒙之義也內險則危殆不安外止則窒礙難往以卦德釋蒙之義也蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也此以卦之體釋卦辭也卦以九二當發蒙之任者以亨行時中謂九二以可亨之道發人之蒙所行皆得其時之中也時者當其可之謂五之志未與二應而告之非時也再三而瀆亦非時也蒙當養正過此而後養亦非時也故下文皆言行時中之事二不求五而五求二志自相應也初筮得九二以剛居中故告之有節也瀆蒙則與不告同以蒙不可瀆也人皆學為聖人而聖學不外于養正人惟當蒙之時因時而告則有以養之使正即為作聖之功甚言蒙之不可不養而養之必以時乃亨也𧰼曰山下出泉蒙君子以果行育德泉水之始出者出而遇險未有所之故有蒙𧰼然泉之既出勢有必行君子體坎之剛中以果決其行水尚在山涵蓄深沉君子體艮之靜止以養育其德初六發蒙利用刑人用說桎梏以往吝初六以隂居下蒙之甚也欲發其蒙利用刑人謂痛加懲責使知敬學也用說桎梏謂暫去拘束以待自新坎為刑為桎梏故有其𧰼然坎初變為兑則為毁折又有脫之之𧰼桎梏用之未刑刑時未有不脫桎梏者若既刑又桎梏一往而不舍拘束太苦則失敷教在寬之義必致羞吝矣𧰼曰利用刑人以正法也發蒙之初法不正則人玩故懲戒之以正教之之法蓋明刑以弼教也九二包蒙吉納婦吉子克家此一爻而具三𧰼也包蒙對上下四隂言納婦克家皆對六五言九二以陽剛統治羣隂當發蒙之任然物性不齊不可一概取必唯剛而得中故能有所包容而吉也坎中陽而五隂以隂應陽二能納之納婦之𧰼也五位尊有父之象二居下位而能任上事又為子克家之象也時解謂大臣能敷教以寬以無負君之委任善教之良臣猶克家之肖子也亦通𧰼曰子克家剛柔接也程傳謂子而克治其家者父之信任專也二能主蒙之功者五之信任專也此重五之能接二也本義但言指二五之應謂剛柔往來相接也二說本義為優全卦不重在五也六三勿用取女見金夫不有躬無攸利三變為巽為長女有女𧰼九二陽剛得乾金之中爻有金夫𧰼六而居三隂柔而不中正女之見有金之夫而不有其躬以從之者也取女得如是之人何所利乎故戒占者以勿取也王注謂三應在上有男女之義三之動為女先求男故有此𧰼不如大全合屯六二參觀而以三趨二取𧰼為優蓋屯之六二近初九之陽而正應在五然震之性動而趨上而所居又中正故曰女子貞不字十年乃字蒙之六三近九二之陽而正應在上然坎之性陷而趨下而所居又不中正故曰見金夫不有躬六五中正故為可納之婦三不中正故為淫奔之女六四質柔雖困猶可教故得稱為蒙三狥欲趨利而忘身併不得言蒙矣故言勿用以拒之亦不屑之教也𧰼曰勿用取女行不順也順亦作慎按程傳作邪僻不順亦可捨正應之夫而從金夫是不順也六四困蒙吝六四以隂居隂既逺于陽無正應又在二隂之間為困于蒙之𧰼蓋氣質既昏錮蔽又甚可羞吝之甚也然能尊師取友困而學之猶或可免終焉則真吝矣𧰼曰困蒙之吝獨逺實也陽實隂虛唯剛明有實德者能發蒙四獨逺之欲從九二則隔三欲從上九則隔五又乏正應異于初與五也言獨使反而知恥也六五童蒙吉艮為少男有童𧰼所謂童蒙者不失赤子之心純一未發以聽于人非幼稚之謂也五以柔中居尊下應九二所謂童蒙求我有可亨之道者故吉時解作幼主任賢亦近之勿拘𧰼曰童蒙之吉順以巽也中爻為坤順變則為巽順以爻之柔言之舍已從人順也巽以志之應言之降志下求巽也上九擊蒙不利為冦利禦冦艮為手有擊之𧰼以剛居上治蒙過剛有擊蒙之𧰼艮止于上不利為冦之象應爻坎為盜賊利禦冦之𧰼本義取必太過攻治太深則必反為之害是猶為冦者矣故不利惟捍其外誘以全其真純則雖過于嚴密乃為得宜猶禦冦者也故利全卦取𧰼以誨人言程傳以用兵言唯本義謂凡事皆然不止為誨人也得周易立象以盡意之㫖占者隨事以思其義可也今以此爻合之彖辭卦中二陽爻二初筮之告者也上之擊蒙近于再三之瀆者也敷教在寬非徒取于擊者然如三之縱欲忘身猶之冦也擊之禦冦之道若一概施之他爻則瀆是上自為冦矣又何利乎禦冦貞也為冦則非貞矣如此解則與彖意更相發明𧰼曰利用禦冦上下順也上陽爻擊蒙者下四隂皆蒙也上之剛不為暴上之順也下得擊去其蒙下之順也全卦有作師之道大抵正蒙者貴有剛中之德而有所包容不必過暴以為之害此二之包蒙所以吉而上之擊蒙但利于禦冦不宜瀆而至于為冦也為蒙者貴于柔順中正以聽于人不宜自逺于剛明之德尤不可縱欲以忘其身此童蒙所以吉困蒙所以吝而見金夫不有躬者併不得數于蒙也初亦隂爻宜言蒙而言發蒙之道宜痛懲而暫舍者蓋亦因其材質之隂柔卑下故正蒙之道宜如此若能為五之童蒙則刑可不用矣六爻于正蒙之道最為明白詳盡然而聖人立𧰼以盡意不必專為一事而言凡治己教人一切應事接物皆可推其意而悟之也需卦下乾上坎以卦𧰼言水在天上未遽下地必待隂陽之交薰蒸而後成雨需之𧰼也以卦德言乾健坎險以剛遇險而不遽進以陷于險需之義也需次于蒙按序卦蒙物之稚也物稚不可不養也故受之以需需者飲食之道也物之幼稚必需飲食長養雲上于天有蒸潤之𧰼飲食所以潤益萬物故需為飲食之道所以次蒙也卦之大意取須待之義序卦取所需之大者耳按左傳云需事之賊言猶豫不決之害事也易需非不決之謂見險而不動能動而不輕動者也內三爻以見險不輕進為需外三爻以入險而待人以共進為需六爻初九九五之吉不待言餘四爻雖有悔吝然終歸于吉如二曰終吉三曰敬慎不敗蓋有剛健之德而能相機度勢從容少待鮮有敗者四曰順以聽上曰敬之終吉蓋雖入險中而待陽剛之德以共進故亦吉也卦雖四陽二隂然三陽不輕進坎五居尊有孚二隂非卦義所重故不得為卦之主需有孚光亨貞吉利涉大川需坎水在前乾健臨之將涉水而不輕進之𧰼乃事所當待非不當待而待者也九五坎體中實陽剛中正而居尊位為有孚得正之𧰼三四五互為離光明之𧰼坎為通亨通之𧰼乾濟乎坎有涉大川之𧰼乾陽在下皆有所需九五坎陽在上又為衆所需需之道貴于實心又貴于得正人之需有出于不得已者需而無實無光而且亨之時必實有有守能待之心則無私計較而光明不恤得失而亨通矣然世有心雖誠實而處事未正者需而非正無吉而且利之理必所為皆合于義不圖行險僥幸則居常凡事皆吉而濟險厯難亦利矣蓋有孚以善其需貞又所以善其孚孚貞者盡所需之道光亨吉利則得所需之效也彖曰需須也險在前也剛健而不陷其義不困窮矣需者須也理勢所在不得不待也剛健者多以輕躁而陷于險剛健而能不陷故善其不至困窮也坎陷而云不陷何也需然後進所以不陷不陷則終能出險故不困窮乾三陽進而迫乎險遇險而能需者也坎一陽居中守正處險而能需者也遇險而能需則不至犯險處險而能需則又將出險矣故曰不陷此以卦德釋卦名義也需有孚光亨貞吉位乎天位以正中也利涉大川往有功也正中與中正同指五也正則規模宏逺無欲速之為中則中心寧靜無喜功之念唯以中正居天位故雖險在前而終必克濟非若蹇之見險而止雖坎居上而剛健不陷非若困之剛掩人知奮發者能有功不知以剛健之德能臨事而懼從容整暇氣定神全不往則已往必有功此以卦𧰼釋卦辭也𧰼曰雲上于天需君子以飲食宴樂雲氣上蒸于天必待隂陽之和而自成雨無所作為也事之當需者亦然內有孚外守正但飲食宴樂俟其自至飲食以養其氣體宴樂以和其心志所謂居易以俟命非若後世麴蘖之托昏冥之逃者也初九需于郊利用恆無咎郊曠逺之地用恆守其常也初逺于險有需郊之𧰼而九陽剛居陽位有恆于其所之𧰼同人于門于宗而後于郊自近而逺也需由郊而沙而泥自逺而近也既能需于郊又戒以利用恆者人需于始或不能需于終唯以義命自安身既逺險又心不妄動乃無咎也𧰼曰需于郊不犯難行也利用恆無咎未失常也險難由人自犯于郊則不冒險而行矣恆即彖之孚也貞也貞者乾之常利用恆未失處需之常道也九二需于沙小有言終吉水近則有沙二近險有需于沙之象二三四互得兑為口舌有言語相傷之象剛中能需有終吉之𧰼既近于險雖未陷患害羣小從而訾議之然言語之傷災之小者初以剛居剛雖逺于陷猶有戒辭二以剛居柔守中寬裕故雖近險可斷其終之吉也爻多以相應為吉此又不然者見險在前有待而進故無取于相應也𧰼曰需于沙衍在中也雖小有言以吉終也衍寬也以寬居中不急于進蓋剛居柔位故謂剛為衍也九三需于泥致冦至水涯有泥三將陷于險有需于泥之𧰼坎為盜賊有冦之𧰼三過剛不中有自我致冦之𧰼𧰼曰需于泥災在外也自我致冦敬慎不敗也外謂坎在外卦謂之外則禍不自已作但以過剛妄動以近于險則冦乃我致之也然卦為需能敬慎猶可不至于敗此則𧰼中本無此意本義所謂發明占外之占使人之逼近于險者思所以善處之道也六四需于血出自穴內卦三陽以見險不輕進為需外卦入險矣以待人共進為需血者殺傷之地穴者險陷之所四入乎險坎為血卦故有需于血之𧰼然以隂居柔得正初為正應所居得正又待正應之陽剛為援可以不終陷于穴矣故有出自穴之𧰼𧰼曰需于血順以聽也隂柔入險中疑不能出矣然能順以聽初之陽剛則不冒險以進是以能出穴也三能敬則雖迫坎之險而不敗四能順則雖陷坎之險而得出敬與順固處險之道也九五需于酒食貞吉坎有酒食之𧰼九五為需之主以一陽處二隂之間以待三陽同德之援需于酒食之𧰼居中得正三陽自來陽彚進而隂退則坎可平而險可夷貞吉之𧰼人君位乎中正之天位與天下相安于日用飲食之常無為而治者也然又必正乃吉非可宴酣無度也飲食男女人之大欲存焉屯蒙多言男女需言飲食蓋雲上于天物資雨澤以為養需于酒食人亦藉飲食以為養故也𧰼曰酒食貞吉以中正也五居中得正是以貞則吉也上六入于穴有不速之客三人來敬之終吉六居上隂居險極無所復需變巽為入有入穴之𧰼下應九三而三下二陽連類並進有不速客三人來之𧰼居柔得正以待陽剛變巽亦為順有敬之之𧰼然隂動于上三陽至健知險可以拯溺待以共濟亦將出險矣故有終吉之𧰼𧰼曰不速之客來敬之終吉雖不當位未大失也六居上隂之當位者曰不當位以應爻言三與上正應當位者也今三陽同來而敬之非其位似有失矣然入穴之時三陽能援我猶論位之當否而敬之失權變矣故初二雖不當位亦敬以待之以出險則亦未大失也全卦以遇險不遽進為義內卦乾健知險有所須而不輕進外卦坎險待剛健之材以共濟險九五孚貞需之適當其時其他或近或逺要于須而不輕進需于泥已迫險矣然能敬猶不至敗入穴已陷險矣然能敬猶可終吉敬者處險之學敬則無不貞無不孚矣此𧰼傳又發彖外之㫖也訟卦下坎上乾以二𧰼言之天陽上行水性就下其行相違以二體言之上剛陵下下險伺上剛險相接又以一人言內險而外健以二人言此險而彼健所以訟也訟卦次需按序卦飲食必有訟故受之以訟人所須者飲食既有所須訟端以起訟所以次需也六爻不外彖𫝊訟不可成一言九五居尊中正為聽訟之主故吉餘五爻皆訟者大抵剛者能訟柔者不能訟初與三柔故皆終吉二四上皆剛而二與五對顧勢不敵四與初對知理不可亦以居柔故得無眚而安貞也獨上處卦之窮三柔不敵故雖暫勝而不足敬此全卦六爻之大㫖也訟有孚窒惕中吉終凶利見大人不利涉大川天水違行乾剛在上以制下坎險在下以伺上又為內險外健已險彼健皆訟之𧰼九二中實而沉二隂之中上無應與有有孚而見窒之𧰼坎卦為加憂剛居二在下卦之中為惕而得中之𧰼上九過剛有終極其訟之𧰼九五剛健中正有大人之𧰼三陽在坎上以剛乘險以實履陷有不利涉大川之𧰼蓋訟非得已必理直受誣有孚見窒而後可又必憂惕存心適中即止不可終極其訟以取凶又利見中正之大人以取直不可冒險以求勝聖人欲人無訟故不言元亨貞言吉兼言凶言利即言不利蓋至于訟必無全吉所以貴謀始以絶訟端也此卦與需反對與需卦皆言有孚以中實皆同也但坎在上則為光亨坎在下則為窒惕乾在坎下剛健不陷故利涉大川乾在坎上為健無所施故涉川不利彖曰訟上剛下險險而健訟此以卦德釋卦名義訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也剛來得中按本義以卦變言易言卦變者始于此自上而反下為來自下而升上為往為進此自遁卦艮體九三來而居二在下卦之中也今按卦變之說本于虞翻先儒亦多異同義多牽强今俱以綜卦論之需訟相綜需上之坎來居下卦坎中剛居柔位剛中為有孚與五敵而不相應為窒窒塞而坎體常懷惕懼之心不過于訟為吉皆以剛來而得中也得中則吉終之則凶故以不可成戒之此皆以綜卦言也二得中五居中得正中則其心不偏正則所斷合理窒者可伸矣此以卦體言之也以乾剛臨坎水之上欲訟以陷人反自陷于淵此以卦𧰼言也𧰼曰天與水違行訟君子以作事謀始天上水下相背而行所以致訟違而後謀則無及矣欲絶訟端必謀之于始天為三才之始水為五行之始君子法之以謀始又乾陽生于坎水坎水生于天一乾坎始本同氣其後至于違行有天淵之隔故其幾之萌不可不謹初六不永所事小有言終吉好訟者多剛初六質柔不能與人訟者故有不永所事之𧰼然不曰不永所訟而曰所事者訟端初起猶冀其不成訟也初變為兑有小有言之𧰼此小有言與需不同需二在人有言語之傷此則在我有爭辨之語也有事不永則易收有言而小則易釋所以終吉以其質柔在下故也𧰼曰不永所事訟不可長也雖小有言其辨明也訟不可成長則成矣不可長不欲其成也小有言語因辨得明所以終吉也九二不克訟歸而逋其邑人三百户無眚九二陽剛為險之主本欲訟者然以剛居柔得下之中而九五陽剛居尊勢不可敵故有不克訟之𧰼坎為隱伏有逃之𧰼坤為國土二變坤有邑𧰼二三四互為離離數三三百戶之𧰼坎為眚二變坤無眚之𧰼歸而逋二句本義謂自處卑約以免災患蓋邑過三百非為竄也竄而據强災未免也退處卑小故得無眚按此二句王注本義皆同而于邑人句終覺牽强今按蘇氏作一句讀逋其邑人三百户者猶曰亡其邑人三百户云爾失衆知懼猶可少安故曰無眚蓋以下訟上而不勝故其私邑之人亦懼而逋逃也然居柔知警災眚或可免耳此說較順𧰼曰不克訟歸逋竄也自下訟上患至掇也掇拾取也以下訟上則禍患自取邑人之逋自掇之患也六三食舊德貞厲終吉或從王事無成食舊德如祖宗有世德子孫得食其報之類六三本隂也變而為陽則隂柔為舊德矣然守其隂柔不欲爭訟故有食舊德之𧰼不改其素為貞然所居剛位故有貞厲之𧰼守舊居剛雖見侵凌終不罹禍有終吉之𧰼然三雖不欲訟而與上應上九方剛其勢必訟故有或從王事之𧰼此與坤從王事無成有終不同從王事即訟事也上位髙將訟之于天子也無與毋同作戒辭訟不可成即不得已而或至于從王之事亦守舊以待無使訟之成也六爻獨三與上辭無訟字然三主于讓上主于爭或從王事不得已而訟者也錫之鞶帶則由訟而得者也此爻程𫝊本義蘇氏來注所解各不同注疏雖對上九一爻言之而意未盡姑出臆見以待就正𧰼曰食舊德從上吉也守其柔貞以從上九故得吉也此亦與本義不同九四不克訟復即命渝安貞吉即就也命正理也渝變也九四剛而不中故有訟𧰼以其居柔故又為不克而復就正理能變易其心以安于正之𧰼占者如是則吉也二與五訟四與初訟而皆曰不克者二四皆以剛居柔也然二以下訟上不克者勢也四以上訟下不克者理也九二坎體其心本險見勢之不敵而逃無眚而已九四乾體其性至健知理之不可而渝故遂可獲吉聖人不責人以無過而望人改過欲人審𫝑尤欲人知命也如此𧰼曰復即命渝安貞不失也始不免于有失能改則不失矣九五訟元吉陽剛中正以居尊位聽訟而得其平者也占者遇之孚窒者可伸矣故為大善之吉也然聖人貴無訟乃以元吉與五何也蓋上有中正聽訟之君下乃有無訟之化初之不永三之無成二四不克即上亦終褫以有五之中正故也故曰利見大人也朱子謂刑獄之官皆足以當之不必專言人君然五實君位大抵必有德位之大人耳𧰼曰訟元吉以中正也中則聽不偏正則斷合理謂以九居五也上九或錫之鞶帶終朝三褫之鞶帶命服之飾褫奪也乾為衣為圜有帶𧰼上以剛居訟極三柔而不抗故能勝之有錫命受服之𧰼曰或者亦未必然之辭也變兌為毁折過剛不中以訟得之豈能安久故又有終朝三褫之𧰼蓋好訟不已以無理而取勝其所得終亦必失也𧰼曰以訟受服亦不足敬也受服尚不足敬况三褫隨之乎甚言以愧之也全卦以九五為聽訟之大人餘皆訟者聽訟者欲其有中正之德化天下于無訟訟者欲其有孚惕之心不可成其訟初三質柔而不欲成訟四知理而不欲成訟所以皆吉二知勢而不敢成訟所以無眚獨上終訟故雖訟而不足敬也師卦下坎上坤二體為地中有水聚衆之𧰼二卦之義內險外順險道而以順行有師之義六爻以一陽統衆隂有大將率師之𧰼二剛居下五柔居上任之人君命將出師之𧰼故名為師師次于訟按序卦訟必有衆起故受之以師師旅之興由于有爭所以次訟也出師貴乎得正而用將在乎得人此全彖之大㫖也九二以陽剛在下卦之中為老成之將六五相應為任將之君三四亦皆將兵之臣二以居中持重而吉三以躁妄而凶四以柔自守僅可無咎初為出師之始貴其紀律之明上為行師之終尤欲論功行賞之當蓋六爻而行師之道備矣又師與比反對皆以一陽統衆隂而義各有所取蓋先王之制民居則為比閭族黨故比則衆在內而一陽在上為之主君𧰼也行則為伍兩卒旅故師則衆在外而一陽在下為之統將帥象也此又二卦取義之意也師貞丈人吉無咎師兵衆也下坎上坤以卦𧰼言地中水聚猶師之聚以卦德言坎險坤順古者寓兵于農伏至險于大順藏不測于至靜之中卦唯九二一陽在下卦之中為將之𧰼上下五隂從之為衆之𧰼又九二以剛在下統衆六五以柔在上而應之為人君命將出師之𧰼貞正也所謂仁義之師師出有名者也丈人老成持重衆所畏服者也言行師之道當以貞為本而用將又必得老成持重之人乃有全師戰勝之吉無窮兵黷武之咎言吉而又曰無咎者蓋動衆而無功罪也有功而貽患亦非善也故必吉乃無咎而吉又貴于無咎也彖曰師衆也貞正也能以衆正可以王矣此以卦體釋師貞之義以能左右之也坎以一陽而能統上下五隂皆歸於正道則順天應人可以為王者之師矣以之正則為王微有不正則為霸行一不義殺一不辜而得天下不為所謂以衆正而為王者之師也剛中而應行險而順以此毒天下而民從之吉又何咎矣以卦體言之九二剛中而六五應之剛而得中恩威並濟五與為應則君之信任專矣以卦德言之坎險坤順雖行危道而順人心以此興師雖勞民傷財不無毒于天下而民悅而從則有吉而無咎矣此釋丈人吉無咎之義也𧰼曰地中有水師君子以容民畜衆地中有水有包容畜聚之𧰼古者兵出于民容保其民即以畜聚其衆水不外于地兵不外于民也容民則無流民畜衆則無叛衆容之畜之于無事之時而用之于有事之日初六師出以律否臧凶律即紀律否臧謂不善即無紀律之謂也初出師之始出師之道當謹于始以律則吉不善則凶蓋以初六才柔故有否臧之戒然以律不言吉否臧則凶者律令謹嚴出師之常勝負猶未可知若失律則凶立見矣𧰼曰師出以律失律凶也按程𫝊釋臧為勝謂失律雖勝亦凶也今按𧰼傳似竟以否臧為失律為是九二在師中吉無咎王三錫命九二以剛居柔在下卦之中有在師中吉無咎之𧰼上應六五之柔為君所寵任者也有王三錫命之𧰼在師中吉無咎竟作在師而得中不必又云在師之中蓋剛柔兼濟故有克敵全師之吉無躁妄逗撓之咎此即彖之所謂丈人也錫命至于三言極其寵故權無中制所向得有功也𧰼曰在師中吉承天寵也王三錫命懷萬邦也爻就二之剛中得吉兼由上之寵任言𧰼傳專重人君任將之道言言二之中而得吉以承天之寵故也人君三錫命于將亦非徒私于一將也蓋將以綏懷萬邦必專其事權以責其成功也六三師或輿尸凶六三衆隂在上有積尸之𧰼坤為輿坎為輪有輿尸𧰼六三以隂居陽不中不正才弱志剛輕躁以進師徒覆敗輿尸以歸也此按本義如此又按程𫝊蘇𫝊皆以輿為衆尸主也小人掣肘號令不一必至敗也今觀下文弟子輿尸則程蘇之說為順𧰼曰師或輿尸大無功也本欲躁妄以圖功而至于大無功非徒小挫而已六四師左次無咎軍尚右左次退舍也隂柔不中而居隂得正故有左次之𧰼全師以退賢于六三故無咎𧰼曰左次無咎未失常也恐人以退為怯故云知難而退師之常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶六五用師之主柔順而中不為兵端者也然敵加于已不得已而應之應坎為豕為田中有禽害稼之𧰼言語辭利于搏執之無窮黷之咎也長子九二也弟子三四也長子即丈人自衆尊之曰丈人自爻𧰼之曰長子二互三四為震長子之𧰼五獨與二為應故有使長子帥師之象又因以戒之言任將在審且專設若任君子而使小人參則使之輿尸以歸出師之名義雖正不免覆敗之辱矣此彖既言貞而又言必用丈人乃吉之意也按本義弟子輿尸句其解如此未免弟子下費一轉折不如程蘇二傳任長子而使衆弟子參之雖正亦凶于文義尤順也象曰長子帥師以中行也弟子輿尸使不當也長子所以可帥師者以剛中之德行之也弟子非不可使使參長子之權則不當矣衆之死生國之存亡在君之使可不審哉上六大君有命開國承家小人勿用上師之終論功行賞之時坤為土有開國承家之𧰼陽大隂小隂爻重叠小人之𧰼變艮為止勿用之𧰼按本義小人雖有功不可使有國土但優以金帛可也蓋以兵多詭道立功不必皆君子故小人之賞雖不可無而用之使有國有家則不可此說雖順然論功封爵土必無但賞以金帛之理不如來注以用為任之以政事為是蓋小人功大開國功小承家使之享有爵土不必任以政事如光武雲臺之將鄧禹賈復外不任以政是也𧰼曰大君有命以正功也小人勿用必亂邦也論功行賞以正其功君子小人皆在所録也但用之使豫國家之事則邦必亂矣出師本以綏懷萬邦豈復容小人亂之哉錫命于行師之始專在丈人有命于行師之終戒在小人用將不可不知人也全卦于用師之道最為詳盡王者之師在于得正尤貴于擇人專任君子而不以小人參之此人君御將之道也行師者貴有剛中之德而又得君之委任師之出必紀律嚴明而後可以制勝其或敵强我弱則當知難而退寧為四之左次勿為三之輿尸此為將之道也至于論功行賞則有開國承家茅土之封而小人必不可豫家國之事此聖人之垂戒深逺非若後世權謀苟且之事凡命將出師之道盡于斯矣周易淺述卷一
