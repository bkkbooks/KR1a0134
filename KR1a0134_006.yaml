body:
  text: 周易淺述卷六翰林院編修陳夢雷撰漸卦下艮上巽上順下止而不遽進以象言之則山上有木其髙以漸故曰漸漸卦次艮按序卦艮者止也物不可以終止故受之以漸漸者進也止必有進消長自然之理漸所以次艮也全彖以艮男下于巽女有女歸之象然必正而有漸乃吉而為士進身之道亦即此可推矣六爻取象於鴻皆自下而上皆以論士進之義故唯二五以正應而吉初在下無應故厲三過剛無應故凶四之無咎以順巽也上羽儀之吉超乎世外者也此全卦六爻之大略也漸女歸吉利貞漸漸進也木生於山雖髙然必以漸而長卦德止於下而巽於上皆有不遽進之義以二體言則艮男下於巽女女之適人必俟媒妁之言六體之備亦有其漸故有女歸之象禮義廉恥之重天下國家之本無如女之歸故以取象時解作士之進必以漸是又因類推言之也女歸以漸為吉而又利於得正不漸則為淫奔不貞亦未合禮卦中唯二五以得正而吉故曰利貞也咸卦止而悅其感以正取女者之吉也漸卦止而巽其進以正女歸者之吉也彖曰漸之進也女歸吉也之字疑亦漸字進得位往有功也進以正可以正邦也以卦綜釋利貞之義按此卦綜歸妹歸妹下卦之兑進為漸上卦之巽九得五之位九進居五又為得位之正其進以正正己正人可以正邦即所謂有功也其位剛得中也剛得中釋上文進得位之言止而巽動不窮也止不輕動巽不躁動然如是而動必有功不至於困窮矣凡進之心愈急則進之機愈沮今內止則未進之先廉靜無求外順則方進之時相時而動所以進不窮也按本義以卦德言漸進之義今按文義似亦承上進以正可以正邦而釋之象曰山上有木漸君子以居賢德善俗地中生木以時而升山上之木似乎髙矣然其進必以漸君子以之成己成物皆有其漸賢字本義疑衍程傳作居賢善之德居德以漸勤修積纍始乎為士終乎為聖也善俗以漸從容化導始乎鄉邦及乎天下也初六鴻漸于干小子厲有言無咎巽有飛鳥之象互離坎離為飛鳥在坎水之上又鴻之行有序而進有漸昏禮用鴻取不再偶于女歸之義尤切故六爻皆以取象干水涯也初六以陰居下當進之始有鴻漸於干之象艮為少男小子之象鴻飛長者在前幼者在後幼者惟恐失羣危而號呼長者必緩飛以俟之初無應於上危厲不免於號呼有小子厲有言之象然以漸不敢躁進於義亦無咎矣象曰小子之厲義無咎也操心危厲言以抒誠不敢躁妄得在下始進之義六二鴻漸于磐飲食衎衎吉磐大石也逺於水進於干而益安矣衎衎和樂也艮為石有磐石象互坎有飲食象六二柔順中正進以其漸而上有九五之應有鴻漸於磐飲食相呼和樂自得之象如是則吉矣象曰飲食衎衎不素飽也不素飽猶不素餐也二五相應可以正邦而有功二大臣位衎衎疑於尸素故傳推言之九三鴻漸于陸夫征不復婦孕不育凶利禦寇鴻水鳥陸非所安也九三過剛不中而無應而居艮體之上有水鳥自干而進於髙平之陸之象內卦少男外卦長女故彖以女歸為吉爻之二五三四皆取夫婦之象二五當相應之位為正三四不當相應之位為邪卦取上進三上比四夫征之象互坎中滿婦孕之象三變成坤離絶夫位坎體亦不成不征不復之象三悅四之隂不當往而往故夫征不復四悅三之陽而從不當合而合故婦孕不育不育者不敢育也如是其凶甚矣然雁羣不亂止則相保三四雖非夫婦之正然以三之剛四能順之情好相比可禦患難三互二四為坎為盜賊三四五互離又為戈兵故有禦寇之象象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也醜程傳以為離羣可醜竊按醜類三與上為羣類者也今上無正應而求四是離其羣類以往不復宜矣四合于三非女歸之正道也雖孕不敢育矣然變坎成坤行險而順欲禦寇賊以相保守或可耳六四鴻漸于木或得其桷無咎桷平柯也鴻不木棲得平柯可以安或者偶然之辭六四巽體而乘剛在艮山之上有漸于木之象然柔順得正三以一陽橫於下有或得其桷之象其占則無咎也象曰或得其桷順以巽也三得四順以相保四從三順以得安順則不拂巽則不迫故雖乘剛而又可以自安與禦寇意相近蓋三四非應以夫婦之道言之則為邪若相比以圖安猶庶幾也九五鴻漸于陵婦三歲不孕終莫之勝吉陵髙阜也九五居尊在艮山之上有鴻漸于陵之象二以隂應五有婦象互離大腹而中虛不孕之象自二至五厯三爻三四間隔其中又離居三有三歲不孕之象然二五皆居中得正而相應女歸之貞而以漸者也三四終莫能勝之之象宜其吉矣卦以上為女下為男爻則以五為男二為女蓋就陰陽相應言之易之取象不可為典要者也象曰終莫之勝吉得所願也中正相應二五之願也時解以明良終合成治言之亦可但不必拘耳上九鴻漸于陸其羽可用為儀吉陸作逵雲路也儀羽毛之􅎖也上九至髙有鴻漸于逵之象上九無位然漸進至此已極其髙猶賢達君子髙蹈逺去而其進退去就可為當世儀表非無用者也故有其羽可用為儀之象占者如是則吉矣象曰其羽可用為儀吉不可亂也立志卓然不可得其亂也全彖以漸進取女歸之象而要之正士君子之出處亦如之二五明良遇合初始進無援者也三躁進而四取容若上則達人之髙致乎歸妹下兌上震雷震而澤動有相從之象女之長者曰姊少者曰妹兌以少女從震之長男亦為女歸之象故曰歸妹歸妹次漸按序卦漸者進也進必有所歸故受之以歸妹漸有女歸之義歸妹女之歸也歸妹所以次漸也全彖以少女從長男以悅而動非正六爻自二至五皆不當位三五皆以柔乘剛初上雖得正而陽下陰上故所往皆凶而無利六爻唯五取帝女下嫁尚德而不尚飾為最吉二雖有女德之貞而不得良配亦不能成內助之功初以安分為美四以愆期為憾蓋陽爻雖無應猶喜其有女德也若三以不正反歸上以無應不終蓋陰爻無應則女之失德者亦以説而動必致凶矣此全卦六爻之大略也歸妹征凶無攸利妹少女也漸曰女歸自彼歸我娶婦之家也此曰歸妹自我歸彼嫁女之家也兌以少女從震之長男故曰歸妹男女相從以正則吉今上動下悅以説而動恣情縱欲者也自二至五皆不得正三五又以柔乘剛初上得位亦柔上而剛下皆非室家之宜故征則必凶凡占得此皆無所利夫婦人道之本女説男動位皆不正何所不至故諸卦之凶未有如此之甚者聖人垂戒之意深切矣彖曰歸妹天地之大義也天地不交萬物不興歸妹人之終始也歸女之終生育者人之始此釋卦之名義而贊其大也説以動所歸妹也説以動以卦德言之所歸者妹女子不由禮也征凶位不當也無攸利柔乘剛也諸爻皆不當位所處不正故動必凶以柔乘剛失尊卑之序故無所利象曰澤上有雷歸妹君子以永終知敝雷動澤隨男動女從之義男女之道欲其永逺有終必有以豫知其不終之敝女子從人以説而動後必不永其終當説動之時知其敝則可以永其終與君子偕老矣初九歸妹以娣跛能履征吉初九居下而無正應有娣之象然以剛居剛女子有賢正之德能承助其君者又震為足兌為毁折有跛能履之象以全卦言為説以動則征凶以此爻言得娣之正故其征吉象曰歸妹以娣以恆也跛能履吉相承也恆常久之德有嫡有妾人道之常謂以九居𥘉也相承能承助其君也以恆以分言相承以德言九三眇能視利幽人之貞九二陽剛得中妹之賢者上有正應而反陰柔不正所配不良而內助之功不能大顯二互三四為離為目陽明而當兌之毁折故有眇能視之象幽人抱道守正而不偶者以男女之象言則五為二之配以上下之位言則五為二之君二以陽居陰位居下卦之中有幽人之象以九二之剛中上應六五之陰柔女之賢不遇其夫猶臣之賢不遇其君也以其所居非正故又戒之利貞宜固守其正也象曰利幽人之貞未變常也幽靜自守女子之常六三歸妹以須反歸以娣須或作待或作斯須皆未當按天官織女貴而須女賤今從之初九在下為娣六三居下之上非娣也然陰柔而不中正為説之主女之賤者也以此于歸人莫之取有反歸為娣之象象曰歸妹以須未當也六居三賤居貴柔乘剛皆未當也九四歸妹愆期遲歸有時九四有陽剛之德而無正應有賢女不輕從人愆期以待時之象愆期者數有時者理非終不歸者也三四皆失位而三反四遲者澤善淫而雷動有時也象曰愆期之志有待而行也志有所待女德之剛也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉卦以歸妹為名故在九二言上配於五在六五又言下嫁於二帝乙始制帝女下嫁之禮者六五柔中居尊下應九二故有帝乙歸妹之象五尊女君之象初在下娣之象袂臂之飾陽爻有外飾華美之觀五六而初九有其君之袂不如其娣之袂良之象尚德而不貴􅎖女德之盛也有月幾望之象小畜中孚之月幾望以位言陰盛足以抗陽也此以德言陰盛足以配陽也占者如是則吉矣象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也有中德之可貴而行故不尚飾上六女承筐無實士刲羊無血無攸利夫婦共承宗廟祭祀者也女當承筐篚而無實士刲羊而無血皆無以承宗廟之祭矣震有虛筐之象兌有羊象坎為血卦今上變為離無血之象上六以陰柔居歸妹之終與三無應約婚而不終者故有承筐無實刲羊無血之象其占無所利矣象曰上六無實承虛筐也卦為歸妹言故象傳不及刲羊無血也合全卦而論之以説而動爻位不正故皆凶分六爻而占之則得中而應剛德者皆吉二五有應者也五以得中為尚德二以得中為守貞然二應柔而五應剛故二又不如五也餘四爻無應則以本爻有剛德者吉而陰柔者凶故初以安分而征吉四雖遲而有時三以越分而反歸上以無實而不終蓋女德能剛則貞也豐卦下離上震以明而動動而能明皆有豐大之意故為豐豐次歸妹按序卦得其所歸者必大故受之以豐物所歸聚勢必盛大豐所以次歸妹也全彖當豐盛之時宜守中不使至於過盛蓋豐則多故故有戒辭也六爻以六五為豐之主五柔暗故欲得二四剛明之臣二應五而四比五初逺五亦偕四同往以輔乎五此四爻所以吉也獨三不從五而逺應上故至於折肱至上則處豐之時自蔽已甚宜其凶也此全卦六爻之大略也豐亨王假之勿憂宜日中豐大也以明而動盛大之勢大則有亨道理勢然也假至也豐盛非王者車書一統不能至此未至此固無可憂至此則似可憂然聖人以為徒憂無益也當守常不使於過盛如日之方中可矣全卦上震下離有日出東方光明盛大之勢故有亨象日之在東其象非王者不能當故有王假之之象坎為加憂離卦坎之反有勿憂之象日自東至中其勢皆盛過此則昃矣故有宜日中之象日之不能常中者勢也宜日中者聖人持盈處豐之道也彖曰豐大也明以動故豐明則見微動則成務故能致治盛大以卦德釋卦名義也王假之尚大也勿憂宜日中宜照天下也尚大當豐之時所尚自大猶不期而自侈所以可憂也如日之常普天下則可以保其豐不然徒憂無益也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎日中有必昃之勢故當豐之時者不可有過中之心象曰雷電皆至豐君子以折獄致刑折獄象電之照致刑象雷之威噬嗑明罰敕法詳審立法使人不敢犯也折獄致刑明察下情使人有所懲也初九遇其配主雖旬無咎往有尚凡卦爻取剛柔相應此則取明動相資蓋全卦以五為豐之主五方柔暗欲得剛明之臣以自輔初逺於五而與四應四初之配也故有遇其配主之象旬均也初四皆陽均敵非應之正然同有陽剛之德明動相資故雖旬而無咎同德共事往以輔五必有功矣故曰往有尚象曰雖旬無咎過旬災也旬則與配均可以相濟初在下僚道宜如此當豐之時求勝其配則有災此雖爻辭外之意亦即不過中之義也六二豐其蔀日中見斗往得疑疾有孚發若吉蔀障蔽也來注作草名今按宜作亂草障蔽為是震為蕃草故以取象南北斗形皆如量故名斗震亦有斗象大其障蔽日中而昏則斗可見矣六二當豐之時離明之主而上應六五柔暗之君故有豐其蔀日中見斗之象二以陰居陰而五又陰故有往得猜疑疾惡之象然二有文明之德中虛之誠人皆信之終當有以發其蔀而行其志故有有孚發若之象占者如是則吉矣象曰有孚發若信以發志也取信於君可以發其心志矣九三豐其沛日中見沫折其右肱無咎沛作斾幡幔也蔽甚於蔀矣沫小星也三與上應上柔暗失中蔽甚於五則三之所見甚於斗故有豐沛見沫之象三欲應上而上之陰柔無位不可有為又此爻變為艮艮為手未變陽爻為右三四五互為兌為毁折有折其右肱之象以有用之才置無用之地上之不可有為非三之咎也象曰豐其沛不可大事也折其右肱終不可用也保豐大事非柔暗者所能人作事在右肱上以三為右則上為左右折則左亦不可用九四豐其蔀日中見斗遇其夷主吉九四上承六五之暗主已又居陰剛明不足故象與六二同夷等夷也指初九初以下偶上視四為配四以上就下視初為夷九四剛而明不足初剛在下離體至明資以輔五則豐盛之治可保宜其吉也象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也不中不正不當也比陰居陰不明也六二中正不得言不當以應五故豐蔀耳六二以陰居陰幽不待言九四以陽居陰幽與二同故象傳不釋於六二而於此釋之下求於初為行震性動有行象得人以事君行則吉矣六五來章有慶譽吉六五質雖柔暗若能來致天下之明則有慶譽而吉矣章指二而初與四亦在所來二雖質柔致疑然離體文明亦章也自二之五曰往自五之二曰來初與四雖非應然保豐盛之治非有剛明之才不能四比五而初應四四以位柔不足求初共輔之皆可以保豐然使五非柔中虛已以來之則慶譽無由致矣慶集於身譽流天下所以吉也象曰六五之吉有慶也言慶則譽可兼上六豐其屋蔀其家窺其户閴其無人三歲不覿凶以陰柔居豐之極動之終所處既髙有豐其屋之象質本柔暗有蔀其家之象變離中虛又陰質空虛有窺其戶閴其無人之象九三正應以上九障蔽之深莫與為用相去三爻又離居三有三歲不覿之象全卦宜日中二五日中之位初四未及乎中三上皆過乎中者也而上又以動體之終處豐之極故凶最甚也象曰豐其屋天際翔也窺其戶閴其無人自藏也上六之豐其屋者不過欲以自髙如飛翔於天際而已不知適以自蔽其家而空其門昏昧自髙人皆棄之非人之逺已乃已之逺人是自藏也全卦以明動相資而成豐彖有王假之言唯有天下者可當此象故六爻以五為主而他爻皆宜輔五以保其豐故不拘爻位之相應也保豐之道宜於日中三與上皆過中故三折肱而上無人獨取於初二與四也五既陰柔輔五者貴有陽剛之德二雖正應而質柔必孚而後能發四雖材剛而位柔必遇初乃可共濟初雖陽剛得正猶必待配主之遇又凛過旬之戒國家當全盛之日持盈保泰之道不出於廟堂而賴於疏逺之小臣而遭遇之不偶又如此欲天下之常豐豈易言哉旅卦下艮上離山止於下火炎於上去其所止而不處為旅之象又入而麗乎內則為家人出而麗乎外則為旅旅卦次豐按序卦豐大也窮大者必失其居故受之以旅失居遂至羈旅旅所以次豐也全彖以處旅本無大通雖亨亦小然道無不在不可以暫時而茍且故必守正乃吉也六爻則旅之道以得中為善卑則取辱髙則召禍初卑故有瑣瑣之災三居下之上焚次喪僕上居上之上焚次喪牛皆髙之過也四雖無太髙太卑之失而未得中故心亦不快唯二以得中而懷資得僕五以得中而譽命然五不當位猶不免於矢亡然則居旅之善唯六二乎旅小亨旅貞吉按本義山止于下火炎于上為去其所止而不去之象故為旅按大全山止而不動旅館之象火動而不止旅人之象二説皆通六五得中而順上下之二陽艮止而麗于明占有亨道但在旅則雖亨亦小耳六爻唯六二居中得正為最善蓋道無不在不可以偶然羈旅而苟且必守正則吉也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也以卦綜言之豐下卦之離得中于外卦順乎二剛羈旅之人得托強援雖在羈旅可小亨矣以卦德言之下艮止而上離麗乎明非賢不主非善不與所謂于止知其所止者貞而得吉矣旅之時義大矣哉旅之亨小而其時義則大義莫大于貞髙則取禍卑則取辱唯貞則吉時義之大如此人未可忽之也象曰山上有火旅君子以明慎用刑而不留獄慎刑如山不留如火取其止以為慎取其火以為明也此于旅之義無與但取火在山上之象耳初六旅瑣瑣斯其所取災當旅之時陰柔居下不務逺大局于瑣屑有瑣瑣取災之象象曰旅瑣瑣志窮災也其志猥陋窮迫自取災也六二旅即次懷其資得童僕貞六二以陰居陰得正又艮為門二居其中有即次得安之象陰主利而二居中互巽為利市三倍有懷其資之象艮為少男而二居中得正有得童僕貞之象即次則安懷資則裕得童僕之貞則無欺而有賴旅之最吉者也象曰得童僕貞終無尤也童僕之貞最難故象傳獨言之九三旅焚其次喪其童僕貞厲九三與六二相反二柔而中正故即次三過剛不中上近于離故有焚次之象二居中乘柔故得僕三過剛無徒又下之柔已為二所得有喪僕之象九居三于爻雖貞于旅則厲也象曰旅焚其次亦以傷矣以旅與下其義喪也在旅與下過剛義當喪僕九四旅于處得其資斧我心不快九四以陽居陰在上之下用柔而能上者故有旅于處之象非其正位故不曰次而曰處非其次舍暫時棲息者也得資足以自利得斧足以自防四互巽為資財又離為戈兵有得其資斧之象然旅雖有處勝于三之焚次終不若二之即次也得資斧勝于三之喪僕亦不若二之得童僕貞也九以剛明之才處近君之地不能得位以有為而在羈旅之中所以心不快也象曰旅于處未得位也得其資斧心未快也九居四非所安之位六五射雉一矢亡終以譽命六五處離之中文明得中有射雉之象矢剛物六居五失剛又坎有矢象離坎之反有一矢亡之象然柔順文明又得中道火體光明其性炎上互得兌巽兌為口為譽巽為命令有譽聞外著寵命自上之象其始不無亡矢之費而所喪不多終有譽命也時解或作人君居文明之位使賢者旅進雖不無弓旌之費而有得賢之譽上承天命或作士人羈旅以取功名雖不無資斧之費而終得衆譽膺君命今按二説皆不必拘大抵人君無旅旅則失位故不取人君之義唯以羈旅言之占者則或君或臣隨事為占要之始雖小失終有所獲也象曰終以譽命上逮也火性炎上有上逮之象自人臣言上逮為得君自人君言之上逮為得天皆不必拘上九鳥焚其巢旅人先笑後號咷喪牛于易凶離為飛鳥又為科上稿而火性炎上有鳥焚其巢之象火有聲有笑號之象又應三為兌説先笑之象上變為震動號咷之象離為牝牛上九驕而不順又震為大塗有喪牛于易之象上九過剛處旅之上離之極故象如此三與上應皆以剛居上三承九四之離他人焚之也上居離極自焚也同人親也故先號咷後笑旅親寡故先笑後號咷三焚次巢尚在猶可歸也喪僕牛尚存猶可行也今巢焚則欲歸無所牛喪則欲行無資凶之甚矣象曰以旅在上其義焚也喪牛于易終莫之聞也旅而過髙豈能安居義有焚巢之事矣驕亢不順禍生所忽而不自覺故曰莫之聞也全卦當旅之時不宜用剛故陽爻三皆不利而柔又貴于得中故初不及乎中亦不免於災柔順中正唯二得貞吉之義而五之居剛亦不免于亡矢則旅道之難言也巽卦一陰在二陽之下順于陽而善入故名為巽巽卦次旅按序卦旅而無所容故受之以巽巽者入也羈旅親寡非巽順無以取容巽所以次旅也全彖以陰為主故所亨者小而以陰從陽故利有所往而利見大人六爻雖以二柔為主而必以居中得位為善初不如四四得位初不得位也然初上位與中俱失三四雖得位而失中二得中而又失位唯九五居中得位所以為申命之大人此全彖六爻之大略也巽小亨利有攸往利見大人一陰伏于二陽之下其性巽以入于象為風亦委曲善入者也順則能亨陰為主故所亨者小蓋卑巽則才智不足以識逺任重矣以陰從陽有利有攸往之象蓋巽以從人人無不説也然失其所從未必利往必利見大德之人此則因其從陽教之以所從之人也九五陽剛中正以居尊位有利見大人之象彖曰重巽以申命風者天之號令柔順善入有命令之象申命叮嚀反復之意此釋卦之義也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人論成卦則以初四之柔為主論爻之吉凶則以二五之剛為重二中而不正巽乎中正其志大行指九五也柔指初四也象曰隨風巽君子以申命行事隨相繼之義命風象申命隨風象行事即行其所命三復申戒然後見之行事則民曉然于吾意之所在而易從也初六進退利武人之貞巽為進退為不果初六重巽之下柔之過故有進退不決之象然以柔居剛為巽之主若臨事以武人之貞處之則有以濟其不及而得利矣此與履六三皆以陰居陽變純乾有武人之象然履宜謙而三居下之上故危之巽不果初又居下之下故以武人勉之象曰進退志疑也利武人之貞志治也過疑則志亂不武之甚武而得正則志治矣治謂修立也履志剛故凶此志治故利九二巽在牀下用史巫紛若吉無咎古之尊者坐于牀上卑者拜于牀下九二以剛居陰不能自安過于卑巽有巽在牀下之象史作策告神巫歌舞事神九五陽剛居尊而非應之正當巽之時二居臣位非丁寧煩悉其辭不能自達又二互三四為兌為巫為口舌三四五互為離為文明有用史巫紛若之象然二居中卑巽不至已甚九五同德三四雖間于上藉之為史為巫以上達于五故占得吉而無咎也象曰紛若之吉得中也中則不亢不諂九三頻巽吝過剛不中居下之上非能巽者然下既乘剛上又臨之以巽不得不勉而為之而屢巽屢失故有吝道也復之六三頻復曰無咎此則吝者聖人不貴無過而貴改過屢失屢復復在失後故雖厲無咎頻巽頻失失則巽後故吝又巽與復不同復則天心之來心本難純故以頻復為無咎巽不過卑巽之一節而已乃不出于中心失而復改改而復失故為可吝象曰頻巽之吝志窮也前倨後恭窮蹙不安六四悔亡田獲三品陰柔無應承乘皆剛宜有悔也然以陰居陰居上之下其悔可亡三品者一為乾豆二為賓客三為君庖初六利武人之貞田亦武事初以陰居陽故勉之以利貞四得位不為無悔且于武事有功中互離為戈兵故有田獲三品之象三雖得陽之正而過剛非能巽以入者故吝四得陰之正能巽以入故無失而有得也象曰田獲三品有功也武人之功成也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉九五陽剛中正以居尊位有貞而得吉之象當巽時而剛疑有悔矣然中而得正故悔可亡而無不利有悔是無初也悔亡則有終矣庚更也取變更之義十干以戊己為中凡事過中則變故庚有變更之義巽不欲其過故二陰爻皆以武事勉之五君位尤不宜過于巽命出于君必有所更改乃為申命但更新之事不可輕必取先庚三日之丁以丁寧于先又取後庚三日之癸以揆度于後乃得吉也巽五變蠱亦亂極更治此曰先庚蠱曰先甲此曰無初有終蠱曰終則有始蓋此乃事過中而更之于後蠱則事已壞而圖之始甲為十干之始故曰有始庚過十干之中故曰有終大抵有所變更得此爻則吉也象曰九五之吉位正中也中則不過于巽上九巽在牀下喪其資斧貞凶上九至髙而曰牀下者居巽之極又以陽居陰故也故與二爻同象旅九四以陽居陰得其資斧此上九亦以剛居柔喪其資斧何也旅道宜柔故剛居柔者得巽戒過柔巽之極而居柔失所斷矣又旅四離體為戈兵巽上九在互離之外故有喪資斧之象雖貞亦凶况不貞乎此資斧本義專就斷言資與齎同不義作資財象曰巽在牀下上窮也喪其資斧正乎凶也上窮巽至於窮極也正乎凶程傳作問答之辭本義以為必凶今從本義全卦以巽名而不欲過于巽故彖言亨而僅得小亨巽之道可以有所往而見大人若過于巽則不能六爻五在上以剛中為巽而吉二在下以柔中為巽而吉此巽之得其宜者也二陰爻卦之所以為巽者初居下之下而失位故進退四居上之下而得位故有功然皆未得中故不言吉也若三居下之上而以過剛失中上居上而以窮極失正宜其吝且凶矣兌卦坎體而塞其下流其象為澤一陰進乎二陽之上喜見乎外故其德為説兌卦次巽按序卦巽者入也入而後説之故受之以兌兌者説也物相入則相説兌所以次巽也全彖以卦體柔外有亨之道而剛中則利于正此全彖之大指也六爻以二陰為説之主四陽皆為陰所説者三為下兌之主以柔居剛動而求陽之説者其惡易見故凶上為上兌之主以柔居柔靜而誘陽之説者其惡難知故不言凶咎四陽爻則在下多吉在上多凶初與陰無係故吉二已近三入説猶淺故悔亡四入上兌處三五之間而莫決故未寧五與上比説之將極則厲矣此六爻之大略也兌亨利貞按本義亨利貞有二義卦體剛中而柔外剛中故説而亨柔外故利于貞此一義也又柔外故為説亨剛中故利于貞亦一義也後説卦中自然之象前説以利貞作戒辭亦相通大抵説有亨道而妄説不可不戒卦辭與咸同咸以艮陽下兌陰則相感感則亨矣而相感易至于不正兌以二陽下一陰則相説説則亨矣而相説亦易流于不正故皆言利貞也又三男之卦皆不言利貞蓋陽剛即貞也三女之卦多以利貞戒之陰柔之質易至于不正也彖曰兌説也釋卦名義聖人謂説人以心不以言故去言稱兌剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉三上柔外二五剛中柔外而不剛中則違道干譽非貞也象曰麗澤兌君子以朋友講習兩澤相麗互相滋益朋友講習其象如此天下之説不可極惟朋友講習過説無害然天下之至可説者亦莫如朋友講習講者資友講之以究其理習者我自習之以踐其事習而不講則精義不出昏而無得講而不習則至理不入殆而不安朋友講習之餘心與理洽天下之説莫過乎此初九和兌吉爻位皆剛處説之初不比于柔又無係應和而不流之象故吉象曰和兌之吉行未疑也鄰于陰則疑説之過二四疑于三五疑于上初去陰逺故曰未疑九二孚兌吉悔亡剛中為孚象居陰比陰與五未應為悔以剛中與五同德不係于三之陰則吉而悔亡之象象曰孚兌之吉信志也迹比三若可疑志剛中則可信六三來兌凶陰柔不中正為兌之主上元所應有來就二陽以求説之象然初剛而正二剛而中必不從也其凶可知象曰來兌之凶位不當也不中正故也九四商兌未寧介疾有喜九四上承九五下比六三以所居位柔未能自決又互巽為進退不果故有商度所兌未能安寧之象上下兌之間介象質本陽剛故有介然自守疾惡柔邪而有喜之象象曰九四之喜有慶也大臣無私交天下之福慶也九五孚于剝有厲剝指上六陰能剝陽者也九五陽剛中正以居尊位而近于上六上六為説之主虛説之極他無係應專附乎五妄説以剝陽九五信之有孚于剝而致危厲之象恃一已之剛明值國家之宴安以小人為不足畏而過信之則蠱惑心志紊亂是非無所不至矣二比于三而能孚于五而悔五比六乃不孚于二而致厲者二臣位猶能剛中以事君五君位易狃于所説而不戒三在下而來兌其側媚之態易見上居髙而引兌其彌縫之術最工又二居陰不過剛而志上孚于五五居剛自謂剛明不下接乎二則上得而引之矣象曰孚于剝位正當也居剛比上適當其位也此與履五意同履五當君位而凡事決之已雖正亦危此則居君位而昵于小人其危甚矣上六引兌以陰居説之極引下五陽而剝之者也故九五當戒而此爻不言吉凶者九五陽剛或能知戒未必從之也象曰上六引兌未光也三居剛而來兌媚説之私見矣上居柔方以柔道牽引使人不覺其迹未光顯也全卦以説雖有亨道而利于得正故以逺于説為貴二陰爻為説之主皆所不取説至上而極五以近之而厲四介于二説之間而未寧二近三以上孚于五而吉然始猶未免于悔唯初剛而得正逺于陰柔故得和兌之吉乃知陰柔説人君子所宜深逺古人所以有美疢藥石之喻而易事難説所以為君子也渙卦下兌上巽取風行水上離披解散之象故名渙渙卦次兌按序卦兌者説也説而後散之故受之以渙人心憂則結聚説則舒散渙所以次兌也卦以渙為名彖辭取聚渙濟渙為義故六爻之中以剛柔上下相比合者乃能濟渙初柔二剛相合以任濟渙之責故初吉而二得願四柔五剛相合以成濟渙之功故四元吉而五無咎三上相應反以逺而不能相及故三但渙其躬之難上不過渙血以逺害而已此六爻吉凶之例又與他卦不同者也渙亨王假有廟利涉大川利貞渙取風行水上解散之象亨就卦綜言詳彖傳爻辭多以渙為吉取解散險難之義彖兼聚渙濟渙二義下卦坎為鬼神中互艮為門闕九五居尊位有王假有廟之象巽木在坎水之上有利涉大川之象人心渙散聖人思所以聚之假廟者聚一已之精神以聚祖考之精神使天下知報本返始則渙者可聚矣此因散而聚之義也天下之難非陽剛得位無以解散之木在水上大川可涉此解散患難之義也然祭祀或以媚神涉川或以行險僥幸則非正矣故又戒以利貞九五居尊得正為濟渙之主亦貞之義也彖曰渙亨剛來而不窮柔得位乎外而上同此卦程朱所論卦變各異皆牽強今以卦綜論之甚合此卦綜莭莭外卦之坎來居內卦二剛在下卦之中不至困窮節下卦之兌在此卦居外為巽以陰居四得其正位上同于五也剛來不窮英雄遷而得所有其地矣四上輔五剛柔相濟有其輔矣此其所以亨也王假有廟王乃在中也九五互艮上畫為廟九居五王在廟中利涉大川乘木有功也取乘舟濟川之義此二節承上有此卦綜之德所以王假有廟所以繫天下之心乘木有功可以濟天下之難也象曰風行水上渙先王以享于帝立廟風行水上天神之象享帝于郊象巽之髙水在地下人鬼之象立廟于宫象坎之隱皆所以合其散初六用拯馬壯吉居渙之初拯之為易初陰柔非能拯渙者也然坎為美脊亟心之馬二有剛中之才能順九二事必有濟故有用拯馬壯之象故吉也象曰初六之吉順也能順二也九二渙奔其機悔亡以卦綜言坎剛自外來互震為足為動有奔象二居中互震為本位有奔其機而得所安之象以陽居陰有悔矣然居中而得所安悔可亡矣當渙之時播遷而得所安則不至于困窮而渙可濟矣象曰渙奔其機得願也濟渙之願可成六三渙其躬無悔此後四爻皆以渙為吉蓋因渙以濟渙也陰柔而不中正有私于已之象然居陽位以應乎上志在散其私以濟時人臣之致身事主者也無可悔矣悔亡者有悔而亡無悔者無可致悔也象曰渙其躬志在外也外與上應志在天下而不為私六四渙其羣元吉渙有丘匪夷所思居陰得正上承九五當濟渙之任者下無應與有能散其朋黨之象髙則為丘平等為夷互艮為山丘小羣既散大羣自合衆正盈朝若丘山然初三二陰皆與四等夷者思慮不能及此故有渙有丘匪夷所思之象六爻唯此最善而吉蓋初二三上皆不得正唯九五以剛陽得正為濟渙之主四則以陰柔得正為輔君以濟渙之臣也象曰渙其羣元吉光大也去朋黨以事君光明正大九五渙汗其大號渙王居無咎坎水渙象巽風號令之象令出必行如汗之出而不反居畜積也渙王居猶散小儲以成大儲也九五陽剛中正以居尊位能散號令由中及外如汗之浹于四體又能散其居積以聚天下之人心此濟渙之主也可以無咎矣象曰王居無咎正位也舊説以有德居尊位故能渙也又按來注以王居為帝都五變為坤有國都之象謂當渙散之時遷都正位如光武之都洛陽宋髙宗之即位應天以聚人心之渙也今觀象傳王居無咎上去渙字釋之曰正位意甚合姑存之上九渙其血去逖出無咎下卦坎為血為加憂上與三應有傷害畏懼之象上九以陽居渙之極能出乎渙者有渙之使血去逖出之象如是則無咎矣然三以應上為美上不以應三為美何也蓋易爻大都以陰應陽者為柔得剛之援以陽應陰者為剛受柔之纍又三在險中則欲得上援以出險上在險外則必欲離下以逺害也象曰渙其血逺害也血去則惕亦出皆所以逺害也全象兼聚渙濟渙二義而皆要之于正初與二皆欲聚渙者也然人心國勢不可渙而私意朋黨不可不渙號令居積不可不渙患害尤所當急渙者也故三四五上四爻皆因渙以濟渙者也五為濟渙之君四為輔君濟渙之臣六爻獨四五得正故也亦即利貞之義乎節卦下兌上坎澤中有水所受有限為節之象節卦次渙按序卦渙者離也物不可以終離故受之以節物既離散必須節止節所以次渙也全彖以二五得中剛柔各半有亨通之道但不可過中而至于苦彖傳又推而極言之六爻大抵當位者吉不當者凶初四五當位而吉者也二三不當位而凶者也上雖當位而亦凶則以處于窮極故也此全卦六爻之大略也節亨苦節不可貞莭有限而止也凡事有節自有亨道然至于太甚則苦不可守以為貞也卦中陰陽各半而二五皆陽節貴于得中也彖曰節亨剛柔分而剛得中剛柔適均而剛得中節所以亨以能得中故也以卦體釋節之亨也苦節不可貞其道窮也甘節為吉苦則窮矣説以行險當位以節中正以通以卦德言之內説欲進者矣説則易流而行于坎險則止説而不流乃為有節以卦體言之九五當位有能節之勢居中得正又坎為通蓋節而中正則可以通行所以亨而不至于苦也天地節而四時成節以制度不傷財不害民極言節道天地四時自然之節聖人則因其自然者立制度以節之如九賦九式之類財不至于匱乏民不苦于誅求象曰澤上有水節君子以制數度議德行數度所以為節議德行商度以求其中節也制數度節民于中議德行節身于中也初九不出戶庭無咎户庭戶外之庭也初前九二九陽竒有户象初四有應宜出者也然九二以陽爻蔽于前又四為坎體出則入于坎窞又以剛在下而無位皆不可出初九陽剛得正當節之初宜止而止故有不出戶庭無咎之象象曰不出戶庭知通塞也通則出塞則止九二不出門庭凶門庭門內之庭也九二前遇六三六耦有門象九二居中有可行之時六三非有所窒塞時可行矣乃失剛不正又以上無應與止而不行知節而不知通者也故有不出戶庭凶之象又按初九為兌始兌于時為酉闔戶之象九二互體震震于時為卯闢戶之象初九時當止位雖有應其行非時九二于時當行位雖無應其止非其時是故節而止者易節而通者難象曰不出門庭凶失時極也九五剛中同德可出以共成節亨之功九二時可出而失之故凶六三不節若則嗟若無咎陰柔而不中正當節而不節若之象兌為口有嗟若之象無咎與他處可同言無所歸咎也象曰不節之嗟又誰咎也嗟乃自取無所歸咎六四安節亨九五當位以節能節以制度者四承君之節順而行之有安節之象柔順得正上承九五有亨道矣象曰安節之亨承上道也安于臣節承上之道也九五甘節吉往有尚甘者味之中節以中為貴中則人説之而不至于苦九五居中得正所謂當位以節中正以通者故有甘節之象其占則吉往則有可嘉尚謂立法于今可垂于後也他爻之節節其在我者九五當位以節節天下者也節天下而使天下甘之其功大矣甘在臨之三以我求説于人故無利在此則人自説于我故有尚象曰甘節之吉居位中也中則不過而至于苦中可兼正故止言中上六苦節貞凶悔亡居節之極過乎中矣故有苦節之象雖正而不免于凶矣凶則有悔然禮奢寧儉故雖有悔而終得亡之矣蓋苦節之悔猶勝于不節之嗟也上六得正為貞窮極故凶凶故悔貞故悔亡象曰苦節貞凶其道窮也莭道也至于苦則窮不可通行于世也今卦以莭為名在學為不陵節在禮為節文在財為樽節在物為符節在臣為名節在君師為節制隨其事皆可為占全彖節有可亨之道而貴于中正六爻在他卦中可兼正在此卦則雖中而不正亦凶蓋不正不可為節但恐其過中而至于苦耳九五居中得正故得甘節之吉六三不中不正故凶咎不待言餘四爻則必以得正為善初九得陽剛之正而無咎六四得柔順之正而吉上六雖以卦極致凶亦以得正而無咎九二雖居中反至于凶則以陽居陰失正之故也天下未有不貞而可謂之節者故彖不必言利貞而爻則必正乃吉也中孚卦下兌上巽風行澤上感于水中中孚之象以卦畫言之內外皆實而中虛中孚之義二五皆陽為中實亦中孚之義蓋中虛者信之本中實者信之質卦所以稱中孚也中孚次節按序卦節而信之故受之以中孚節制使人不越上下信從中孚所以次節也也全彖以誠信之極雖無知之物可感雖患難可涉而皆利于以正也六爻以孚之道在剛中故獨二五為孚之至初之應四初實而四虛至三之應上三虛而上實故皆未能盡孚之道蓋他卦皆以陰陽相應為吉此則獨以剛中同德為孚此全彖六爻之大略也中孚豚魚吉利涉大川利貞孚心可相信也以一卦言為中虛以二體言為中實皆孚之象又上巽以順下下説以應上亦相孚之義豚魚江豚至則有風信之可必者澤上有風有豚魚之象木在澤上外實內虛舟楫之象誠信之至如豚魚則吉以涉險難亦利然必利于正固乃可不則硜硜匹夫之諒矣以為信可感豚魚于義亦優然不如以象言為當彖曰中孚柔在內而剛得中説而巽孚乃化邦也以卦體言之六三六四在內則中虛無私主矣九二九五剛而得中事皆不妄矣以卦德言之下説以孚乎上上巽以孚乎下可以感化乎萬邦矣豚魚吉信及豚魚也利涉大川乘木舟虛也以卦象言中孚以利貞乃應乎天也天者理之正而已象曰澤上有風中孚君子以議獄緩死議獄兌象緩死巽象風無形而能震川澤誠也議獄緩死求之以誠也如舜之好生洽民舜之中孚不犯有司天下之中孚也初九虞吉有他不燕中孚之初上應六四度其可信而信之則吉若有他則失所安戒之也卦中二柔四得正三不正初宜應四而間于三故有此象象曰初九虞吉志未變也志定于始恐變于終九二鳴鶴在陰其子和之我有好爵吾與爾縻之兌為正秋為口舌鶴感秋而鳴者二為陰有鳴鶴在陰之象二五以上下之位言之則五為君二為臣以先後之序言之則二可為父而五可為子二中孚之實而五亦以中孚之實應之有鶴鳴子和之象好爵爾縻按大全張氏謂我爵指五五為君位故以爵言吾亦五也爾指二縻二係于五也今按好爵諸家皆以為爵祿獨本義以為懿德蓋謂二五剛而得中皆能修其天爵者也如此則我吾仍指二爾指五為順蓋懿德之實可以相感二之所有吾亦繫戀之也象曰其子和之中心願也九二以實感九五以實應也六三得敵或鼓或罷或泣或歌敵謂上九信之窮者也三陰柔不中正居説之極與不中正之上九為應而不能自主互二四為震或鼓之象互四五為艮或罷之象兌澤之流或泣之象兌口之開或歌之象象曰或鼓或罷位不當也不中不正故也六四月幾望馬匹亡無咎六四居陰得正位近于君有月無光借日之光以為光而幾于望之象又下卦兌互震震東兌西日月相望之象又震為馬倆馬一色為匹猶對也初與四為匹四乃絶之以上信于五有馬匹亡之象此大臣能杜私交以事主者也故無咎象曰馬匹亡絶類上也下絶初九之類而上從于五也九五有孚攣如無咎九五剛健中正而居尊位孚之主也下應九二與之同德故為有孚攣如之象此彖所謂孚乃化邦者也故無咎象曰有孚攣如位正當也有德有位乃為正當上九翰音登于天貞凶雞鳴必先振羽故曰翰音巽為雞又雞之鳴有信故于中孚言之上九居卦之最上雞非登天之物以居卦之極信非所信而不知變又有翰音登天之象雖貞亦凶也况不貞乎象曰翰音登于天何可長也九而不變則凶也全卦以誠信在中則可以涉險難然皆利于得正六爻在他卦皆取陰陽相應此獨取二五中實之同德為孚蓋中可兼正即卦之貞也四亦以正而無咎初以正而吉而戒其有他至三上則不中不正失所謂貞即失所謂孚矣小過下艮上震山上有雷其聲小過為卦四陰二陽陰多于陽又陰居尊位陽失位而不中小者過其常也故為小過小過次中孚按序卦有其信者必行之故受之以小過人之所信必行行則有過小過所以次中孚也全彖以陰小過于陽亦可以亨但利于守正宜于小事而不宜于大事此全彖之大旨也六爻四陰二陽陰過于陽初爻上爻陰之不中而過者也故皆凶二五兩爻中而不過者也故無凶咎若三四兩陽爻當四陰方過之時四居柔在下不過危厲若三居剛在上必致凶戕矣大抵陰過則陽多傷而陰又不宜至于太過又聖人扶陽抑陰之微旨乎小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小謂陰也四陽在外二陽在內陰多于陽小者過也以事言之有三義小有所過一也大者不可過而小者可過二也所過者小三也既過于陽則可以亨矣然必利于守正蓋不正則所過不小矣二五以柔得中有可小事之象三四以陽剛失位不中有不可大事之象此卦錯中孚中孚大象離有飛鳥之象今錯變為小過象坎不見離有鳥飛已過但遺音之象本卦中二陽爻有鳥身之象上下四陰爻有鳥翼之象三四五互為兌口有遺音之象陽上隂下宜順其性有不宜上宜下而大吉之象過非美名大過陽多于陰易猶許其往小過陰多于陽則聖人多戒辭此時非可以吉然能善于自處小事而不為大事處下而不處上則可以大吉矣彖曰小過小者過而亨也陰多陽寡小者過也過而亨時當小過不順時豈能亨惟小者過所以亨也此以卦體釋卦名義與卦辭也過以利貞與時行也柔得中是以小事吉也時當小過而不失其正乃可謂與時行失正則非與時偕行之義矣柔得中以二五言柔順得中則處一身之小事能與時行矣所以小事吉剛失位而不中是以不可大事也以三四言凡大事必以剛健中正之君子為之今失位不中陽剛不得志矣所以不可大事有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦體言飛鳥遺音不宜上宜下上逆下順者上卦乘陽四五失位逆也下卦乘陽二三得位順也故占此者凡事不宜上而宜下也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷在天上為大壯出于地而上于山其聲小過而已三者之過皆小者之過本義謂可過于小而不可過于大蓋可過乎恭不可過乎傲可過乎哀不可過乎易可過乎儉不可過乎奢也又謂可以小過而不可甚過蓋恐其恭之甚為足恭哀之甚而為喪明儉之甚而為豚肩不掩豆也初六飛鳥以凶大全以初上為鳥翼故于初上言飛鳥然初二五上皆翼取象未確竊按全卦有飛鳥之象而上卦震二三四互巽亦有鳥象小過之時不宜上宜下初在下者也乃陰柔不正上應于四則上而不下猶小人附權貴以取禍者故有飛鳥以凶之象曰以者初躁動援四而四以之也洞林占謂致羽蟲之孽亦此意象曰飛鳥以凶不可如何也初不安于下凶乃自取無可如何六二過其祖遇其妣不及其君遇其臣無咎三陽在二之上有父象四在三上有祖象五以陰居尊有妣象然五尊而初二卑又有君臣之象二越三四而上應于五是過其祖矣然五陰非正應是所遇乃妣也然以爻位言之五又君也過祖有繼世之譽過君則有犯分之嫌當小過時上逆而下順二柔順中正過而不過下與初比故有不及其君而遇其臣之象如是則無咎矣過祖非敢抗祖乃遇其妣君不敢過而與臣遇正所謂可小事而不可大事不宜上宜下者故無咎也象曰不及其君臣不可過也臣過其君非小過之義矣九三弗過防之從或戕之凶本義以弗過防之謂不能過于防陰然于四爻異同今依胡氏以弗過為句小過陰過之時二陽皆稱弗過謂陽不能過陰也從隨也柔過之時衆陰害陽三雖得位而弗能過乎陰則當防之若不防則隨有戕之者至矣故凶蓋此卦不宜上三居下卦之上衆陰勢方上進故也象曰從我戕之凶如何也如何言其甚也九四無咎弗過遇之往厲必戒勿用永貞九四以剛居柔似有咎矣然當過之時以剛居柔小過乎恭者無咎之道也弗過遇之亦宜從胡氏之説弗過絶句與九三同遇之前遇乎陰也三之陰在下其性止故惟防之而已四之陰在上震性動陽性上行故往遇之然小過之時不宜上宜下三居二陰之上而自恃其剛故陰或戕之四居二陰之下而以剛遇柔未必致戕而往則亦厲故必在所當戒也然往固非固守而不能隨乎時宜亦非也故又曰勿用永貞蓋小過九四變而為謙又有終吉之象矣象曰弗過遇之位不當也往厲必戒終不可長也以剛居柔前與柔遇故曰不當不可長他卦多于上爻言之此言于四故程傳以長為上聲謂當陰過之時陽不能長而盛也然于終字義有未安蓋陰陽消長理勢自然竊意此句即勿用永貞之意言往厲雖在所戒而陰之過終不可長是以當隨時變通不可固執也長字如字未知是否六五密雲不雨自我西郊公弋取彼在穴全卦有坎體而三四五互為兌為西六五以陰居尊以陰過乎陽不能和而為雨有密雲不雨自我西郊之象坎為弓有弋象二陰在陽之下有在穴象六五當陰過之時雖居尊不能有為下取六二以為助兩陰相得不能大事所取者下有公弋取彼自穴之象象曰密雲不雨已上也已上太髙也陰陽和則雨小畜一陰不能固陽陽尚往故不雨此則四陰過陽陰太髙亦不能與陽和而為雨矣上六弗遇過之飛鳥離之是謂災眚此爻與九四正相反四前遇陰上六已髙不復遇陽矣動體之極又陰過之極震有飛鳥象變離為網罟有飛鳥離之象陰柔過髙天災人眚皆所自取凶之甚也象曰弗遇過之已亢也卦不宜上上則過亢必取凶也全卦陰過乎陽占者宜小事不宜大事凡事宜下而不宜上六爻唯二最吉以在下卦之中不至太過而所居得正又合利貞之義也五不正不能有為若初之不正而援上上之動極而過髙皆凶之甚者二陽爻則四以居柔而無咎三以恃剛而致凶與時行之難也既濟下離上坎水在火上相交為用天下事已濟之時也又涉川曰濟既濟未濟二卦皆有坎體坎在內有險為未濟坎在外則無險為既濟也又以卦畫言之六爻皆應剛柔皆當其位至此無不濟矣故為既濟既濟次小過按序卦有過物者必濟故受之以既濟也全彖當既濟之時自有可亨然六爻陽在陰下故亨者小剛柔皆當故利于貞然事之既濟則聖人憂盛危明之心正于此始蓋治亂相因理勢自然也六爻皆有戒辭內三爻皆既濟之象即彖之初吉也外三爻漸入于未濟即彖之終亂也此全彖六爻之大旨也既濟亨小利貞初吉終亂既濟事之既成也水火相交各得其用六爻相應各得其正故為既濟亨小按本義作小亨既濟之終未濟之始猶日中則昃之意故亨亦小也六爻皆正所以利于貞也既濟故初吉終為未濟故亂此雖聖人警戒之辭亦理數之自然又內卦離明外卦坎險亦初吉終亂之象也彖傳柔得中終止又推文王言外之意彖曰既濟亨小者亨也按本義謂者下脫小字小者亨蓋爻有三陰得位而三陽下之故曰小者亨也然按彖辭似以事之既濟則泰否相仍所亨亦小夫子彖傳又推言外之意大旨亦並行不悖也利貞剛柔正而位當也以卦體言六十四卦六爻皆應而得位者獨此而已初吉柔得中也指六二也終止則亂其道窮也文王初吉終亂之占就理數自然言之如泰極為否之類夫子彖傳則又于言外而推之于人事也蓋未濟則圖其濟既濟宜保其濟柔在二則吉在上則亂蓋柔順得中則善處濟之初所以吉也然天下治亂相乘終極必變終以優柔自處則有止心止而不挽救亂之所由生也然則當既濟之時者始則柔順文明終必貴于剛健振作庶幾知窮變通久之道而具撥亂反正之才者乎象曰水在火上既濟君子以思患而豫防之思患坎難象豫防離明象按大全項氏謂人之用莫大于火而火常生患善濟火者莫如水常儲水以防火則其患亡矣此説似近而意未備竊按水在火上則水火有相濟之功而其終也有相克之患蓋水能滅火火亦能乾水思其患而豫防則相為用而不相為害以此推之天下事莫不皆然也初九曵其輪濡其尾無咎初應六四坎有輪象輪所以行曵之則不行矣初九當濟之初守正而不輕進有曵其輪之象坎為狐初在一卦之後又有尾象狐必揭其尾而後濟濡尾則不掉不速濟也以剛在下有濡其尾之象徐進而不躐等無咎之道也象曰曵其輪義無咎也得慎始之義六二婦喪其茀勿逐七日得茀車之蔽也離為中女二柔婦象上應九五坎為輿離又中虛茀象二五本正應以當既濟之時九五剛中之君反有中滿之勢不能下賢以行其道又坎為盜故有婦喪其茀之象言失其所以行也卦厯六爻復于二為七位中正之道不可終廢二厯七數中正自在與五必有合也故有勿逐七日得之象象曰七日得以中道也不失其中則濟世之具在我九三髙宗伐鬼方三年克之小人勿用九三應上坎體坎居北有鬼方之象離為甲胄為戈兵九三以剛居剛有髙宗伐鬼方之象自四至上厯三爻又離居三有三年克之之象必三年而後克言其不輕濟也然既克之後而用小人則除一亂又生一亂矣故戒以勿用既濟之後常存未濟之虞也象曰三年克之憊也師至三年師老財匱矣兵不可輕用也六四繻有衣袽終日戒繻作濡衣袽以塞舟之罅漏者四坎體之下有漏舟之象當既濟之時以柔居柔以豫而知戒者故有衣袽已備終日不忘戒懼之象象曰終日戒有所疑也亂生于治疑禍患之將至也九五東鄰殺牛不如西鄰之禴祭實受其福五陽東鄰之象二陰西鄰之象離有牛象五坎水能滅火有殺牛象禴夏祭離為夏禴祭之象九五居尊而時已過不如六二之在下適當其時故有東鄰殺牛之大祭反不如西鄰之禴祭受福之象象曰東鄰殺牛不如西鄰之時也實受其福吉大來也方來之吉猶未艾二之所以勝五也上六濡其首厲既濟之極坎險之上而以陰柔處之故有狐涉水而濡其首之象危厲可知象曰濡其首厲何可久也危亡不久既濟全彖六爻皆有警戒之詞蓋天道否泰循環固理勢之自然亦聖人治不忘亂安不忘危之深心也未濟下坎上離火在水上不相為用又六爻皆不得位故為未濟未濟次既濟按序卦物不可窮也故受以未濟終焉既濟物之窮窮無不變易者變易不窮未濟則未窮也未窮則生生不絶矣又後天八卦以坎離居先天乾坤之位蓋天以一生水地以二生火故坎得乾之中畫離得坤之中畫上經首乾坤而終坎離後天首咸恆而終既濟未濟既濟水火之交六爻皆當萬物之終也未濟水火不交六爻皆反終則有始也此未濟所以次既濟而為全易之終也全彖卦雖未濟終有可亨之道幾濟而猶未濟故無所利而彖傳又以剛柔之應以見其亨蓋未濟固終濟也六爻下三爻在坎險之中皆未濟之象上三爻離明則未濟者終濟矣此全卦六爻之大略也未濟亨小狐汔濟濡其尾無攸利未濟事未成也水火不相交不相為用卦之六爻皆失其位故曰未濟未濟有終濟之理故亨既濟已然之亨又陽居陰下故曰小未濟方來之亨又陽在陰上故但曰亨彖傳柔得中則又就卦體而推之人事也坎有狐象坎在下小狐象狐老者多疑小者輕于濟狐尾大涉必揭其尾汔幾也幾濟而濡其尾則未能濟矣何所利乎蓋未濟雖終有可亨之道使如小狐之濡尾則亦無所利戒占者之辭也彖曰未濟亨柔得中也彖未濟之亨就天運之自然言之夫子又專指六五一爻言人事有致亨之道也柔而得中則既非柔弱無能又不剛猛僨事小心慎密處置得宜未濟者終濟此其所以亨也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也未出中指二也九二在坎險之中未能出也不續終指初也初在下為尾二所以不能出險以初陰柔力微故首濟而尾不濟不能續其後也雖不當位而剛柔皆應則彼此相輔終成濟險之功此二語又覆解亨之義蓋柔既得中又與剛應故能亨也二五固剛柔應然全卦剛柔皆應故于此覆言之象曰火在水上未濟君子以慎辨物居方辨物如火之明居方如水之聚又水火異物故以之辨物使物以羣分水火各居其所故以之居方使方以類聚也初六濡其尾吝以陰居下當未濟之初未能自進故有濡尾之象而致吝也既濟濡尾無咎此則吝者既濟陽剛得正離明之體當既濟之時知緩急而不輕進故無咎此則才柔不正坎險之下又當未濟之時冒險躁進則至于濡尾而不能濟矣故吝然彖言無攸利而此但言吝則以卦之初失尚未逺也象曰濡其尾亦不知極也程傳作不知之極從之坎之初不如離之初明知也九二曵其輪貞吉坎有輪象九二上應六五有陽剛之才可以濟矣而居柔得中自止而不進有曵其輪之象九居二非正而得為下之宜正也故曰貞吉既濟初兩象此分初二兩爻初欲進不能而吝才柔故也二可進而不輕進而吉才剛與既濟初九同故也象曰九二貞吉中以行正也九居二非正以中故得正也六三未濟征凶利涉大川陰柔不中正居未濟之時以征則凶利涉大川本義謂將出乎坎有利涉之象蓋行者可以水浮而不可以陸走也又曰或疑利字上當有不字今從後説為優蓋二陽剛猶以守貞為吉三陰柔非利涉可知矣象曰未濟征凶位不當也未濟六爻皆不當獨于三言之者陰柔居險極也九四貞吉悔亡震用伐鬼方三年有賞于大國九居四不正而有悔勉而貞則吉而悔亡戒之也未濟之四即既濟之三三以上為鬼方四以初為鬼方坎北方有鬼方象離為甲胄戈兵有伐之之象既濟九三以剛居剛故言髙宗此以剛居柔則大國諸侯出征者也四變互震震懼也臨事而懼可以勝矣在既濟言憊此則受賞蓋既濟之世利用靜未濟之世利用動當未濟之時以剛居柔上承六五以克初陰雖隔初三爻有三年之久而有剛健之才有承有應故有代鬼方而終受賞之象象曰貞吉悔亡志行也已出其險則伐亂之志可行也六五貞吉無悔君子之光有孚吉以六居五非貞也然文明之主居中應剛虛心以求下之助故得貞而吉離體光明虛以應九二之實故又有君子之光而有孚之象其吉可知象曰君子之光其暉吉也日光曰暉言如日光之盛也六五乘承應皆陽剛君子相助為理故曰其暉吉上九有孚于飲酒無咎濡其首有孚失是上與三應三坎為酒食又以征凶而安于未濟有飲酒之象上應之有孚于飲酒之象然上在五之上有首之象時雖未濟至五則濟矣上九陽剛可以有為乃過于逸樂自縱以信于三有飲酒而濡其首雖有孚而亦失之象蓋時在需則酒食而吉若未濟之極即濟之初安可昵其私人飲酒濡首以厲階兆亂乎本義大意亦同但未及六三之應耳象曰飲酒濡首亦不知節也知節則能隨時以取中矣全彖當未濟之時終有可濟之理故有亨道但輕于濟則無所利耳六爻吉多凶少較勝于既濟然亦皆有戒辭蓋既濟者固宜保于既濟之後未濟者亦宜慎于方濟之初也合全易而論之天地之道不外于陰陽五行之用莫先于水火上篇首天地陰陽之正也故以水火之正終焉下篇首夫婦陰陽之交也故以水火之交終焉乾上坤下離東坎西此先天之易天地日月之四象也故居上經之始終以立造化之體水火相逮雷風不相悖山澤通氣此後天之易六子之用也故居下經之始終以致造化之用既濟之後猶有未濟者示造化之用終必有始也周易淺述卷六
