body:
  text: 周易淺述卷五翰林院編修陳夢雷撰益卦震下巽上以卦象言之風烈則雷迅雷激則風怒兩相助益所以為益以其義言損下謂之損則益下謂之益以陽爻益坤之下爻所以謂之益也益卦次損按序卦損而不已必益故受之以益蓋損卦天下富實之象下實上虛宜有所損以奉君益卦朝廷富實之象上實下虛宜有所損以惠民然損下謂損損上謂益者蓋民貧則上無所寄民富則上無可憂故損下君子反以為自損損上反以為自益也損益循環理之自然益之所以次損也全彖言益則無所不利彖傳即君之及民又推之學問造化以贊其義之大六爻下三爻皆受益者初受四之益必有以受之故利大作二受五之益而爻位皆隂故宜永貞三不中正不得當益而當益下之時故以凶事為益也上三爻處益而當損者四以順下之動為益五以至誠感人為益上處益之極不能損己反以求人則或擊之矣此全卦六爻之大指也益利有攸往利涉大川益增益也當益之時無所不利以行則利往以濟則利涉也二五皆居中得正故利往震巽皆木舟行之象故利涉人君能以益下為心則處常處變無所不利矣彖曰益損上益下民説無疆自上下下其道大光此以卦體釋卦名義也損乾之下爻益坤之下爻有人君損所有以惠其民之象民説之自無窮矣陽爻居下隂爻居上有人君居九重之上降已以下其下之象則非私恩小惠之為其道光眀顯著矣民説道光何益如之利有攸往中正有慶利涉大川木道乃行此又以卦體卦象釋卦辭也以卦體言之五以中正應二二亦以中正應五君臣同德天下受其福慶所以利有攸往也以卦象言之木為舟有濟險之才震巽皆木君臣同德上下一心不獨可以處常且可濟變木道之行也益動而巽日進無疆天施地生其益無方凡益之道與時偕行又以二卦之德推之學問言之則內卦震動奮發有為外卦巽順潛心遜志其進也無疆矣以二卦之體推之造化言之震剛卦之一陽在下天陽之下施也巽柔卦之一隂居四地隂之上生也萬物並育其益無方矣凡此之益皆道也道皆時也損與益皆合乎時而已此皆以極贊益之大也象曰風雷益君子以見善則遷有過則改遷善當如風之速改過當如雷之猛又雷與風有交相助益之𫝑速於遷善則過當益寡決于改過則善當益純學問之益莫大乎此初九利用為大作元吉無咎隂小陽大初剛在下與四正應六四近君信任乎𥘉正受上之益者又震體主動故有利用大作之象蓋𥘉以在下受上之益非大有作為無以報效故利用大作然所作不盡善未免于有咎矣越分圖事必出萬全得盡善之吉乃可無咎也他卦元吉以效言此以功言象曰元吉無咎下不厚事也𥘉在下位本不當任重大之事不盡善不足以免咎六二或益之十朋之龜弗克違永貞吉王用享于帝吉二以柔順中正上應乎五又當益下之時此爻即損五之綜故象占亦同在損曰元吉此曰永貞吉則位有剛柔之分分有君臣之異也二已得正恐隂柔不能固守則非為下受益之道故戒以永貞二非君位自王者占之則為享帝之吉占亦以下而受上之益也若自人臣占之則事君如事天之義也象曰或益之自外來也外不專指五五固正應而二之柔順中正人孰不願益之或者衆無定主之辭六三益之用凶事無咎有孚中行告公用圭三爻多凶六三隂柔不中不正不當得益者然當益下之時與上為應而上立心勿恆故有益之以凶事之象警戒震動使之困心衡慮以增益其所不能也如此可以無咎六爻中虛有孚之象三四皆居全卦之中中行之象上卦主益下者上勿恆而五君位非可告者唯四近君在三之上有公象震為玉圭所以通信三知上之所以警戒震動我者益我也信之篤而行之必合乎中以通信于上故有有孚中行告公用圭之象如此則三有受益之道矣象曰益用凶事固有之也困心衡慮則有之固也六四中行告公從利用為依遷國三四在全卦之中故皆言中行四互二三為坤有國象中行告公三告四也從者四從三也巽為入有從之之象四本損之三遷為益之四依者三依四四依五也故有為依遷國之象言四以益三為心合于中行故三告之而見從也三之告四欲得所依以受益也而古者遷國以益下亦必有所依而後能立如邢依齊許依楚之類今四上遷依于五以柔依剛以弱依強四得所依矣三亦得所依矣遷國使民有所依此自損以益下之大者也象曰告公從以益志也志在益下故告于公而見從也九五有孚惠心勿問元吉有孚惠我德九五以剛中與二相應天下皆受其益者也故言上茍有信以實心惠于下不問而元吉可知矣蓋我以實心惠下則下亦實心感我之惠以為德也自施者言心惠出于心非口惠也自受者言德德實及民民皆感德非邀結也九五益之主自損以益下者至于惠我德則不特益下而上已大益矣象曰有孚惠心勿問之矣惠我德大得志也大德不德不必問也自損益民君志大得則上之益亦大矣上九莫益之或擊之立心勿恆凶按本義以陽居益之極求益不已故莫益而或擊之立心勿恆戒之按大全朱子云此處可疑且闕之今細按卦以損上益下故名曰益則下三爻皆言受益上三爻宜言損上四遷國正自損以益下者五雖陽爻而居中得正故為能自損以受益者獨上不中不正以陽居益之極雖與三應而不自損以益下則不獨不能受益且有反擊之凶矣卦以益名而反致擊者蓋為上者始終以損上益下為心則立心有恆終當受益若始能自損終反求益則立心勿恆不但無益自當致凶矣此與損之上爻皆有極而必變之意損卦損下益上為損然上爻不損下則損極而益之漸也益卦以損上益下為益至上爻反有求於下則益極而損之漸也損益循環猶否泰之相因也象曰莫益之偏辭也或擊之自外來也夲義莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣按此于偏辭句亦未眀竊意上不損己以益下上之偏也自外來即繫辭所謂莫之與則傷之者至之意此卦三爻四爻上爻雖説有可通而不無牽強來注蘇傳亦多異同未見的確姑合諸家酌其近理者如此夬卦上兊下乾以二體言之水聚于澤積上至高𫝑必潰決以爻論之五陽在下長而將極一隂消而將盡五陽決去一隂故名夬也夬卦次益按序卦益而不已必決故受之以夬夬者決也理無常益益極必決夬所以次益也全彖大意以雖處隂消陽長之時亦不容以易心處之必相與同心戒懼而後利有所往六爻皆從上爻取義陽之決隂逺則不能相及唯比與應當之五比上三應上故皆言夬夬決而又決不繫于隂也四介三五兩剛之間欲決上而進退不果二則逺而不相及自偹而已初在下最遠則不能勝矣大抵君子之去小人不可以易心處之此全彖六爻之大旨也夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬五陽一隂三月之卦也陽盛而隂將衰決而去之有君子決去小人之象五陽去一隂其𫝑甚易恐人之安肆而忘戒懼也故再三為警戒之詞揚于王庭夲義作名正其罪今按彖傳柔乘五剛此句宜指上六言之言小人在君側得志也孚號以下指五陽爻孚號至誠孚號其衆使合力也有厲有危道不可肆也告自邑先治其私也不利即戎不可專尚威武也能如是則可以有所往亦不以瞻顧而遂却也兌為口有揚王庭象陽實孚象乾為言孚號告自邑之象五陽恐剛或過有有厲不利即戎之象陽盛隂衰有利有攸往之象聖人于君子道長之時戒懼叮嚀如此蓋不以得為而自肆又不以過葸而小却也彖曰夬決也剛決柔也健而説決而和釋卦名義而贊其德也以五陽決一隂乾健而濟以兑説則不至于怯亦不過于猛矣其決之也得無過不及之中非決而和乎健而説以德言決而和以事言揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也柔乘五剛以卦體言之以一小人乘九五之君跋扈橫恣之象也其危乃光危厲其心必去小人乃光顯也所尚乃窮言尚威武必至困窮所以既告自邑而又不利即戎也剛長乃終謂一變純乾乃無復小人也易于剛乘柔不書于柔乘剛則書剝言不利有攸往不欲其為純坤夬言利有攸往則欲其為純乾皆扶陽抑隂之意然以五陽去一隂其𫝑似易而聖人所以周防戒偹之詞無所不至蓋小人有一之未去皆足為君子之憂人欲有一分之未盡皆足為天理之纍此聖人所為三致意也象曰澤上于天夬君子以施祿及下居德則忌澤上于天其𫝑不居君子觀此施祿使澤及于下也居德即屯膏之意居其德而澤不下逮人君所最忌也𥘉九壯于前趾往不勝為咎陽壯之時居下無𫝑有壯前趾之象勇決前進不勝其任雖非背理而反為小人所傷則咎矣此與壯初爻同當壯之時在下戒其用壯當決之時在下戒其過決象曰不勝而往咎也知其不勝而往自取咎也九二惕號莫夜有戎勿恤二地位二變為離離日在地莫夜之象離為戈兵有戎之象坎為加憂離坎之反勿恤之象九二當決之時以剛居柔則能自晦不至于過憂惕號呼以自戒備則雖莫夜兵戎驟至亦可無憂患矣象曰有戎勿恤得中道也下卦之中剛而能柔故也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎九三居下卦之上重剛不中又乾為首故有剛壯見于面目之象以剛居剛有夬而又夬之象上與隂應有獨行遇雨之象君子之去小人悻悻見于面目則小人忌之有凶道矣然若果能果決不係于應與之私則雖合于上六如獨行遇雨至于若濡而為衆陽之君子所愠然終必能決去小人無所咎也夲義以溫嶠之于王敦言之亦近象曰君子夬夬終無咎也所以無咎者以有夬夬之心故也迹可濡心不可變決之以心不必見于靣目也九四臀無膚其行次且牽羊悔亡聞言不信四亦為坎坎為溝瀆有臀象兊為毁折無膚之象九四居上之下以陽居隂不中不正居則不安行則不進有臀無膚其行次且之象兊有羊象牽羊者當其前則不進縱之使前而隨其後則可以行四欲決隂必藉五為之前而隨其後有牽羊之象兑為口四變隂則為坎為耳有聞言之象牽羊隨其後則悔亡而九剛無下人之志聞牽羊之言當信而四柔必無克已之功有聞言不信之象蓋君子之去小人𫝑未可遏姑緩之必上格君心兼藉同志故一決而去之若才柔志剛専已自用鮮有不敗者王沂公之于丁謂牽羊悔亡者也冦萊公則聞言不信矣象曰其行次且位不當也聞言不信聰不明也位不當不中不正也九五莧陸夬夬中行無咎莧馬齒陸商陸皆感隂氣之多者暴之難乾而脆易折指上六小人之象夬夬中行按夲義決而決之而又不為過暴大全丘氏謂勉之以夬夬而又戒其中行則無咎者五當可決之位𫝑易于三三唯其夬夬即可以無咎五之夬夬或失之過暴則猶為有咎也今按象傳中未光之言非慮其過暴也特慮其不決耳蓋馬齒之為物莖脆而根甚固一拔即折似易除而根蔓延不已非盡力決而又決不可故以此取象小人人主昵于近習忽為易制不忍治之太過而卒以敗事者多矣九三與上應而在下位故雖夬夬不免于濡而得無咎者諒其心也五居君位有可夬之權特恐昵比之過視為易制不忍處之太甚以過中為疑故戒之曰勿謂莧陸之易折也小草根蔓難除必夬之又夬之非過于暴也如是乃合乎中行僅可以免咎耳如此于象傳始合象曰中行無咎中未光也以其有昵比之心未得為光大也上六無號終有凶兌為口變純陽為乾無所號呼之象上比五以自肆而五則夬夬矣應三以為援三則亦夬夬也小人窮極必敗無所控訴也占者有君子之德則其敵當之不然必凶矣象曰無號之凶終不可長也一柔在上終不可久必為五陽所決也全卦于君子去小人之道言之最為委曲詳盡參之前史君子小人消長之際乃知聖人因理數之自然立言以垂訓萬世者至深切也姤卦巽下乾上風行天下萬物無不經觸乃遇之象又卦爻五陽而一隂始生于下隂與陽遇也故為姤姤卦次夬按序卦夬決也決必有遇故受之以姤姤遇也夲合則無所遇夬決既離乃復有遇又夬卦一隂將消于上則復生于下姤所以次夬也全彖以一隂遇五陽壯盛不正之女故戒以勿取彖傳喜陽之得行正以見隂生之未可忽也六爻皆以𥘉陰取義遇非正道故惟近者得之而正應反凶二最近𥘉遇之最先者故有魚四雖與𥘉正應而𥘉為二得非已有矣故無魚凶三介二四兩剛之間欲遇不得猶夬四之欲去不能也五去𥘉逺無相得之理矣聽天命之自至而已上則最逺而窮矣蓋陰生必至敵陽故彖戒以勿取而陽得隂猶可制故爻又欲其制隂此全卦六爻無非扶陽抑隂之意也姤女壯勿用取女姤遇也一隂生于五陽之下五月之卦也夬決之盡則為純乾一隂忽生于下如不期而遇者故為姤一隂而遇五陽女德之不貞而壯之甚者取以自配必害乎陽故戒以勿取也彖曰姤遇也柔遇剛也五陽往而隂方來故曰柔遇剛勿用取女不可與長也女德不貞不能從一而長久也天地相遇品物咸章也以卦體言之五陽在上而一隂生于下以隂遇陽天地相遇也以卦畫論其時則為五月萬物茂育蕃衍品物咸章也剛遇中正天下大行也夲義專指九五謂以剛明之君遇建中表正之位德因位顯治化大行于天下也今宜兼二五言九二之剛德遇九五中正之君明良會合道可行于天下也彖辭慮隂之始生彖傳又以遇之善者言之天之遇地臣之遇君時當相遇所關者不小姤之時義大矣哉程傳專承天地君臣之相遇言之夲義謂幾微之際聖人所謹蓋以柔遇剛遇之不善者也天地相遇剛遇中正遇之善者也隂陽造化之夲不能相無就姤而言豈必無善者然當品物咸章治化大行之時實為隂長陽消之幾所自伏當其時者不可不思其義預為扶陽抑隂之計也象曰天下有風姤后以施命誥四方風者天之號令所以鼓舞萬物命者君之號令所以鼓舞萬民施命誥四方取風行天下之象也君門深于九重豈能與民相遇惟施命誥四方則君民相遇猶風之遇物也觀為地上之風旁行而通姤為太虛之風自上而下故觀言省方而此則言施命也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅以止車金柅言其堅也乾為金𥘉隂在下宜靜正自守有繫于金柅之象其貞也如是則吉矣然𥘉隂已動有攸往之象故又言當遇之時若以隂往遇陽則立見其凶矣設言一吉一凶使之自擇也豕隂物𥘉𫝑雖微然在下而動有羸豕蹢躅之象言隂雖微而躁動漸進侵陽猶豕雖羸其蹢躅跳躑有必然而可信者不可不預為之備也此爻只宜就隂不宜輕動遇陽言之而戒小人警君子之意皆在其中不必專言小人之害君子象曰繫于金柅柔道牽也𥘉四相應將牽連而上故柅以止之也九二包有魚無咎不利賔魚陰物巽為白茅二與𥘉近𥘉在其內為包有魚之象得之則陰受制于陽矣故無咎乾尊有賓象二包𥘉而有之則二為主而四為賓四雖正應反不得而有𥘉矣故有不利之象蓋卦以遇合為義遇合之女未嘗擇配二近則先有之矣象曰包有魚義不及賓也一隂不能兼二陽揆之于義不能及之矣譬衆漁之取魚先至者得之後至者雖善漁不及也九三臀無膚其行次且厲無大咎巽為股三居巽之上有臀象過剛不中與上無應居則不安有臀無膚之象下不遇𥘉為二所隔行則不進有其行次且之象進退如此雖有危厲然無所遇亦不為隂邪所傷故無大咎也夬四欲上決上而不能此則欲下遇隂而不得故取象皆同象曰其行次且行未牽也𥘉隂上進又與四應若有引進之者故宜繫之三孤孑無應下又隔二無牽引之者是以行次且也九四包無魚起凶四與𥘉正應當遇者也乃己遇于二不及于四有包無魚之象人心已離凶自此起矣蓋遇夲非正故正應無遇之象此即二之所謂不利賓也象曰無魚之凶遠民也隂為民民之去己猶己逺之也隂陽之取象不一或取于男女或取于君子小人或取于君民姤取男女之遇夲非其正故四不得𥘉而二得之然隂之𥘉長近者易制逺者難及故二取象于得魚以言君子小人近而得制故可無咎但陽宜得隂以為正應故四取象于君之失民必至召凶取象雖異而大意皆扶陽抑隂占者亦隨事變通以占之不可執一也九五以杞包瓜含章有隕自天杞高大堅實之木九五陽剛中正主卦于上有杞象瓜柔蔓之物𥘉隂在下有瓜象五與𥘉逺不相遇𫝑不能相制有以高大之杞欲包在地之瓜之象姤隂長之卦而九五居陽明之位有含晦其章美之象瓜性善潰終有必壞之時隂陽消長姤又有終復之𫝑靜以待天心之復有有隕自天之象陽剛之君在上小人方盛𫝑未能制姑靜晦以待元惡之自斃若晉明帝之于王敦其事類之象曰九五含章中正也有隕自天志不舍命也居中得正故能含其章美不失之暗昧亦不失于淺露也志不舍命蓋隂長而陽消天之命也有以勝之人之志也君子不以命廢志九五之志堅則必有自天而隕者言人之至者天不能勝也上九姤其角吝無咎上九剛而在上無位無應不得所遇為姤其角之象吝道也然不為隂邪所侵亦無咎矣蓋隂之𥘉萌能如二包而制之可也四不能包反受其凶三以剛在下卦之上故雖厲而無大咎上以剛居上卦之上雖吝而無咎蓋遇夲非正故不遇無可咎也象曰姤其角上窮吝也剛上窮極自無所遇也大抵當姤之時小人固不可使之進而君子又不可無以蓄小人彖但言隂長之宜防而彖傳復言陽剛之可行君子當此正宜慎之于微也𥘉爻戒小人之不可往二四五皆言包制之道唯三以重剛不中上以剛居卦極故厲而吝然皆無咎亦以與隂不相遇皆不與隂之進也萃卦下坤上兌澤在地上水之聚也水潤澤其地萬物羣聚而生萃之象也又上説下順九五剛中二以柔中應之萃之由也故為萃萃卦次姤按序卦姤者遇也物相遇而後聚故受之以萃萃者聚也物相會遇則成羣萃萃所以次姤也全彖當萃聚之時理𫝑必亨但當得正則可大有所為此全彖之大旨也六爻四陰萃于二陽五得位而權分于四故有元永貞之戒四以陽有可萃之權而不居其位故必大吉而後無咎𥘉宜應四而隔于二隂故衆笑而可往二五正應而二中正故有引吉之占三比四不得應上非正故不免于小吝上無位求萃不得唯有齎咨涕洟而已此六爻之大略也萃亨王假有廟利見大人亨利貞用大牲吉利有攸往澤上于地萬物萃聚之象亨字衍文廟所以聚祖考之精神人必先聚己之精神乃可入廟而承祖考當萃之時故宜為卜祭之吉占也既萃則宜見大人可以得亨而貴于正不正則亦不能亨矣萃當物力豐盛之時故祭享宜豐用大牲則吉萃當人心翕聚之會故凡事可為而有所往則利也全卦六爻二三五互艮為門闕內坤純隂有宗廟之象九五居尊而二應之有利見大人之象二五皆居中得正有利貞之象大象坎為豕外卦兑為羊內卦坤為牛大牲之象損之時二簋可享則萃之時宜用大牲矣渙之時利涉大川則萃之時宜利有攸往矣彖曰萃聚也順以説剛中而應故聚也以卦德卦體釋卦名坤順兌説五剛中在上而二以柔中應之君臣聚會之時也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也致孝享言萃一己之精神以萃祖考之精神所以盡孝享之心也盡志以致孝盡物以致享二五正應君臣遇合以道所謂聚以正也當萃之時物力豐贍事𫝑可為時豐而豐道隆而隆皆天之正理故曰順天命也觀其所聚而天地萬物之情可見矣陽倡陰和乾始坤生天地之化育皆聚也形交氣感聲應氣求萬物之生成皆聚也于咸見情之通于恆見情之久于萃見情之同然情之所以同其理夲一故也人能聚其精神則天地萬物與我一造化在我心矣象曰澤上於地萃君子以除戎器戒不虞澤在天上有恩澤之意在地上有潤澤之意潤澤故生萬物而萃也水聚而不防則潰衆聚而不防則亂除者去舊取新除其弊壞以為不虞之偹也曰戒不虞則非以耀武矣若秦之銷鋒鑄鐻則非除戎器之謂黷武窮兵又非戒不虞之謂也𥘉六有孚不終乃亂乃萃若號一握為笑勿恤往無咎𥘉與四應而質柔不能固守有孚不終之象二隂間之同類妄聚乃亂乃萃之象應四又連兑體若有所呼號之象二隂羣聚而非之互體為艮為手兊為説有一握為笑之象一握猶一羣曰握小之也大象坎為加憂恤之象初變不成坎勿恤之象初能勿恤二陰之笑往從正應則無咎矣比𥘉無應而有孚盈缶終有他吉萃𥘉有應而有孚不終至于乃亂乃萃者比一陽得位諸爻比之者其情專萃二陽四不得位二隂得以間之其志亂也象曰乃亂乃萃其志亂也為同類羣隂所亂也六二引吉無咎孚乃利用禴互艮為手牽引之象中正相應孚之象艮為門闕二變互離禴為夏祭利用禴之象二與五為正應君臣道合矣然在二隂之間必牽引其同類之𥘉六六三以萃于五則得以人事君之義乃吉而無咎矣又以二之柔順中正應五之剛健中正至誠交孚不事煩文猶四時之祭夏用禴以聲為主祭之薄矣然用之亦利當萃乃大牲可用之時然誠意既孚則雖薄亦可祭矣蓋人臣薦賢為國非以植黨則誠意可以上達也象曰引吉無咎中未變也隂柔不能固守則所萃不正二有中正之德不變所守也六三萃如嗟如無攸利往無咎小吝六三隂柔不中不正欲萃于四而非應有萃如嗟如之象如是則無所利往從于上我順彼説可以無咎矣然上隂無位所應非正故又小吝與𥘉之往無咎者不同也象曰往無咎上巽也上應雖非正以其説體能巽順以從之也九四大吉無咎上比九五下比衆隂得其萃矣然以陽居隂不正非君位而得衆心有僣逼之嫌故必大吉然後可無逼君之咎也此與隨四同義隨四以承五致天下之隨必有孚而後無咎此以承五致天下之萃必大吉而後無咎所以戒人臣者至矣象曰大吉無咎位不當也不居君位也九五萃有位無咎匪孚元永貞悔亡九五陽剛中正以居尊位當萃之時有位則與四之不當者不同足以致天下之萃而無咎矣然有四分其權故或有匪孚者必修其元善永長正固之德則無思不服而悔可亡也象曰萃有位志未光也有位而猶匪孚志未光大故反己修德為要也上六齎咨涕洟無咎齎咨嘆息也自目曰涕自鼻曰洟兑口之嘆有齎咨象兑澤之流有涕洟象處萃之終隂柔無位求萃不得必如是然後可無咎也象曰齎咨涕洟未安上也五為萃主而上乘之心自不安也按萃卦六爻或有應或無應或當位或不當位而皆曰無咎蓋天地萬物之情既聚吉多凶少此萃所以亨也然萃卦與比卦相似比以五為主而吉萃亦以五為主而有匪孚者比卦一陽其情專萃多九四一陽其𫝑分也然萃六爻皆無咎而比之六三傷上六凶者比則向背已定其情私萃則進退未定其情猶公也然比卦一陽為主故于全彖言元永貞萃卦二陽獨于九五言元永貞則凡人君者當萃比之時非有元永貞之德無以善其始終也升卦下巽上坤木生地中長而益髙升之象也又卦綜萃下卦之坤升為上卦亦升之義也升卦次萃按序卦萃者聚也聚而上者謂之升故受之以升物之積聚益髙而上升所以次萃也全彖內巽外順九二剛中而六五虛中以應君子進用之象故可以見大人而利于前進六爻六五為升之主下四爻皆有可進之象唯上當升之極而猶升不已則冥升而已此全卦六爻之大略也升元亨用見大人勿恤南征吉升進而上也木自地生卦綜萃坤升于上內巽外順九二剛中有應皆有大亨之象以剛中之臣遇柔中虛己之君有宜見大人不事憂恤之象後天巽坤之中為離有南征得吉之象彖曰柔以時升按夲義謂以卦變釋卦名謂解之三上居四也隂陽二氣迭為升降剛在上以為常柔在上則以為時亦扶陽抑隂之意也來注以卦綜言萃下卦之坤升而上也然竊按卦變柔進居上者多即卦綜坤居上者亦多獨此以升言當以卦象言之五行惟木最柔然及時之既至則自地下升于地上又巽為風風有氣無質亦最柔者也然時之既至亦自地而上升大象專言木此兼木與風言之故曰柔以時升巽而順剛中而應是以大亨以卦德言之內巽則沉潛觀理外順則從容待時以卦體言之二有剛中之德應五虛己之君宜其大亨也用見大人勿恤有慶也南征吉志行也萃以五為大人升以二為大人聚者下之所樂故但見言利見大人進者上之所忌故言用見大人勿恤慶在得君而志在行道也象曰地中生木升君子以順德積小以高大夲義以順作慎謂事事謹慎乃能積小以至髙大也然按坤巽二卦皆有順義木之生自小至大人莫見其迹順其自然也學問積小以至髙大亦順其自然不間以私意而已初六允升大吉以柔居下無應于上夲不能升而二三當上升初巽于二陽二陽允之故大吉也晉三衆允為二隂所信也以陰信隂不過悔亡而已以陽信陰故得大吉也象曰允升大吉上合志也程傳以上專指九二然二陽皆欲上進者初為巽主與二陽同體故從夲義兼指二三九二孚乃利用禴無咎萃六二以中虛為孚此以中實為孚二變互坎為隱伏鬼神祭祀之象以剛中之臣應柔中之主至誠相感可以不事文飾猶禴祭之簡質可達于神也如是則可以無咎矣象曰九二之孚有喜也君臣相信有得時行道之喜也中互兑喜悅之象二未言升有喜則可升矣九三升虛邑陽實隂虛坤為國邑九三以陽剛當升之時進臨于坤故有升虛邑之象象曰升虛邑無所疑也三得正應可以無疑也六四王用亨于岐山吉無咎人積誠以達于神有升而上通之義故二四皆以祭享言之五隂居尊山象四承之亨于岐山之象四未居尊位文王在岐周時之象又二大臣四近臣升有逼上之嫌故皆不言升而以誠意上達為升如是則吉而無咎也象曰王用亨于岐山順事也按夲義謂以順而升登祭于山之象竊按順宜就文王言之文王三分有二以服事殷順之至也守人臣之位而以積誠上達為升所謂順也六五貞吉升階以陰居陽疑于不正故言必正固則吉如升階之易矣坤為土有階象六五以隂居尊必有正固之德以居天子之位則正朝廷以正萬民如升階之易也象曰貞吉升階大得志也居尊致治其志大得又自下而上至君位而極矣故曰大得志上六冥升利于不息之貞以陰居升之極務進不已昏冥于升者也若能反其升位之心以升其德則純亦不已積而愈髙故曰利于不息之貞也使不貞則其不息何所利哉象曰冥升在上消不富也隂虛不富升極必降長極必消昏冥不已不能有其富矣全卦以卦綜言之則坤升巽上以二象言之則木自地升以六爻言之則六五為踐阼之君升至此而極為升之主而下四爻皆上升者二應五之大臣四承五之近臣皆嫌于言升積誠上達亦升也𥘉在下小臣也得上援而升三立功任事之臣也升而得國上無可升而務升不已能為不息之貞則衛武公之髦期進德也若徒于位求升君則周天元臣則莾卓之臣而已其昏冥何如哉困卦下坎上兑以二象言之水在澤下枯涸無水困乏之象以二體言之兑隂在上坎陽在下以卦畫言之上六在二陽之上九二限二隂之中皆以隂掩陽故為困困卦次升按序卦升而不已必困故受之以困干進不已必取困窮困所以次升也全彖以處險而説二五剛中有處困而亨之道然惟大人能之但不可尚口以取困窮此全彖之大旨也六爻以三柔掩三剛大抵柔掩剛者凶而剛之被掩者吉下卦𥘉三凶而二吉上卦四五吉而上悔蓋在困不失其亨惟君子故剛爻多吉也上雖有悔而不至于𥘉三之凶則又困極而通之漸也此六爻之大略也困亨貞大人吉無咎有言不信困窮不能自振也坎剛為兑柔所掩九二為初三所掩四五為上六所掩所以為困坎險兑説處險而説有亨之象困而能亨得其正矣二五剛中有大人象身困道亨非大人不能其占吉而無咎也兌為口有言象坎為耳痛有言不信之象當困之時嘵嘵有言人必不信徒取困窮也他卦言亨言貞亨由于貞此則亨所以為貞蓋處困能亨惟貞正之大人能之所以吉而無咎有言不信則戒之之辭也彖曰困剛掩也不曰柔掩剛而曰剛掩卦為君子設言剛之受掩若剛自為之亦抑隂之意也此以卦體釋卦名也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也困而不失其所亨亨不于其身于其心不于其時于其道也剛中指二五凡人處困大則失節小則憂隕以中不剛耳剛中則知眀守固居易俟命所以貞大人吉也兑口在上有尚口之象剛德在中無藉于口尚口欲以出困反以致窮蓋困時向人嘵嘵即不能亨即非貞矣象曰澤無水困君子以致命遂志水下漏則澤枯故曰無水致命委致其身也委命于天以遂我之志論是非不論利害論可否不論死生所謂困而亨也致命有坎險之象遂志有兑説之象初六臀困于株木入于幽谷三嵗不覿全卦剛為柔所困六爻柔之困益甚蓋在困時無剛德則不能亨故也人之體行則趾為下坐則臀為下𥘉六不能行而坐困者故有臀象株木不可坐者全卦水澤中互巽木水草之區故初三上皆以草木取象兑正秋坎正北𥘉六在坎之下大冬之時蔓草凋脫僅存株木有困于株木之象又坎險之最下有入于幽谷之象四夲正應而四亦在困中不能振人初距四三爻不能遽遇于四有三嵗不覿之象象曰入于幽谷幽不明也陽眀陰暗陰居最下不明之極自陷于深困也能眀則亨矣九二困于酒食朱紱方來利用亨祀征凶無咎坎為酒食陽陷陰中上無應與有困于酒食厭飫過宜之象然與五同德五雖亦在困中緩乃終合又二互三四為離有朱紱方來之象坎中實誠意在中利用享祀之象無應而在險中行非其時有征凶之象然朱紱之來正宜竭誠圖報雖時值艱難征則有凶而鞠躬盡瘁于義無咎也象曰困于酒食中有慶也雖困于酒食而有剛中之德終能當大任以造福于天下也六三困于石據于蒺藜入于其宫不見其妻凶六三不中不正上無應與將比于四而四扼之四以兑體堅不可動有困于石之象乘乎九二之陽而剛鋭不可倚又坎為蒺藜有據于蒺藜之象六三居陽而上六居隂故三以上為妻互巽為入互離而此爻變為有目不見三求配于上入其宫則是而上六非正應有入其宫不見其妻之象上非所困而困下非所據而據身危而家不可保矣象曰據于蒺藜乘剛也入于其宫不見其妻不祥也三變為大過有棺槨象不祥死期將至也九四來徐徐困于金車吝有終按夲義初六九四正應九四處位不當不能濟物而𥘉六方困于下又為九二所隔故其象如此然邪不勝正故其占為可吝而必有終也今按卦以剛掩于柔為名則九四不宜困于九二之剛宜合坎體言之初與四為正應𥘉受困而待拯于四四以剛居柔力不能濟故有來徐徐之象兑為金坎為輪兑之二陽皆為上柔所掩四復乘坎之險有困于金車之象如是誠可吝矣然上承五陽有與故有終也象曰來徐徐志在下也雖不當位有與也按程傳以𥘉之正應為與竊按剛掩之卦無取于隂之與宜作上承五陽為有與有與則亨而有終矣九五劓刖困于赤紱乃徐有説利用祭祀按夲義以上為隂掩下則乘剛為劓刖上下既傷則赤紱無所用為困竊按剛掩之卦不宜以乘剛為掩五居三陽之上君位宜合全卦論之上掩于上六有劓象下困于坎初有刖象二二四互為離南方赤色紱下體之衣為君而在困中上下被掩則雖衣純朱之赤紱亦無所用矣有困于赤紱之象然而剛中説體誠意可格于鬼神故有徐有説利用祭祀之象象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也志未得在困中主威不振也中直有剛中之德是非有别不惑羣枉也受福者至誠格天則可祈天而永命矣此困之亨也上六困于葛藟于臲卼曰動悔有悔征吉澤水草之區水枯而草木叢雜故困三陰爻皆取于草木坎北方𥘉冬將盡僅存株木三秋冬之交草葉脫而刺存故象蒺藜兌上𥘉秋蔓草未殺也故有困于葛藟之象葛藟在束縛之中臲卼不安之狀曰動悔言處困之極動則有悔也有悔征吉之悔與上不同上言事必致悔此言心能自悔也言能自悔其所為則不終于困往而可以得吉所謂困極而通也九二征凶在險中也上六征吉困之極出險之外也必曰有悔聖人欲人之悔過也象曰困于葛藟未當也動悔有悔吉行也所行未當所以受困動而有悔也然困悔而能有悔則行為吉行可以出困矣全卦以剛掩為困唯其剛故在困而亨為貞為大人然剛中則亨尚口則不信處困之道盡是矣六爻初困于株木三困于石而二之困酒食則有慶𥘉三凶而二吉也四有終五有説而上則未當四五吉而上凶也蓋陽剛為能亨貞之大人故陽爻雖困皆吉陰爻唯上有有悔征吉則聖人望人悔過之心困而知悔亦可學為君子矣井卦下巽上坎巽入于水汲而上之井之象又以卦畫論之初柔象泉源三二剛象泉四柔井之中五剛泉之上出上柔井口有全井之象故名井井卦次困按序卦困乎上者必反下故受之以井上升至于困必反于下物之最下者莫如井井所以次困也全彖以井有常體猶事有常法時異而法不異又當敬以守之不可垂成而敗也六爻以三陽為泉三隂為井二曰射始達之泉三曰泄已潔之泉五洌則可食之泉矣初泥方掘之井四甃已修之井上收則出汲之井矣又以六爻之序言之𥘉泥而二谷井之地在下未見于用者也三泄而四甃在人位則人事盡可以待用矣五洌而上收則得乎天功用及物井道大成矣此全卦六爻之大旨也井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶巽木入于坎水之下上出其水故謂之井邑有改而井不改其體有定也井卦綜困在困為兑在井為巽巽為市邑今改為巽而坎卦不改改邑不改井也改邑而不改井是以無得無喪而往者來者皆井其井其用有常也汔幾也繘綆也巽為繩繘象中爻離瓶象羸弱也墜落之意井之為用如此而有事于井者又當敬以處之使汲井幾至未盡綆而敗其瓶則凶矣時解以言治道言因革貴得其宜然一切學問人事皆可通也彖曰巽乎水而上水井井養而不窮也以卦象釋卦名義木桶下汲而水乃上巽乎水而上水也井取之無禁用之不竭飬而不窮也井改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也以卦綜言之兊改為巽而坎之剛中不改在困居二之中在井居五之中也井以得水為功未得水而羸瓶井養之道廢矣故凶象曰木上有水井君子以勞民勸相木上有水程子作取水木器夲義疑瓶從瓦作草木之津潤上行竊按古人樽罍亦以木為之字乃從缶則瓶亦有木器從程傳為順勞民者以君飬民勸相者使民相飬皆井飬之義初六井泥不食舊井無禽井以陽剛為泉上出為功𥘉六隂柔在下泥象不可食矣舊井未泄者井廢則舊旁無汲水之餘瀝禽安得而食之坎有禽象今在上卦禽髙飛莫顧無禽之象象曰井泥不食下也舊井無禽時舍也所處汚下為時所棄九二井谷射鮒甕敝漏谷井傍穴鮒或作鯽或云泥鰍皆水中小魚喜食泥者巽為魚鮒象三四五互離甕象九二上無正應下比𥘉六有井谷射鮒之象功不上行又巽體下斷有甕敝漏之象此有德無援不能濟物者也象曰井谷射鮒無與也上茍有與則汲而出成井養之功矣九三井泄不食為我心惻可用汲王明並受其福泄泄去泥也泄則清而可食矣不食者人不食也九三以陽居陽上雖正應柔而無位修已全潔未為時用二三四互兑為口三變成震不成兌口有井泄不食之象坎為加憂心惻之象言如是則雖行道無與之人亦為之惻然矣然三之潔清實有可用汲之泉特無王眀耳使王之眀汲之則井飬之功可成豈獨三之遇哉澤可大行天下並受其福矣五為王位三四五互為離王眀之象五非其應故有待于王之眀也象曰井泄不食行惻也求王明受福也行惻行道之人皆為心惻求王明非枉道干進孔孟之轍環是也不求正應而求王眀易之所以時也六四井甃無咎以六居四隂柔非泉然所居得正雖未有及物之功而能自修治者故有井甃之象亦可以無咎矣象曰井甃無咎修井也𥘉六不正在下故為泥六四正而在上故為甃甃所以禦泥達泉間邪存誠之功故曰修井三之泄修于內以致潔四之甃修于外以禦汚內外交修濟物及人之夲也又四大臣近君修井以儲九五之寒泉能盡臣下之職可因君以成井飬之功矣九五井冽寒泉食三居甃下未汲之泉也五居甃上已汲之泉也陽剛中正功及于物有井冽寒泉食之象冽潔也泄潔之也泄已可食至此乃食蓋泄與冽性也食不食命也未有泄而不冽者至此則井飬之德已具井養之功可行矣象曰寒泉之食中正也居中得正故六爻唯五曰泉雖未收上出之功井之德已盡善矣上六井收勿幕有孚元吉收成也即小象之大成也幕蔽覆也蓋井之具也有孚者其出有源而用不窮也上六雖非陽剛而井之功用在上坎口不掩故有井收勿幕之象濟人澤物元吉可知象曰元吉在上大成也他卦至終則變井至上功乃大成也按水之大者不一而聖人畫卦有取于井者凡水皆水之下流故他卦言水皆以險言之獨井泉在冬而溫乃天一之真性也是以古者建國必先卜井泉之便而居之井之為用大矣時解專就治道飬民言之然飬德飬民治已治世皆可觀象于井隨其所處以占其吉凶也革卦下離上兌火燃則水涸水決則火滅又二女同居志不相得有變革之義故為革革卦次井按序卦井道不可不革故受之以革井之為物久則汚易之則潔不可不革革所以次井也全彖以改革之事不信于初而信于後其占可以大亨而必利于正固見革之不輕也六爻下三爻有不輕于革之意上三爻則革之善者而上革道已成又不可過有所更此全卦六爻之大略也革已日乃孚元亨利貞悔亡革卦澤上火下火燃水乾水決火滅又中少二女合為一卦少上中下志不相得故卦為革日為離象日入澤有已日象民可與樂成難于慮始故不信于方革之時而信于已革之日內有文明之德外有和説之氣占可大亨然而改革之事非可妄舉必得其正則所革皆當而悔可亡若不貞則不孚而有悔矣彖曰革水火相息二女同居其志不相得曰革以卦象釋卦名義與睽相似相違背為睽相滅息為革二女不同行離而去之而已不相得則相克矣故為革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡眀則燭事理能見于已革之先説則順人情能孚于已革之後大亨者除弊興利一事之大亨伐暴救民舉世之大亨正者順天理合人心也又亨又正則革之當革當而悔乃亡見革之不可輕也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉天地帝王之革皆視其時先時後時皆不可也象曰澤中有火革君子以治厯明時四時之變革之大者厯之因時修改革之義也初九鞏用黃牛之革黃中色牛順物離得坤之中皆有牛象雖當革時而居初位卑無可革之權無應無共革之人未可有為當堅固以守不可輕有所革如用牛皮以束物者故其鞏固有用黃牛之革之象當以中順自固也初變為艮止故有此象象曰鞏用黃牛不可以有為也時位不可六二已日乃革之征吉無咎六二柔順中正文眀之主有應于上可以革矣猶必已日乃革則征吉而無咎彖言已日已革之日也爻言已日日已至然後革也蓋德與位皆可革猶俟其時也象曰已日革之行有嘉也行將然之辭革必俟時將有嘉美九三征凶貞厲革言三就有孚應兑互乾為口為言離居三革言三就之象中實有孚之象九三過剛不中居離之極自恃剛眀躁于革者故戒以征則凶雖貞亦厲也然時當可革爻位居三審量所革再三已有成説亦可見信于人而在所當革矣象曰革言三就又何之矣至于再至于三無所待矣九四悔亡有孚改命吉以陽居隂有悔之象然卦已過中水火之際乃革之時剛柔不偏又革之用故有悔亡之象然必有孚則改命而吉矣下三爻猶不輕革至此則已革而改為新矣三議革而後孚四有孚而始改革之序也象曰改命之吉信志也謂上下信九四之志也九五大人虎變未占有孚變希革毛毨毛落更生潤澤鮮好也乾以純陽為龍以剛健亦為虎五互乾有虎象九五陽剛中正當革之時而居尊位湯武之順天應人者也故有大人虎變之象有孚在未占之先則致此者有素矣象曰大人虎變其文炳也炳者如火日之光眀也改正朔易服色制禮作樂皆是也即彖所謂文眀以説也上六君子豹變小人革面征凶居貞吉虎文踈而著故曰炳豹文密而理故曰蔚九五皆陽大人虎變之象上六皆隂君子豹變之象兌説見于上有革面象君子小人以位則有上下以德則有邪正上六處革之極革道已成君子變革其外而有文小人變革其外而順君復何所求哉若他有所往則梗化之民凶矣况上六之才亦不可有為惟有居貞靜守則吉耳蓋革非得已之事𥘉未可革當中順以自守上既已革當靜正以自居蓋九五湯武之事上六則伊吕之事也象曰君子豹變其文蔚也小人革面順以從君也蔚者隱然有文之謂上六柔故也全卦言變革之事皆不得已而為之初用黃牛不敢輕于未革之先也上言居貞不敢擾于已革之後也二之征吉必俟已日三已三就猶戒征凶當革之時必孚以信乎人心當以合乎天理乃可言四之改命為五之虎變也革豈易言哉鼎卦下巽上離取其象亦取其義取象有二以全體言之下植為足中實為腹對峙于上為耳橫亘于上為鉉以二體言之中虛在上下有足以承之皆鼎象也取義則以木從火烹飪之義故為鼎鼎卦次革按序卦革物者莫若鼎故受之以鼎水火不可同處能使相合為用而不相害易堅為柔變生為熟能革物也鼎所以次革也全彖以內巽順而外文眀柔進居尊得中應剛可以大亨而六爻之義則以上出為功初幸其出否二幸其逺仇三不知六五之君則為失義四不知應于初六之小人則為失信唯五之中實與上剛柔之節有吉占焉蓋井與鼎皆以上出為功故也此全卦六爻之大略也鼎元吉亨吉字衍文彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢象卦畫取鼎之象也亨飪以二體言鼎之用也亨飪不過祭祀賓客祭之大者莫過于上帝賓之大者莫過于聖賢享帝貴誠用犢而已故言亨聖賢則偹饔飱牢醴之盛故言大亨此以卦體釋卦名義也巽而耳目聰明柔進而上行得中而應乎剛是以元亨以卦象言則內巽而五為鼎耳離為目此心順巽則入乎義理耳目聰眀則審乎事幾有其德矣以卦綜言則革下卦之離二上行居五有其位矣以卦體言則五有虛中之君而二應以剛中之臣有其輔矣眀良道合治化大成宜占為元亨也柔進上行得中應剛與睽同而占不同于睽之小事反同于大有之元亨其時與德之異也象曰木上有火鼎君子以正位凝命離為聽政之位巽為命令天之命亦命也恭己以正其位而凝固其所受于天之命蓋鼎為重器故有正位凝命之象初六鼎顚趾利出否得妾以其子無咎初居鼎之下趾象上應九四有顚趾之象然當卦𥘉鼎未有實舊有否惡之積因顛而出去之有利出否之象六以隂居初不正有妾之象趾不宜顛而利以出否妾得不足貴而因以得子蓋因敗以為功因賤以致貴也故占可無咎象曰鼎顚趾未悖也利出否以從貴也顚趾悖矣可以出否則未悖從貴去鼎中否之可賤以從珍羞之可貴者也九二鼎有實我仇有疾不能我即吉以剛居中有實之象我仇謂初隂陽相求而不相得所謂怨耦曰仇也二以剛中自守𥘉雖近而顛趾不能就之有我仇有疾不我能即之象故吉象曰鼎有實愼所之也我仇有疾終無尤也雖有實而不愼所之則為仇所即而有尤矣不昵于𥘉上從六五之正應所以有吉無尤九三鼎耳革其行塞雉膏不食方雨虧悔終吉革變革也九三以陽居鼎腹之中夲有美實者也然與五不相應五為鼎耳鼎耳方革不可舉移故有鼎耳革其行塞之象上卦離為雉三變為坎為膏互兑三變則兑口不成承上卦文眀之腴而不見應于五有雉膏不為人所食之象又變坎為雨隂陽和則雨三以陽居陽為得其正然以正自守而五將求之如隂陽之和而雨悔可虧而終得吉矣象曰鼎耳革失其義也仕以行義三不應五而應上失君臣之義九四鼎折足覆公餗其形渥凶九四居上任重有實之鼎也而下應初六之隂大臣信任匪人敗壞國事傾覆天祿享上帝養聖賢之用皆廢矣初在下足象互兌為毁折折象四變為震震動顚覆有折足而覆公餗之象形渥作刑剭謂重刑也周禮所謂不于市而以適甸師氏者也不勝任而被重刑也𥘉否未出顛之猶可舍舊而求新四鼎有實折之則鼎毁而用廢吉凶所以異也象曰覆公餗信如何也才不勝任無以自信亦失君上信任之意矣六五鼎黃耳金鉉利貞五有耳象黃中色五居中有黃耳象金剛物鉉貫耳以舉鼎者五變乾金鉉象五以柔中下應九二之剛中有黃耳金鉉之象六五非正故勉以利貞蓋以柔中之君下用剛中之臣即彖所謂得中而應乎剛者也或以鉉為上九則與玉鉉重復且失彖意象曰鼎黃耳中以為實也五中虛以得中為實德上九鼎玉鉉大吉無不利舉鼎在鉉故上有鉉象以剛居隂剛而能溫又上變為震為玉有玉鉉之象玉非可為鉉取象不可拘也鼎道貴和至此則隂陽和而鼎之功成可舉鼎實以成飬人之功矣故其占大吉無不利時解以言相道之得中者亦可象曰玉鉉在上剛柔節也爻剛位柔剛柔中節故成夑理之功也全卦有元亨之象而六爻獨五上為最吉蓋井與鼎皆以上出為功五為主鼎之君上輔鼎之臣二應五亦輔鼎者也君臣相得以成至治而致元亨故皆吉初在下附𫝑猶幸能因敗以為功三有德不仕亦終能守正以待遇唯四以大臣比匪遂致覆餗雖因事為占不必過拘而就君臣治道言之則大略如是矣震卦一陽動于二隂之下動而震驚故為震震卦次鼎按序卦主器者莫若長子故受之以震鼎者器也震為長男承主重器震所以次鼎也全彖以震有可亨之道蓋人能戒懼則雖震動不失其常不喪其所主之重也六爻以初為震主與彖同占四陷二隂之間則失所以震矣四隂皆受震者二乘初剛而厲三稍逺則無眚矣五乘四剛以居中不至有喪上逺四則不于其躬矣此全卦六爻之大略也震亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩虩恐懼驚顧之貌啞啞言笑自如也匕所以舉鼎實鬯所以和秬黍皆主祭之君所親執者震一陽方動而上為二隂所掩有虩虩之象隂破而上逹有啞啞之象雷鳴及逺有震驚百里之象長子主器有不喪匕鬯之象震有可亨之道虩虩震也笑言以下震之亨也以人心言之茍能常自戒懼如震之來虩虩不寧然仰不愧俯不怍從容自得雖憂患之至如雷震驚百里之逺在我亦不至失所守之重也彖曰震亨震則自亨唯震故亨兼二義震來虩虩恐致福也笑言啞啞後有則也恐致福恐懼以致福所謂生于憂患也後恐之後也有則者言笑有常不以震驚而變也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也驚逺懼邇言雷威之可畏也此句之下程子謂脫不喪匕鬯四字從之出字或云即鬯字之誤今應作帝出乎震之出謂繼世而主祭也當其執匕鬯以祭心存誠敬雖震驚百里而莫之聞可以為宗廟社稷之主矣如舜之烈風雷雨弗迷堯乃使之嗣位是也象曰洊雷震君子以恐懼修省上下皆震重襲而至故曰洊恐懼存于心修省見于事恐懼繼以修省所以盡畏天之實象雷之洊也𥘉九震來虩虩後笑言啞啞吉初九九四二爻震之所以為震者下餘四隂爻皆受震者而初又成卦之主也故占與彖同爻之吉即彖之亨也象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得億大也十萬曰億貝介蟲古者用為寶貨也躋升也九陵猶九臯髙處也二變為離貝象六二乘初九之剛有震來甚厲必喪其重寶之象上互三四為艮有升于九陵以避之之象占者為震動而有所失能中正自守則不求而終獲也象曰震來厲乘剛也近雷之威故危六三震蘇蘇震行無眚蘇蘇緩散自失之狀以隂居陽當震時而所居不正有蘇蘇自失之象然去震𥘉稍逺因震而能行去其不正猶可以避災眚三互坎為眚變陽則無眚之象象曰震蘇蘇位不當也不中不正故宜急去九四震遂泥遂者不反之意泥滯溺也以剛居柔不中不正陷于二隂互坎為泥故有遂泥之象蓋無奮發之才而溺于宴安之私者也象曰震遂泥未光也陽夲光眀陷隂故未光六五震往來厲億無喪有事以柔居尊當震之時下乘四剛初始震為往四洊震為來五為君位震主故有往來厲之象然柔而得中不至于大有喪而震動戒懼之後事功因之以立故有億無喪有事之象五與二皆乘剛而四遂泥其𫝑稍緩故往來厲較之來厲者稍殊而無喪又不同于喪貝有事則又不但勿逐而已象曰震往來厲危行也其事在中大無喪也往來皆厲行則有危矣得中德而能有事故可無大喪上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索索神氣不存也矍矍視不定也鄰謂五婚媾指三以隂柔處震之極有震索索之象上變離為目有視矍矍之象三居位不正故宜行則無眚六居上正矣而過懼行必有失故有征凶之象四剛近五而逺上然能因此以自戒懼知畏天者也故有不于其躬于其鄰而于義無咎之象上變離為中女坎為中男婚媾之象三與上皆隂柔而不相應有婚媾有言之象親者尚議之則踈者可知象曰震索索中未得也雖凶無咎畏鄰戒也中未得謂處震極中心有所未安也因鄰戒而知畏可以無咎矣全卦皆言震懼而六爻皆無凶咎之言上雖征凶而亦無咎大抵人心泰侈則致禍戒懼則致福也艮卦一陽居二隂之上陽動至上則止隂性夲靜上止下靜故為艮不曰止而曰艮止有畜止之義艮有安止之義又其象為山有安重堅實之意故曰艮也艮卦次震按序卦震者動也物不可以終動止之故受之以艮艮者止也動靜相因艮所以次震也全彖以上下不相應而相背為各止其所之義動靜皆止無我無人此全彖之大旨也六爻從二陽爻起義而全艮之時用者獨在乎上蓋九三互震失止之義故有厲薰心之占九五近上艮故悔亡四逺之則亦艮其身而已二近下艮能艮腓而不能拯初則逺之但未失正而已此六爻之大略也艮其背不獲其身行其庭不見其人無咎艮一陽止于二隂之上陽自下升至上而止其象為山取坤地而隆其上之狀亦止而不進之意也人以靣前為身後為背一身皆動而背則靜耳目口鼻皆有欲唯背無欲止之至也卦體似人背面而立故有艮其背之象蓋天下之理止于其所當止也然理有所當止而多所擾者起于有我之私唯艮其背則無我之見是以有不獲其身之象理有所當止而多所岐者又起于有人之見唯艮其背雖應事接物各因其宜無人之見是以有行其庭不見其人之象內外兩忘動靜皆定所以無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明此釋卦名也時止而止固止時行而行亦止非膠于止唯其時各當所以為止也人心無主則昏中有定止自然光眀又艮一陽見于二隂之上光眀著見隂莫能掩有光明之象艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也背即止之所故易背為止以見背即止也以卦體言之內外相敵而不相與陽上而隂下一陽而統二隂理無可加隂陽各正其性無外求之意所以內不見已外不見人也象曰兼山艮君子以思不出其位內外皆山故曰兼山理之所止為位思各得其所止不出其位也不出位身之止思不出位心之止亦兼山之義也初六艮其趾無咎利永貞趾所以行初隂在下方行之初當止而止不失其正故有艮其趾無咎之象止貴有終恐隂柔不能固守故勉以利永貞象曰艮其趾未失正也當止而行則非正事初而止則正未失六二艮其腓不拯其隨其心不快二居限之下趾之上有腓象居中得正有艮其腓之象三為限腓之所隨三過剛不中止于上而薰心二柔弱不能往而拯之然非其心之所欲也故有不拯其隨其心不快之象象曰不拯其隨未退聽也三止于上亦不肯退而聽二也九三艮其限列其夤厲薰心限身上下之際夤腰膂也九三上下卦之間有限之象人身榮衛上下流通則身舒而心泰九三以剛限于上下二柔之間止而不動如腰脊中強上下榮衛隔絶百骸不屬危懼驚心故有艮其限列其夤而危厲薰心之象艮以九居三為得正乃至于薰心者蓋三互四五為震為動艮之反也當動之時而止猶腰膂夲轉動之處乃中強不能屈伸所以危厲薰心亦有震驚之象也象曰艮其限危薰心也震上動極不寧故心不安艮三則所止不適故心危厲也六四艮其身無咎以隂居隂時止而止有艮其身之象可以無咎矣咸與艮皆以人身取象艮四正當心位不言心而言身兼動靜而言也心不可見身止則心之得所止可知矣象曰艮其身止諸躬也成已未能成物也六五艮其輔言有序悔亡輔頰兩傍骨不言頰舌止言輔背後所見也六五正當輔之地言所由出也以柔居尊發則為絲綸之言然柔而得中言不輕發發必有秩秩之德音故為艮其輔言有序之象以隂居陽疑于有悔然能得中悔可亡矣人莫大于言行艮趾艮腓慎其行艮輔慎其言也象曰艮其輔以中正也以其中故可兼正上九敦艮吉以陽剛居止之極自始至終一止于理而不變敦厚于止者也自初至五皆囿于一體未能盡止道之善獨上為成艮之主于當止之地而止焉所謂止于至善者又陽在上不為隂掩即彖所謂其道光明者故占曰吉與悔亡無咎者異矣象曰敦艮之吉以厚終也天下事有終為難而厚道有終尤難今于卦終敦厚其止宜其吉也全卦為震體之反其吉凶之反亦然震之吉在初動之主也艮之吉在上止之終也震之四下互二隂為艮失所以為震矣故遂泥艮之三上互二隂為震失其所以為艮矣故薰心趾腓下體取象于行輔在上取象于言而全卦取象于背言行得其所止可無咎悔之憂若夫忘我忘人事事安于所止必以上之敦艮為極乎周易淺述卷五
